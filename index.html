<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FamilyConnect">
    <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>FamilyConnect</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'media' }
    </script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <style>
        :root {
            --app-bg: #F2F2F7;
        }
        @media (prefers-color-scheme: dark) {
            :root { --app-bg: #000000; }
        }

        body { 
            margin: 0; 
            padding: 0;
            background-color: var(--app-bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-text-size-adjust: 100%;
            overflow: hidden; 
            overscroll-behavior-y: none;
        }

        .scrollable-area {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; 
            padding-bottom: calc(120px + env(safe-area-inset-bottom, 20px));
        }
        
        .scrollable-area::-webkit-scrollbar { display: none; }
        
        .ios-blur { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
        }
        @media (prefers-color-scheme: dark) {
            .ios-blur { background: rgba(28, 28, 30, 0.85); }
        }

        .pt-safe-top { padding-top: max(env(safe-area-inset-top), 24px); }
        
        input[type="file"] { display: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-action-sheet {
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>

</head>
<body class="text-black dark:text-white antialiased flex justify-center w-full">
    
    <div id="root" class="w-full relative flex flex-col h-[100dvh]"></div>

    <script type="text/babel">
        try {
            const params = new URLSearchParams(window.location.search);
            const urlCfg = params.get('cfg');
            if (urlCfg) {
                const decodedCfg = JSON.parse(decodeURIComponent(escape(atob(urlCfg))));
                localStorage.setItem('familyConnectAppConfig', JSON.stringify(decodedCfg));
                localStorage.setItem('firebaseConfig', JSON.stringify(decodedCfg));
            }
        } catch(e) { console.warn("Fehler beim Laden der URL Config:", e); }

        const originalConsoleError = console.error;
        console.error = function(...args) {
            originalConsoleError.apply(console, args);
        };

        window.addEventListener('error', (event) => {
            console.warn('Ignoriere Global Error:', event.error || event.message);
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.warn('Ignoriere Unhandled rejection:', event.reason);
        });

        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;

        const CONFIG_STORAGE_KEY = "familyConnectAppConfig";
        
        let app, db, auth, messaging;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-connect-pro';

        const generateId = () => Math.floor(100000 + Math.random() * 900000).toString();
        const getFamilyDocRef = (familyId) => db.doc(`artifacts/${appId}/public/data/families/${familyId}`);

        const getLocalTodayString = () => {
            const now = new Date();
            const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
            return local.toISOString().slice(0, 10);
        };

        const formatTime = (ts) => {
            if (!ts) return '';
            const d = new Date(ts);
            return isNaN(d.getTime()) ? '' : d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        };

        const formatDate = (ts) => {
            if (!ts) return '';
            const d = new Date(ts);
            return isNaN(d.getTime()) ? '' : d.toLocaleDateString('de-DE', { weekday: 'short', year: 'numeric', month: '2-digit', day: '2-digit' });
        };

        const getStatusColor = (ackString) => {
            if (!ackString) return 'text-[#8E8E93] dark:text-[#EBEBF5]/60'; 
            if (ackString.includes('Komme sofort') || ackString.includes('Übernommen')) return 'text-[#34C759]'; 
            if (ackString.includes('In 5 Minuten')) return 'text-[#FF9500]'; 
            if (ackString.includes('Fangt schon mal an') || ackString.includes('Fangt an') || ackString.includes('Abgelehnt')) return 'text-[#FF3B30]'; 
            return 'text-[#34C759]'; 
        };

        const ICONS = {
          Bell: '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
          BellOff: '<path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><line x1="1" x2="23" y1="1" y2="23"/>',
          Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
          Settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
          Coffee: '<path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/>',
          Utensils: '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>',
          UtensilsCrossed: '<path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/><path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"/><path d="m2.1 21.8 6.4-6.3"/><path d="m19 5-7 7"/>',
          Moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
          MessageCircle: '<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>',
          Film: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h4"/><path d="M3 12h18"/><path d="M3 16.5h4"/><path d="M17 3v18"/><path d="M17 7.5h4"/><path d="M17 16.5h4"/>',
          Gamepad2: '<line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/>',
          Check: '<polyline points="20 6 9 17 4 12"/>',
          LogOut: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>',
          ShieldCheck: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
          Smartphone: '<rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/>',
          Speaker: '<rect width="16" height="20" x="4" y="2" rx="2"/><circle cx="12" cy="14" r="4"/><line x1="12" x2="12.01" y1="6" y2="6"/>',
          CheckCircle2: '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
          Key: '<path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/>',
          Trash2: '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
          Euro: '<path d="M4 10h12"/><path d="M4 14h9"/><path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/>',
          Plus: '<line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/>',
          X: '<line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/>',
          Pencil: '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
          Users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
          Home: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
          Sparkles: '<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>'
        };

        const REASONS = [
            { id: 'general_meal', label: 'Essen', shortcutLabel: 'Essen rufen', sentence: 'Das Essen ist fertig!', icon: 'Utensils', category: 'meal' },
            { id: 'breakfast', label: 'Frühstück', sentence: 'Das Frühstück ist fertig!', icon: 'Coffee', category: 'meal' },
            { id: 'lunch', label: 'Mittagessen', sentence: 'Das Mittagessen ist fertig!', icon: 'Utensils', category: 'meal' },
            { id: 'coffee', label: 'Kaffee', sentence: 'Es gibt Kaffee und Kuchen!', icon: 'UtensilsCrossed', category: 'meal' },
            { id: 'dinner', label: 'Abendessen', sentence: 'Das Abendessen ist fertig!', icon: 'Moon', category: 'meal' },
            { id: 'table', label: 'Tischdecken', sentence: 'Hilfe beim Tischdecken wird benötigt!', icon: 'Utensils', category: 'push_only' },
            { id: 'message', label: 'Wohnzimmer', shortcutLabel: 'Ins Wohnzimmer rufen', sentence: 'Bitte komme ins Wohnzimmer!', icon: 'MessageCircle', category: 'other' },
            { id: 'movie', label: 'Film', sentence: 'Der Film fängt gleich an!', icon: 'Film', category: 'other' },
            { id: 'game', label: 'Spielen', sentence: 'Wir wollen spielen, komm dazu!', icon: 'Gamepad2', category: 'other' },
        ];

        const Icon = ({ name, size = 24, strokeWidth = 2, className = "", onClick }) => {
            return React.createElement('svg', {
                xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: strokeWidth, strokeLinecap: "round", strokeLinejoin: "round",
                className: `flex-shrink-0 ${className}`, onClick: onClick, dangerouslySetInnerHTML: { __html: ICONS[name] }
            });
        };

        function Modal({ data, onClose }) {
            if (!data) return null;
            
            // Pop-Up für Vertretungsanfragen
            if (data.type === 'swap_request_ack') {
                return (
                    <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 pb-8 sm:pb-4 bg-black/40 dark:bg-black/60 backdrop-blur-sm transition-opacity animate-in fade-in duration-300">
                        <div className="bg-white/95 dark:bg-[#1C1C1E]/95 backdrop-blur-3xl rounded-[32px] p-6 w-full max-w-sm shadow-[0_20px_40px_rgba(0,0,0,0.25)] border border-white/40 dark:border-[#38383A]/50 overflow-hidden animate-action-sheet">
                            
                            <div className="flex flex-col items-center mb-6 mt-1 text-center">
                                <div className="w-14 h-14 bg-gradient-to-tr from-[#FF9500] to-[#FFCC00] text-white rounded-full flex items-center justify-center mb-4 shadow-md">
                                    <Icon name="Users" size={28} strokeWidth={2.5}/>
                                </div>
                                <h3 className="font-bold text-[20px] tracking-tight text-black dark:text-white mb-1.5">{data.title}</h3>
                                <p className="text-[#3C3C43] dark:text-[#EBEBF5]/70 text-[15px] leading-relaxed px-2 font-medium whitespace-pre-wrap">{data.message}</p>
                            </div>
                            
                            <div className="flex gap-3 mb-2.5">
                                <button onClick={data.onAccept} className="flex-1 py-3.5 rounded-[16px] bg-[#007AFF] hover:bg-[#0066CC] text-white font-bold text-[17px] active:scale-[0.98] transition-transform shadow-sm">
                                    Übernehmen
                                </button>
                                <button onClick={data.onReject} className="flex-1 py-3.5 rounded-[16px] bg-[#F2F2F7] dark:bg-[#2C2C2E] text-[#FF3B30] font-bold text-[17px] active:scale-[0.98] transition-transform">
                                    Ablehnen
                                </button>
                            </div>
                            <button onClick={data.onCancel} className="w-full py-3.5 rounded-[16px] text-[#8E8E93] dark:text-[#EBEBF5]/60 font-semibold text-[15px] active:opacity-70 transition-opacity">
                                Später entscheiden
                            </button>
                        </div>
                    </div>
                );
            }

            if (data.type === 'custom_ack') {
                return (
                    <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 pb-8 sm:pb-4 bg-black/40 dark:bg-black/60 backdrop-blur-sm transition-opacity animate-in fade-in duration-300">
                        <div className="bg-white/95 dark:bg-[#1C1C1E]/95 backdrop-blur-3xl rounded-[32px] p-6 w-full max-w-sm shadow-[0_20px_40px_rgba(0,0,0,0.25)] border border-white/40 dark:border-[#38383A]/50 overflow-hidden animate-action-sheet">
                            
                            <div className="flex flex-col items-center mb-6 mt-1 text-center">
                                <div className="w-14 h-14 bg-gradient-to-tr from-[#007AFF] to-[#5856D6] text-white rounded-full flex items-center justify-center mb-4 shadow-md">
                                    <Icon name="Bell" size={28} strokeWidth={2.5}/>
                                </div>
                                <h3 className="font-bold text-[20px] tracking-tight text-black dark:text-white mb-1.5">{data.title}</h3>
                                <p className="text-[#3C3C43] dark:text-[#EBEBF5]/70 text-[15px] leading-relaxed px-2 font-medium">{data.message}</p>
                            </div>
                            
                            <div className="space-y-2.5">
                                <button onClick={() => data.onRespond('Komme sofort')} className="w-full py-3.5 rounded-[16px] bg-[#34C759] hover:bg-[#32B353] text-white font-bold text-[17px] active:scale-[0.98] transition-transform flex items-center justify-center gap-2 shadow-sm">
                                    Komme sofort
                                </button>
                                <button onClick={() => data.onRespond('In 5 Minuten')} className="w-full py-3.5 rounded-[16px] bg-[#F2F2F7] dark:bg-[#2C2C2E] text-black dark:text-white font-bold text-[17px] active:scale-[0.98] transition-transform">
                                    In 5 Minuten
                                </button>
                                <button onClick={() => data.onRespond('Fangt schon mal an')} className="w-full py-3.5 rounded-[16px] bg-[#F2F2F7] dark:bg-[#2C2C2E] text-black dark:text-white font-bold text-[17px] active:scale-[0.98] transition-transform">
                                    Fangt schon mal an
                                </button>
                                <button onClick={data.onCancel} className="w-full py-3.5 rounded-[16px] text-[#FF3B30] font-bold text-[17px] active:opacity-70 transition-opacity mt-1">
                                    Später antworten
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-xl transition-opacity">
                    <div className="bg-white dark:bg-[#1C1C1E] backdrop-blur-2xl rounded-[14px] p-6 w-full max-w-sm shadow-2xl animate-scale-in border border-white/50 dark:border-[#38383A]/50">
                        <div className="text-center mb-6">
                            <h3 className="font-semibold text-[17px] mb-2 text-black dark:text-white leading-snug">{data.title}</h3>
                            <p className="text-[#3C3C4399] dark:text-[#EBEBF5]/60 text-[13px] leading-relaxed whitespace-pre-wrap">{data.message}</p>
                        </div>
                        <div className="flex flex-col gap-2">
                            <button onClick={data.onConfirm} className={`w-full py-3.5 rounded-[12px] font-semibold text-[17px] active:opacity-70 transition-opacity ${data.danger ? 'bg-[#FF3B30] text-white' : 'bg-[#007AFF] text-white'}`}>
                                {data.confirmText || 'OK'}
                            </button>
                            {data.type === 'confirm' && (
                                <button onClick={data.onCancel} className="w-full py-3.5 rounded-[12px] bg-[#F2F2F7] dark:bg-[#2C2C2E] text-[#007AFF] font-semibold text-[17px] active:opacity-70 transition-opacity">
                                    Abbrechen
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function TrackingOverlay({ event, currentFamily, currentUser, safeMembers, onClose, onResend }) {
            if (!event) return null;
            const [cooldowns, setCooldowns] = useState({});

            const isSender = event.sender === currentUser?.name || event.sender === 'Extern';

            useEffect(() => {
                const calculateCooldowns = () => {
                    const newCooldowns = {};
                    (event.targets || []).forEach(targetName => {
                        const lastSentStr = sessionStorage.getItem(`resend_${event.id}_${targetName}`);
                        const lastSentTime = lastSentStr ? parseInt(lastSentStr, 10) : new Date(event.timestamp).getTime();
                        const passed = Math.floor((Date.now() - lastSentTime) / 1000);
                        newCooldowns[targetName] = passed >= 60 ? 0 : 60 - passed;
                    });
                    return newCooldowns;
                };

                setCooldowns(calculateCooldowns());
                const timer = setInterval(() => {
                    setCooldowns(calculateCooldowns());
                }, 1000);
                
                return () => clearInterval(timer);
            }, [event.id, event.timestamp, event.targets]);

            return (
                <div className="fixed inset-0 z-[90] flex items-end justify-center bg-black/40 backdrop-blur-md animate-fade-in md:items-center">
                    <div className="bg-[#F2F2F7] dark:bg-black w-full md:max-w-md md:rounded-[24px] rounded-t-[24px] p-6 pb-safe shadow-2xl animate-scale-in max-h-[85vh] overflow-y-auto scroll-smooth">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-[22px] font-bold tracking-tight text-black dark:text-white">Ruf Status</h2>
                            <button onClick={onClose} className="w-8 h-8 bg-gray-200/60 dark:bg-[#2C2C2E] rounded-full flex items-center justify-center text-gray-500 dark:text-gray-300 active:opacity-70"><Icon name="X" size={18}/></button>
                        </div>
                        <p className="text-[#3C3C4399] dark:text-[#EBEBF5]/60 mb-6 font-medium bg-white dark:bg-[#1C1C1E] p-4 rounded-[16px] text-[15px] shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">"{event?.reason}"</p>
                        
                        <div className="space-y-3">
                            {(event.targets || []).map(targetName => {
                                const safeAck = Array.isArray(event.acknowledgedBy) ? event.acknowledgedBy : [];
                                const ackEntry = safeAck.find(ack => ack === targetName || ack.startsWith(targetName + ':'));
                                const hasAck = !!ackEntry;
                                
                                let ackText = 'Hat bestätigt!';
                                if (hasAck && ackEntry.includes(':')) {
                                    ackText = ackEntry.split(':')[1];
                                }

                                const targetMember = safeMembers.find(m => m.name === targetName);
                                const isDND = targetMember?.dndUntil && new Date(targetMember.dndUntil) > new Date();
                                const currentCooldown = cooldowns[targetName] || 0;
                                
                                const isExpiredTime = event.timestamp ? (Date.now() - new Date(event.timestamp).getTime()) > 5 * 60 * 1000 : false;
                                const canResendIndividual = isSender && !isExpiredTime;

                                return (
                                    <div key={targetName} className="flex items-center justify-between bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A] p-4 rounded-[16px] shadow-[0_1px_3px_rgba(0,0,0,0.02)]">
                                        <div className="flex items-center gap-3">
                                            {hasAck ? <Icon name="CheckCircle2" className={getStatusColor(ackEntry)} /> : isDND ? <Icon name="BellOff" className="text-[#FF9500]" /> : <div className="w-6 h-6 rounded-full border-2 border-gray-200 dark:border-gray-600 animate-pulse" />}
                                            <div>
                                                <p className="font-semibold text-[17px] text-black dark:text-white">{targetName}</p>
                                                <p className={`text-[13px] font-normal ${hasAck ? getStatusColor(ackEntry) : 'text-[#3C3C4399] dark:text-[#EBEBF5]/60'}`}>
                                                    {hasAck ? ackText : isDND ? 'Bitte nicht stören aktiv' : isExpiredTime ? 'Nicht geantwortet' : 'Wartet auf Antwort...'}
                                                </p>
                                            </div>
                                        </div>
                                        {!hasAck && !isDND && canResendIndividual && (
                                            <button 
                                                disabled={currentCooldown > 0}
                                                onClick={() => { 
                                                    sessionStorage.setItem(`resend_${event.id}_${targetName}`, Date.now().toString());
                                                    setCooldowns(prev => ({...prev, [targetName]: 60}));
                                                    onResend(targetName, event.reason); 
                                                }}
                                                className={`text-[13px] font-semibold px-4 py-2 rounded-full transition-all ${currentCooldown > 0 ? 'bg-[#F2F2F7] dark:bg-[#2C2C2E] text-gray-400' : 'bg-[#007AFF]/10 text-[#007AFF] active:opacity-70'}`}
                                            >
                                                {currentCooldown > 0 ? `${currentCooldown}s` : 'Nochmal'}
                                            </button>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        <button onClick={onClose} className="w-full mt-8 py-3.5 bg-white dark:bg-[#1C1C1E] font-semibold text-[17px] text-[#007AFF] rounded-[14px] active:opacity-70 shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">Schließen</button>
                    </div>
                </div>
            );
        }

        function ConfigLoader({ onConfigLoaded }) {
            const [error, setError] = useState("");
            
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        localStorage.setItem('familyConnectAppConfig', JSON.stringify(parsed));
                        localStorage.setItem('firebaseConfig', JSON.stringify(parsed));
                        onConfigLoaded(parsed);
                    } catch (err) { setError("Fehler: Ungültiges Dateiformat."); }
                };
                reader.onerror = () => setError("Fehler beim Lesen der Datei.");
                reader.readAsText(file);
            };

            return (
                <div className="fixed inset-0 z-50 flex flex-col items-center justify-center p-8 bg-[#000000] text-white w-full h-[100dvh] overflow-y-auto">
                    <div className="w-full max-w-sm text-center space-y-8 my-auto">
                        <Icon name="ShieldCheck" size={96} strokeWidth={1.5} className="text-[#007AFF] mx-auto" />
                        <div>
                          <h1 className="text-[34px] font-bold tracking-tight mb-2">System Setup</h1>
                          <p className="text-gray-400 text-[15px] leading-relaxed px-4">Bitte lade deine <span className="font-mono text-[#007AFF]">config.json</span> hoch. Die Daten werden sicher lokal gespeichert.</p>
                        </div>
                        {error && <p className="text-[#FF3B30] text-[13px] font-semibold bg-[#FF3B30]/10 p-3 rounded-[10px] border border-[#FF3B30]/20">{error}</p>}
                        
                        <label className="inline-flex items-center justify-center w-full bg-[#007AFF] text-white py-4 rounded-[14px] font-semibold text-[17px] active:opacity-80 transition-opacity cursor-pointer">
                            Konfiguration laden
                            <input type="file" accept=".json" onChange={handleFileUpload} onClick={(e) => { e.target.value = null; }} />
                        </label>
                    </div>
                </div>
            );
        }

        const LiquidTabBar = ({ activeTab, setActiveTab, isKeyboardOpen }) => {
          const tabs = [
            { id: 'home', icon: 'Bell' },
            { id: 'history', icon: 'Clock' },
            { id: 'household', icon: 'Home' }, 
            { id: 'expenses', icon: 'Euro' }, 
            { id: 'settings', icon: 'Settings' }
          ];
          const activeIndex = tabs.findIndex(t => t.id === activeTab);

          return (
            <div 
              className={`fixed bottom-0 left-0 right-0 flex justify-center z-50 pointer-events-none px-4 transition-transform duration-500 ease-out ${isKeyboardOpen ? 'translate-y-full opacity-0' : 'translate-y-0 opacity-100'}`}
              style={{ paddingBottom: 'max(12px, env(safe-area-inset-bottom))' }}
            >
              <div className="pointer-events-auto ios-blur shadow-[0_8px_30px_rgba(0,0,0,0.12)] border border-[#E5E5EA] dark:border-[#38383A] rounded-full p-1.5 flex items-center justify-between w-full max-w-[320px] md:max-w-[400px] relative h-[60px]">
                {/* RUNDER KREIS FIX: Exakt runder Kreis, millimetergenau hinter jedem Icon zentriert */}
                <div className="absolute inset-y-1.5 left-1.5 flex justify-center items-center transition-transform duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] pointer-events-none" style={{ width: `calc((100% - 12px) / ${tabs.length})`, transform: `translateX(${activeIndex * 100}%)` }}>
                  <div className="w-[46px] h-[46px] bg-[#007AFF]/15 dark:bg-[#007AFF]/25 rounded-full flex-shrink-0"></div>
                </div>
                {tabs.map((tab) => {
                  const isActive = activeTab === tab.id;
                  return (
                    <button key={tab.id} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setActiveTab(tab.id); }} className="flex-1 relative z-10 flex items-center justify-center h-full active:opacity-60 transition-opacity">
                      <Icon name={tab.icon} size={isActive ? 24 : 22} strokeWidth={isActive ? 2.5 : 2} className={`transition-colors duration-300 flex-shrink-0 ${isActive ? 'text-[#007AFF]' : 'text-[#8E8E93] dark:text-[#98989D]'}`} />
                    </button>
                  );
                })}
              </div>
            </div>
          );
        };

        // --- HAUSHALT HELPER ---
        const getNextSaturday = () => {
            const d = new Date();
            const diff = (6 - d.getDay() + 7) % 7;
            d.setDate(d.getDate() + diff);
            return d.toISOString().split('T')[0];
        };

        const getWeekNumber = (d) => {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
        };

        const safeFormatDateTime = (ts) => {
            if (!ts) return '';
            const d = new Date(ts);
            if (isNaN(d.getTime())) return '';
            return `am ${d.toLocaleDateString('de-DE')} um ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} Uhr`;
        };

        function App() {
          const [appLoaded, setAppLoaded] = useState(false);
          const [firebaseUser, setFirebaseUser] = useState(null);
          
          const [localFamilyId, setLocalFamilyId] = useState(() => localStorage.getItem('familyId'));
          const [localUserName, setLocalUserName] = useState(() => localStorage.getItem('userName'));

          const [currentFamily, setCurrentFamily] = useState(null);
          const [currentUser, setCurrentUser] = useState(null);
          const [modal, setModal] = useState(null);
          const [isKeyboardOpen, setIsKeyboardOpen] = useState(false);
          const [trackingEventId, setTrackingEventId] = useState(null);
          
          const [authMode, setAuthMode] = useState('login');
          const [isAdminMode, setIsAdminMode] = useState(false); 
          const [adminFamilies, setAdminFamilies] = useState([]);
          const [newFamilyName, setNewFamilyName] = useState('');
          const [newMemberNames, setNewMemberNames] = useState({});

          const [formInput, setFormInput] = useState({ familyId: '', familyName: '', name: '', password: '' });
          const [authError, setAuthError] = useState('');

          const [expenseModal, setExpenseModal] = useState(null); 
          const [expenseForm, setExpenseForm] = useState({ amount: '', reason: '', date: getLocalTodayString(), splitCount: 1, splitTargets: [] });

          // --- HAUSHALT STATES ---
          const [householdAdminMode, setHouseholdAdminMode] = useState(false);
          const [householdHistoryModal, setHouseholdHistoryModal] = useState(null);
          const [householdSwapModal, setHouseholdSwapModal] = useState(null);
          const [newChoreName, setNewChoreName] = useState("");

          const [activeTab, setActiveTab] = useState(() => {
              const params = new URLSearchParams(window.location.search);
              const tab = params.get('tab');
              return ['history', 'expenses', 'household'].includes(tab) ? tab : 'home';
          });
          const [selectedReason, setSelectedReason] = useState(null);
          const [selectedMembers, setSelectedMembers] = useState([]);
          const [isSending, setIsSending] = useState(false);
          const [pushStatus, setPushStatus] = useState('Nicht konfiguriert');

          const safeMembers = Array.isArray(currentFamily?.members) ? currentFamily.members.filter(m => m && typeof m === 'object' && m.name) : [];
          const activeMembersList = safeMembers.filter(m => m.status !== 'pending');
          const safeExpenses = Array.isArray(currentFamily?.expenses) ? currentFamily.expenses.filter(e => e && typeof e === 'object' && e.id) : [];
          const safeHistory = Array.isArray(currentFamily?.history) ? currentFamily.history.filter(h => h && typeof h === 'object' && h.id) : [];

          const defaultChores = [
              { id: 'c1', name: 'großes Bad putzen' },
              { id: 'c2', name: 'kleines Bad putzen' },
              { id: 'c3', name: 'Treppe und Vorhäuschen kehren & putzen' }
          ];
          const householdConfig = currentFamily?.householdConfig || {};
          const safeHouseholdMembers = Array.isArray(householdConfig.members) ? householdConfig.members : [];
          const safeHouseholdChores = Array.isArray(householdConfig.chores) ? householdConfig.chores : defaultChores;
          const householdTasks = Array.isArray(currentFamily?.householdTasks) ? currentFamily.householdTasks : [];

          const isAdmin = safeMembers.length > 0 && safeMembers[0].name === currentUser?.name;

          const activeDND = Boolean(
              currentUser?.dndUntil &&
              !isNaN(new Date(currentUser.dndUntil).getTime()) &&
              new Date(currentUser.dndUntil) > new Date()
          );

          const showConfirm = (title, message, onConfirm, danger = false) => setModal({ type: 'confirm', title, message, danger, onConfirm: () => { onConfirm(); setModal(null); }, onCancel: () => setModal(null) });
          const showAlert = (title, message) => setModal({ type: 'alert', title, message, onConfirm: () => setModal(null) });

          const isExpired = (timestamp) => {
              if (!timestamp) return true;
              const time = new Date(timestamp).getTime();
              if (isNaN(time)) return true;
              return (Date.now() - time) > 5 * 60 * 1000;
          };

          // --- TASTATUR FIX (Kontinuierliches Scrollen beim Schließen) ---
          useEffect(() => {
            const handleFocusIn = (e) => { 
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') setIsKeyboardOpen(true); 
            };
            const handleFocusOut = () => { 
                setIsKeyboardOpen(false);
                // Der ultimative stille Fix: Zwingt Safari, die weiße Lücke zu füllen, 
                // ohne ein Flimmern durch "Resize"-Events auszulösen.
                let count = 0;
                const interval = setInterval(() => {
                    window.scrollTo(0, 0); 
                    count++;
                    if (count > 10) clearInterval(interval); // 1000ms lang leise absichern
                }, 100);
            };
            
            window.addEventListener('focusin', handleFocusIn); 
            window.addEventListener('focusout', handleFocusOut);
            
            return () => { 
                window.removeEventListener('focusin', handleFocusIn); 
                window.removeEventListener('focusout', handleFocusOut); 
            };
          }, []);

          // --- 1. LOGIN & AUTH ---
          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else { 
                  await auth.signInAnonymously(); 
                }
              } catch (error) { 
                console.error("Auth error:", error); 
              }
            };
            initAuth();

            const unsubscribe = auth.onAuthStateChanged((u) => {
              setFirebaseUser(u);
              if (!u && !localFamilyId) {
                  setAppLoaded(true);
              }
            });
            return () => unsubscribe();
          }, [localFamilyId]);

          // --- 2. DATENBANK-VERBINDUNG ---
          useEffect(() => {
            if (!localFamilyId || !localUserName) {
                setAppLoaded(true);
                return;
            }

            if (!firebaseUser) return;

            const unsubscribe = getFamilyDocRef(localFamilyId).onSnapshot({ includeMetadataChanges: true }, (docSnap) => {
              if (docSnap.exists) {
                const data = docSnap.data();
                const rawMembers = Array.isArray(data.members) ? data.members : [];
                const updatedUser = rawMembers.find(m => m && typeof m === 'object' && m.name === localUserName);
                
                if (!updatedUser || updatedUser.status === 'pending') {
                    setAppLoaded(true);
                    return; 
                }

                setCurrentFamily(data);
                setCurrentUser(updatedUser);
                if (updatedUser.fcmToken) setPushStatus('Aktiviert ✅');
                
                setAppLoaded(true); 
              }
            }, (error) => {
                console.warn("DB:", error);
                setAppLoaded(true);
            });
            
            return () => unsubscribe();
          }, [firebaseUser, localFamilyId, localUserName, isAdminMode]);

          // --- 2.5 HAUSHALT AUTO-GENERATOR & 9-UHR PUSH ---
          useEffect(() => {
              if (appLoaded && currentFamily && safeHouseholdMembers.length > 0 && safeHouseholdChores.length > 0) {
                  const checkAndGenerate = async () => {
                      const upcomingSat = getNextSaturday();
                      const satTasks = householdTasks.filter(t => t.date === upcomingSat);
                      
                      if (satTasks.length < safeHouseholdChores.length) {
                          const dateObj = new Date(upcomingSat);
                          const weekNum = getWeekNumber(dateObj);
                          
                          let newTasks = [...householdTasks];
                          let changed = false;
                          
                          safeHouseholdChores.forEach((chore, i) => {
                              if (!satTasks.find(t => t.choreId === chore.id)) {
                                  const memberIndex = (weekNum + i) % safeHouseholdMembers.length;
                                  newTasks.push({
                                      id: generateId(),
                                      choreId: chore.id,
                                      choreName: chore.name,
                                      date: upcomingSat,
                                      assignedTo: safeHouseholdMembers[memberIndex],
                                      status: 'pending',
                                      swapRequestedWith: null
                                  });
                                  changed = true;
                              }
                          });
                          
                          if (changed) {
                              try { await getFamilyDocRef(currentFamily.id).update({ householdTasks: newTasks.slice(-150) }); } catch(e) {}
                          }
                      }

                      // 9 Uhr Push Erinnerung
                      const now = new Date();
                      if (now.getDay() === 6 && now.getHours() >= 9) {
                          const todayStr = now.toISOString().split('T')[0];
                          const historyHasToday = safeHistory.some(h => h.isHousehold && typeof h.timestamp === 'string' && h.timestamp.startsWith(todayStr));
                          
                          if (!historyHasToday && currentUser) {
                              const todaysTasks = householdTasks.filter(t => t.date === todayStr && t.assignedTo);
                              if (todaysTasks.length > 0) {
                                  const assignees = [...new Set(todaysTasks.map(t => t.assignedTo))];
                                  const newHistoryItem = { 
                                      id: Date.now().toString(), 
                                      timestamp: now.toISOString(), 
                                      sender: 'System', 
                                      reason: 'Erinnerung: Haushaltsdienst! 🧹', 
                                      targets: assignees, 
                                      acknowledgedBy: [], 
                                      isExpense: false, 
                                      isResend: false,
                                      isHousehold: true 
                                  };
                                  try { await getFamilyDocRef(currentFamily.id).update({ history: [newHistoryItem, ...safeHistory].slice(0, 50) }); } catch(e) {}
                              }
                          }
                      }
                  };
                  checkAndGenerate();
              }
          }, [appLoaded, currentFamily?.id]);

          useEffect(() => {
              if (isAdminMode) {
                 const unsub = db.collection(`artifacts/${appId}/public/data/families`).onSnapshot(snap => {
                     const families = [];
                     snap.forEach(doc => { if (doc.id !== 'admin_setup') families.push(doc.data() || {}); });
                     setAdminFamilies(families);
                 });
                 return () => unsub();
              }
          }, [isAdminMode]);

          // --- 3. AUTO-PUSH BEIM START ---
          useEffect(() => {
              if (appLoaded && currentFamily && currentUser) {
                  const timer = setTimeout(() => {
                      requestPushPermission(true);
                  }, 2500);
                  return () => clearTimeout(timer);
              }
          }, [appLoaded, currentFamily?.id, currentUser?.name]);

          // MODAL LISTENER FÜR RUFE UND TAUSCHANFRAGEN
          useEffect(() => {
              if (currentFamily && currentUser) {
                  const latestEventForMe = safeHistory.find(h => {
                      if (h.isExpense || h.isResend) return false;
                      if (h.reason === 'Erinnerung: Haushaltsdienst! 🧹') return false;
                      if (!Array.isArray(h.targets) || !h.targets.includes(currentUser.name)) return false;
                      return true;
                  });

                  if (latestEventForMe) {
                      const safeAck = Array.isArray(latestEventForMe.acknowledgedBy) ? latestEventForMe.acknowledgedBy : [];
                      const alreadyAcked = safeAck.some(ack => ack === currentUser.name || ack.startsWith(currentUser.name + ':'));
                      
                      if (!alreadyAcked && latestEventForMe.sender !== currentUser.name) {
                          if (!isExpired(latestEventForMe.timestamp)) {
                              if (!sessionStorage.getItem(`prompted_${latestEventForMe.id}`)) {
                                  sessionStorage.setItem(`prompted_${latestEventForMe.id}`, 'true');
                                  
                                  if (latestEventForMe.isSwapRequest) {
                                      setModal({ 
                                          type: 'swap_request_ack', 
                                          title: `Vertretungsanfrage`, 
                                          message: `${latestEventForMe.sender} bittet dich um Vertretung für:\n${latestEventForMe.choreName}`, 
                                          onAccept: () => {
                                              handleHouseholdAction(latestEventForMe.taskId, 'accept_swap');
                                              handleAcknowledge(latestEventForMe.id, 'Übernommen');
                                              setModal(null);
                                          },
                                          onReject: () => {
                                              handleHouseholdAction(latestEventForMe.taskId, 'reject_swap');
                                              handleAcknowledge(latestEventForMe.id, 'Abgelehnt');
                                              setModal(null);
                                          },
                                          onCancel: () => setModal(null) 
                                      });
                                  } else {
                                      setModal({ 
                                          type: 'custom_ack', 
                                          title: `Ruf von ${latestEventForMe.sender}`, 
                                          message: `${latestEventForMe.reason}`, 
                                          onRespond: (responseType) => {
                                              handleAcknowledge(latestEventForMe.id, responseType);
                                              setModal(null);
                                          },
                                          onCancel: () => setModal(null) 
                                      });
                                  }
                              }
                          }
                      }
                  }
              }
          }, [currentFamily, currentUser]);

          useEffect(() => {
              const handleSWMessage = (event) => {
                  if (event.data && event.data.type === 'TAB_CHANGE') {
                      setActiveTab(event.data.tab);
                  }
              };
              if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.addEventListener('message', handleSWMessage);
              }
              if (messaging) {
                  try {
                      const unsub = messaging.onMessage((payload) => {
                          if(navigator.vibrate) navigator.vibrate([50, 100, 50]);
                          showAlert(payload.notification?.title || "Neue Benachrichtigung", payload.notification?.body || "");
                      });
                      return () => {
                          unsub();
                          if ('serviceWorker' in navigator) navigator.serviceWorker.removeEventListener('message', handleSWMessage);
                      };
                  } catch(e) {}
              }
              return () => {
                  if ('serviceWorker' in navigator) navigator.serviceWorker.removeEventListener('message', handleSWMessage);
              };
          }, []);

          // --- HANDLER FUNKTIONEN ---

          const handleAdminAuth = async () => {
              setAuthError('');
              if (!formInput.password) return setAuthError('Bitte Passwort eingeben.');
              try {
                  const adminDocRef = getFamilyDocRef('admin_setup');
                  const docSnap = await adminDocRef.get();
                  if (!docSnap.exists) {
                      await adminDocRef.set({ isAdminDoc: true, password: formInput.password.trim() });
                      setIsAdminMode(true);
                  } else {
                      if (docSnap.data().password === formInput.password.trim()) setIsAdminMode(true);
                      else setAuthError('Falsches Master-Passwort.');
                  }
              } catch (e) { setAuthError('Fehler beim Admin-Login. Bitte kurz warten.'); }
          };

          const handleJoinFamily = async () => {
            setAuthError('');
            if (!formInput.familyId || !formInput.name || !formInput.password) return setAuthError('Bitte alle Felder ausfüllen.');
            try {
              const cleanId = formInput.familyId.trim();
              const cleanName = formInput.name.trim().toLowerCase();
              const docSnap = await getFamilyDocRef(cleanId).get();
              if (!docSnap.exists) return setAuthError('Familie nicht gefunden.');
              const data = docSnap.data();
              
              const rawMembers = Array.isArray(data.members) ? data.members : [];
              const cleanMembers = rawMembers.filter(m => m && typeof m === 'object');
              const memberIndex = cleanMembers.findIndex(m => m.name.toLowerCase() === cleanName);
              
              if (memberIndex === -1) return setAuthError('Dieser Name wurde vom Administrator noch nicht registriert.');
              if (cleanMembers[memberIndex].status !== 'pending') return setAuthError('Dieser Account ist bereits aktiv. Bitte nutze "Anmelden".');
              
              const updatedMembers = [...cleanMembers];
              updatedMembers[memberIndex] = { ...updatedMembers[memberIndex], password: formInput.password.trim(), status: 'active', fcmToken: '', voiceMonkeyMeal: '', voiceMonkeyOther: '', dndUntil: null };
              
              const updateData = { members: updatedMembers };
              let storedConfig = {};
              try { storedConfig = JSON.parse(localStorage.getItem('firebaseConfig') || '{}'); } catch(e) {}
              if (!data.vapidKey && storedConfig.vapidKey) updateData.vapidKey = storedConfig.vapidKey;

              await getFamilyDocRef(cleanId).update(updateData);
              
              setCurrentFamily(data);
              setCurrentUser(updatedMembers[memberIndex]);
              localStorage.setItem('familyId', cleanId); 
              localStorage.setItem('userName', updatedMembers[memberIndex].name);
              setLocalFamilyId(cleanId); 
              setLocalUserName(updatedMembers[memberIndex].name);
              setAppLoaded(true);
            } catch (err) { setAuthError('Verbindungsfehler. Bitte versuche es erneut.'); }
          };

          const handleLogin = async () => {
            setAuthError('');
            if (!formInput.familyId || !formInput.name || !formInput.password) return setAuthError('Familien-ID, Name und Passwort erforderlich.');
            try {
              const cleanId = formInput.familyId.trim();
              const cleanName = formInput.name.trim().toLowerCase();
              const docSnap = await getFamilyDocRef(cleanId).get();
              if (!docSnap.exists) return setAuthError('Familie nicht gefunden. Überprüfe die ID.');
              
              const data = docSnap.data();
              const rawMembers = Array.isArray(data.members) ? data.members : [];
              const cleanMembers = rawMembers.filter(m => m && typeof m === 'object');
              const member = cleanMembers.find(m => m.name.toLowerCase() === cleanName && m.password === formInput.password.trim());
              
              if (!member || member.status === 'pending') return setAuthError('Falsches Passwort oder noch nicht beigetreten.');
              
              let storedConfig = {};
              try { storedConfig = JSON.parse(localStorage.getItem('firebaseConfig') || '{}'); } catch(e) {}
              if (!data.vapidKey && storedConfig.vapidKey) {
                  await getFamilyDocRef(cleanId).update({ vapidKey: storedConfig.vapidKey });
              }

              setCurrentFamily(data);
              setCurrentUser(member);
              localStorage.setItem('familyId', data.id); 
              localStorage.setItem('userName', member.name);
              setLocalFamilyId(data.id); 
              setLocalUserName(member.name);
              setAppLoaded(true);
            } catch (err) { setAuthError('Fehler bei der Anmeldung. Bitte kurz warten.'); }
          };

          const handleLogout = () => { 
              localStorage.removeItem('familyId'); localStorage.removeItem('userName');
              setLocalFamilyId(null); setLocalUserName(null); setCurrentFamily(null); setCurrentUser(null);
          };

          const adminCreateFamily = async () => {
              if (!newFamilyName.trim()) return showAlert("Fehler", "Bitte Familiennamen eingeben.");
              const newId = generateId();
              
              let storedConfig = {};
              try { storedConfig = JSON.parse(localStorage.getItem('firebaseConfig') || '{}'); } catch(e) {}

              await getFamilyDocRef(newId).set({ 
                  id: newId, 
                  name: newFamilyName.trim(), 
                  vapidKey: storedConfig.vapidKey || '', 
                  expenses: [], history: [], members: [] 
              });
              setNewFamilyName('');
          };

          const adminDeleteFamily = async (famId) => {
              showConfirm("Familie löschen", "Möchtest du diese Familie und alle Daten endgültig löschen?", async () => { await getFamilyDocRef(famId).delete(); }, true);
          };

          const adminAddMember = async (fam) => {
              const name = newMemberNames[fam.id];
              if (!name || !name.trim()) return;
              
              const rawFamMembers = Array.isArray(fam.members) ? fam.members.filter(m => m && typeof m === 'object') : [];
              if (rawFamMembers.find(m => m.name.toLowerCase() === name.trim().toLowerCase())) return showAlert("Fehler", "Name existiert bereits.");
              await getFamilyDocRef(fam.id).update({ members: [...rawFamMembers, { name: name.trim(), status: 'pending' }] });
              setNewMemberNames({ ...newMemberNames, [fam.id]: '' });
          };

          const adminDeleteMember = async (famId, memberName) => {
              showConfirm("Mitglied löschen", `Möchtest du ${memberName} aus der Familie entfernen?`, async () => {
                  const fam = adminFamilies.find(f => f.id === famId);
                  const rawFamMembers = Array.isArray(fam.members) ? fam.members.filter(m => m && typeof m === 'object') : [];
                  await getFamilyDocRef(famId).update({ members: rawFamMembers.filter(m => m.name !== memberName) });
              }, true);
          };

          const generatePDF = async (family) => {
              try {
                  const { jsPDF } = window.jspdf;
                  const QRCodeLib = window.QRCode; 
                  if (!QRCodeLib) throw new Error("QR-Code Bibliothek lädt nicht. Lade die Seite neu oder prüfe deinen Werbeblocker.");
                  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
                  const appUrl = window.location.origin + window.location.pathname;
                  const qrDataUrl = await QRCodeLib.toDataURL(appUrl, { width: 300, margin: 2, color: { dark: '#007AFF', light: '#FFFFFF' } });

                  doc.setFillColor(242, 242, 247); doc.rect(0, 0, 210, 297, 'F');
                  doc.setFillColor(255, 255, 255); doc.roundedRect(20, 40, 170, 180, 10, 10, 'F');
                  
                  doc.setFont("helvetica", "bold"); doc.setTextColor(0, 122, 255); doc.setFontSize(32); doc.text("FamilyConnect", 105, 65, { align: "center" });
                  doc.setTextColor(28, 28, 30); doc.setFontSize(22); doc.text(`Familie: ${family.name}`, 105, 85, { align: "center" });
                  doc.setFont("helvetica", "normal"); doc.setFontSize(14); doc.setTextColor(142, 142, 147); doc.text("Scanne den QR-Code, um der App beizutreten:", 105, 105, { align: "center" });
                  doc.addImage(qrDataUrl, 'PNG', 70, 115, 70, 70);
                  doc.setFontSize(14); doc.setTextColor(28, 28, 30); doc.text("Eure Familien-ID lautet:", 105, 200, { align: "center" });
                  doc.setFont("helvetica", "bold"); doc.setFontSize(36); doc.setTextColor(0, 122, 255); doc.text(family.id, 105, 215, { align: "center" });
                  doc.setFont("helvetica", "normal"); doc.setFontSize(11); doc.setTextColor(142, 142, 147); doc.text("Wichtig: Dein Vorname muss vom Administrator", 105, 260, { align: "center" }); doc.text("freigeschaltet sein, bevor du beitreten kannst.", 105, 266, { align: "center" });
                  doc.save(`FamilyConnect_${family.name}_Setup.pdf`);
              } catch (err) { showAlert("Fehler", err.message || "Fehler beim Generieren der PDF."); }
          };

          // --- HAUSHALTS HANDLER SICHER & ECHTZEIT-SYNC ---
          const updateHouseholdConfig = async (newMembers, newChores) => {
              try {
                  const docRef = getFamilyDocRef(currentFamily.id);
                  const docSnap = await docRef.get();
                  if (!docSnap.exists) return;
                  const currentData = docSnap.data();
                  const currentTasks = currentData.householdTasks || [];
                  
                  const upcomingSat = getNextSaturday();
                  const dateObj = new Date(upcomingSat);
                  const weekNum = getWeekNumber(dateObj);
                  
                  // Behalte alle Aufgaben außer den noch offenen/zu erledigenden von diesem Samstag
                  let keptTasks = currentTasks.filter(t => t.date !== upcomingSat || t.status === 'completed');
                  
                  if (newMembers.length > 0 && newChores.length > 0) {
                      newChores.forEach((chore, i) => {
                          const alreadyCompleted = currentTasks.find(t => t.date === upcomingSat && t.choreId === chore.id && t.status === 'completed');
                          if (!alreadyCompleted) {
                              const memberIndex = (weekNum + i) % newMembers.length;
                              keptTasks.push({
                                  id: generateId(),
                                  choreId: chore.id,
                                  choreName: chore.name,
                                  date: upcomingSat,
                                  assignedTo: newMembers[memberIndex],
                                  status: 'pending',
                                  swapRequestedWith: null
                              });
                          }
                      });
                  }
                  
                  await docRef.update({
                      'householdConfig.members': newMembers,
                      'householdConfig.chores': newChores,
                      householdTasks: keptTasks.slice(-150)
                  });
              } catch (error) {
                  console.error("Sync Fehler:", error);
              }
          };

          const handleHouseholdAction = async (taskId, action, data = null) => {
              try {
                  const docRef = getFamilyDocRef(currentFamily.id);
                  const docSnap = await docRef.get();
                  if (!docSnap.exists) return;
                  
                  const freshData = docSnap.data();
                  const freshTasks = freshData.householdTasks || [];
                  const taskIndex = freshTasks.findIndex(t => t.id === taskId);
                  if (taskIndex === -1) return;

                  if (action === 'complete') {
                      freshTasks[taskIndex].status = 'completed';
                      freshTasks[taskIndex].completedAt = new Date().toISOString();
                      freshTasks[taskIndex].completedBy = currentUser.name;
                  } else if (action === 'absent') {
                      freshTasks[taskIndex].status = 'open';
                      freshTasks[taskIndex].assignedTo = null;
                  } else if (action === 'takeover') {
                      freshTasks[taskIndex].status = 'pending';
                      freshTasks[taskIndex].assignedTo = currentUser.name;
                      freshTasks[taskIndex].swapRequestedWith = null;
                  } else if (action === 'request_swap') {
                      freshTasks[taskIndex].swapRequestedWith = data;
                      const newHistoryItem = { 
                          id: Date.now().toString(), timestamp: new Date().toISOString(), sender: currentUser.name, 
                          reason: `Vertretung gesucht für: ${freshTasks[taskIndex].choreName}`, 
                          targets: [data], acknowledgedBy: [], isExpense: false, isResend: false, isHousehold: true,
                          isSwapRequest: true, taskId: taskId, choreName: freshTasks[taskIndex].choreName
                      };
                      await docRef.update({ history: [newHistoryItem, ...(freshData.history || [])].slice(0, 50) });
                  } else if (action === 'accept_swap') {
                      const requester = freshTasks[taskIndex].assignedTo;
                      const accepter = currentUser.name;
                      
                      freshTasks[taskIndex].assignedTo = currentUser.name;
                      freshTasks[taskIndex].swapRequestedWith = null;

                      const newHistoryItem = { 
                          id: Date.now().toString(), timestamp: new Date().toISOString(), sender: 'System', 
                          reason: `${accepter} hat deine Vertretungsanfrage für ${freshTasks[taskIndex].choreName} übernommen!`, 
                          historyText: `${accepter} vertritt ${requester}`,
                          choreName: freshTasks[taskIndex].choreName,
                          targets: [requester], acknowledgedBy: [], isExpense: false, isResend: false, isHousehold: true,
                          isSuccessfulSwap: true
                      };
                      await docRef.update({ history: [newHistoryItem, ...(freshData.history || [])].slice(0, 50) });

                  } else if (action === 'reject_swap') {
                      const requester = freshTasks[taskIndex].assignedTo;
                      freshTasks[taskIndex].swapRequestedWith = null;
                      
                      const newHistoryItem = { 
                          id: Date.now().toString(), timestamp: new Date().toISOString(), sender: 'System', 
                          reason: `${currentUser.name} hat deine Vertretungsanfrage abgelehnt.`, 
                          targets: [requester], acknowledgedBy: [], isExpense: false, isResend: false, isHousehold: true,
                          isRejectedSwap: true
                      };
                      await docRef.update({ history: [newHistoryItem, ...(freshData.history || [])].slice(0, 50) });
                  } else if (action === 'admin_reassign') {
                      freshTasks[taskIndex].assignedTo = data;
                      freshTasks[taskIndex].status = 'pending';
                      freshTasks[taskIndex].swapRequestedWith = null;
                  }

                  await docRef.update({ householdTasks: freshTasks });
                  if(navigator.vibrate) navigator.vibrate(10);
              } catch (e) { showAlert("Fehler", "Aktion fehlgeschlagen."); }
          };

          const toggleHouseholdMember = async (name) => {
              const newMembers = safeHouseholdMembers.includes(name) 
                  ? safeHouseholdMembers.filter(m => m !== name) 
                  : [...safeHouseholdMembers, name];
              await updateHouseholdConfig(newMembers, safeHouseholdChores);
          };

          const handleAddChore = async () => {
              if (!newChoreName.trim()) return;
              const newChore = { id: generateId(), name: newChoreName.trim() };
              await updateHouseholdConfig(safeHouseholdMembers, [...safeHouseholdChores, newChore]);
              setNewChoreName("");
          };

          const handleDeleteChore = async (choreId) => {
              const updatedChores = safeHouseholdChores.filter(c => c.id !== choreId);
              await updateHouseholdConfig(safeHouseholdMembers, updatedChores);
          };

          // --- SILENT PUSH ---
          const requestPushPermission = async (silent = false) => {
            if (!window.isSecureContext) {
                if (!silent) showAlert("Fehler", "Push funktioniert nur über HTTPS.");
                return;
            }
            
            if (!('Notification' in window) || !('serviceWorker' in navigator)) {
                if (!silent) showAlert("Push-Fehler", "Push wird in diesem Modus nicht unterstützt. Bitte als Web-App auf dem Home-Bildschirm speichern.");
                return;
            }

            if (!firebase?.messaging) {
                if (!silent) showAlert("Fehler", "Firebase Messaging ist nicht verfügbar.");
                return;
            }

            try {
                const supported = firebase.messaging.isSupported ? await firebase.messaging.isSupported() : true;
                if (!supported) {
                    if (!silent) showAlert("Fehler", "Push ist auf diesem Gerät/Browser nicht verfügbar.");
                    return;
                }
            } catch (e) {}

            if (!messaging) {
                try { messaging = firebase.messaging(); } catch (e) { 
                    if (!silent) showAlert("Fehler", "Push-Dienst konnte nicht gestartet werden."); 
                    return; 
                }
            }
            
            let storedConfig = {};
            let firebaseConfigObj = {};
            try { 
                const rawConfig = localStorage.getItem('firebaseConfig') || localStorage.getItem('familyConnectAppConfig');
                if (rawConfig) {
                    const parsed = JSON.parse(rawConfig);
                    storedConfig = parsed.vapidKey ? parsed : (parsed.firebaseConfig || {});
                    firebaseConfigObj = parsed.firebaseConfig || parsed;
                }
            } catch(e) {}
            
            const vapidKey = currentFamily?.vapidKey || storedConfig.vapidKey;
            
            if (!vapidKey || !vapidKey.trim()) {
                if (!silent) showAlert("Fehler", "Kein VAPID-Key gefunden! Bitte lade als Administrator die config.json noch einmal hoch.");
                return;
            }
            
            let swReg = await navigator.serviceWorker.getRegistration();
            if (!swReg) {
                try {
                    const swUrl = `./firebase-messaging-sw.js?apiKey=${encodeURIComponent(firebaseConfigObj.apiKey || '')}&projectId=${encodeURIComponent(firebaseConfigObj.projectId || '')}&senderId=${encodeURIComponent(firebaseConfigObj.messagingSenderId || '')}&appId=${encodeURIComponent(firebaseConfigObj.appId || '')}`;
                    swReg = await navigator.serviceWorker.register(swUrl);
                } catch(e) {
                    console.error("SW Registration Error:", e);
                    if (!silent) showAlert("Push-Registrierung", "Fehler beim Starten des Hintergrunddienstes. Auf dem iPhone: Bitte über 'Teilen' -> 'Zum Home-Bildschirm' hinzufügen.");
                    return;
                }
            } else {
                await swReg.update();
            }

            if (!silent) setPushStatus('Wird angefragt...');
            try {
              const permission = await Notification.requestPermission();
              if (permission !== 'granted') {
                  setPushStatus('Abgelehnt ❌');
                  return;
              }

              const token = await messaging.getToken({
                  vapidKey: vapidKey.trim(),
                  serviceWorkerRegistration: swReg
              });

              if (!token) {
                  setPushStatus('Fehler');
                  if (!silent) showAlert("Fehler", "Es konnte kein Push-Token erzeugt werden.");
                  return;
              }

              if (currentUser?.fcmToken !== token) {
                  await getFamilyDocRef(currentFamily.id).update({
                      members: safeMembers.map(m => m.name === currentUser?.name ? { ...m, fcmToken: token } : m)
                  });
              }
              
              setPushStatus('Aktiviert ✅'); 
              if (!silent) showAlert("Erfolg", "Push-Mitteilungen wurden erfolgreich aktiviert!");

            } catch (error) { 
                console.error(error); 
                setPushStatus('Fehler'); 
                if (!silent) showAlert("Fehler", "Kritischer Fehler beim Token-Abruf."); 
            }
          };

          const handleSendNotification = async (customReasonObj = null, customTargets = null, isResend = false) => {
            const reasonObj = customReasonObj || REASONS.find(r => r.id === selectedReason);
            const targetsList = customTargets || selectedMembers;
            if (!reasonObj || targetsList.length === 0) return;
            
            const todayCalls = safeHistory.filter(h => h?.sender === currentUser.name && h?.timestamp && new Date(h.timestamp).toDateString() === new Date().toDateString());
            if (todayCalls.length >= 20) return showAlert("Limit erreicht", "Du hast heute bereits 20 Rufe gesendet.");

            setIsSending(true); if(navigator.vibrate) navigator.vibrate(10);
            const now = new Date(); const isNightMode = now.getHours() >= 22 || now.getHours() < 7;
            const actualTargets = [];

            safeMembers.forEach(member => {
                if (member && targetsList.includes(member.name) && member.status !== 'pending') {
                    const isDND = member.dndUntil && new Date(member.dndUntil) > now;
                    if (!isDND) {
                        actualTargets.push(member.name);
                        if (!isNightMode && reasonObj.category !== 'push_only') {
                            const url = reasonObj.category === 'meal' ? member.voiceMonkeyMeal : member.voiceMonkeyOther;
                            if (url && url.trim() !== '') fetch(url).catch(e => {});
                        }
                    }
                }
            });

            if (actualTargets.length === 0) {
                setIsSending(false);
                return showAlert("Hinweis", "Alle ausgewählten Personen haben aktuell 'Nicht stören' aktiviert.");
            }

            const newHistoryItem = { 
                id: Date.now().toString(), 
                timestamp: now.toISOString(), 
                sender: currentUser.name, 
                reason: reasonObj.sentence, 
                targets: actualTargets, 
                acknowledgedBy: [], 
                isExpense: false, 
                isResend: isResend,
                category: reasonObj.category 
            };

            try {
              await getFamilyDocRef(currentFamily.id).update({ history: [newHistoryItem, ...safeHistory].slice(0, 50) });
              if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
              if (!customReasonObj && reasonObj.category !== 'push_only' && !isResend) setTrackingEventId(newHistoryItem.id);
              setSelectedReason(null); setSelectedMembers([]); 
              if (activeTab === 'home' && reasonObj.category === 'push_only') setActiveTab('history');
            } catch (err) {}
            setTimeout(() => setIsSending(false), 800);
          };

          const handleAcknowledge = async (historyItemId, responseType = 'Bestätigt') => {
            if(navigator.vibrate) navigator.vibrate([20, 30]);
            const responseString = `${currentUser.name}:${responseType}`;

            try {
                const docRef = getFamilyDocRef(currentFamily.id);
                const docSnap = await docRef.get();
                if (!docSnap.exists) return;
                
                const freshData = docSnap.data();
                const freshHistory = freshData.history || [];
                
                let changed = false;
                const updatedHistory = freshHistory.map(item => {
                    if (item.id === historyItemId) {
                        const safeAck = Array.isArray(item.acknowledgedBy) ? item.acknowledgedBy : [];
                        const alreadyAcked = safeAck.some(ack => ack === currentUser.name || ack.startsWith(currentUser.name + ':'));
                        if (!alreadyAcked) {
                            changed = true;
                            return { ...item, acknowledgedBy: [...safeAck, responseString] };
                        }
                    }
                    return item;
                });

                if (changed) {
                    await docRef.update({ history: updatedHistory });
                }
            } catch (e) {
                console.error("Fehler beim Bestätigen:", e);
            }
          };

          const resetExpenseForm = (overrides = {}) => {
              setExpenseForm({
                  amount: '',
                  reason: '',
                  date: getLocalTodayString(),
                  splitCount: 1,
                  splitTargets: [],
                  ...overrides
              });
          };

          const openSingleExpense = (target) => {
              resetExpenseForm();
              setExpenseModal({ mode: 'single', target });
          };

          const openSplitExpense = () => {
              resetExpenseForm({ splitCount: 2 });
              setExpenseModal({ mode: 'split' });
          };

          const openEditExpense = (expense) => {
              resetExpenseForm({
                  amount: String(expense?.amount ?? ''),
                  reason: expense?.reason ?? '',
                  date: expense?.date || getLocalTodayString(),
                  splitCount: 1,
                  splitTargets: []
              });
              setExpenseModal({ mode: 'edit', expense });
          };

          const toggleSplitTarget = (name) => {
              setExpenseForm(prev => {
                  const exists = prev.splitTargets.includes(name);
                  const nextTargets = exists
                      ? prev.splitTargets.filter(n => n !== name)
                      : [...prev.splitTargets, name];

                  return {
                      ...prev,
                      splitTargets: nextTargets
                  };
              });
          };

          const handleSaveExpense = async () => {
              if (!expenseForm.amount || !expenseForm.reason) return showAlert("Fehler", "Bitte Betrag und Grund angeben.");
              const cleanAmount = String(expenseForm.amount).replace(',', '.').replace(/[^0-9.]/g, '');
              const amountNum = parseFloat(cleanAmount);
              if (isNaN(amountNum) || amountNum <= 0) return showAlert("Fehler", "Ungültiger Betrag.");

              let newExpenses = [...safeExpenses];
              let historyPushes = [];

              if (expenseModal.mode === 'edit') {
                  newExpenses = newExpenses.map(e => e?.id === expenseModal.expense.id ? { ...e, amount: amountNum.toFixed(2), reason: expenseForm.reason, date: expenseForm.date } : e);
              } else if (expenseModal.mode === 'single') {
                  newExpenses.unshift({ id: generateId(), creditor: currentUser.name, debtor: expenseModal.target, amount: amountNum.toFixed(2), reason: expenseForm.reason, date: expenseForm.date, timestamp: new Date().toISOString(), isPaid: false });
                  historyPushes.push({ id: generateId(), timestamp: new Date().toISOString(), sender: currentUser.name, reason: `Neue Auslage: ${expenseForm.reason} (${amountNum.toFixed(2)}€)`, targets: [expenseModal.target], acknowledgedBy: [], isExpense: true });
              } else if (expenseModal.mode === 'split') {
                  const splitCount = parseInt(expenseForm.splitCount, 10);
                  
                  if (isNaN(splitCount) || splitCount < 1) {
                      return showAlert("Fehler", "Bitte gib an, durch wie viele Personen der Betrag geteilt wird.");
                  }
                  if (expenseForm.splitTargets.length === 0) {
                      return showAlert("Fehler", "Bitte wähle mindestens eine Person aus.");
                  }

                  const perPerson = (amountNum / splitCount).toFixed(2);
                  expenseForm.splitTargets.forEach(target => {
                      newExpenses.unshift({ id: generateId(), creditor: currentUser.name, debtor: target, amount: perPerson, reason: `${expenseForm.reason} (Anteilig)`, date: expenseForm.date, timestamp: new Date().toISOString(), isPaid: false });
                      historyPushes.push({ id: generateId(), timestamp: new Date().toISOString(), sender: currentUser.name, reason: `Neue geteilte Auslage: ${expenseForm.reason} (${perPerson}€)`, targets: [target], acknowledgedBy: [], isExpense: true });
                  });
              }

              try {
                  await getFamilyDocRef(currentFamily.id).update({ expenses: newExpenses });
                  if (historyPushes.length > 0) await getFamilyDocRef(currentFamily.id).update({ history: [...historyPushes, ...safeHistory].slice(0, 50) });
                  setExpenseModal(null);
              } catch (e) { showAlert("Fehler", "Konnte nicht gespeichert werden."); }
          };

          const handleMarkExpensePaid = async (expId) => {
              const updatedExpenses = safeExpenses.map(e => e?.id === expId ? { ...e, isPaid: true } : e);
              await getFamilyDocRef(currentFamily.id).update({ expenses: updatedExpenses });
          };

          const handleDeleteExpense = async (expId) => {
              const updatedExpenses = safeExpenses.filter(e => e?.id !== expId);
              await getFamilyDocRef(currentFamily.id).update({ expenses: updatedExpenses });
          };

          const setDND = async (hours) => {
              let dndTime = null;
              if (hours > 0) { 
                  const dndDate = new Date();
