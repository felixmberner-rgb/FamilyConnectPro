<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FamilyConnect">
    <title>FamilyConnect</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F2F2F7; margin: 0; }
        .ios-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe-top { padding-top: env(safe-area-inset-top, 44px); }
        ::-webkit-scrollbar { display: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="text-black antialiased overflow-hidden flex justify-center bg-gray-200">
    <div id="root" class="w-full bg-[#F2F2F7] relative"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // =====================================================================
        // 🛡️ HIER DEINEN RECAPTCHA SCHLÜSSEL EINTRAGEN 🛡️
        // =====================================================================
        const RECAPTCHA_SITE_KEY = "DEIN_SCHLUESSEL_HIER_EINFUEGEN";
        // =====================================================================

        let app, db, auth, messaging;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-connect-pro';

        const generateId = () => Math.floor(100000 + Math.random() * 900000).toString();
        const getFamilyDocRef = (familyId) => db.doc(`artifacts/${appId}/public/data/families/${familyId}`);

        const ICONS = {
          Bell: '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
          BellOff: '<path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><line x1="1" x2="23" y1="1" y2="23"/>',
          Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
          Settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
          Coffee: '<path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/>',
          Utensils: '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>',
          UtensilsCrossed: '<path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/><path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"/><path d="m2.1 21.8 6.4-6.3"/><path d="m19 5-7 7"/>',
          Moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
          MessageCircle: '<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>',
          Film: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h4"/><path d="M3 12h18"/><path d="M3 16.5h4"/><path d="M17 3v18"/><path d="M17 7.5h4"/><path d="M17 16.5h4"/>',
          Gamepad2: '<line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/>',
          Check: '<polyline points="20 6 9 17 4 12"/>',
          LogOut: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>',
          ShieldCheck: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
          Smartphone: '<rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/>',
          Speaker: '<rect width="16" height="20" x="4" y="2" rx="2"/><circle cx="12" cy="14" r="4"/><line x1="12" x2="12.01" y1="6" y2="6"/>',
          CheckCircle2: '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
          Key: '<path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/>',
          Trash2: '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
          Banknote: '<rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/>',
          Plus: '<line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/>',
          X: '<line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/>'
        };

        const Icon = ({ name, size = 24, strokeWidth = 2, className = "", onClick }) => {
            return React.createElement('svg', {
                xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: strokeWidth, strokeLinecap: "round", strokeLinejoin: "round",
                className: className, onClick: onClick, dangerouslySetInnerHTML: { __html: ICONS[name] }
            });
        };

        function Modal({ data, onClose }) {
            if (!data) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                    <div className="bg-white rounded-[28px] p-6 w-full max-w-sm shadow-2xl animate-scale-in">
                        <div className="text-center mb-6">
                            <h3 className="font-bold text-xl mb-2 text-black">{data.title}</h3>
                            <p className="text-gray-500 text-[15px] leading-relaxed whitespace-pre-wrap">{data.message}</p>
                        </div>
                        <div className="flex gap-3">
                            {data.type === 'confirm' && (
                                <button onClick={data.onCancel} className="flex-1 py-3.5 rounded-xl bg-[#F2F2F7] text-black font-bold active:scale-95 transition-transform">
                                    Abbrechen
                                </button>
                            )}
                            <button onClick={data.onConfirm} className={`flex-1 py-3.5 rounded-xl font-bold active:scale-95 transition-transform ${data.danger ? 'bg-red-500 text-white' : 'bg-[#007AFF] text-white'}`}>
                                {data.confirmText || 'OK'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Live Tracking Overlay (Nach dem Rufen)
        function TrackingOverlay({ event, currentUser, currentFamily, onClose, onResend }) {
            if (!event) return null;
            const [cooldown, setCooldown] = useState(60);

            useEffect(() => {
                const start = Date.now();
                const timer = setInterval(() => {
                    const passed = Math.floor((Date.now() - start) / 1000);
                    if (passed >= 60) setCooldown(0);
                    else setCooldown(60 - passed);
                }, 1000);
                return () => clearInterval(timer);
            }, [event.id]);

            return (
                <div className="fixed inset-0 z-[90] flex items-end justify-center bg-black/60 backdrop-blur-md animate-fade-in md:items-center">
                    <div className="bg-white w-full md:max-w-lg md:rounded-[32px] rounded-t-[32px] p-6 pb-safe shadow-2xl animate-scale-in max-h-[85vh] overflow-y-auto">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold tracking-tight">Ruf Status</h2>
                            <button onClick={onClose} className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 active:scale-90"><Icon name="X" size={18}/></button>
                        </div>
                        <p className="text-gray-500 mb-6 font-medium bg-gray-50 p-4 rounded-2xl">"{event.reason}"</p>
                        
                        <div className="space-y-3">
                            {event.targets.map(targetName => {
                                const hasAck = event.acknowledgedBy?.includes(targetName);
                                const targetMember = currentFamily.members.find(m => m.name === targetName);
                                const isDND = targetMember?.dndUntil && new Date(targetMember.dndUntil) > new Date();

                                return (
                                    <div key={targetName} className="flex items-center justify-between bg-white border border-gray-100 p-4 rounded-2xl shadow-sm">
                                        <div className="flex items-center gap-3">
                                            {hasAck ? <Icon name="CheckCircle2" className="text-green-500" /> : isDND ? <Icon name="BellOff" className="text-orange-400" /> : <div className="w-6 h-6 rounded-full border-2 border-gray-200 animate-pulse" />}
                                            <div>
                                                <p className="font-bold text-[16px]">{targetName}</p>
                                                <p className="text-xs font-medium text-gray-400">{hasAck ? 'Hat bestätigt!' : isDND ? 'Bitte nicht stören aktiv' : 'Wartet auf Antwort...'}</p>
                                            </div>
                                        </div>
                                        {!hasAck && !isDND && (
                                            <button 
                                                disabled={cooldown > 0}
                                                onClick={() => { setCooldown(60); onResend(targetName, event.reason); }}
                                                className={`text-xs font-bold px-3 py-2 rounded-xl transition-all ${cooldown > 0 ? 'bg-gray-100 text-gray-400' : 'bg-[#007AFF]/10 text-[#007AFF] active:scale-95'}`}
                                            >
                                                {cooldown > 0 ? `${cooldown}s` : 'Nochmal'}
                                            </button>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        <button onClick={onClose} className="w-full mt-8 py-4 bg-gray-100 font-bold rounded-[20px] active:scale-95 text-black">Schließen</button>
                    </div>
                </div>
            );
        }

        function ConfigLoader({ onConfigLoaded }) {
            const [error, setError] = useState("");
            
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        const firebaseData = parsed.firebaseConfig || parsed;
                        
                        if (!firebaseData || !firebaseData.apiKey) {
                            throw new Error("Ungültige JSON-Datei. Firebase 'apiKey' fehlt.");
                        }
                        
                        localStorage.setItem('firebaseConfig', JSON.stringify(firebaseData));
                        onConfigLoaded(firebaseData);
                    } catch (err) { 
                        setError("Fehler: " + err.message); 
                    }
                };
                reader.onerror = () => setError("Fehler beim Lesen der Datei.");
                reader.readAsText(file);
            };

            return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-8 bg-black text-white w-full">
                    <div className="w-full max-w-sm text-center space-y-6">
                        <Icon name="ShieldCheck" size={96} strokeWidth={1.5} className="text-blue-500 mx-auto mb-4" />
                        <h1 className="text-3xl font-bold tracking-tight">System Setup</h1>
                        <p className="text-gray-400 text-sm leading-relaxed px-4">Bitte lade deine <span className="font-mono text-blue-400">config.json</span> hoch. Die Daten werden sicher lokal auf diesem Gerät gespeichert.</p>
                        {error && <p className="text-red-400 text-xs font-semibold bg-red-500/10 p-3 rounded-lg border border-red-500/20">{error}</p>}
                        
                        <label className="inline-block w-full bg-blue-600 py-4 rounded-2xl font-bold active:scale-95 transition-all cursor-pointer mt-8 shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                            Konfiguration laden
                            <input type="file" accept=".json" onChange={handleFileUpload} onClick={(e) => { e.target.value = null; }} />
                        </label>
                    </div>
                </div>
            );
        }

        const LiquidTabBar = ({ activeTab, setActiveTab, isKeyboardOpen }) => {
          const tabs = [
            { id: 'home', icon: 'Bell' },
            { id: 'history', icon: 'Clock' },
            { id: 'expenses', icon: 'Banknote' },
            { id: 'settings', icon: 'Settings' }
          ];

          const activeIndex = tabs.findIndex(t => t.id === activeTab);

          return (
            <div 
              className={`absolute bottom-8 left-0 right-0 flex justify-center z-50 pointer-events-none px-4 transition-all duration-300 ease-in-out ${isKeyboardOpen ? 'translate-y-32 opacity-0' : 'translate-y-0 opacity-100'}`}
              style={{ paddingBottom: 'env(safe-area-inset-bottom, 0px)' }}
            >
              <div className="pointer-events-auto bg-white/95 backdrop-blur-2xl shadow-[0_8px_30px_rgba(0,0,0,0.12)] border border-gray-100 rounded-full p-1.5 flex items-center justify-between w-full max-w-[280px] md:max-w-[400px] relative h-[60px]">
                <div 
                  className="absolute inset-y-1.5 left-1.5 flex justify-center transition-transform duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] pointer-events-none"
                  style={{ width: 'calc((100% - 12px) / 4)', transform: `translateX(${activeIndex * 100}%)` }}
                >
                  <div className="w-12 md:w-16 h-full bg-[#007AFF]/12 rounded-full"></div>
                </div>
                
                {tabs.map((tab) => {
                  const isActive = activeTab === tab.id;
                  return (
                    <button 
                      key={tab.id}
                      onClick={() => {
                        if(navigator.vibrate) navigator.vibrate(10);
                        setActiveTab(tab.id);
                      }}
                      className="flex-1 relative z-10 flex items-center justify-center h-full active:scale-90 transition-transform"
                    >
                      <Icon 
                        name={tab.icon}
                        size={isActive ? 24 : 22} 
                        strokeWidth={isActive ? 2.5 : 2}
                        className={`transition-colors duration-300 ${isActive ? 'text-[#007AFF]' : 'text-gray-400'}`} 
                      />
                    </button>
                  );
                })}
              </div>
            </div>
          );
        };

        function App() {
          const [appLoaded, setAppLoaded] = useState(false);
          const [firebaseUser, setFirebaseUser] = useState(null);
          
          const [localFamilyId, setLocalFamilyId] = useState(() => localStorage.getItem('familyId'));
          const [localUserName, setLocalUserName] = useState(() => localStorage.getItem('userName'));

          const [currentFamily, setCurrentFamily] = useState(null);
          const [currentUser, setCurrentUser] = useState(null);
          const [modal, setModal] = useState(null);
          const [isKeyboardOpen, setIsKeyboardOpen] = useState(false);
          const [trackingEventId, setTrackingEventId] = useState(null);
          
          const [authMode, setAuthMode] = useState('login');
          const [formInput, setFormInput] = useState({ familyId: '', familyName: '', name: '', password: '' });
          const [authError, setAuthError] = useState('');

          const [addingExpenseFor, setAddingExpenseFor] = useState(null);
          const [expenseForm, setExpenseForm] = useState({ amount: '', reason: '', whoPaid: 'me' });

          const [activeTab, setActiveTab] = useState(() => {
              const params = new URLSearchParams(window.location.search);
              const tab = params.get('tab');
              return ['history', 'expenses'].includes(tab) ? tab : 'home';
          });
          const [selectedReason, setSelectedReason] = useState(null);
          const [selectedMembers, setSelectedMembers] = useState([]);
          const [isSending, setIsSending] = useState(false);
          const [pushStatus, setPushStatus] = useState('Nicht konfiguriert');

          const REASONS = [
            { id: 'breakfast', label: 'Frühstück', sentence: 'Das Frühstück ist fertig!', icon: 'Coffee', category: 'meal' },
            { id: 'lunch', label: 'Mittagessen', sentence: 'Das Mittagessen ist fertig!', icon: 'Utensils', category: 'meal' },
            { id: 'coffee', label: 'Kaffee', sentence: 'Es gibt Kaffee und Kuchen!', icon: 'UtensilsCrossed', category: 'meal' },
            { id: 'dinner', label: 'Abendessen', sentence: 'Das Abendessen ist fertig!', icon: 'Moon', category: 'meal' },
            { id: 'table', label: 'Tischdecken', sentence: 'Hilfe beim Tischdecken wird benötigt!', icon: 'Utensils', category: 'push_only' },
            { id: 'message', label: 'Kommen', sentence: 'Bitte komm kurz zu mir!', icon: 'MessageCircle', category: 'other' },
            { id: 'movie', label: 'Film', sentence: 'Der Film fängt gleich an!', icon: 'Film', category: 'other' },
            { id: 'game', label: 'Spielen', sentence: 'Wir wollen spielen, komm dazu!', icon: 'Gamepad2', category: 'other' },
          ];

          const showConfirm = (title, message, onConfirm, danger = false) => setModal({ type: 'confirm', title, message, danger, onConfirm: () => { onConfirm(); setModal(null); }, onCancel: () => setModal(null) });
          const showAlert = (title, message) => setModal({ type: 'alert', title, message, onConfirm: () => setModal(null) });

          useEffect(() => {
            const handleFocusIn = (e) => { if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') setIsKeyboardOpen(true); };
            const handleFocusOut = () => setIsKeyboardOpen(false);
            window.addEventListener('focusin', handleFocusIn); window.addEventListener('focusout', handleFocusOut);
            return () => { window.removeEventListener('focusin', handleFocusIn); window.removeEventListener('focusout', handleFocusOut); };
          }, []);

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else { await auth.signInAnonymously(); }
              } catch (error) { console.error("Auth error:", error); }
            };
            initAuth();

            const unsubscribe = auth.onAuthStateChanged(async (u) => {
              setFirebaseUser(u);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!firebaseUser || !localFamilyId || !localUserName) {
                if (firebaseUser) setAppLoaded(true);
                return;
            }

            const unsubscribe = getFamilyDocRef(localFamilyId).onSnapshot((docSnap) => {
              if (docSnap.exists) {
                const data = docSnap.data();
                const updatedUser = data.members.find(m => m.name === localUserName);
                
                if (!updatedUser) {
                    alert("Dein Account wurde vom Administrator aus der Familie entfernt.");
                    handleLogout(); return;
                }

                if (!data.expenses) data.expenses = [];
                setCurrentFamily(data);
                setCurrentUser(updatedUser);
                if (updatedUser.fcmToken) setPushStatus('Aktiviert ✅');
                setAppLoaded(true);
              } else {
                alert("Diese Familie wurde aufgelöst.");
                handleLogout();
              }
            });
            return () => unsubscribe();
          }, [firebaseUser, localFamilyId, localUserName]);

          useEffect(() => {
              if (currentFamily && currentUser && activeTab === 'history') {
                  const latestEvent = currentFamily.history?.[0];
                  if (latestEvent && latestEvent.targets?.includes(currentUser.name) && !latestEvent.acknowledgedBy?.includes(currentUser.name) && latestEvent.sender !== currentUser.name) {
                      const eventAge = Date.now() - new Date(latestEvent.timestamp).getTime();
                      if (eventAge < 3 * 60 * 1000 && !sessionStorage.getItem(`prompted_${latestEvent.id}`)) {
                          sessionStorage.setItem(`prompted_${latestEvent.id}`, 'true');
                          showConfirm(`Ruf von ${latestEvent.sender}`, `${latestEvent.reason}\n\nMöchtest du direkt bestätigen, dass du kommst?`, () => handleAcknowledge(latestEvent.id));
                      }
                  }
              }
          }, [currentFamily, currentUser, activeTab]);

          useEffect(() => {
              if (messaging) {
                  try {
                      const unsub = messaging.onMessage((payload) => {
                          if(navigator.vibrate) navigator.vibrate([50, 100, 50]);
                          showAlert(payload.notification?.title || "Neue Benachrichtigung", payload.notification?.body || "");
                      });
                      return () => unsub();
                  } catch(e) { console.warn("Meldungs-Listener Fehler:", e); }
              }
          }, []);

          const handleCreateFamily = async () => {
            setAuthError('');
            if (!formInput.familyName || !formInput.name || !formInput.password) return setAuthError('Bitte alle Felder ausfüllen.');
            const newId = generateId();
            const familyData = {
              id: newId, name: formInput.familyName, vapidKey: '', expenses: [], history: [],
              members: [{ name: formInput.name.trim(), password: formInput.password.trim(), fcmToken: '', voiceMonkeyMeal: '', voiceMonkeyOther: '', dndUntil: null }]
            };
            try {
              await getFamilyDocRef(newId).set(familyData);
              localStorage.setItem('familyId', newId); 
              localStorage.setItem('userName', formInput.name.trim());
              setLocalFamilyId(newId);
              setLocalUserName(formInput.name.trim());
            } catch (err) { setAuthError('Fehler beim Erstellen.'); }
          };

          const handleJoinFamily = async () => {
            setAuthError('');
            if (!formInput.familyId || !formInput.name || !formInput.password) return setAuthError('Bitte alle Felder ausfüllen.');
            try {
              const docSnap = await getFamilyDocRef(formInput.familyId).get();
              if (!docSnap.exists) return setAuthError('Familie nicht gefunden.');
              const data = docSnap.data();
              if (data.members.find(m => m.name.toLowerCase() === formInput.name.trim().toLowerCase())) return setAuthError('Name existiert. Bitte logge dich ein.');
              
              const newUser = { name: formInput.name.trim(), password: formInput.password.trim(), fcmToken: '', voiceMonkeyMeal: '', voiceMonkeyOther: '', dndUntil: null };
              const updatedMembers = [...data.members, newUser];
              await getFamilyDocRef(formInput.familyId).update({ members: updatedMembers });
              
              localStorage.setItem('familyId', formInput.familyId); 
              localStorage.setItem('userName', newUser.name);
              setLocalFamilyId(formInput.familyId);
              setLocalUserName(newUser.name);
            } catch (err) { setAuthError('Fehler beim Beitreten.'); }
          };

          const handleLogin = async () => {
            setAuthError('');
            if (!formInput.familyId || !formInput.name || !formInput.password) return setAuthError('Familien-ID, Name und Passwort erforderlich.');
            try {
              const docSnap = await getFamilyDocRef(formInput.familyId).get();
              if (!docSnap.exists) return setAuthError('Familie nicht gefunden. Überprüfe die ID.');
              
              const data = docSnap.data();
              const member = data.members.find(m => m.name.toLowerCase() === formInput.name.trim().toLowerCase() && m.password === formInput.password.trim());
              
              if (!member) return setAuthError('Falsches Passwort oder Nutzername in dieser Familie.');
              
              localStorage.setItem('familyId', data.id); 
              localStorage.setItem('userName', member.name);
              setLocalFamilyId(data.id);
              setLocalUserName(member.name);
            } catch (err) { setAuthError('Fehler bei der Anmeldung.'); }
          };

          const handleLogout = () => { 
              localStorage.removeItem('familyId');
              localStorage.removeItem('userName');
              localStorage.removeItem('firebaseConfig');
              window.location.reload();
          };

          const requestPushPermission = async () => {
            if (!messaging) return alert("Push wird auf diesem Gerät nicht unterstützt (Safari auf dem Home-Bildschirm speichern!).");
            
            const storedConfig = JSON.parse(localStorage.getItem('firebaseConfig') || '{}');
            const vapidKey = storedConfig.vapidKey || (currentFamily && currentFamily.vapidKey);

            if (!vapidKey || vapidKey.trim() === '') return alert("Kein VAPID-Key hinterlegt! Admin muss diesen im Setup eintragen.");
            
            setPushStatus('Wird angefragt...');
            try {
              const permission = await Notification.requestPermission();
              if (permission === 'granted') {
                  const reg = await navigator.serviceWorker.ready;
                  const token = await messaging.getToken({ vapidKey: vapidKey.trim(), serviceWorkerRegistration: reg });
                  if (token) {
                    const updatedMembers = currentFamily.members.map(m => m.name === currentUser.name ? { ...m, fcmToken: token } : m);
                    await getFamilyDocRef(currentFamily.id).update({ members: updatedMembers });
                    setPushStatus('Aktiviert ✅');
                    if(navigator.vibrate) navigator.vibrate(50);
                    alert("Erfolgreich!");
                  } else setPushStatus('Fehler');
              } else setPushStatus('Abgelehnt ❌');
            } catch (error) { setPushStatus('Fehler'); alert("Kritischer Fehler beim Token-Abruf."); }
          };

          const handleSendNotification = async (customReasonObj = null, customTargets = null) => {
            const reasonObj = customReasonObj || REASONS.find(r => r.id === selectedReason);
            const targetsList = customTargets || selectedMembers;
            if (!reasonObj || targetsList.length === 0) return;
            
            const todayCalls = currentFamily.history.filter(h => h.sender === currentUser.name && new Date(h.timestamp).toDateString() === new Date().toDateString());
            if (todayCalls.length >= 20) return showAlert("Limit erreicht", "Du hast heute bereits 20 Rufe gesendet. Bitte warte bis morgen.");

            setIsSending(true);
            if(navigator.vibrate) navigator.vibrate(10);

            const now = new Date();
            const currentHour = now.getHours();
            const isNightMode = currentHour >= 22 || currentHour < 7;
            
            const actualTargets = [];

            currentFamily.members.forEach(member => {
                if (targetsList.includes(member.name)) {
                    const isDND = member.dndUntil && new Date(member.dndUntil) > now;
                    if (!isDND) {
                        actualTargets.push(member.name);
                        if (!isNightMode && reasonObj.category !== 'push_only') {
                            const url = reasonObj.category === 'meal' ? member.voiceMonkeyMeal : member.voiceMonkeyOther;
                            if (url && url.trim() !== '') fetch(url).catch(e => {});
                        }
                    }
                }
            });

            const newHistoryItem = {
              id: Date.now().toString(),
              timestamp: now.toISOString(),
              sender: currentUser.name,
              reason: reasonObj.sentence, 
              targets: actualTargets,
              acknowledgedBy: [],
              isExpense: false
            };

            try {
              await getFamilyDocRef(currentFamily.id).update({ history: [newHistoryItem, ...(currentFamily.history || [])].slice(0, 50) });
              if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
              
              if (!customReasonObj && reasonObj.category !== 'push_only') {
                  setTrackingEventId(newHistoryItem.id);
              }
              
              setSelectedReason(null); setSelectedMembers([]); 
              if (activeTab === 'home' && reasonObj.category === 'push_only') setActiveTab('history');
            } catch (err) { console.error("History err:", err); }

            setTimeout(() => setIsSending(false), 800);
          };

          const handleAcknowledge = async (historyItemId) => {
            if(navigator.vibrate) navigator.vibrate([20, 30]);
            const updatedHistory = currentFamily.history.map(item => {
              if (item.id === historyItemId && !item.acknowledgedBy.includes(currentUser.name)) {
                   return { ...item, acknowledgedBy: [...(item.acknowledgedBy || []), currentUser.name] };
              }
              return item;
            });
            await getFamilyDocRef(currentFamily.id).update({ history: updatedHistory });
          };

          const handleAddExpense = async () => {
              if (!expenseForm.amount || !expenseForm.reason) return showAlert("Fehler", "Bitte Betrag und Grund angeben.");
              const amountNum = parseFloat(expenseForm.amount.replace(',', '.'));
              if (isNaN(amountNum) || amountNum <= 0) return showAlert("Fehler", "Ungültiger Betrag.");

              const isMeCreditor = expenseForm.whoPaid === 'me';
              const newExpense = {
                  id: generateId(),
                  creditor: isMeCreditor ? currentUser.name : addingExpenseFor,
                  debtor: isMeCreditor ? addingExpenseFor : currentUser.name,
                  amount: amountNum.toFixed(2),
                  reason: expenseForm.reason,
                  timestamp: new Date().toISOString(),
                  isPaid: false
              };

              try {
                  await getFamilyDocRef(currentFamily.id).update({ expenses: [newExpense, ...(currentFamily.expenses || [])] });
                  
                  const pushHistoryItem = {
                      id: Date.now().toString(),
                      timestamp: new Date().toISOString(),
                      sender: currentUser.name,
                      reason: `Neue Auslage hinzugefügt: ${expenseForm.reason} (${amountNum.toFixed(2)}€)`, 
                      targets: [addingExpenseFor], 
                      acknowledgedBy: [],
                      isExpense: true
                  };
                  await getFamilyDocRef(currentFamily.id).update({ history: [pushHistoryItem, ...(currentFamily.history || [])].slice(0, 50) });

                  setAddingExpenseFor(null);
                  setExpenseForm({ amount: '', reason: '', whoPaid: 'me' });
              } catch (e) { showAlert("Fehler", "Konnte nicht gespeichert werden."); }
          };

          const handleMarkExpensePaid = async (expId) => {
              const updatedExpenses = currentFamily.expenses.map(e => e.id === expId ? { ...e, isPaid: true } : e);
              await getFamilyDocRef(currentFamily.id).update({ expenses: updatedExpenses });
          };

          const handleDeleteExpense = async (expId) => {
              const updatedExpenses = currentFamily.expenses.filter(e => e.id !== expId);
              await getFamilyDocRef(currentFamily.id).update({ expenses: updatedExpenses });
          };

          const setDND = async (hours) => {
              let dndTime = null;
              if (hours > 0) {
                  const dndDate = new Date();
                  dndDate.setHours(dndDate.getHours() + hours);
                  dndTime = dndDate.toISOString();
              }
              const updatedMembers = currentFamily.members.map(m => m.name === currentUser.name ? { ...m, dndUntil: dndTime } : m);
              await getFamilyDocRef(currentFamily.id).update({ members: updatedMembers });
          };

          const handleClearHistory = () => {
            showConfirm("Verlauf leeren", "Möchtest du den gesamten Verlauf für alle dauerhaft löschen?", async () => {
                await getFamilyDocRef(currentFamily.id).update({ history: [] });
            }, true);
          };

          const handleDeleteMember = (memberName) => {
            if (memberName === currentUser.name) return; 
            showConfirm("Mitglied entfernen", `Möchtest du ${memberName} dauerhaft aus der Familie entfernen?`, async () => {
                const updatedMembers = currentFamily.members.filter(m => m.name !== memberName);
                await getFamilyDocRef(currentFamily.id).update({ members: updatedMembers });
            }, true);
          };

          const handleDeleteFamily = () => {
            showConfirm("Familie auflösen", "Möchtest du die gesamte Familie und alle Daten endgültig löschen? Alle Mitglieder werden abgemeldet.", async () => {
                await getFamilyDocRef(currentFamily.id).delete();
            }, true);
          };

          const saveSettings = async (key, value) => {
            const updatedMembers = currentFamily.members.map(m => m.name === currentUser.name ? { ...m, [key]: value.trim() } : m);
            await getFamilyDocRef(currentFamily.id).update({ members: updatedMembers });
          };
          
          const saveAdminSettings = async (key, value) => await getFamilyDocRef(currentFamily.id).update({ [key]: value.trim() });

          if (!appLoaded) {
              return (
                  <div className="h-[100dvh] bg-[#F2F2F7] flex flex-col items-center justify-center relative w-full sm:max-w-md sm:shadow-2xl sm:border-x border-gray-300">
                     <Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                  </div>
              );
          }

          if (!currentFamily || !currentUser) {
            return (
              <div className="h-[100dvh] bg-[#000000] text-white flex flex-col items-center justify-center p-6 font-sans relative w-full sm:max-w-md sm:shadow-2xl sm:border-x border-gray-800 overflow-hidden">
                <div className="absolute top-[-10%] left-[-10%] w-[50vw] max-w-[400px] h-[50vw] max-h-[400px] rounded-full bg-[#007AFF] blur-[100px] opacity-20 pointer-events-none"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] max-w-[400px] h-[50vw] max-h-[400px] rounded-full bg-[#5856D6] blur-[100px] opacity-20 pointer-events-none"></div>

                <div className="bg-white/10 backdrop-blur-3xl border border-white/20 p-8 rounded-[40px] shadow-2xl w-full relative z-10">
                  <div className="flex justify-center mb-6">
                    <div className="w-20 h-20 bg-gradient-to-tr from-[#007AFF] to-[#5856D6] rounded-3xl flex items-center justify-center shadow-lg">
                      <Icon name="ShieldCheck" size={40} className="text-white" />
                    </div>
                  </div>
                  <h1 className="text-3xl font-bold text-center mb-8 tracking-tight">FamilyConnect</h1>
                  
                  <div className="flex bg-black/30 p-1.5 rounded-2xl mb-8 backdrop-blur-md">
                    {['login', 'join', 'create'].map((mode) => (
                      <button key={mode} className={`flex-1 py-2 text-sm font-semibold rounded-xl transition-all duration-300 ${authMode === mode ? 'bg-white text-black shadow-md scale-100' : 'text-gray-400 scale-95 hover:text-white'}`} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setAuthMode(mode); }}>
                        {mode === 'login' ? 'Anmelden' : mode === 'join' ? 'Beitreten' : 'Neu'}
                      </button>
                    ))}
                  </div>

                  <div className="space-y-4">
                    {authMode === 'create' && <input type="text" placeholder="Familienname" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 text-white placeholder-gray-400" value={formInput.familyName} onChange={e => setFormInput({...formInput, familyName: e.target.value})} />}
                    
                    {(authMode === 'join' || authMode === 'login') && <input type="text" placeholder="Familien-ID (6 Ziffern)" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 text-white placeholder-gray-400" value={formInput.familyId} onChange={e => setFormInput({...formInput, familyId: e.target.value})} />}
                    
                    <input type="text" placeholder="Dein Vorname" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 text-white placeholder-gray-400" value={formInput.name} onChange={e => setFormInput({...formInput, name: e.target.value})} />
                    <input type="password" placeholder="Passwort" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 text-white placeholder-gray-400" value={formInput.password} onChange={e => setFormInput({...formInput, password: e.target.value})} />
                    
                    {authError && <p className="text-red-400 text-sm text-center font-medium">{authError}</p>}
                    <button onClick={() => { if(navigator.vibrate) navigator.vibrate(15); authMode === 'login' ? handleLogin() : authMode === 'join' ? handleJoinFamily() : handleCreateFamily(); }} className="w-full bg-gradient-to-r from-[#007AFF] to-[#5856D6] text-white font-bold py-4 rounded-2xl mt-4 active:scale-95 transition-transform shadow-[0_0_20px_rgba(0,122,255,0.4)]">
                      {authMode === 'login' ? 'Anmelden' : authMode === 'join' ? 'Beitreten' : 'Familie erstellen'}
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          const isAdmin = currentFamily.members.length > 0 && currentFamily.members[0].name === currentUser.name;
          const trackingEvent = trackingEventId ? currentFamily.history.find(h => h.id === trackingEventId) : null;
          const activeDND = currentUser.dndUntil && new Date(currentUser.dndUntil) > new Date();

          return (
            <div className="h-[100dvh] bg-[#F2F2F7] font-sans select-none flex flex-col relative w-full">
              <Modal data={modal} onClose={() => setModal(null)} />
              
              {trackingEvent && (
                  <TrackingOverlay 
                      event={trackingEvent} currentFamily={currentFamily} currentUser={currentUser} 
                      onClose={() => setTrackingEventId(null)} 
                      onResend={(name, reason) => {
                          const rObj = REASONS.find(r => r.sentence === reason);
                          if(rObj) handleSendNotification(rObj, [name]);
                      }} 
                  />
              )}

              <div className="flex-1 flex flex-col w-full max-w-5xl mx-auto h-[100dvh]">
                  <header className="flex-none pb-4 px-6 bg-white/90 ios-blur border-b border-gray-200/50 z-40 relative flex items-end justify-center w-full" style={{ paddingTop: 'calc(env(safe-area-inset-top, 44px) + 24px)' }}>
                    <div className="text-center w-full">
                      <h1 className="text-[28px] font-extrabold text-black tracking-tight leading-none">
                        {activeTab === 'home' && `Familie ${currentFamily.name}`}
                        {activeTab === 'history' && 'Verlauf'}
                        {activeTab === 'expenses' && 'Auslagen'}
                        {activeTab === 'settings' && 'Einstellungen'}
                      </h1>
                    </div>
                    {activeTab === 'history' && currentFamily.history?.length > 0 && (
                      <button onClick={handleClearHistory} className="absolute right-4 bottom-4 text-red-500 font-bold text-xs bg-red-50 px-3 py-1.5 rounded-full active:bg-red-100 transition-colors flex items-center gap-1.5 shadow-sm">
                        <Icon name="Trash2" size={14} /> Leeren
                      </button>
                    )}
                  </header>

                  <main className="flex-1 overflow-y-auto px-4 pt-6 pb-36 relative w-full">
                    <div className="pb-10">
                    
                    {activeTab === 'home' && (
                      <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <section>
                          <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Grund</h2>
                          <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">
                            <div className="grid grid-cols-4 md:grid-cols-8 gap-y-4 md:gap-6 p-4">
                              {REASONS.map((reason) => {
                                const isSelected = selectedReason === reason.id;
                                return (
                                  <div key={reason.id} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setSelectedReason(reason.id); }} className="flex flex-col items-center cursor-pointer group relative">
                                    <div className={`w-[60px] h-[60px] rounded-2xl flex items-center justify-center mb-2 transition-all duration-300 ease-out transform ${isSelected ? 'bg-[#007AFF] text-white scale-105 shadow-md' : 'bg-[#F2F2F7] text-black group-active:scale-95'}`}>
                                      <Icon name={reason.icon} size={26} strokeWidth={isSelected ? 2.5 : 2} />
                                    </div>
                                    <span className={`text-[11px] text-center font-bold transition-colors ${isSelected ? 'text-black' : 'text-gray-400'}`}>{reason.label}</span>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </section>

                        <section>
                          <div className="flex justify-between items-end mb-3 px-2">
                            <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest">Empfänger</h2>
                            <button className="text-sm text-[#007AFF] font-bold bg-[#007AFF]/10 px-3 py-1 rounded-full active:bg-[#007AFF]/20 transition-colors" onClick={() => {
                                if(navigator.vibrate) navigator.vibrate(10);
                                const others = currentFamily.members.filter(m => m.name !== currentUser.name).map(m => m.name);
                                setSelectedMembers(selectedMembers.length === others.length ? [] : others);
                              }}>
                              {selectedMembers.length === (currentFamily.members.length - 1) ? 'Keine' : 'Alle'}
                            </button>
                          </div>
                          
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {currentFamily.members.filter(m => m.name !== currentUser.name).map((member) => {
                              const isSelected = selectedMembers.includes(member.name);
                              const isMemberDND = member.dndUntil && new Date(member.dndUntil) > new Date();

                              return (
                                <div key={member.name} onClick={() => {
                                    if(navigator.vibrate) navigator.vibrate(10);
                                    if (isSelected) setSelectedMembers(prev => prev.filter(m => m !== member.name));
                                    else setSelectedMembers(prev => [...prev, member.name]);
                                  }} className={`flex items-center justify-between p-5 cursor-pointer active:scale-[0.98] transition-all bg-white rounded-[24px] border shadow-sm ${isSelected ? 'border-[#007AFF]/30 shadow-[#007AFF]/10' : 'border-gray-100'}`}>
                                  <div className="flex items-center gap-2">
                                      <span className="font-semibold text-[17px]">{member.name}</span>
                                      {isMemberDND && <Icon name="BellOff" size={16} className="text-orange-400" />}
                                  </div>
                                  <div className={`w-[51px] h-[31px] rounded-full transition-colors duration-300 ease-in-out relative ${isSelected ? 'bg-[#34C759]' : 'bg-[#E9E9EB]'}`}>
                                    <div className={`absolute top-[2px] left-[2px] w-[27px] h-[27px] bg-white rounded-full shadow-[0_3px_8px_rgba(0,0,0,0.15),0_3px_1px_rgba(0,0,0,0.06)] transform transition-transform duration-300 ease-in-out ${isSelected ? 'translate-x-[20px]' : 'translate-x-0'}`} />
                                  </div>
                                </div>
                              );
                            })}
                            {currentFamily.members.length <= 1 && <div className="p-6 text-center text-gray-400 text-sm md:col-span-2">Du bist noch alleine.</div>}
                          </div>
                        </section>

                        <div className="pt-4 md:flex md:justify-center">
                          <button disabled={!selectedReason || selectedMembers.length === 0 || isSending} onClick={() => handleSendNotification()} className={`w-full md:w-96 py-5 rounded-[24px] font-bold text-xl transition-all duration-300 ease-out ${!selectedReason || selectedMembers.length === 0 ? 'bg-gray-200 text-gray-400 scale-100' : 'bg-[#007AFF] text-white shadow-[0_10px_30px_rgba(0,122,255,0.3)] active:scale-95 active:shadow-md'}`}>
                            {isSending ? 'Wird gesendet...' : 'Jetzt rufen'}
                          </button>
                        </div>
                      </div>
                    )}

                    {activeTab === 'expenses' && (
                      <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                          
                          {addingExpenseFor ? (
                              <div className="bg-white rounded-[28px] p-6 shadow-sm border border-gray-100 max-w-xl mx-auto">
                                  <div className="flex justify-between items-center mb-6">
                                      <h3 className="font-bold text-xl">Auslage mit {addingExpenseFor}</h3>
                                      <button onClick={() => setAddingExpenseFor(null)} className="w-8 h-8 bg-gray-100 rounded-full flex justify-center items-center active:scale-90"><Icon name="X" size={18}/></button>
                                  </div>
                                  <div className="space-y-4">
                                      <div className="flex bg-[#F2F2F7] p-1 rounded-2xl">
                                          <button onClick={() => setExpenseForm({...expenseForm, whoPaid: 'me'})} className={`flex-1 py-2.5 text-sm font-bold rounded-xl transition-all ${expenseForm.whoPaid === 'me' ? 'bg-white shadow-sm text-black' : 'text-gray-400'}`}>Ich habe bezahlt</button>
                                          <button onClick={() => setExpenseForm({...expenseForm, whoPaid: 'them'})} className={`flex-1 py-2.5 text-sm font-bold rounded-xl transition-all ${expenseForm.whoPaid === 'them' ? 'bg-white shadow-sm text-black' : 'text-gray-400'}`}>{addingExpenseFor}</button>
                                      </div>
                                      <input type="number" placeholder="Betrag in € (z.B. 12.50)" className="w-full bg-[#F2F2F7] px-5 py-4 rounded-2xl outline-none font-bold text-lg" value={expenseForm.amount} onChange={e => setExpenseForm({...expenseForm, amount: e.target.value})} />
                                      <input type="text" placeholder="Wofür? (z.B. Pizza)" className="w-full bg-[#F2F2F7] px-5 py-4 rounded-2xl outline-none font-medium" value={expenseForm.reason} onChange={e => setExpenseForm({...expenseForm, reason: e.target.value})} />
                                      <button onClick={handleAddExpense} className="w-full bg-[#007AFF] text-white font-bold py-4 rounded-2xl active:scale-95 transition-transform mt-2">Speichern & Informieren</button>
                                  </div>
                              </div>
                          ) : (
                              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {currentFamily.members.filter(m => m.name !== currentUser.name).map(member => {
                                    const expensesWithThem = (currentFamily.expenses || []).filter(e => !e.isPaid && ((e.creditor === currentUser.name && e.debtor === member.name) || (e.creditor === member.name && e.debtor === currentUser.name)));
                                    let iOwe = 0; let theyOwe = 0;
                                    expensesWithThem.forEach(e => { if (e.creditor === currentUser.name) theyOwe += parseFloat(e.amount); else iOwe += parseFloat(e.amount); });
                                    const net = theyOwe - iOwe;

                                    return (
                                        <div key={member.name} className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100 flex flex-col h-full">
                                            <div className="p-5 flex justify-between items-center bg-gray-50/50">
                                                <div>
                                                    <p className="font-bold text-lg">{member.name}</p>
                                                    <p className={`text-sm font-bold mt-0.5 ${net > 0 ? 'text-green-500' : net < 0 ? 'text-red-500' : 'text-gray-400'}`}>
                                                        {net > 0 ? `Bekommt: +${net.toFixed(2)}€` : net < 0 ? `Schuldet: ${Math.abs(net).toFixed(2)}€` : 'Alles beglichen'}
                                                    </p>
                                                </div>
                                                <button onClick={() => setAddingExpenseFor(member.name)} className="w-10 h-10 bg-[#007AFF]/10 text-[#007AFF] rounded-full flex justify-center items-center active:scale-90 flex-shrink-0"><Icon name="Plus" size={20}/></button>
                                            </div>
                                            {expensesWithThem.length > 0 && (
                                                <div className="border-t border-gray-100 p-4 space-y-3 flex-1 overflow-y-auto">
                                                    {expensesWithThem.map(e => {
                                                        const isMyCredit = e.creditor === currentUser.name;
                                                        return (
                                                            <div key={e.id} className="flex justify-between items-center bg-white border border-gray-100 p-3 rounded-2xl">
                                                                <div className="pr-3">
                                                                    <p className="text-[14px] font-bold text-gray-800 break-words">{e.reason}</p>
                                                                    <p className="text-[11px] text-gray-400 font-medium">{new Date(e.timestamp).toLocaleDateString()}</p>
                                                                </div>
                                                                <div className="flex items-center gap-3 flex-shrink-0">
                                                                    <span className={`font-bold text-[15px] ${isMyCredit ? 'text-green-500' : 'text-red-500'}`}>{isMyCredit ? '+' : '-'}{e.amount}€</span>
                                                                    {isMyCredit && <button onClick={() => handleMarkExpensePaid(e.id)} className="w-8 h-8 bg-green-100 text-green-600 rounded-full flex justify-center items-center active:scale-90"><Icon name="Check" size={16}/></button>}
                                                                    {!isMyCredit && <button onClick={() => handleDeleteExpense(e.id)} className="w-8 h-8 bg-red-100 text-red-500 rounded-full flex justify-center items-center active:scale-90"><Icon name="Trash2" size={14}/></button>}
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                              </div>
                          )}
                      </div>
                    )}

                    {activeTab === 'history' && (
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        {(!currentFamily.history || currentFamily.history.length === 0) ? (
                          <div className="text-center text-gray-400 font-medium mt-16 md:col-span-2 lg:col-span-3">Keine Benachrichtigungen.</div>
                        ) : (
                          currentFamily.history.map((item) => {
                            const targetList = item.targets || item.recipients || [];
                            const isRecipient = targetList.includes(currentUser.name);
                            const hasAcknowledged = item.acknowledgedBy?.includes(currentUser.name);
                            const isRecent = (new Date() - new Date(item.timestamp)) < (2 * 60 * 60 * 1000);
                            
                            const renderRecipientStatus = (name) => {
                              const ack = item.acknowledgedBy?.includes(name);
                              return (
                                <span key={name} className={`inline-flex items-center space-x-1 ${ack ? 'text-green-600 font-bold' : 'text-gray-500'}`}>
                                  <span>{name}</span>
                                  {ack && <Icon name="CheckCircle2" size={12} className="text-green-500 inline" />}
                                  {targetList.indexOf(name) !== targetList.length - 1 && <span className="text-gray-400 mr-1">,</span>}
                                </span>
                              );
                            };

                            return (
                              <div key={item.id} className={`bg-white p-5 rounded-[28px] shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col justify-between ${item.isExpense ? 'border-l-4 border-l-[#007AFF]' : ''}`}>
                                <div className="space-y-4">
                                    <div className="flex items-center space-x-4">
                                      <div className={`w-14 h-14 rounded-[20px] flex items-center justify-center flex-shrink-0 ${item.isExpense ? 'bg-blue-50 text-[#007AFF]' : 'bg-[#F2F2F7] text-[#007AFF]'}`}>
                                        <Icon name={item.isExpense ? "Banknote" : "Clock"} size={24} />
                                      </div>
                                      <div className="flex-1">
                                        <p className="font-bold text-[18px] tracking-tight">{item.reason}</p>
                                        <p className="text-[13px] text-gray-500 font-medium mt-0.5">Von <span className="font-bold text-gray-700">{item.sender}</span></p>
                                      </div>
                                      <div className="text-[13px] font-bold text-gray-400 self-start mt-1">
                                        {new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                      </div>
                                    </div>

                                    <div className="bg-gray-50 rounded-2xl p-3 flex flex-wrap gap-1 items-center text-[13px]">
                                      <span className="text-gray-400 font-medium mr-1">An:</span>
                                      {targetList.map(name => renderRecipientStatus(name))}
                                    </div>
                                </div>

                                {isRecipient && !hasAcknowledged && isRecent && item.sender !== currentUser.name && !item.isExpense && (
                                  <button onClick={() => handleAcknowledge(item.id)} className="w-full mt-4 bg-[#007AFF]/10 text-[#007AFF] font-bold py-3.5 rounded-[18px] active:scale-95 transition-all flex items-center justify-center space-x-2">
                                    <Icon name="Check" size={20} strokeWidth={3} /><span>Bestätigen</span>
                                  </button>
                                )}
                              </div>
                            );
                          })
                        )}
                      </div>
                    )}

                    {activeTab === 'settings' && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        
                        <section>
                          <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2 flex items-center gap-2"><Icon name="BellOff" size={14}/> Nicht stören</h2>
                          <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100 p-5 h-[calc(100%-2rem)]">
                              {activeDND ? (
                                  <div className="flex flex-col justify-center h-full gap-4 bg-orange-50 p-4 rounded-2xl border border-orange-100 text-center">
                                      <div>
                                          <p className="font-bold text-orange-600 text-lg">Aktiviert bis</p>
                                          <p className="text-md text-orange-500 font-medium">{new Date(currentUser.dndUntil).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} Uhr</p>
                                      </div>
                                      <button onClick={() => setDND(0)} className="bg-orange-500 text-white font-bold px-4 py-3 rounded-xl active:scale-95 mx-auto w-full">Beenden</button>
                                  </div>
                              ) : (
                                  <div className="flex flex-col h-full justify-between">
                                      <p className="text-sm font-medium text-gray-500 mb-4">Stumm schalten für:</p>
                                      <div className="grid grid-cols-2 gap-3 mb-4">
                                          <button onClick={() => setDND(0.25)} className="bg-[#F2F2F7] py-4 rounded-xl font-bold text-sm active:scale-95">15 Min</button>
                                          <button onClick={() => setDND(1)} className="bg-[#F2F2F7] py-4 rounded-xl font-bold text-sm active:scale-95">1 Std</button>
                                          <button onClick={() => setDND(8)} className="bg-[#F2F2F7] py-4 rounded-xl font-bold text-sm active:scale-95">8 Std</button>
                                          <button onClick={() => setDND(24)} className="bg-[#F2F2F7] py-4 rounded-xl font-bold text-sm active:scale-95">24 Std</button>
                                      </div>
                                      <p className="text-[11px] text-gray-400 text-center">Hinweis: Die Alexa bleibt von 22 bis 7 Uhr automatisch immer stumm.</p>
                                  </div>
                              )}
                          </div>
                        </section>

                        <section>
                          <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Geräte Setup</h2>
                          <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">
                            <div className="p-5 border-b border-gray-100 flex items-center justify-between">
                              <div className="flex items-center space-x-3">
                                <div className="bg-blue-100 p-2 rounded-xl"><Icon name="Smartphone" size={20} className="text-blue-500"/></div>
                                <div>
                                  <p className="font-bold text-[16px]">Apple Push</p>
                                  <p className="text-[12px] text-gray-500 font-medium">Status: <span className={currentUser.fcmToken ? "text-green-500" : "text-orange-400"}>{pushStatus}</span></p>
                                </div>
                              </div>
                              <button onClick={requestPushPermission} className="bg-[#007AFF]/10 text-[#007AFF] text-sm font-bold px-4 py-2.5 rounded-[14px] active:scale-95 transition-transform">
                                {currentUser.fcmToken ? 'Erneuern' : 'Aktivieren'}
                              </button>
                            </div>
                            
                            <div className="p-5 space-y-4">
                              <div className="flex items-center space-x-3 mb-2">
                                <div className="bg-purple-100 p-2 rounded-xl"><Icon name="Speaker" size={20} className="text-purple-500"/></div>
                                <p className="font-bold text-[16px]">Alexa Voice Monkey Links</p>
                              </div>
                              
                              <div>
                                 <p className="text-[12px] font-bold text-gray-500 mb-1 ml-1">Für Mahlzeiten</p>
                                 <input type="text" placeholder="https://api.voicemonkey.io/trigger..." 
                                        className="w-full bg-[#F2F2F7] px-4 py-3 rounded-2xl text-[14px] font-medium outline-none focus:ring-2 ring-purple-500/20 transition-all" 
                                        defaultValue={currentUser.voiceMonkeyMeal} 
                                        onBlur={(e) => saveSettings('voiceMonkeyMeal', e.target.value)} />
                              </div>

                              <div>
                                 <p className="text-[12px] font-bold text-gray-500 mb-1 ml-1">Für Aktivitäten</p>
                                 <input type="text" placeholder="https://api.voicemonkey.io/trigger..." 
                                        className="w-full bg-[#F2F2F7] px-4 py-3 rounded-2xl text-[14px] font-medium outline-none focus:ring-2 ring-purple-500/20 transition-all" 
                                        defaultValue={currentUser.voiceMonkeyOther} 
                                        onBlur={(e) => saveSettings('voiceMonkeyOther', e.target.value)} />
                              </div>
                            </div>
                          </div>
                        </section>

                        {isAdmin && (
                           <section className="md:col-span-2">
                             <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2 flex items-center gap-2"><Icon name="Key" size={14}/> Admin-Bereich</h2>
                             <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">
                               <div className="p-5 border-b border-gray-100 flex items-center justify-between bg-[#F2F2F7]/50">
                                 <p className="font-bold text-sm">Familien ID:</p>
                                 <p className="font-mono font-bold tracking-wider text-[#007AFF]">{currentFamily.id}</p>
                               </div>
                               <div className="p-5">
                                 <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Familienmitglieder verwalten</p>
                                 <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                   {currentFamily.members.map((member) => (
                                      <div key={member.name} className={`flex items-center justify-between p-4 rounded-2xl ${member.name === currentUser.name ? 'bg-gray-50' : 'bg-white border border-gray-100 shadow-sm'}`}>
                                        <span className="font-semibold text-[15px]">{member.name} {member.name === currentUser.name && "(Du)"}</span>
                                        {member.name !== currentUser.name && (
                                           <button onClick={() => handleDeleteMember(member.name)} className="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-full active:scale-90 transition-transform">
                                             <Icon name="Trash2" size={16} />
                                           </button>
                                        )}
                                      </div>
                                   ))}
                                 </div>
                               </div>
                               <div className="p-4 bg-red-50 border-t border-red-100 md:flex md:justify-end">
                                 <button onClick={handleDeleteFamily} className="w-full md:w-auto px-6 py-3 text-red-500 font-bold text-sm bg-white rounded-xl shadow-sm border border-red-100 active:scale-95 transition-transform">
                                   Komplette Familie auflösen
                                 </button>
                               </div>
                             </div>
                           </section>
                        )}
                        
                        <div className="md:col-span-2 pt-4">
                            <button onClick={handleLogout} className="w-full md:max-w-md mx-auto py-4 bg-red-50 text-red-500 font-bold rounded-[24px] shadow-sm flex items-center justify-center space-x-2 active:scale-95 transition-transform border border-red-100">
                              <Icon name="LogOut" size={20} />
                              <span className="text-[17px]">App & Gerät abmelden</span>
                            </button>
                        </div>
                      </div>
                    )}

                    </div>
                  </main>
              </div>

              <LiquidTabBar activeTab={activeTab} setActiveTab={setActiveTab} isKeyboardOpen={isKeyboardOpen} />
            </div>
          );
        }

        function Root() {
            const [config, setConfig] = useState(() => {
                if (typeof __firebase_config !== 'undefined') return JSON.parse(__firebase_config);
                const saved = localStorage.getItem('firebaseConfig');
                return saved ? JSON.parse(saved) : null;
            });
            const [status, setStatus] = useState("booting"); 
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                if (!config) return setStatus("config-needed");
                setStatus("booting");
                try {
                    if (!firebase.apps.length) app = firebase.initializeApp(config);
                    else app = firebase.app();
                    
                    if (RECAPTCHA_SITE_KEY && RECAPTCHA_SITE_KEY !== "DEIN_SCHLUESSEL_HIER_EINFUEGEN") {
                        try { firebase.appCheck().activate(RECAPTCHA_SITE_KEY, true); } catch (e) {}
                    }
                    db = firebase.firestore();
                    auth = firebase.auth();
                    setStatus("ready");
                } catch (e) {
                    setErrorMsg("Verbindungsfehler: " + e.message);
                    setStatus("error");
                }
            }, [config]);

            if (status === "config-needed") return <ConfigLoader onConfigLoaded={setConfig} />;
            
            if (status === "error") {
                return (
                    <div className="h-[100dvh] w-full bg-black text-white flex flex-col items-center justify-center p-8 text-center relative mx-auto">
                        <Icon name="ShieldCheck" size={64} className="text-red-500 mb-4" />
                        <h2 className="text-xl font-bold mb-2">Systemfehler</h2>
                        <p className="text-red-400 text-sm mb-8 font-mono bg-red-500/10 p-4 rounded-xl border border-red-500/20">{errorMsg}</p>
                        <button onClick={() => { localStorage.removeItem('firebaseConfig'); setConfig(null); setStatus("config-needed"); }} className="bg-white/10 px-6 py-3 rounded-xl font-bold active:scale-95 transition-transform">
                            Neue Config laden
                        </button>
                    </div>
                );
            }

            if (status === "booting") {
                return (
                   <div className="h-[100dvh] w-full bg-[#F2F2F7] flex flex-col items-center justify-center relative mx-auto">
                      <Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                   </div>
                );
            }
            return <App />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
