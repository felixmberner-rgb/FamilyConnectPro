<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Connect Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F2F2F7; }
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 44px); }
        ::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.96); }
        input[type="file"] { display: none; }
        
        /* Modal Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-scale-in { animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    </style>
</head>
<body class="text-black antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // =====================================================================
        // 🛡️ HIER DEINEN RECAPTCHA SCHLÜSSEL EINTRAGEN 🛡️
        // =====================================================================
        const RECAPTCHA_SITE_KEY = "6LdParwsAAAAAF-uow3DHSMtCchnjl785njIYF_V";
        // =====================================================================

        let db = null;
        let auth = null;
        let messaging = null;

        const { useState, useEffect } = React;
        const APP_ID = 'family-connect-pro';

        const getFamilyDocRef = (familyId) => db.doc(`artifacts/${APP_ID}/public/data/families/${familyId}`);

        // --- Custom Modal UI Component ---
        function Modal({ data, onClose }) {
            if (!data) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-[28px] p-6 w-full max-w-sm shadow-2xl animate-scale-in">
                        <div className="text-center mb-6">
                            <h3 className="font-bold text-xl mb-2 text-black">{data.title}</h3>
                            <p className="text-gray-500 text-[15px] leading-relaxed">{data.message}</p>
                        </div>
                        <div className="flex gap-3">
                            {data.type === 'confirm' && (
                                <button onClick={data.onCancel} className="flex-1 py-3.5 rounded-xl bg-[#F2F2F7] text-black font-bold active:scale-95 transition-transform">
                                    Abbrechen
                                </button>
                            )}
                            <button onClick={data.onConfirm} className={`flex-1 py-3.5 rounded-xl font-bold active:scale-95 transition-transform ${data.danger ? 'bg-red-500 text-white' : 'bg-[#007AFF] text-white'}`}>
                                {data.confirmText || 'OK'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Liquid Tab Bar Component ---
        const LiquidTabBar = ({ activeTab, setActiveTab }) => {
            const tabs = [
                { id: 'home', icon: 'bell', label: 'Rufen' },
                { id: 'history', icon: 'clock', label: 'Verlauf' },
                { id: 'settings', icon: 'settings', label: 'Setup' }
            ];
            const activeIndex = tabs.findIndex(t => t.id === activeTab);

            return (
                <div className="fixed bottom-6 left-0 right-0 flex justify-center z-50 pointer-events-none px-4" style={{ paddingBottom: 'env(safe-area-inset-bottom, 0px)' }}>
                    <div className="pointer-events-auto bg-white/90 backdrop-blur-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 rounded-full px-4 py-2.5 flex items-center justify-between w-full max-w-[280px] relative overflow-hidden transition-all duration-500 ease-out">
                        
                        {/* Einheitliche blaue Pille */}
                        <div 
                            className="absolute h-[80%] bg-[#007AFF]/10 rounded-[20px] transition-all duration-400 ease-[cubic-bezier(0.4,0,0.2,1)]"
                            style={{ width: '30%', left: `${4 + (activeIndex * 32.5)}%`, top: '10%' }}
                        />
                        
                        {tabs.map((tab) => {
                            const isActive = activeTab === tab.id;
                            return (
                                <button key={tab.id} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setActiveTab(tab.id); }} className="relative z-10 flex flex-col items-center justify-center w-full h-11">
                                    <i data-lucide={tab.icon} className={`w-5 h-5 transition-all duration-300 ${isActive ? 'text-[#007AFF] translate-y-[-2px]' : 'text-gray-400 translate-y-0'}`}></i>
                                    <span className={`text-[10px] font-bold mt-1 transition-all duration-300 ${isActive ? 'text-[#007AFF] opacity-100' : 'text-gray-400 opacity-0 absolute bottom-[-10px]'}`}>
                                        {tab.label}
                                    </span>
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- Config Loader ---
        function ConfigLoader({ onConfigLoaded }) {
            const [error, setError] = useState("");
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const config = JSON.parse(event.target.result);
                        const firebaseData = config.firebaseConfig ? config.firebaseConfig : config;
                        if (!firebaseData || !firebaseData.apiKey) throw new Error("Ungültiges Dateiformat. apiKey fehlt.");
                        localStorage.setItem('firebaseConfig', JSON.stringify(firebaseData));
                        onConfigLoaded(firebaseData);
                    } catch (err) { setError("Fehler: " + err.message); }
                };
                reader.readAsText(file);
            };

            return (
                <div className="h-screen flex flex-col items-center justify-center p-8 bg-black text-white">
                    <div className="w-full max-w-sm text-center space-y-6">
                        <i data-lucide="shield-check" className="w-24 h-24 text-blue-500 mx-auto mb-4"></i>
                        <h1 className="text-3xl font-bold tracking-tight">System Setup</h1>
                        <p className="text-gray-400 text-sm leading-relaxed px-4">Bitte lade deine <span className="font-mono text-blue-400">config.json</span> hoch.</p>
                        {error && <p className="text-red-400 text-xs font-semibold">{error}</p>}
                        <label className="inline-block w-full bg-blue-600 py-4 rounded-2xl font-bold active:scale-95 transition-all cursor-pointer mt-8">
                            Konfiguration laden<input type="file" accept=".json" onChange={handleFileUpload} />
                        </label>
                    </div>
                </div>
            );
        }

        // --- Main App ---
        function App() {
            const [view, setView] = useState('auth'); 
            const [activeTab, setActiveTab] = useState('home');
            const [user, setUser] = useState(null);
            const [family, setFamily] = useState(null);
            const [loading, setLoading] = useState(true);
            const [modal, setModal] = useState(null);

            const [authMode, setAuthMode] = useState('login');
            const [form, setForm] = useState({ familyId: '', familyName: '', name: '', password: '' });

            const [selectedReason, setSelectedReason] = useState(null);
            const [selectedMembers, setSelectedMembers] = useState([]);
            const [isSending, setIsSending] = useState(false);
            const [pushStatus, setPushStatus] = useState('Nicht konfiguriert');

            const reasons = [
                { id: 'breakfast', label: 'Frühstück', icon: 'coffee', category: 'meal' },
                { id: 'lunch', label: 'Mittagessen', icon: 'utensils', category: 'meal' },
                { id: 'coffee', label: 'Kaffee', icon: 'utensils-crossed', category: 'meal' },
                { id: 'dinner', label: 'Abendessen', icon: 'moon', category: 'meal' },
                { id: 'message', label: 'Kommen', icon: 'message-circle', category: 'other' },
                { id: 'movie', label: 'Film', icon: 'film', category: 'other' },
                { id: 'game', label: 'Spielen', icon: 'gamepad-2', category: 'other' }
            ];

            const showAlert = (title, message) => setModal({ type: 'alert', title, message, onConfirm: () => setModal(null) });

            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons();
            });

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        const savedFamilyId = localStorage.getItem('familyId');
                        const savedName = localStorage.getItem('userName');
                        if (savedFamilyId && savedName) await loadFamilyData(savedFamilyId, savedName);
                        else setLoading(false);
                    } else { setLoading(false); }
                });
                return unsubscribe;
            }, []);

            const loadFamilyData = async (familyId, userName) => {
                try {
                    const doc = await getFamilyDocRef(familyId).get();
                    if (!doc.exists) throw new Error("Familie existiert nicht.");
                    
                    const data = doc.data();
                    const member = data.members.find(m => m.name.trim().toLowerCase() === userName.trim().toLowerCase());
                    
                    if (!member) throw new Error("Benutzername nicht gefunden.");
                    
                    setFamily(data);
                    setUser(member);
                    if (member.fcmToken) setPushStatus('Aktiviert ✅');
                    setView('app');
                    
                    getFamilyDocRef(familyId).onSnapshot(snap => {
                        if (snap.exists) {
                            const updatedData = snap.data();
                            setFamily(updatedData);
                            const updatedUser = updatedData.members.find(m => m.name === member.name);
                            if (updatedUser) setUser(updatedUser);
                        }
                    });
                } catch (e) {
                    showAlert("Ladefehler", e.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleAuth = async () => {
                try {
                    if (!auth.currentUser) await auth.signInAnonymously();
                    
                    const safeName = form.name.trim();
                    const safePassword = form.password.trim();

                    if (authMode === 'create') {
                        if (!form.familyName || !safeName || !safePassword) throw new Error("Alle Felder ausfüllen.");
                        const newId = Math.floor(100000 + Math.random() * 900000).toString();
                        const newFamily = { 
                            id: newId, 
                            name: form.familyName, 
                            vapidKey: '',
                            members: [{ name: safeName, password: safePassword, voiceMonkeyMeal: '', voiceMonkeyOther: '', fcmToken: '' }], 
                            history: [] 
                        };
                        
                        await getFamilyDocRef(newId).set(newFamily);
                        localStorage.setItem('familyId', newId);
                        localStorage.setItem('userName', safeName);
                        await loadFamilyData(newId, safeName);
                        
                    } else if (authMode === 'join') {
                        if (!form.familyId || !safeName || !safePassword) throw new Error("Alle Felder ausfüllen.");
                        const doc = await getFamilyDocRef(form.familyId).get();
                        if (!doc.exists) throw new Error('Familie nicht gefunden.');
                        
                        const data = doc.data();
                        if (data.members.find(m => m.name.toLowerCase() === safeName.toLowerCase())) throw new Error('Name bereits vergeben.');
                        
                        const updatedMembers = [...data.members, { name: safeName, password: safePassword, voiceMonkeyMeal: '', voiceMonkeyOther: '', fcmToken: '' }];
                        await getFamilyDocRef(form.familyId).update({ members: updatedMembers });
                        
                        localStorage.setItem('familyId', form.familyId);
                        localStorage.setItem('userName', safeName);
                        await loadFamilyData(form.familyId, safeName);
                        
                    } else {
                        if (!safeName || !safePassword) throw new Error("Name und Passwort erforderlich.");
                        const snap = await db.collection(`artifacts/${APP_ID}/public/data/families`).get();
                        let found = false;
                        snap.forEach((doc) => {
                            const d = doc.data();
                            const m = d.members.find(m => m.name.toLowerCase() === safeName.toLowerCase() && m.password === safePassword);
                            if (m) {
                                localStorage.setItem('familyId', d.id);
                                localStorage.setItem('userName', m.name);
                                loadFamilyData(d.id, m.name);
                                found = true;
                            }
                        });
                        if (!found) throw new Error('Anmeldedaten nicht korrekt.');
                    }
                } catch (e) { showAlert("Fehler", e.message); }
            };

            const requestPushPermission = async () => {
                if (!messaging) return showAlert("Hinweis", "Push-Benachrichtigungen werden von diesem Gerät/Browser nicht unterstützt.");
                if (!family.vapidKey) return showAlert("Fehler", "Der Admin muss im Setup den VAPID Key hinterlegen.");

                setPushStatus('Wird angefragt...');
                try {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        try {
                            const token = await messaging.getToken({ vapidKey: family.vapidKey });
                            if (token) {
                                const updatedMembers = family.members.map(m => m.name === user.name ? { ...m, fcmToken: token } : m);
                                await getFamilyDocRef(family.id).update({ members: updatedMembers });
                                setPushStatus('Aktiviert ✅');
                                showAlert("Erfolg", "Apple Push wurde erfolgreich aktiviert! ✅");
                            }
                        } catch (tokenError) {
                            console.error(tokenError);
                            setPushStatus('Zertifikat Fehler');
                            showAlert("Fast fertig!", "Berechtigung erteilt. Bitte lade die App einmal komplett neu, um den Prozess abzuschließen.");
                        }
                    } else {
                        setPushStatus('Abgelehnt ❌');
                        showAlert("Abgelehnt", "Du hast die Push-Berechtigung abgelehnt. Du kannst sie in den Einstellungen wieder aktivieren.");
                    }
                } catch (error) {
                    setPushStatus('Fehler');
                    showAlert("Fehler", "Fehler bei der Aktivierung.");
                }
            };

            const sendCall = async () => {
                if (!selectedReason || selectedMembers.length === 0) return;
                setIsSending(true);
                const reasonObj = reasons.find(r => r.id === selectedReason);
                
                // Voice Monkey Trigger
                family.members.filter(m => selectedMembers.includes(m.name)).forEach(m => {
                    const url = reasonObj.category === 'meal' ? m.voiceMonkeyMeal : m.voiceMonkeyOther;
                    if (url && url.trim() !== '') fetch(url).catch(() => {});
                });

                const newEvent = { id: Date.now().toString(), sender: user.name, reason: reasonObj.label, recipients: selectedMembers, timestamp: new Date().toISOString(), acknowledgedBy: [] };
                const newHistory = [newEvent, ...(family.history || [])].slice(0, 50);
                
                await getFamilyDocRef(family.id).update({ history: newHistory });

                if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                setSelectedReason(null); setSelectedMembers([]); setIsSending(false); setActiveTab('history');
            };

            const acknowledge = async (id) => {
                const updatedHistory = family.history.map(item => {
                    if (item.id === id && !item.acknowledgedBy.includes(user.name)) {
                        return { ...item, acknowledgedBy: [...(item.acknowledgedBy || []), user.name] };
                    }
                    return item;
                });
                await getFamilyDocRef(family.id).update({ history: updatedHistory });
                if (navigator.vibrate) navigator.vibrate([20, 30]);
            };

            const saveSettings = async (key, value) => {
                const updatedMembers = family.members.map(m => m.name === user.name ? { ...m, [key]: value } : m);
                await getFamilyDocRef(family.id).update({ members: updatedMembers });
            };

            const resetSystem = () => { auth.signOut(); localStorage.clear(); location.reload(); };

            if (loading) return <div className="h-screen flex items-center justify-center text-gray-400 font-medium bg-black">Laden...</div>;

            if (view === 'auth') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-8 bg-black text-white relative">
                        <Modal data={modal} onClose={() => setModal(null)} />
                        <div className="bg-white/10 backdrop-blur-3xl border border-white/20 p-8 rounded-[40px] shadow-2xl w-full max-w-sm relative z-10">
                            <div className="flex justify-center mb-6">
                                <div className="w-20 h-20 bg-gradient-to-tr from-[#007AFF] to-[#5856D6] rounded-3xl flex items-center justify-center shadow-lg">
                                    <i data-lucide="shield-check" className="w-10 h-10 text-white"></i>
                                </div>
                            </div>
                            <h1 className="text-3xl font-bold text-center mb-8 tracking-tight">Family Hub</h1>
                            
                            <div className="flex bg-black/30 p-1.5 rounded-2xl mb-8 backdrop-blur-md">
                                {['login', 'join', 'create'].map(m => (
                                    <button key={m} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setAuthMode(m); }} className={`flex-1 py-2 text-sm font-semibold rounded-xl transition-all duration-300 ${authMode === m ? 'bg-white text-black shadow-md scale-100' : 'text-gray-400 scale-95 hover:text-white'}`}>
                                        {m === 'login' ? 'Login' : m === 'join' ? 'Code' : 'Neu'}
                                    </button>
                                ))}
                            </div>
                            <div className="space-y-4">
                                {authMode === 'create' && <input type="text" placeholder="Familienname" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 focus:border-[#007AFF]/50 transition-all text-white" value={form.familyName} onChange={e => setForm({...form, familyName: e.target.value})} />}
                                {authMode === 'join' && <input type="text" placeholder="Familien-ID (6 Ziffern)" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 focus:border-[#007AFF]/50 transition-all text-white" value={form.familyId} onChange={e => setForm({...form, familyId: e.target.value})} />}
                                <input type="text" placeholder="Vorname" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 focus:border-[#007AFF]/50 transition-all text-white" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                <input type="password" placeholder="Passwort" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 focus:border-[#007AFF]/50 transition-all text-white" value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                                <button onClick={handleAuth} className="w-full bg-gradient-to-r from-[#007AFF] to-[#5856D6] text-white font-bold py-4 rounded-2xl mt-4 active:scale-95 transition-transform shadow-[0_0_20px_rgba(0,122,255,0.4)]">Jetzt Starten</button>
                            </div>
                        </div>
                    </div>
                );
            }

            const availableTargets = family.members.filter(m => m.name !== user.name);
            const isAdmin = family.members.length > 0 && family.members[0].name === user.name;

            return (
                <div className="h-screen flex flex-col bg-[#F2F2F7] relative">
                    <Modal data={modal} onClose={() => setModal(null)} />
                    
                    <div className="pt-safe px-6 pb-4 bg-white/80 backdrop-blur-xl border-b border-gray-200/50 flex justify-between items-end sticky top-0 z-40">
                        <div>
                            <h1 className="text-3xl font-extrabold tracking-tight text-black">{activeTab === 'home' ? family.name : activeTab === 'history' ? 'Verlauf' : 'Einstellungen'}</h1>
                            {activeTab === 'home' && <p className="text-gray-500 font-medium mt-1 tracking-wide">ID: <span className="font-bold">{family.id}</span></p>}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 pb-32 space-y-6">
                        {activeTab === 'home' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <section>
                                    <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Grund</h2>
                                    <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">
                                        <div className="grid grid-cols-4 gap-y-4 p-4">
                                            {reasons.map(r => (
                                                <div key={r.id} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setSelectedReason(r.id); }} className="flex flex-col items-center cursor-pointer group relative">
                                                    <div className={`w-[60px] h-[60px] rounded-2xl flex items-center justify-center mb-2 transition-all duration-300 transform ${selectedReason === r.id ? 'bg-[#007AFF] text-white scale-105 shadow-md' : 'bg-[#F2F2F7] text-black group-active:scale-95'}`}>
                                                        <i data-lucide={r.icon} className="w-6 h-6"></i>
                                                    </div>
                                                    <span className={`text-[11px] font-bold ${selectedReason === r.id ? 'text-black' : 'text-gray-400'}`}>{r.label}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </section>

                                <section>
                                    <div className="flex justify-between items-end mb-3 px-2">
                                        <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest">Empfänger</h2>
                                        <button className="text-sm text-[#007AFF] font-bold bg-[#007AFF]/10 px-3 py-1 rounded-full active:bg-[#007AFF]/20 transition-colors" onClick={() => setSelectedMembers(selectedMembers.length === availableTargets.length ? [] : availableTargets.map(m => m.name))}>
                                            {selectedMembers.length === availableTargets.length ? 'Keine' : 'Alle'}
                                        </button>
                                    </div>
                                    <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">
                                        {availableTargets.length === 0 ? (
                                            <div className="p-6 text-center text-gray-400 text-sm">Du bist noch alleine. Bitte lade Familie ein!</div>
                                        ) : (
                                            availableTargets.map((m, i) => (
                                                <div key={m.name} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setSelectedMembers(prev => prev.includes(m.name) ? prev.filter(x => x !== m.name) : [...prev, m.name]); }} className={`flex items-center justify-between p-5 cursor-pointer active:bg-gray-50 transition-colors ${i !== availableTargets.length - 1 ? 'border-b border-gray-100' : ''}`}>
                                                    <span className="font-semibold text-[17px]">{m.name}</span>
                                                    <div className={`w-[50px] h-[30px] rounded-full p-1 transition-colors duration-300 ease-in-out ${selectedMembers.includes(m.name) ? 'bg-[#34C759]' : 'bg-gray-200'}`}>
                                                        <div className={`w-6 h-6 bg-white rounded-full shadow-sm transform transition-transform duration-300 ease-in-out ${selectedMembers.includes(m.name) ? 'translate-x-[20px]' : 'translate-x-0'}`} />
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </section>
                                <button onClick={sendCall} disabled={!selectedReason || selectedMembers.length === 0 || isSending} className={`w-full py-5 rounded-[24px] font-bold text-xl transition-all duration-300 ease-out ${!selectedReason || selectedMembers.length === 0 ? 'bg-gray-200 text-gray-400 scale-100' : 'bg-[#007AFF] text-white shadow-[0_10px_30px_rgba(0,122,255,0.3)] active:scale-95 active:shadow-md'}`}>
                                    {isSending ? 'Sende...' : 'Jetzt rufen'}
                                </button>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                {(!family.history || family.history.length === 0) && <div className="text-center text-gray-400 font-medium mt-16">Keine Benachrichtigungen.</div>}
                                {family.history?.map(item => {
                                    const isRecipient = item.recipients.includes(user.name);
                                    const hasAcked = item.acknowledgedBy?.includes(user.name);
                                    const isRecent = (new Date() - new Date(item.timestamp)) < (2 * 60 * 60 * 1000);
                                    return (
                                        <div key={item.id} className="bg-white p-5 rounded-[28px] shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col space-y-4">
                                            <div className="flex items-center space-x-4">
                                                <div className="bg-[#F2F2F7] text-[#007AFF] w-14 h-14 rounded-[20px] flex items-center justify-center flex-shrink-0"><i data-lucide="clock" className="w-6 h-6"></i></div>
                                                <div className="flex-1">
                                                    <p className="font-bold text-[18px] tracking-tight">{item.reason}</p>
                                                    <p className="text-[13px] text-gray-500 font-medium mt-0.5">Von <span className="font-bold text-gray-700">{item.sender}</span></p>
                                                </div>
                                                <div className="text-[13px] font-bold text-gray-400 self-start mt-1">{new Date(item.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                                            </div>
                                            <div className="bg-gray-50 rounded-2xl p-3 flex flex-wrap gap-1 items-center text-[13px]">
                                                <span className="text-gray-400 font-medium mr-1">An:</span>
                                                {item.recipients.map((name, idx) => (
                                                    <span key={name} className={`inline-flex items-center space-x-1 ${item.acknowledgedBy?.includes(name) ? 'text-green-600 font-bold' : 'text-gray-500'}`}>
                                                        <span>{name}</span>{item.acknowledgedBy?.includes(name) && <i data-lucide="check-circle-2" className="w-3 h-3 text-green-500 inline"></i>}{idx !== item.recipients.length - 1 && <span className="text-gray-400 mr-1">,</span>}
                                                    </span>
                                                ))}
                                            </div>
                                            {isRecipient && !hasAcked && isRecent && item.sender !== user.name && (
                                                <button onClick={() => acknowledge(item.id)} className="w-full bg-[#007AFF]/10 text-[#007AFF] font-bold py-3.5 rounded-[18px] active:scale-95 transition-all flex items-center justify-center space-x-2">
                                                    <i data-lucide="check" className="w-5 h-5"></i><span>Bestätigen (Ich komme)</span>
                                                </button>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                {isAdmin && (
                                    <section>
                                        <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2 flex items-center gap-2"><i data-lucide="key" className="w-3.5 h-3.5"></i> Admin-Bereich</h2>
                                        <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100 p-5">
                                            <p className="text-sm font-bold mb-1">Server Push Schlüssel (VAPID)</p>
                                            <p className="text-xs text-gray-500 mb-3 leading-relaxed">Firebase Konsole &rarr; Project Settings &rarr; Cloud Messaging &rarr; Web Push certificates.</p>
                                            <input type="text" placeholder="B... Vapid Key eintragen..." className="w-full bg-[#F2F2F7] px-4 py-3 rounded-xl text-sm font-mono outline-none focus:ring-2 ring-black/10" defaultValue={family.vapidKey} onBlur={async (e) => await getFamilyDocRef(family.id).update({ vapidKey: e.target.value })} />
                                        </div>
                                    </section>
                                )}

                                <section>
                                    <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Geräte Setup</h2>
                                    <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">
                                        <div className="p-5 border-b border-gray-100 flex items-center justify-between">
                                            <div className="flex items-center space-x-3">
                                                <div className="bg-blue-100 p-2 rounded-xl"><i data-lucide="smartphone" className="w-5 h-5 text-blue-500"></i></div>
                                                <div>
                                                    <p className="font-bold text-[16px]">Apple Push</p>
                                                    <p className="text-[12px] font-medium">Status: <span className={user.fcmToken ? "text-green-500" : "text-orange-400"}>{pushStatus}</span></p>
                                                </div>
                                            </div>
                                            <button onClick={requestPushPermission} className="bg-[#007AFF]/10 text-[#007AFF] text-sm font-bold px-4 py-2.5 rounded-[14px] active:scale-95 transition-transform">{user.fcmToken ? 'Erneuern' : 'Aktivieren'}</button>
                                        </div>
                                        
                                        <div className="p-5 space-y-4">
                                            <div className="flex items-center space-x-3 mb-2">
                                                <div className="bg-purple-100 p-2 rounded-xl"><i data-lucide="speaker" className="w-5 h-5 text-purple-500"></i></div>
                                                <p className="font-bold text-[16px]">Alexa Voice Monkey Links</p>
                                            </div>
                                            <div>
                                                <p className="text-[12px] font-bold text-gray-500 mb-1 ml-1">Für Mahlzeiten (Frühstück, Mittag, etc.)</p>
                                                <input type="text" placeholder="https://api.voicemonkey.io/trigger..." className="w-full bg-[#F2F2F7] px-4 py-3 rounded-2xl text-[14px] font-medium outline-none focus:ring-2 ring-purple-500/20" defaultValue={user.voiceMonkeyMeal} onBlur={(e) => saveSettings('voiceMonkeyMeal', e.target.value)} />
                                            </div>
                                            <div>
                                                <p className="text-[12px] font-bold text-gray-500 mb-1 ml-1">Für Aktivitäten (Kommen, Film, Spielen)</p>
                                                <input type="text" placeholder="https://api.voicemonkey.io/trigger..." className="w-full bg-[#F2F2F7] px-4 py-3 rounded-2xl text-[14px] font-medium outline-none focus:ring-2 ring-purple-500/20" defaultValue={user.voiceMonkeyOther} onBlur={(e) => saveSettings('voiceMonkeyOther', e.target.value)} />
                                            </div>
                                        </div>
                                    </div>
                                </section>
                                
                                <button onClick={resetSystem} className="w-full bg-red-50 text-red-500 font-bold py-4 rounded-[24px] shadow-sm flex items-center justify-center space-x-2 active:scale-95 transition-transform border border-red-100">
                                    <i data-lucide="log-out" className="w-5 h-5"></i><span className="text-[17px]">Abmelden</span>
                                </button>
                            </div>
                        )}
                    </div>
                    <LiquidTabBar activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        }

        // --- Init & Root ---
        function Root() {
            const [config, setConfig] = useState(() => {
                const saved = localStorage.getItem('firebaseConfig');
                return saved ? JSON.parse(saved) : null;
            });
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                if (config) {
                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(config);
                        }
                        
                        // 🛡️ APP CHECK (Sicherheit) Initialisierung
                        if (RECAPTCHA_SITE_KEY && RECAPTCHA_SITE_KEY !== "DEIN_SCHLUESSEL_HIER_EINFUEGEN") {
                            const appCheck = firebase.appCheck();
                            appCheck.activate(
                                new firebase.appCheck.ReCaptchaEnterpriseProvider(RECAPTCHA_SITE_KEY),
                                true // Auto-Refresh erlauben
                            );
                        }

                        db = firebase.firestore();
                        auth = firebase.auth();
                        if (firebase.messaging.isSupported()) {
                            messaging = firebase.messaging();
                        }
                        setIsReady(true);
                    } catch (e) {
                        console.error("Firebase Init Error:", e);
                        localStorage.removeItem('firebaseConfig'); 
                        setConfig(null);
                    }
                }
            }, [config]);

            if (!config) return <ConfigLoader onConfigLoaded={setConfig} />;
            if (!isReady) return <div className="h-screen bg-black text-gray-400 flex items-center justify-center font-bold text-xl">System wird hochgefahren...</div>;
            
            return <App />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
