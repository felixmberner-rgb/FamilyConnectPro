          const handleAcknowledge = async (historyItemId) => {
            if(navigator.vibrate) navigator.vibrate([20, 30]);
            const updatedHistory = currentFamily.history.map(item => {
              if (item.id === historyItemId) {
                if (!item.acknowledgedBy.includes(currentUser.name)) {
                   return { ...item, acknowledgedBy: [...(item.acknowledgedBy || []), currentUser.name] };
                }
              }
              return item;
            });
            try {
              await getFamilyDocRef(currentFamily.id).update({ history: updatedHistory });
            } catch (err) { console.error("Ack err:", err); }
          };

          const handleClearHistory = () => {
            showConfirm("Verlauf leeren", "Möchtest du den gesamten Verlauf für alle dauerhaft löschen?", async () => {
                await getFamilyDocRef(currentFamily.id).update({ history: [] });
            }, true);
          };

          const saveSettings = async (key, value) => {
            const updatedMembers = currentFamily.members.map(m => 
              m.name === currentUser.name ? { ...m, [key]: value.trim() } : m
            );
            await getFamilyDocRef(currentFamily.id).update({ members: updatedMembers });
          };

          const saveAdminSettings = async (key, value) => {
            await getFamilyDocRef(currentFamily.id).update({ [key]: value.trim() });
          };

          const showAlert = (title, message) => setModal({ type: 'alert', title, message, onConfirm: () => setModal(null) });

          // --- Splash Screen ---
          if (!appLoaded) {
              return (
                  <div className="h-screen bg-[#F2F2F7] flex flex-col items-center justify-center">

          if (!currentFamily || !currentUser) {
            return (
              <div className="min-h-screen bg-[#000000] text-white flex flex-col items-center justify-center p-6 font-sans">

                      <button

                    {authMode === 'create' && (

                    <input type="password" placeholder="Passwort" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 focus:border-[#007AFF]/50 transition-all text-white placeholder-gray-400" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} />

            <div className="h-screen bg-[#F2F2F7] font-sans select-none overflow-hidden flex flex-col relative">
              <Modal data={modal} onClose={() => setModal(null)} />

                    {activeTab === 'home' && currentFamily.name}
                    {activeTab === 'history' && 'Verlauf'}
                    {activeTab === 'settings' && 'Einstellungen'}
                  </h1>
                  {activeTab === 'home' && (
                    <p className="text-gray-500 font-medium mt-0.5 text-xs tracking-wide">ID: <span className="font-bold">{currentFamily.id}</span></p>
                  )}
                </div>
                {activeTab === 'history' && currentFamily.history?.length > 0 && (
                  <button onClick={handleClearHistory} className="absolute right-4 bottom-4 text-red-500 font-bold text-xs bg-red-50 px-3 py-1.5 rounded-full active:bg-red-100 transition-colors flex items-center gap-1.5 shadow-sm">
                    <Icon name="Trash2" size={14} /> Leeren
                  </button>
                )}
              </header>

              <main className="flex-1 overflow-y-auto px-4 pt-6 pb-36">
                <div className="min-h-[calc(100%+1px)] pb-10">
                
                {activeTab === 'home' && (
                  <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <section>

                      <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">
                        <div className="grid grid-cols-4 gap-y-4 p-4">
                          {REASONS.map((reason) => {
                            const isSelected = selectedReason === reason.id;

                              <div key={reason.id} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setSelectedReason(reason.id); }} className="flex flex-col items-center cursor-pointer group relative">
                                <div className={`w-[60px] h-[60px] rounded-2xl flex items-center justify-center mb-2 transition-all duration-300 ease-out transform ${isSelected ? 'bg-[#007AFF] text-white scale-105 shadow-md' : 'bg-[#F2F2F7] text-black group-active:scale-95'}`}>
                                  <Icon name={reason.icon} size={26} strokeWidth={isSelected ? 2.5 : 2} />

                                else setSelectedMembers(prev => [...prev, member.name]);

                              className={`flex items-center justify-between p-5 cursor-pointer active:bg-gray-50 transition-colors ${index !== arr.length - 1 ? 'border-b border-gray-100' : ''}`}

                              <span className="font-semibold text-[17px]">{member.name}</span>
                              <div className={`w-[50px] h-[30px] rounded-full p-1 transition-colors duration-300 ease-in-out ${isSelected ? 'bg-[#34C759]' : 'bg-gray-200'}`}>
                                <div className={`w-6 h-6 bg-white rounded-full shadow-sm transform transition-transform duration-300 ease-in-out ${isSelected ? 'translate-x-[20px]' : 'translate-x-0'}`} />

                        {currentFamily.members.length <= 1 && (
                           <div className="p-6 text-center text-gray-400 text-sm">Du bist noch alleine. Bitte lade Familienmitglieder ein!</div>

                      </div>
                    </section>

                    <div className="pt-4">
                      <button 
                        disabled={!selectedReason || selectedMembers.length === 0 || isSending}
                        onClick={handleSendNotification}
                        className={`w-full py-5 rounded-[24px] font-bold text-xl transition-all duration-300 ease-out ${
                          !selectedReason || selectedMembers.length === 0
                            ? 'bg-gray-200 text-gray-400 scale-100'

                        }`}
                      >
                        {isSending ? 'Wird gesendet...' : 'Jetzt rufen'}
                      </button>
                    </div>
                  </div>
                )}

                {activeTab === 'history' && (
                  <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    {(!currentFamily.history || currentFamily.history.length === 0) ? (
                      <div className="text-center text-gray-400 font-medium mt-16">Keine Benachrichtigungen.</div>
                    ) : (
                      currentFamily.history.map((item) => {
                        const targetList = item.targets || item.recipients || [];
                        const isRecipient = targetList.includes(currentUser.name);
                        const hasAcknowledged = item.acknowledgedBy?.includes(currentUser.name);
                        const isRecent = (new Date() - new Date(item.timestamp)) < (2 * 60 * 60 * 1000);
                        
                        const renderRecipientStatus = (name) => {
                          const ack = item.acknowledgedBy?.includes(name);
                          return (
                            <span key={name} className={`inline-flex items-center space-x-1 ${ack ? 'text-green-600 font-bold' : 'text-gray-500'}`}>
                              <span>{name}</span>
                              {ack && <Icon name="CheckCircle2" size={12} className="text-green-500 inline" />}
                              {targetList.indexOf(name) !== targetList.length - 1 && <span className="text-gray-400 mr-1">,</span>}
                            </span>
                          );
                        };

                        return (
                          <div key={item.id} className="bg-white p-5 rounded-[28px] shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col space-y-4">
                            <div className="flex items-center space-x-4">
                              <div className="bg-[#F2F2F7] text-[#007AFF] w-14 h-14 rounded-[20px] flex items-center justify-center flex-shrink-0">
                                <Icon name="Clock" size={24} />
                              </div>
                              <div className="flex-1">
                                <p className="font-bold text-[18px] tracking-tight">{item.reason}</p>
                                <p className="text-[13px] text-gray-500 font-medium mt-0.5">
                                  Von <span className="font-bold text-gray-700">{item.sender}</span>
                                </p>
                              </div>
                              <div className="text-[13px] font-bold text-gray-400 self-start mt-1">
                                {new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                              </div>
                            </div>

                            <div className="bg-gray-50 rounded-2xl p-3 flex flex-wrap gap-1 items-center text-[13px]">
                              <span className="text-gray-400 font-medium mr-1">An:</span>
                              {targetList.map(name => renderRecipientStatus(name))}
                            </div>

                            {isRecipient && !hasAcknowledged && isRecent && item.sender !== currentUser.name && (
                              <button 
                                onClick={() => handleAcknowledge(item.id)}
                                className="w-full bg-[#007AFF]/10 text-[#007AFF] font-bold py-3.5 rounded-[18px] active:scale-95 transition-all flex items-center justify-center space-x-2"
                              >
                                <Icon name="Check" size={20} strokeWidth={3} />
                                <span>Bestätigen (Ich komme)</span>
                              </button>
                            )}
                          </div>
                        );
                      })
                    )}
                  </div>
                )}

                {activeTab === 'settings' && (
                  <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    
                    {isAdmin && (
                       <section>
                         <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2 flex items-center gap-2"><Icon name="Key" size={14}/> Admin-Bereich</h2>
                         <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100 p-5">
                           <p className="text-sm font-bold mb-1">Server Push Schlüssel (VAPID)</p>
                           <p className="text-xs text-gray-500 mb-3 leading-relaxed">Diesen Schlüssel bekommst du in der Firebase Konsole unter Project Settings &rarr; Cloud Messaging &rarr; Web Push certificates.</p>
                           <input type="text" placeholder="B... Vapid Key eintragen..." 
                                  className="w-full bg-[#F2F2F7] px-4 py-3 rounded-xl text-sm font-mono outline-none focus:ring-2 ring-black/10" 
                                  defaultValue={currentFamily.vapidKey} 
                                  onBlur={(e) => saveAdminSettings('vapidKey', e.target.value)} />
                         </div>

                    <section>
                      <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Geräte Setup</h2>
                      <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">

                            </div>
                          </div>
                          <button onClick={requestPushPermission} className="bg-[#007AFF]/10 text-[#007AFF] text-sm font-bold px-4 py-2.5 rounded-[14px] active:scale-95 transition-transform">
                            {currentUser.fcmToken ? 'Erneuern' : 'Aktivieren'}
                          </button>

                        <div className="p-5 space-y-4">

                            <p className="font-bold text-[16px]">Alexa Voice Monkey Links</p>

                          <div>
                             <p className="text-[12px] font-bold text-gray-500 mb-1 ml-1">Für Mahlzeiten (Frühstück, Mittag, etc.)</p>

                                    className="w-full bg-[#F2F2F7] px-4 py-3 rounded-2xl text-[14px] font-medium outline-none focus:ring-2 ring-purple-500/20 transition-all"

                                    onBlur={(e) => saveSettings('voiceMonkeyMeal', e.target.value)} />

                                    defaultValue={currentUser.voiceMonkeyOther} 
                                    onBlur={(e) => saveSettings('voiceMonkeyOther', e.target.value)} />

                        </div>
                      </div>
                    </section>
                    
                    <button onClick={handleLogout} className="w-full bg-red-50 text-red-500 font-bold py-4 rounded-[24px] shadow-sm flex items-center justify-center space-x-2 active:scale-95 transition-transform border border-red-100">
                      <Icon name="LogOut" size={20} />
                      <span className="text-[17px]">Abmelden</span>
                    </button>
                  </div>
                )}

                </div>
              </main>

              <LiquidTabBar activeTab={activeTab} setActiveTab={setActiveTab} />
            </div>
          );
        }

        // --- Init & Root Component ---
        function Root() {
            const [config, setConfig] = useState(() => {
                if (typeof __firebase_config !== 'undefined') return JSON.parse(__firebase_config);
                const saved = localStorage.getItem('firebaseConfig');
                return saved ? JSON.parse(saved) : null;
            });
            const [status, setStatus] = useState("booting"); // booting, config-needed, error, ready
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                if (!config) {
                    setStatus("config-needed");
                    return;
                }
                
                setStatus("booting");
                
                try {
                    if (!firebase.apps.length) {
                        app = firebase.initializeApp(config);
                    } else {
                        app = firebase.app();
                    }
                    
                    // AppCheck aktivieren
                    if (RECAPTCHA_SITE_KEY && RECAPTCHA_SITE_KEY !== "DEIN_SCHLUESSEL_HIER_EINFUEGEN") {
                        try {
                            firebase.appCheck().activate(RECAPTCHA_SITE_KEY, true);
                        } catch (e) { console.warn("AppCheck Warnung:", e); }
                    }

                    db = firebase.firestore();
                    auth = firebase.auth();

                    if (typeof window !== 'undefined' && 'Notification' in window) {
                        try { messaging = firebase.messaging(); } catch (e) { console.log("Messaging übersprungen."); }
                    }

                    if ('serviceWorker' in navigator) {
                        try {
                            const urlParams = `?apiKey=${config.apiKey}&projectId=${config.projectId}&senderId=${config.messagingSenderId}&appId=${config.appId}`;
                            navigator.serviceWorker.register('./firebase-messaging-sw.js' + urlParams)
                                .then(() => console.log("Hintergrund-Dienst (SW) gestartet!"))
                                .catch(err => console.warn("SW Fehler:", err));
                        } catch (swErr) {
                            console.warn("SW Registrierung fehlgeschlagen:", swErr);
                        }
                    }

                    setStatus("ready");
                } catch (e) {
                    console.error("Firebase Init Fehler:", e);
                    setErrorMsg("Verbindungsfehler: " + e.message);
                    setStatus("error");
                }
            }, [config]);

            if (status === "config-needed") return <ConfigLoader onConfigLoaded={setConfig} />;
            
            if (status === "error") {
                return (
                    <div className="h-screen bg-black text-white flex flex-col items-center justify-center p-8 text-center">
                        <Icon name="ShieldCheck" size={64} className="text-red-500 mb-4" />
                        <h2 className="text-xl font-bold mb-2">Systemfehler</h2>
                        <p className="text-red-400 text-sm mb-8 font-mono bg-red-500/10 p-4 rounded-xl border border-red-500/20">{errorMsg}</p>
                        <button 
                            onClick={() => { localStorage.removeItem('firebaseConfig'); setConfig(null); setStatus("config-needed"); }}
                            className="bg-white/10 px-6 py-3 rounded-xl font-bold active:scale-95"
                        >
                            Neue Config laden
                        </button>
                    </div>
                );
            }

            if (status === "booting") {
                return (
                   <div className="h-screen bg-[#F2F2F7] flex flex-col items-center justify-center">
                      <Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                      <p className="text-gray-400 font-bold text-sm tracking-widest uppercase">System hochfahren</p>
                   </div>
                );
            }
            
            return <App />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
