                  const exactMinutes = Math.round(hours * 60);
                  dndDate.setMinutes(dndDate.getMinutes() + exactMinutes); 
                  dndTime = dndDate.toISOString(); 
              }
              await getFamilyDocRef(currentFamily.id).update({ members: safeMembers.map(m => m?.name === currentUser.name ? { ...m, dndUntil: dndTime } : m) });
          };

          const handleClearHistory = () => {
            showConfirm("Verlauf leeren", "Möchtest du den gesamten Verlauf für alle dauerhaft löschen?", async () => {
                await getFamilyDocRef(currentFamily.id).update({ history: [] });
            }, true);
          };

          const handleDeleteMember = (memberName) => {
            if (memberName === currentUser.name) return; 
            showConfirm("Mitglied entfernen", `Möchtest du ${memberName} dauerhaft aus der Familie entfernen?`, async () => {
                const updatedMembers = safeMembers.filter(m => m?.name !== memberName);
                await getFamilyDocRef(currentFamily.id).update({ members: updatedMembers });
            }, true);
          };

          const handleDeleteFamily = () => {
            showConfirm("Familie auflösen", "Möchtest du die gesamte Familie und alle Daten endgültig löschen?", async () => {
                await getFamilyDocRef(currentFamily.id).delete();
            }, true);
          };

          const saveSettings = async (key, value) => {
            const val = value ? String(value).trim() : '';
            await getFamilyDocRef(currentFamily.id).update({ members: safeMembers.map(m => m?.name === currentUser.name ? { ...m, [key]: val } : m) });
          };

          // --- RENDER LOGIK ---
          
          if (!appLoaded) {
              return (
                  <div className="h-[100dvh] w-full bg-[var(--app-bg)] flex flex-col items-center justify-center relative z-50">
                     <Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                  </div>
              );
          }

          if (isAdminMode) {
              return (
                  <div className="h-[100dvh] w-full bg-[var(--app-bg)] font-sans flex flex-col relative z-40 overflow-hidden">
                      <Modal data={modal} onClose={() => setModal(null)} />
                      <div className="flex-1 flex flex-col w-full max-w-5xl mx-auto relative h-full">
                          <header className="flex-none pt-safe-top pb-4 px-6 bg-white/80 dark:bg-[#1C1C1E]/80 ios-blur border-b border-[#E5E5EA] dark:border-[#38383A] z-40 flex justify-between items-end sticky top-0">
                              <h1 className="text-[28px] font-extrabold text-black dark:text-white tracking-tight leading-none mt-6">Admin-Dashboard</h1>
                              <button onClick={() => setIsAdminMode(false)} className="text-[#FF3B30] font-semibold active:opacity-70">Logout</button>
                          </header>
                          
                          <main className="scrollable-area px-6 py-6 w-full">
                              <div className="max-w-4xl mx-auto space-y-8 pb-20">
                                  <section className="bg-white dark:bg-[#1C1C1E] rounded-[20px] p-6 shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">
                                      <h2 className="text-[18px] font-bold mb-4 text-black dark:text-white">Neue Familie anlegen</h2>

                                        </div>
                                    </div>
                                );
                            }

                            const targetList = Array.isArray(item.targets) ? item.targets : (Array.isArray(item.recipients) ? item.recipients : []);
                            
                            const handleCardClick = () => {
                                if (navigator.vibrate) navigator.vibrate(10);
                                const isRecipient = targetList.includes(currentUser?.name);
                                const hasAcknowledged = safeAckList.some(ack => ack === currentUser?.name || ack.startsWith(currentUser?.name + ':'));
                                
                                if (isRecipient && !hasAcknowledged && item.sender !== currentUser?.name) {

                                        <p className="text-[14px] text-[#8E8E93] dark:text-[#EBEBF5]/60 font-normal mt-0.5 truncate">Von <span className="font-medium text-[#3C3C43] dark:text-gray-300">{item.sender}</span></p>
                                      </div>
                                      <div className="text-[13px] font-medium text-[#8E8E93] dark:text-[#EBEBF5]/60 self-start mt-1 flex-shrink-0">
                                        {formatTime(item.timestamp)}
                                      </div>
                                    </div>

                                    <div className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] rounded-[14px] p-3.5 flex flex-wrap gap-1.5 items-center text-[14px]">
                                      <span className="text-[#8E8E93] dark:text-[#EBEBF5]/60 font-medium mr-1">An:</span>
                                      {targetList.map(name => renderRecipientStatus(name))}
                                    </div>
                                </div>
                              </div>
                            );
                          })
                        )}
                      </div>
                    )}

                    {/* --- SETTINGS TAB --- */}
                    {activeTab === 'settings' && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-5 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-10">
                        
                        <section>
                          <h2 className="text-[13px] font-semibold text-[#8E8E93] dark:text-[#EBEBF5]/60 uppercase tracking-widest mb-2 ml-2 flex items-center gap-2"><Icon name="BellOff" size={14}/> Nicht stören</h2>
                          <div className="bg-white dark:bg-[#1C1C1E] rounded-[20px] overflow-hidden shadow-[0_1px_3px_rgba(0,0,0,0.02)] border border-[#E5E5EA] dark:border-[#38383A] p-5 h-[calc(100%-2rem)]">
                              {activeDND ? (
                                  <div className="flex flex-col justify-center h-full gap-4 bg-[#FF9500]/10 p-5 rounded-[16px] border border-[#FF9500]/20 text-center">
                                      <div>
                                          <p className="font-semibold text-[#FF9500] text-[17px]">Aktiviert bis</p>
                                          <p className="text-[15px] text-[#FF9500]/80 font-medium">{currentUser?.dndUntil && !isNaN(new Date(currentUser.dndUntil).getTime()) ? new Date(currentUser.dndUntil).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''} Uhr</p>
                                      </div>
                                      <button onClick={() => setDND(0)} className="bg-[#FF9500] text-white font-semibold px-4 py-3 rounded-[12px] active:opacity-80 w-full">Beenden</button>
                                  </div>
                              ) : (
                                  <div className="flex flex-col h-full justify-between">
                                      <p className="text-[14px] font-medium text-[#8E8E93] dark:text-[#EBEBF5]/60 mb-4">Stumm schalten für:</p>
                                      <div className="grid grid-cols-2 gap-3 mb-4">
                                          <button onClick={() => setDND(0.25)} className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px] active:opacity-70">15 Min</button>
                                          <button onClick={() => setDND(1)} className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px] active:opacity-70">1 Std</button>
                                          <button onClick={() => setDND(8)} className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px] active:opacity-70">8 Std</button>
                                          <button onClick={() => setDND(24)} className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px] active:opacity-70">24 Std</button>
                                      </div>
                                      <p className="text-[12px] text-[#8E8E93] dark:text-[#EBEBF5]/60 text-center">Hinweis: Die Alexa bleibt von 22 bis 7 Uhr automatisch immer stumm.</p>
                                  </div>
                              )}
                          </div>
                        </section>

                        <section>
                          <h2 className="text-[13px] font-semibold text-[#8E8E93] dark:text-[#EBEBF5]/60 uppercase tracking-widest mb-2 ml-2">Geräte Setup</h2>
                          <div className="bg-white dark:bg-[#1C1C1E] rounded-[20px] overflow-hidden shadow-[0_1px_3px_rgba(0,0,0,0.02)] border border-[#E5E5EA] dark:border-[#38383A]">
                            <div className="p-4 border-b border-[#E5E5EA] dark:border-[#38383A] flex items-center justify-between">
                              <div className="flex items-center space-x-3">
                                <div className="bg-[#007AFF]/10 p-2.5 rounded-[12px]"><Icon name="Smartphone" size={20} className="text-[#007AFF]"/></div>
                                <div>
                                  <p className="font-semibold text-[16px] text-black dark:text-white">Apple Push</p>
                                  <p className="text-[13px] text-[#8E8E93] dark:text-[#EBEBF5]/60 font-normal">Status: <span className={currentUser?.fcmToken ? "text-[#34C759] font-medium" : "text-[#FF9500] font-medium"}>{pushStatus}</span></p>
                                </div>
                              </div>
                              <button onClick={() => requestPushPermission(false)} className="bg-[#007AFF]/10 text-[#007AFF] text-[14px] font-semibold px-4 py-2 rounded-full active:opacity-70 transition-opacity">
                                {currentUser?.fcmToken ? 'Erneuern' : 'Aktivieren'}
                              </button>
                            </div>
                            
                            <div className="p-4 space-y-4">
                              <div className="flex items-center space-x-3 mb-2">
                                <div className="bg-[#AF52DE]/10 p-2.5 rounded-[12px]"><Icon name="Speaker" size={20} className="text-[#AF52DE]"/></div>
                                <p className="font-semibold text-[16px] text-black dark:text-white">Alexa Voice Monkey Links</p>
                              </div>
                              
                              <div>
                                 <p className="text-[13px] font-medium text-[#8E8E93] dark:text-[#EBEBF5]/60 mb-1.5 ml-1">Für Mahlzeiten</p>
                                 <input type="url" placeholder="https://api.voicemonkey.io/trigger..." 
                                        className="w-full box-border bg-[var(--app-bg)] dark:bg-[#2C2C2E] px-4 py-3 rounded-[12px] text-[15px] font-normal outline-none focus:ring-2 ring-[#007AFF]/20 transition-all text-black dark:text-white placeholder-gray-500" 
                                        defaultValue={currentUser?.voiceMonkeyMeal} 
                                        onBlur={(e) => saveSettings('voiceMonkeyMeal', e.target.value)} />
                              </div>

                              <div>
                                 <p className="text-[13px] font-medium text-[#8E8E93] dark:text-[#EBEBF5]/60 mb-1.5 ml-1">Für Aktivitäten</p>
                                 <input type="url" placeholder="https://api.voicemonkey.io/trigger..." 
                                        className="w-full box-border bg-[var(--app-bg)] dark:bg-[#2C2C2E] px-4 py-3 rounded-[12px] text-[15px] font-normal outline-none focus:ring-2 ring-[#007AFF]/20 transition-all text-black dark:text-white placeholder-gray-500" 
                                        defaultValue={currentUser?.voiceMonkeyOther} 
                                        onBlur={(e) => saveSettings('voiceMonkeyOther', e.target.value)} />
                              </div>
                            </div>
                          </div>
                        </section>

                        {isAdmin && (
                           <section className="md:col-span-2">
                             <h2 className="text-[13px] font-semibold text-[#8E8E93] dark:text-[#EBEBF5]/60 uppercase tracking-widest mb-2 ml-2 flex items-center gap-2"><Icon name="Key" size={14}/> Admin-Bereich</h2>
                             <div className="bg-white dark:bg-[#1C1C1E] rounded-[20px] overflow-hidden shadow-[0_1px_3px_rgba(0,0,0,0.02)] border border-[#E5E5EA] dark:border-[#38383A]">
                               <div className="p-4 border-b border-[#E5E5EA] dark:border-[#38383A] flex items-center justify-between bg-[#F9F9F9] dark:bg-[#2C2C2E]">
                                 <p className="font-semibold text-[15px] text-black dark:text-white">Familien ID:</p>
                                 <p className="font-mono font-semibold tracking-wider text-[#007AFF]">{currentFamily.id}</p>
                               </div>
                               <div className="p-4">
                                 <p className="text-[13px] font-medium text-[#8E8E93] dark:text-[#EBEBF5]/60 uppercase tracking-wider mb-3">Familienmitglieder verwalten</p>
                                 <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                   {safeMembers.map((member) => (
                                      <div key={member.name} className={`flex items-center justify-between p-3.5 rounded-[14px] ${member.name === currentUser.name ? 'bg-[var(--app-bg)] dark:bg-[#2C2C2E]' : 'bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A] shadow-sm'}`}>
                                        <span className="font-medium text-[16px] text-black dark:text-white">{member.name} {member.name === currentUser.name && "(Du)"}</span>
                                        {member.name !== currentUser.name && (
                                           <button onClick={() => handleDeleteMember(member.name)} className="w-9 h-9 flex items-center justify-center bg-[#FF3B30]/10 text-[#FF3B30] rounded-full active:opacity-70 transition-opacity">
                                             <Icon name="Trash2" size={16} />
                                           </button>
                                        )}
                                      </div>
                                   ))}
                                 </div>
                               </div>
                               <div className="p-4 bg-[#FF3B30]/5 border-t border-[#FF3B30]/10 md:flex md:justify-end">
                                 <button onClick={handleDeleteFamily} className="w-full md:w-auto px-6 py-3.5 text-[#FF3B30] font-semibold text-[15px] bg-white dark:bg-[#1C1C1E] rounded-[12px] shadow-sm border border-[#FF3B30]/20 active:opacity-80 transition-opacity">
                                   Komplette Familie auflösen
                                 </button>
                               </div>
                             </div>
                           </section>
                        )}
                        
                        <section className="md:col-span-2">
                          <h2 className="text-[13px] font-semibold text-[#8E8E93] dark:text-[#EBEBF5]/60 uppercase tracking-widest mb-2 ml-2 flex items-center gap-2"><Icon name="Smartphone" size={14}/> Apple Kurzbefehle & Watch</h2>
                          <div className="bg-white dark:bg-[#1C1C1E] rounded-[20px] overflow-hidden shadow-[0_1px_3px_rgba(0,0,0,0.02)] border border-[#E5E5EA] dark:border-[#38383A] p-5">
                              <p className="text-[14px] text-[#3C3C43] dark:text-[#EBEBF5]/70 mb-4 leading-relaxed">
                                  Erstelle auf deinem iPhone in der Kurzbefehle-App die Aktion <b>"URL öffnen"</b> und füge einen dieser Links ein. Die Konfiguration wird automatisch übertragen, sodass es auch sofort auf deiner Apple Watch funktioniert!
                              </p>
                              <div className="space-y-3">
                                  {[
                                      { id: 'general_meal', label: 'Essen rufen', icon: 'Utensils' },
                                      { id: 'message', label: 'Ins Wohnzimmer rufen', icon: 'MessageCircle' }
                                  ].map(reason => {
                                      let rawConfig = localStorage.getItem(CONFIG_STORAGE_KEY) || localStorage.getItem('firebaseConfig');
                                      if(!rawConfig && typeof __firebase_config !== 'undefined') rawConfig = typeof __firebase_config === 'string' ? __firebase_config : JSON.stringify(__firebase_config);
                                      const cfgBase64 = rawConfig ? encodeURIComponent(btoa(unescape(encodeURIComponent(rawConfig)))) : '';
                                      
                                      const url = `${window.location.origin}${window.location.pathname}?action=shortcut&reason=${reason.id}&fid=${currentFamily.id}&cfg=${cfgBase64}`;
                                      
                                      return (
                                          <div key={reason.id} className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] p-3.5 rounded-[16px]">
                                              <div className="flex justify-between items-center mb-2">
                                                  <span className="font-semibold text-[15px] text-black dark:text-white flex items-center gap-2">
                                                      <Icon name={reason.icon} size={16} /> {reason.label}
                                                  </span>
                                                  <button onClick={() => { 
                                                      try {
                                                          const el = document.createElement('textarea');
                                                          el.value = url;
                                                          document.body.appendChild(el);
                                                          el.select();
                                                          document.execCommand('copy');
                                                          document.body.removeChild(el);
                                                          showAlert('Kopiert!', 'Der Link wurde in die Zwischenablage kopiert.');
                                                      } catch(e) {}
                                                  }} className="bg-[#007AFF]/10 text-[#007AFF] px-3 py-1.5 rounded-full text-[13px] font-bold active:opacity-70 transition-opacity">
                                                      Kopieren
                                                  </button>
                                              </div>
                                              <div className="text-[11px] text-[#8E8E93] dark:text-[#EBEBF5]/50 font-mono break-all line-clamp-2 overflow-hidden select-all">
                                                  {url}
                                              </div>
                                          </div>
                                      );
                                  })}
                              </div>
                          </div>
                        </section>

                        <div className="md:col-span-2 pt-2">
                            <button onClick={handleLogout} className="w-full md:max-w-xs mx-auto py-3.5 bg-white dark:bg-[#1C1C1E] text-[#FF3B30] font-semibold rounded-[14px] shadow-sm flex items-center justify-center space-x-2 active:opacity-70 transition-opacity border border-[#E5E5EA] dark:border-[#38383A]">
                              <Icon name="LogOut" size={20} />
                              <span className="text-[17px]">App & Gerät abmelden</span>
                            </button>
                        </div>
                      </div>
                    )}

                  </main>
              </div>

              <LiquidTabBar activeTab={activeTab} setActiveTab={setActiveTab} isKeyboardOpen={isKeyboardOpen} />
            </div>
          );
        }

        function ShortcutTrigger({ reason, fid }) {
            const [statusText, setStatusText] = useState('Sende Ruf...');

            useEffect(() => {
                const executeShortcut = async () => {
                    try {
                        const auth = firebase.auth();
                        await auth.signInAnonymously(); 

                        const docRef = db.doc(`artifacts/${appId}/public/data/families/${fid}`);
                        const docSnap = await docRef.get();

                        if (docSnap.exists) {
                            const data = docSnap.data();
                            const activeMembers = Array.isArray(data.members) ? data.members.filter(m => m && typeof m === 'object' && m.status !== 'pending') : [];
                            
                            const reasonObj = REASONS.find(r => r.id === reason) || { id: 'shortcut', category: 'other', sentence: 'Ruf über Kurzbefehl!' };
                            const now = new Date();
                            const isNightMode = now.getHours() >= 22 || now.getHours() < 7;
                            
                            const actualTargets = [];
                            activeMembers.forEach(member => {
                                const isDND = member.dndUntil && new Date(member.dndUntil) > now;
                                if (!isDND) {
                                    actualTargets.push(member.name);
                                    if (!isNightMode && reasonObj.category !== 'push_only') {
                                        const url = reasonObj.category === 'meal' ? member.voiceMonkeyMeal : member.voiceMonkeyOther;
                                        if (url && url.trim() !== '') fetch(url).catch(e => {});
                                    }
                                }
                            });

                            if (actualTargets.length > 0) {
                                const newHistoryItem = { 
                                    id: Date.now().toString(), 
                                    timestamp: now.toISOString(), 
                                    sender: 'Extern', 
                                    reason: reasonObj.sentence, 
                                    targets: actualTargets, 
                                    acknowledgedBy: [], 
                                    isExpense: false, 
                                    isResend: false,
                                    category: reasonObj.category
                                };
                                await docRef.update({ history: [newHistoryItem, ...(data.history || [])].slice(0, 50) });
                                setStatusText('Erfolgreich gesendet! ✅');
                                if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
                            } else {
                                setStatusText('Alle im Nicht-Stören Modus 🔕');
                            }
                        } else {
                            setStatusText('Familie nicht gefunden ❌');
                        }
                    } catch(e) {
                        setStatusText('Verbindungsfehler ❌');
                    }
                };
                executeShortcut();
            }, [reason, fid]);

            return (
                <div className="h-[100dvh] w-full bg-[var(--app-bg)] dark:bg-black text-black dark:text-white flex flex-col items-center justify-center p-8 text-center relative z-50">
                    <div className="bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A] p-8 rounded-[32px] shadow-2xl w-full max-w-sm text-center">
                        <div className="w-20 h-20 bg-[#007AFF]/10 text-[#007AFF] rounded-full flex items-center justify-center mx-auto mb-5">
                            <Icon name="Bell" size={36} />
                        </div>
                        <h2 className="text-[22px] font-bold mb-3">{statusText}</h2>
                        <p className="text-[15px] text-gray-500 dark:text-[#EBEBF5]/60 mb-6 leading-relaxed">
                            Dieses Fenster kann nun geschlossen werden.
                        </p>
                    </div>
                </div>
            );
        }

        function Root() {
            const params = new URLSearchParams(window.location.search);
            const isShortcut = params.get('action') === 'shortcut';
            const shortcutReason = params.get('reason');
            const shortcutFid = params.get('fid');

            const [config, setConfig] = useState(() => {
                try {
                    // Watch-Fix: Config direkt aus dem Shortcut-Link laden
                    const urlCfg = params.get('cfg');
                    if (urlCfg) {
                        const decodedStr = decodeURIComponent(escape(atob(urlCfg)));
                        const parsedUrlCfg = JSON.parse(decodedStr);
                        localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(parsedUrlCfg));
                        return parsedUrlCfg;
                    }
                    
                    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                        return typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
                    }
                    
                    const saved = localStorage.getItem(CONFIG_STORAGE_KEY) || localStorage.getItem('firebaseConfig');
                    if (saved) return JSON.parse(saved);
                } catch (e) { console.error("Config Setup Fehler:", e); }
                return null;
            });
            
            const [status, setStatus] = useState("booting"); 
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                if (!config) return setStatus("config-needed");
                
                setStatus("booting");
                try {
                    const finalConfig = config.firebaseConfig ? config.firebaseConfig : config;
                    if (!firebase.apps.length) app = firebase.initializeApp(finalConfig);
                    else app = firebase.app();
                    
                    db = firebase.firestore();
                    try {
                        db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
                    } catch (e) {}

                    auth = firebase.auth();
                    setStatus("ready");
                } catch (e) {
                    setErrorMsg("Verbindungsfehler: " + e.message);
                    setStatus("error");
                }
            }, [config]);

            if (status === "config-needed") return <ConfigLoader onConfigLoaded={setConfig} />;
            
            if (status === "error") {
                return (
                    <div className="h-[100dvh] w-full bg-[var(--app-bg)] dark:bg-black text-black dark:text-white flex flex-col items-center justify-center p-8 text-center relative z-50">
                        <Icon name="ShieldCheck" size={64} className="text-[#FF3B30] mb-4" />
                        <h2 className="text-xl font-bold mb-2">Systemfehler</h2>
                        <p className="text-[#FF3B30] text-[15px] mb-8 font-mono bg-[#FF3B30]/10 p-4 rounded-[16px] border border-[#FF3B30]/20">{errorMsg}</p>
                        <button onClick={() => { localStorage.removeItem(CONFIG_STORAGE_KEY); localStorage.removeItem('firebaseConfig'); setConfig(null); setStatus("config-needed"); }} className="bg-[#007AFF] text-white px-6 py-3.5 rounded-[14px] font-semibold text-[17px] active:opacity-80 transition-opacity">
                            Neue Config laden
                        </button>
                    </div>
                );
            }

            if (status === "booting") {
                return (
                   <div className="h-[100dvh] w-full bg-[var(--app-bg)] dark:bg-black flex flex-col items-center justify-center relative z-50">
                      <Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                   </div>
                );
            }

            if (isShortcut && shortcutReason && shortcutFid) {
                return <ShortcutTrigger reason={shortcutReason} fid={shortcutFid} />;
            }

            return <App />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
