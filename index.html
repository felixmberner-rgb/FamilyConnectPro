<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="FamilyConnect" />

<title>FamilyConnect</title>

<link rel="apple-touch-icon" href="apple-touch-icon.png" />

<!-- Libraries -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
html, body {
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-text-size-adjust: 100%;
}

#root {
  width: 100%;
  height: 100%;
  background: #F2F2F7;
}

/* iOS helpers */
.ios-blur {
  background: rgba(255,255,255,.8);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
}
::-webkit-scrollbar { display: none; }

/* Animations (FIX) */
@keyframes scaleIn {
  from { opacity:0; transform:scale(.92); }
  to   { opacity:1; transform:scale(1); }
}
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}
.animate-scale-in {
  animation: scaleIn .22s cubic-bezier(.16,1,.3,1) both;
}
.animate-fade-in {
  animation: fadeIn .22s ease both;
}
</style>
</head>

<body class="flex justify-center w-full text-black antialiased">

<!-- Fallback -->
<div id="fallback"
     style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
            background:#000;color:#007AFF;font-weight:700;z-index:9999">
  FamilyConnect startet…
</div>

<div id="root"></div>

<script type="text/babel">

/* ---------------------------------------------------
   GLOBAL SAFETY NETS
--------------------------------------------------- */
const fallback = document.getElementById('fallback');
const showFatal = (msg) => {
  if (!fallback) return;
  fallback.style.display = 'flex';
  fallback.textContent = msg || 'Fehler beim Start';
};

window.addEventListener('error', e => {
  console.error(e);
  showFatal('FamilyConnect konnte nicht gestartet werden.');
});
window.addEventListener('unhandledrejection', e => {
  console.error(e);
  showFatal('Unerwarteter Fehler.');
});

/* ---------------------------------------------------
   SAFE STORAGE (iOS FIX)
--------------------------------------------------- */
const safeGet = (k) => { try { return localStorage.getItem(k); } catch { return null; } };
const safeSet = (k,v) => { try { localStorage.setItem(k,v); } catch {} };
const safeRemove = (k) => { try { localStorage.removeItem(k); } catch {} };

/* ---------------------------------------------------
   UTIL
--------------------------------------------------- */
const todayLocal = () => {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0,10);
};

/* ---------------------------------------------------
   ICONS (X FIXED)
--------------------------------------------------- */
const ICONS = {
  X: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  Check: '<polyline points="20 6 9 17 4 12"/>'
};

const Icon = ({name,size=24,className=""}) => (
  <svg viewBox="0 0 24 24" width={size} height={size}
       fill="none" stroke="currentColor" strokeWidth="2"
       strokeLinecap="round" strokeLinejoin="round"
       className={className}
       dangerouslySetInnerHTML={{__html: ICONS[name]}} />
);

/* ---------------------------------------------------
   APP
--------------------------------------------------- */
function App() {
  const [familyId,setFamilyId] = React.useState(() => safeGet('familyId'));
  const [userName,setUserName] = React.useState(() => safeGet('userName'));
  const [loaded,setLoaded] = React.useState(true);

  /* ---- DND FIX ---- */
  const activeDND = false;

  /* ---- Expense helpers FIX ---- */
  const [expenseModal,setExpenseModal] = React.useState(null);
  const [expenseForm,setExpenseForm] = React.useState({
    amount:'',
    reason:'',
    date: todayLocal(),
    splitCount:1,
    splitTargets:[]
  });

  const openSingleExpense = (target) => {
    setExpenseForm({amount:'',reason:'',date:todayLocal(),splitCount:1,splitTargets:[]});
    setExpenseModal({mode:'single',target});
  };

  const openSplitExpense = () => {
    setExpenseForm({amount:'',reason:'',date:todayLocal(),splitCount:2,splitTargets:[]});
    setExpenseModal({mode:'split'});
  };

  const openEditExpense = (e) => {
    setExpenseForm({
      amount:e.amount,
      reason:e.reason,
      date:e.date || todayLocal(),
      splitCount:1,
      splitTargets:[]
    });
    setExpenseModal({mode:'edit',expense:e});
  };

  const toggleSplitTarget = (name) => {
    setExpenseForm(p => {
      const has = p.splitTargets.includes(name);
      const t = has ? p.splitTargets.filter(n=>n!==name) : [...p.splitTargets,name];
      return {...p, splitTargets:t, splitCount: Math.max(1,t.length+1)};
    });
  };

  /* ---- UI ---- */
  React.useEffect(()=>{
    fallback.style.display='none';
  },[]);

  if (!loaded) {
    return <div className="fixed inset-0 bg-black"></div>;
  }

  return (
    <div className="flex flex-col w-full h-full items-center justify-center bg-[#F2F2F7]">
      <h1 className="text-3xl font-bold mb-4">✅ FamilyConnect</h1>
      <p className="text-gray-600 mb-6">App erfolgreich repariert & gestartet.</p>

      <button onClick={()=>openSplitExpense()}
              className="px-6 py-3 bg-[#007AFF] text-white rounded-xl font-semibold">
        Test: Auslage öffnen
      </button>

      {expenseModal && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center animate-fade-in">
          <div className="bg-white p-6 rounded-xl w-80 animate-scale-in">
            <div className="flex justify-between mb-4">
              <strong>Auslage</strong>
              <button onClick={()=>setExpenseModal(null)}>
                <Icon name="X"/>
              </button>
            </div>
            <input className="w-full mb-3 p-2 bg-gray-100 rounded"
                   placeholder="Betrag"
                   value={expenseForm.amount}
                   onChange={e=>setExpenseForm({...expenseForm,amount:e.target.value})}/>
            <button className="w-full bg-[#34C759] text-white py-2 rounded"
                    onClick={()=>setExpenseModal(null)}>
              <Icon name="Check" className="inline mr-2"/> OK
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------
   RENDER
--------------------------------------------------- */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
