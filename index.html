<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FamilyConnect">
    <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>FamilyConnect</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'media', /* Automatisch Dark/Light Mode anhand iOS Einstellungen */
      }
    </script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <style>
        /* * DER PERFEKTE IOS LAYOUT FIX NACH DEINER ANLEITUNG * */
        :root {
            --app-bg: #F2F2F7;
        }
        @media (prefers-color-scheme: dark) {
            :root { --app-bg: #000000; }
        }

        /* html und body füllen die exakt verfügbare Höhe aus, um schwarze Balken zu töten */
        html {
            height: -webkit-fill-available;
        }
        
        body { 
            background-color: var(--app-bg); 
            margin: 0; 
            padding: 0;
            width: 100%; 
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden; /* Body sperren, damit die App nicht bounct */
            overscroll-behavior-y: none; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-text-size-adjust: 100%;
        }
        
        #root { 
            width: 100%; 
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
        }
        
        /* Das ist der native Scrolling-Bereich für den Content */
        .scrollable-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; /* Butterweiches Wischen auf iOS */
            padding-bottom: calc(80px + env(safe-area-inset-bottom, 20px)); /* Platz für die tiefergelegte Navbar */
        }
        
        .scrollable-area::-webkit-scrollbar { display: none; }
        .ios-blur { backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
        .pt-safe-top { padding-top: env(safe-area-inset-top, 44px); }
        
        input[type="file"] { display: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
    </style>
</head>
<body class="text-black dark:text-white antialiased">
    
    <div id="fallback" style="position:fixed;inset:0;background-color:var(--app-bg);display:flex;align-items:center;justify-content:center;color:#007AFF;font-weight:bold;z-index:9999;">
        FamilyConnect startet...
    </div>

    <div id="root"></div>

    <script type="text/babel">
        // --- 1. GLOBALE FEHLERBEHANDLUNG & CONSOLE CLEANUP ---
        
        const originalConsoleError = console.error;
        console.error = function(...args) {
            const msg = String(args[0]);
            if (msg.includes('appCheck') || msg.includes('recaptcha') || msg.includes('ReCAPTCHA')) return;
            if (args[0] && args[0].message && (String(args[0].message).includes('appCheck') || String(args[0].message).includes('ReCAPTCHA'))) return;
            originalConsoleError.apply(console, args);
        };

        const setFallbackMessage = (message) => {
            const fallback = document.getElementById('fallback');
            if (!fallback) return;
            fallback.style.display = 'flex';
            fallback.textContent = message;
        };

        window.addEventListener('error', (event) => {
            console.error('Global error:', event.error || event.message);
            setFallbackMessage('App konnte nicht gestartet werden. Bitte lade die Seite neu.');
        });

        window.addEventListener('unhandledrejection', (event) => {
            const reason = String(event.reason);
            if (reason.includes("URL protocol") || reason.includes("appCheck") || reason.includes("ReCAPTCHA")) {
                event.preventDefault();
                return;
            }
            console.error('Unhandled rejection:', event.reason);
        });

        // --- 2. REACT SETUP ---
        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;

        const RECAPTCHA_SITE_KEY = "6LdParwsAAAAAF-uow3DHSMtCchnjl785njIYF_V";
        
        let app, db, auth, messaging;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-connect-pro';

        const generateId = () => Math.floor(100000 + Math.random() * 900000).toString();
        const getFamilyDocRef = (familyId) => db.doc(`artifacts/${appId}/public/data/families/${familyId}`);

        // --- 3. HILFSFUNKTIONEN ---
        const getLocalTodayString = () => {
            const now = new Date();
            const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
            return local.toISOString().slice(0, 10);
        };

        const formatTime = (ts) => {
            if (!ts) return '';
            const d = new Date(ts);
            return isNaN(d.getTime()) ? '' : d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        };

        const formatDate = (ts) => {
            if (!ts) return '';
            const d = new Date(ts);
            return isNaN(d.getTime()) ? '' : d.toLocaleDateString('de-DE');
        };

        const getStatusColor = (ackString) => {
            if (!ackString) return 'text-[#8E8E93] dark:text-[#EBEBF5]/60'; 
            if (ackString.includes('Komme sofort')) return 'text-[#34C759]'; 
            if (ackString.includes('In 5 Minuten')) return 'text-[#FF9500]'; 
            if (ackString.includes('Fangt schon mal an')) return 'text-[#FF3B30]'; 
            return 'text-[#34C759]'; 
        };

        // --- 4. ICONS ---
        const ICONS = {
          Bell: '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
          BellOff: '<path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><line x1="1" x2="23" y1="1" y2="23"/>',
          Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
          Settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
          Coffee: '<path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/>',
          Utensils: '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>',
          UtensilsCrossed: '<path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/><path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"/><path d="m2.1 21.8 6.4-6.3"/><path d="m19 5-7 7"/>',
          Moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
          MessageCircle: '<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>',
          Film: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h4"/><path d="M3 12h18"/><path d="M3 16.5h4"/><path d="M17 3v18"/><path d="M17 7.5h4"/><path d="M17 16.5h4"/>',
          Gamepad2: '<line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/>',
          Check: '<polyline points="20 6 9 17 4 12"/>',
          LogOut: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>',
          ShieldCheck: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
          Smartphone: '<rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/>',
          Speaker: '<rect width="16" height="20" x="4" y="2" rx="2"/><circle cx="12" cy="14" r="4"/><line x1="12" x2="12.01" y1="6" y2="6"/>',
          CheckCircle2: '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
          Key: '<path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/>',
          Trash2: '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
          Euro: '<path d="M4 10h12"/><path d="M4 14h9"/><path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/>',
          Plus: '<line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/>',
          X: '<line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/>',
          Pencil: '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
          Users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'
        };

        const Icon = ({ name, size = 24, strokeWidth = 2, className = "", onClick }) => {
            return React.createElement('svg', {
                xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: strokeWidth, strokeLinecap: "round", strokeLinejoin: "round",
                className: className, onClick: onClick, dangerouslySetInnerHTML: { __html: ICONS[name] }
            });
        };

        // --- CUSTOM MODAL ---
        function Modal({ data, onClose }) {
            if (!data) return null;
            
            if (data.type === 'custom_ack') {
                return (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-xl transition-opacity">
                        <div className="bg-white dark:bg-[#1C1C1E] backdrop-blur-2xl rounded-[24px] p-6 w-full max-w-sm shadow-2xl animate-scale-in border border-white/50 dark:border-[#38383A]/50">
                            <div className="text-center mb-6">
                                <h3 className="font-semibold text-[19px] mb-2 text-black dark:text-white leading-snug">{data.title}</h3>
                                <p className="text-[#3C3C4399] dark:text-[#EBEBF5]/60 text-[15px] leading-relaxed whitespace-pre-wrap">{data.message}</p>
                            </div>
                            <div className="flex flex-col gap-3">
                                <button onClick={() => data.onRespond('Komme sofort')} className="w-full py-3.5 rounded-[14px] bg-[#34C759] text-white font-semibold text-[17px] active:opacity-70 transition-opacity flex items-center justify-center gap-2">
                                    <Icon name="Check" size={20} strokeWidth={2.5}/> Komme sofort
                                </button>
                                <button onClick={() => data.onRespond('In 5 Minuten')} className="w-full py-3.5 rounded-[14px] bg-[#FF9500] text-white font-semibold text-[17px] active:opacity-70 transition-opacity">
                                    In 5 Minuten
                                </button>
                                <button onClick={() => data.onRespond('Fangt schon mal an')} className="w-full py-3.5 rounded-[14px] bg-[#FF3B30] text-white font-semibold text-[17px] active:opacity-70 transition-opacity">
                                    Fangt schon mal an
                                </button>
                                <button onClick={data.onCancel} className="w-full py-3.5 rounded-[14px] bg-[#F2F2F7] dark:bg-[#2C2C2E] text-[#8E8E93] dark:text-[#EBEBF5]/60 font-semibold text-[17px] active:opacity-70 transition-opacity mt-2">
                                    Später antworten
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-xl transition-opacity">
                    <div className="bg-white dark:bg-[#1C1C1E] backdrop-blur-2xl rounded-[14px] p-6 w-full max-w-sm shadow-2xl animate-scale-in border border-white/50 dark:border-[#38383A]/50">
                        <div className="text-center mb-6">
                            <h3 className="font-semibold text-[17px] mb-2 text-black dark:text-white leading-snug">{data.title}</h3>
                            <p className="text-[#3C3C4399] dark:text-[#EBEBF5]/60 text-[13px] leading-relaxed whitespace-pre-wrap">{data.message}</p>
                        </div>
                        <div className="flex flex-col gap-2">
                            <button onClick={data.onConfirm} className={`w-full py-3.5 rounded-[12px] font-semibold text-[17px] active:opacity-70 transition-opacity ${data.danger ? 'bg-[#FF3B30] text-white' : 'bg-[#007AFF] text-white'}`}>
                                {data.confirmText || 'OK'}
                            </button>
                            {data.type === 'confirm' && (
                                <button onClick={data.onCancel} className="w-full py-3.5 rounded-[12px] bg-[#F2F2F7] dark:bg-[#2C2C2E] text-[#007AFF] font-semibold text-[17px] active:opacity-70 transition-opacity">
                                    Abbrechen
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Live Tracking Overlay
        function TrackingOverlay({ event, currentFamily, currentUser, safeMembers, onClose, onResend }) {
            if (!event) return null;
            const [cooldown, setCooldown] = useState(60);

            const isSender = event.sender === currentUser?.name;
            const isRecent = event.timestamp && (Date.now() - new Date(event.timestamp).getTime() < 5 * 60 * 1000);
            const canResend = isSender && isRecent;

            useEffect(() => {
                const start = Date.now();
                const timer = setInterval(() => {
                    const passed = Math.floor((Date.now() - start) / 1000);
                    if (passed >= 60) setCooldown(0);
                    else setCooldown(60 - passed);
                }, 1000);
                return () => clearInterval(timer);
            }, [event.id]);

            return (
                <div className="fixed inset-0 z-[90] flex items-end justify-center bg-black/40 backdrop-blur-md animate-fade-in md:items-center">
                    <div className="bg-[#F2F2F7] dark:bg-black w-full md:max-w-md md:rounded-[24px] rounded-t-[24px] p-6 pb-safe shadow-2xl animate-scale-in max-h-[85vh] overflow-y-auto scroll-smooth" style={{WebkitOverflowScrolling: 'touch'}}>
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-[22px] font-bold tracking-tight text-black dark:text-white">Ruf Status</h2>
                            <button onClick={onClose} className="w-8 h-8 bg-gray-200/60 dark:bg-[#2C2C2E] rounded-full flex items-center justify-center text-gray-500 dark:text-gray-300 active:opacity-70"><Icon name="X" size={18}/></button>
                        </div>
                        <p className="text-[#3C3C4399] dark:text-[#EBEBF5]/60 mb-6 font-medium bg-white dark:bg-[#1C1C1E] p-4 rounded-[16px] text-[15px] shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">"{event?.reason}"</p>
                        
                        <div className="space-y-3">
                            {(event.targets || []).map(targetName => {
                                const ackEntry = (event.acknowledgedBy || []).find(ack => ack === targetName || ack.startsWith(targetName + ':'));
                                const hasAck = !!ackEntry;
                                
                                let ackText = 'Hat bestätigt!';
                                if (hasAck && ackEntry.includes(':')) {
                                    ackText = ackEntry.split(':')[1];
                                }

                                const targetMember = safeMembers.find(m => m.name === targetName);
                                const isDND = targetMember?.dndUntil && new Date(targetMember.dndUntil) > new Date();

                                return (
                                    <div key={targetName} className="flex items-center justify-between bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A] p-4 rounded-[16px] shadow-[0_1px_3px_rgba(0,0,0,0.02)]">
                                        <div className="flex items-center gap-3">
                                            {hasAck ? <Icon name="CheckCircle2" className={getStatusColor(ackEntry)} /> : isDND ? <Icon name="BellOff" className="text-[#FF9500]" /> : <div className="w-6 h-6 rounded-full border-2 border-gray-200 dark:border-gray-600 animate-pulse" />}
                                            <div>
                                                <p className="font-semibold text-[17px] text-black dark:text-white">{targetName}</p>
                                                <p className={`text-[13px] font-normal ${hasAck ? getStatusColor(ackEntry) : 'text-[#3C3C4399] dark:text-[#EBEBF5]/60'}`}>
                                                    {hasAck ? ackText : isDND ? 'Bitte nicht stören aktiv' : 'Wartet auf Antwort...'}
                                                </p>
                                            </div>
                                        </div>
                                        {!hasAck && !isDND && canResend && (
                                            <button 
                                                disabled={cooldown > 0}
                                                onClick={() => { setCooldown(60); onResend(targetName, event.reason); }}
                                                className={`text-[13px] font-semibold px-4 py-2 rounded-full transition-all ${cooldown > 0 ? 'bg-[#F2F2F7] dark:bg-[#2C2C2E] text-gray-400' : 'bg-[#007AFF]/10 text-[#007AFF] active:opacity-70'}`}
                                            >
                                                {cooldown > 0 ? `${cooldown}s` : 'Nochmal'}
                                            </button>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        <button onClick={onClose} className="w-full mt-8 py-3.5 bg-white dark:bg-[#1C1C1E] font-semibold text-[17px] text-[#007AFF] rounded-[14px] active:opacity-70 shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">Schließen</button>
                    </div>
                </div>
            );
        }

        function ConfigLoader({ onConfigLoaded }) {
            const [error, setError] = useState("");
            
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        localStorage.setItem('firebaseConfig', JSON.stringify(parsed));
                        onConfigLoaded(parsed);
                    } catch (err) { setError("Fehler: " + err.message); }
                };
                reader.onerror = () => setError("Fehler beim Lesen der Datei.");
                reader.readAsText(file);
            };

            // Nur auf der Startseite: Schwarzer Hintergrund, keine Safari-Balken!
            return (
                <div className="fixed inset-0 z-50 flex flex-col items-center justify-center p-8 bg-[#000000] text-white w-full h-full overflow-y-auto pb-safe">
                    <div className="w-full max-w-sm text-center space-y-8 my-auto">
                        <Icon name="ShieldCheck" size={96} strokeWidth={1.5} className="text-[#007AFF] mx-auto" />
                        <div>
                          <h1 className="text-[34px] font-bold tracking-tight mb-2">System Setup</h1>
                          <p className="text-gray-400 text-[15px] leading-relaxed px-4">Bitte lade deine <span className="font-mono text-[#007AFF]">config.json</span> hoch. Die Daten werden sicher lokal gespeichert.</p>
                        </div>
                        {error && <p className="text-[#FF3B30] text-[13px] font-semibold bg-[#FF3B30]/10 p-3 rounded-[10px] border border-[#FF3B30]/20">{error}</p>}
                        
                        <label className="inline-flex items-center justify-center w-full bg-[#007AFF] text-white py-4 rounded-[14px] font-semibold text-[17px] active:opacity-80 transition-opacity cursor-pointer">
                            Konfiguration laden
                            <input type="file" accept=".json" onChange={handleFileUpload} onClick={(e) => { e.target.value = null; }} />
                        </label>
                    </div>
                </div>
            );
        }

        const LiquidTabBar = ({ activeTab, setActiveTab, isKeyboardOpen }) => {
          const tabs = [
            { id: 'home', icon: 'Bell' },
            { id: 'history', icon: 'Clock' },
            { id: 'expenses', icon: 'Euro' }, 
            { id: 'settings', icon: 'Settings' }
          ];
          const activeIndex = tabs.findIndex(t => t.id === activeTab);

          return (
            <div 
              className={`fixed left-0 right-0 flex justify-center z-40 pointer-events-none px-4 transition-transform duration-500 ease-out ${isKeyboardOpen ? 'translate-y-48 opacity-0' : 'translate-y-0 opacity-100'}`}
              style={{ bottom: 'max(env(safe-area-inset-bottom), 12px)' }}
            >
              <div className="pointer-events-auto bg-white/80 dark:bg-[#1C1C1E]/80 ios-blur shadow-[0_8px_30px_rgba(0,0,0,0.12)] border border-[#E5E5EA] dark:border-[#38383A] rounded-full p-1.5 flex items-center justify-between w-full max-w-[280px] md:max-w-[360px] relative h-[60px]">
                <div className="absolute inset-y-1.5 left-1.5 flex justify-center transition-transform duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] pointer-events-none" style={{ width: 'calc((100% - 12px) / 4)', transform: `translateX(${activeIndex * 100}%)` }}>
                  <div className="w-12 md:w-14 h-full bg-[#007AFF]/15 dark:bg-[#007AFF]/25 rounded-full"></div>
                </div>
                {tabs.map((tab) => {
                  const isActive = activeTab === tab.id;
                  return (
                    <button key={tab.id} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setActiveTab(tab.id); }} className="flex-1 relative z-10 flex items-center justify-center h-full active:opacity-60 transition-opacity">
                      <Icon name={tab.icon} size={isActive ? 24 : 22} strokeWidth={isActive ? 2.5 : 2} className={`transition-colors duration-300 ${isActive ? 'text-[#007AFF]' : 'text-[#8E8E93] dark:text-[#98989D]'}`} />
                    </button>
                  );
                })}
              </div>
            </div>
          );
        };

        function App() {
          const [appLoaded, setAppLoaded] = useState(false);
          const [firebaseUser, setFirebaseUser] = useState(null);
          
          // Liest sicher die Daten aus dem Cache, ohne jemals automatisch abzumelden!
          const [localFamilyId, setLocalFamilyId] = useState(() => localStorage.getItem('familyId'));
          const [localUserName, setLocalUserName] = useState(() => localStorage.getItem('userName'));

          const [currentFamily, setCurrentFamily] = useState(null);
          const [currentUser, setCurrentUser] = useState(null);
          const [modal, setModal] = useState(null);
          const [isKeyboardOpen, setIsKeyboardOpen] = useState(false);
          const [trackingEventId, setTrackingEventId] = useState(null);
          
          const [authMode, setAuthMode] = useState('login');
          const [isAdminMode, setIsAdminMode] = useState(false); 
          const [adminFamilies, setAdminFamilies] = useState([]);
          const [newFamilyName, setNewFamilyName] = useState('');
          const [newMemberNames, setNewMemberNames] = useState({});

          const [formInput, setFormInput] = useState({ familyId: '', familyName: '', name: '', password: '' });
          const [authError, setAuthError] = useState('');

          const [expenseModal, setExpenseModal] = useState(null); 
          const [expenseForm, setExpenseForm] = useState({ amount: '', reason: '', date: getLocalTodayString(), splitCount: 1, splitTargets: [] });

          const [activeTab, setActiveTab] = useState(() => {
              const params = new URLSearchParams(window.location.search);
              const tab = params.get('tab');
              return ['history', 'expenses'].includes(tab) ? tab : 'home';
          });
          const [selectedReason, setSelectedReason] = useState(null);
          const [selectedMembers, setSelectedMembers] = useState([]);
          const [isSending, setIsSending] = useState(false);
          const [pushStatus, setPushStatus] = useState('Nicht konfiguriert');

          // --- SICHERHEITS-NETZE ---
          const safeMembers = Array.isArray(currentFamily?.members) ? currentFamily.members.filter(m => m && typeof m === 'object' && m.name) : [];
          const activeMembersList = safeMembers.filter(m => m.status !== 'pending');
          const safeExpenses = Array.isArray(currentFamily?.expenses) ? currentFamily.expenses.filter(e => e && typeof e === 'object' && e.id) : [];
          const safeHistory = Array.isArray(currentFamily?.history) ? currentFamily.history.filter(h => h && typeof h === 'object' && h.id) : [];

          const isAdmin = safeMembers.length > 0 && safeMembers[0].name === currentUser?.name;

          const activeDND = Boolean(
              currentUser?.dndUntil &&
              !isNaN(new Date(currentUser.dndUntil).getTime()) &&
              new Date(currentUser.dndUntil) > new Date()
          );

          const REASONS = [
            { id: 'breakfast', label: 'Frühstück', sentence: 'Das Frühstück ist fertig!', icon: 'Coffee', category: 'meal' },
            { id: 'lunch', label: 'Mittagessen', sentence: 'Das Mittagessen ist fertig!', icon: 'Utensils', category: 'meal' },
            { id: 'coffee', label: 'Kaffee', sentence: 'Es gibt Kaffee und Kuchen!', icon: 'UtensilsCrossed', category: 'meal' },
            { id: 'dinner', label: 'Abendessen', sentence: 'Das Abendessen ist fertig!', icon: 'Moon', category: 'meal' },
            { id: 'table', label: 'Tischdecken', sentence: 'Hilfe beim Tischdecken wird benötigt!', icon: 'Utensils', category: 'push_only' },
            { id: 'message', label: 'Wohnzimmer', sentence: 'Bitte komme ins Wohnzimmer!', icon: 'MessageCircle', category: 'other' },
            { id: 'movie', label: 'Film', sentence: 'Der Film fängt gleich an!', icon: 'Film', category: 'other' },
            { id: 'game', label: 'Spielen', sentence: 'Wir wollen spielen, komm dazu!', icon: 'Gamepad2', category: 'other' },
          ];

          const showConfirm = (title, message, onConfirm, danger = false) => setModal({ type: 'confirm', title, message, danger, onConfirm: () => { onConfirm(); setModal(null); }, onCancel: () => setModal(null) });
          const showAlert = (title, message) => setModal({ type: 'alert', title, message, onConfirm: () => setModal(null) });

          // Elegantes Ausblenden der TabBar bei Fokus
          useEffect(() => {
            const handleFocusIn = (e) => { 
                const tag = e.target.tagName;
                const type = e.target.type;
                if ((tag === 'INPUT' || tag === 'TEXTAREA') && !['checkbox', 'radio', 'submit', 'button'].includes(type)) {
                    setIsKeyboardOpen(true); 
                }
            };
            const handleFocusOut = () => { 
                setIsKeyboardOpen(false);
            };
            
            window.addEventListener('focusin', handleFocusIn); 
            window.addEventListener('focusout', handleFocusOut);
            
            return () => { 
                window.removeEventListener('focusin', handleFocusIn); 
                window.removeEventListener('focusout', handleFocusOut); 
            };
          }, []);

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else { await auth.signInAnonymously(); }
              } catch (error) {}
            };
            initAuth();

            const unsubscribe = auth.onAuthStateChanged(async (u) => {
              setFirebaseUser(u);
            });
            return () => unsubscribe();
          }, []);

          // ABSOLUT SICHERER DB Listener (kein Autologout!)
          useEffect(() => {
            if (!firebaseUser || !localFamilyId || !localUserName) {
                if (firebaseUser && !isAdminMode) setAppLoaded(true);
                return;
            }

            const unsubscribe = getFamilyDocRef(localFamilyId).onSnapshot((docSnap) => {
              if (docSnap.exists) {
                const data = docSnap.data();
                
                const rawMembers = Array.isArray(data.members) ? data.members : [];
                const updatedUser = rawMembers.find(m => m && typeof m === 'object' && m.name === localUserName);
                
                if (!updatedUser || updatedUser.status === 'pending') {
                    console.warn("User temporär nicht gefunden.");
                    return; 
                }

                setCurrentFamily(data);
                setCurrentUser(updatedUser);
                if (updatedUser.fcmToken) setPushStatus('Aktiviert ✅');
                setAppLoaded(true);
              }
            }, (error) => {
                console.warn("Snapshot Error, kein Grund zur Panik:", error);
            });
            return () => unsubscribe();
          }, [firebaseUser, localFamilyId, localUserName, isAdminMode]);

          // Admin Listener
          useEffect(() => {
              if (isAdminMode) {
                 const unsub = db.collection(`artifacts/${appId}/public/data/families`).onSnapshot(snap => {
                     const families = [];
                     snap.forEach(doc => { if (doc.id !== 'admin_setup') families.push(doc.data() || {}); });
                     setAdminFamilies(families);
                 });
                 return () => unsub();
              }
          }, [isAdminMode]);

          // Auto-Popup Listener (GLOBAL)
          useEffect(() => {
              if (currentFamily && currentUser) {
                  const latestEvent = safeHistory.find(h => !h.isExpense && !h.isResend);
                  if (latestEvent && (latestEvent.targets || []).includes(currentUser.name)) {
                      
                      const alreadyAcked = (latestEvent.acknowledgedBy || []).some(ack => ack === currentUser.name || ack.startsWith(currentUser.name + ':'));
                      
                      if (!alreadyAcked && latestEvent.sender !== currentUser.name) {
                          if (latestEvent.timestamp) {
                              const eventAge = Date.now() - new Date(latestEvent.timestamp).getTime();
                              if (eventAge < 5 * 60 * 1000 && !sessionStorage.getItem(`prompted_${latestEvent.id}`)) {
                                  sessionStorage.setItem(`prompted_${latestEvent.id}`, 'true');
                                  
                                  setModal({ 
                                      type: 'custom_ack', 
                                      title: `Ruf von ${latestEvent.sender}`, 
                                      message: `${latestEvent.reason}\n\nWie möchtest du antworten?`, 
                                      onRespond: (responseType) => {
                                          handleAcknowledge(latestEvent.id, responseType);
                                          setModal(null);
                                      },
                                      onCancel: () => setModal(null) 
                                  });
                              }
                          }
                      }
                  }
              }
          }, [currentFamily, currentUser]);

          // Foreground Push Listener
          useEffect(() => {
              if (messaging) {
                  try {
                      const unsub = messaging.onMessage((payload) => {
                          if(navigator.vibrate) navigator.vibrate([50, 100, 50]);
                          showAlert(payload.notification?.title || "Neue Benachrichtigung", payload.notification?.body || "");
                      });
                      return () => unsub();
                  } catch(e) {}
              }
          }, []);

          // --- HANDLER FUNKTIONEN ---

          const handleAdminAuth = async () => {
              setAuthError('');
              if (!formInput.password) return setAuthError('Bitte Passwort eingeben.');
              try {
                  const adminDocRef = getFamilyDocRef('admin_setup');
                  const docSnap = await adminDocRef.get();
                  if (!docSnap.exists) {
                      await adminDocRef.set({ isAdminDoc: true, password: formInput.password.trim() });
                      setIsAdminMode(true);
                  } else {
                      if (docSnap.data().password === formInput.password.trim()) setIsAdminMode(true);
                      else setAuthError('Falsches Master-Passwort.');
                  }
              } catch (e) { setAuthError('Fehler beim Admin-Login.'); }
          };

          const handleJoinFamily = async () => {
            setAuthError('');
            if (!formInput.familyId || !formInput.name || !formInput.password) return setAuthError('Bitte alle Felder ausfüllen.');
            try {
              const cleanId = formInput.familyId.trim();
              const cleanName = formInput.name.trim().toLowerCase();
              const docSnap = await getFamilyDocRef(cleanId).get();
              if (!docSnap.exists) return setAuthError('Familie nicht gefunden.');
              const data = docSnap.data();
              
              const rawMembers = Array.isArray(data.members) ? data.members : [];
              const cleanMembers = rawMembers.filter(m => m && typeof m === 'object');
              const memberIndex = cleanMembers.findIndex(m => m.name.toLowerCase() === cleanName);
              
              if (memberIndex === -1) return setAuthError('Dieser Name wurde vom Administrator noch nicht registriert.');
              if (cleanMembers[memberIndex].status !== 'pending') return setAuthError('Dieser Account ist bereits aktiv. Bitte nutze "Anmelden".');
              
              const updatedMembers = [...cleanMembers];
              updatedMembers[memberIndex] = { ...updatedMembers[memberIndex], password: formInput.password.trim(), status: 'active', fcmToken: '', voiceMonkeyMeal: '', voiceMonkeyOther: '', dndUntil: null };
              
              await getFamilyDocRef(cleanId).update({ members: updatedMembers });
              
              setCurrentFamily(data);
              setCurrentUser(updatedMembers[memberIndex]);
              localStorage.setItem('familyId', cleanId); 
              localStorage.setItem('userName', updatedMembers[memberIndex].name);
              setLocalFamilyId(cleanId); 
              setLocalUserName(updatedMembers[memberIndex].name);
              setAppLoaded(true);
            } catch (err) { setAuthError('Fehler beim Beitreten.'); }
          };

          const handleLogin = async () => {
            setAuthError('');
            if (!formInput.familyId || !formInput.name || !formInput.password) return setAuthError('Familien-ID, Name und Passwort erforderlich.');
            try {
              const cleanId = formInput.familyId.trim();
              const cleanName = formInput.name.trim().toLowerCase();
              const docSnap = await getFamilyDocRef(cleanId).get();
              if (!docSnap.exists) return setAuthError('Familie nicht gefunden. Überprüfe die ID.');
              
              const data = docSnap.data();
              const rawMembers = Array.isArray(data.members) ? data.members : [];
              const cleanMembers = rawMembers.filter(m => m && typeof m === 'object');
              const member = cleanMembers.find(m => m.name.toLowerCase() === cleanName && m.password === formInput.password.trim());
              
              if (!member || member.status === 'pending') return setAuthError('Falsches Passwort oder noch nicht beigetreten.');
              
              setCurrentFamily(data);
              setCurrentUser(member);
              localStorage.setItem('familyId', data.id); 
              localStorage.setItem('userName', member.name);
              setLocalFamilyId(data.id); 
              setLocalUserName(member.name);
              setAppLoaded(true);
            } catch (err) { setAuthError('Fehler bei der Anmeldung.'); }
          };

          const handleLogout = () => { 
              localStorage.removeItem('familyId'); localStorage.removeItem('userName');
              setLocalFamilyId(null); setLocalUserName(null); setCurrentFamily(null); setCurrentUser(null);
          };

          const adminCreateFamily = async () => {
              if (!newFamilyName.trim()) return showAlert("Fehler", "Bitte Familiennamen eingeben.");
              const newId = generateId();
              await getFamilyDocRef(newId).set({ id: newId, name: newFamilyName.trim(), vapidKey: '', expenses: [], history: [], members: [] });
              setNewFamilyName('');
          };

          const adminDeleteFamily = async (famId) => {
              showConfirm("Familie löschen", "Möchtest du diese Familie und alle Daten endgültig löschen?", async () => { await getFamilyDocRef(famId).delete(); }, true);
          };

          const adminAddMember = async (fam) => {
              const name = newMemberNames[fam.id];
              if (!name || !name.trim()) return;
              
              const rawFamMembers = Array.isArray(fam.members) ? fam.members.filter(m => m && typeof m === 'object') : [];
              if (rawFamMembers.find(m => m.name.toLowerCase() === name.trim().toLowerCase())) return showAlert("Fehler", "Name existiert bereits.");
              await getFamilyDocRef(fam.id).update({ members: [...rawFamMembers, { name: name.trim(), status: 'pending' }] });
              setNewMemberNames({ ...newMemberNames, [fam.id]: '' });
          };

          const adminDeleteMember = async (famId, memberName) => {
              showConfirm("Mitglied löschen", `Möchtest du ${memberName} aus der Familie entfernen?`, async () => {
                  const fam = adminFamilies.find(f => f.id === famId);
                  const rawFamMembers = Array.isArray(fam.members) ? fam.members.filter(m => m && typeof m === 'object') : [];
                  await getFamilyDocRef(famId).update({ members: rawFamMembers.filter(m => m.name !== memberName) });
              }, true);
          };

          const generatePDF = async (family) => {
              try {
                  const { jsPDF } = window.jspdf;
                  const QRCodeLib = window.QRCode; 
                  if (!QRCodeLib) throw new Error("QR-Code Bibliothek lädt nicht. Lade die Seite neu oder prüfe deinen Werbeblocker.");
                  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
                  const appUrl = window.location.origin + window.location.pathname;
                  const qrDataUrl = await QRCodeLib.toDataURL(appUrl, { width: 300, margin: 2, color: { dark: '#007AFF', light: '#FFFFFF' } });

                  doc.setFillColor(242, 242, 247); doc.rect(0, 0, 210, 297, 'F');
                  doc.setFillColor(255, 255, 255); doc.roundedRect(20, 40, 170, 180, 10, 10, 'F');
                  
                  doc.setFont("helvetica", "bold"); doc.setTextColor(0, 122, 255); doc.setFontSize(32); doc.text("FamilyConnect", 105, 65, { align: "center" });
                  doc.setTextColor(28, 28, 30); doc.setFontSize(22); doc.text(`Familie: ${family.name}`, 105, 85, { align: "center" });
                  doc.setFont("helvetica", "normal"); doc.setFontSize(14); doc.setTextColor(142, 142, 147); doc.text("Scanne den QR-Code, um der App beizutreten:", 105, 105, { align: "center" });
                  doc.addImage(qrDataUrl, 'PNG', 70, 115, 70, 70);
                  doc.setFontSize(14); doc.setTextColor(28, 28, 30); doc.text("Eure Familien-ID lautet:", 105, 200, { align: "center" });
                  doc.setFont("helvetica", "bold"); doc.setFontSize(36); doc.setTextColor(0, 122, 255); doc.text(family.id, 105, 215, { align: "center" });
                  doc.setFont("helvetica", "normal"); doc.setFontSize(11); doc.setTextColor(142, 142, 147); doc.text("Wichtig: Dein Vorname muss vom Administrator", 105, 260, { align: "center" }); doc.text("freigeschaltet sein, bevor du beitreten kannst.", 105, 266, { align: "center" });
                  doc.save(`FamilyConnect_${family.name}_Setup.pdf`);
              } catch (err) { showAlert("Fehler", err.message || "Fehler beim Generieren der PDF."); }
          };

          const requestPushPermission = async () => {
            if (!window.isSecureContext) return showAlert("Fehler", "Push funktioniert nur über HTTPS.");
            
            if (!('Notification' in window) || !('serviceWorker' in navigator)) {
                return showAlert("Push-Fehler", "Push wird in diesem Modus nicht unterstützt. Bitte als Web-App auf dem Home-Bildschirm speichern.");
            }

            if (!firebase?.messaging) return showAlert("Fehler", "Firebase Messaging ist nicht verfügbar.");

            try {
                const supported = firebase.messaging.isSupported ? await firebase.messaging.isSupported() : true;
                if (!supported) return showAlert("Fehler", "Push ist auf diesem Gerät/Browser nicht verfügbar.");
            } catch (e) { return showAlert("Fehler", "Push-Unterstützung konnte nicht geprüft werden."); }

            if (!messaging) {
                try { messaging = firebase.messaging(); } catch (e) { return showAlert("Fehler", "Push-Dienst konnte nicht gestartet werden."); }
            }
            
            let storedConfig = {};
            let firebaseConfigObj = {};
            try { 
                const rawConfig = localStorage.getItem('firebaseConfig');
                if (rawConfig) {
                    const parsed = JSON.parse(rawConfig);
                    storedConfig = parsed.vapidKey ? parsed : (parsed.firebaseConfig || {});
                    firebaseConfigObj = parsed.firebaseConfig || parsed;
                }
            } catch(e) {}
            
            const vapidKey = storedConfig.vapidKey || currentFamily?.vapidKey;
            
            if (!vapidKey || !vapidKey.trim()) {
                return showAlert("Fehler", "Kein VAPID-Key gefunden! Bitte stelle sicher, dass das Feld 'vapidKey' in deiner hochgeladenen config.json steht.");
            }
            
            let swReg = await navigator.serviceWorker.getRegistration();
            if (!swReg) {
                try {
                    const swUrl = `./firebase-messaging-sw.js?apiKey=${encodeURIComponent(firebaseConfigObj.apiKey || '')}&projectId=${encodeURIComponent(firebaseConfigObj.projectId || '')}&senderId=${encodeURIComponent(firebaseConfigObj.messagingSenderId || '')}&appId=${encodeURIComponent(firebaseConfigObj.appId || '')}`;
                    swReg = await navigator.serviceWorker.register(swUrl);
                } catch(e) {
                    return showAlert("Push-Fehler", "Fehler beim Starten des Push-Dienstes: " + e.message);
                }
            }

            if (!swReg) return showAlert("Fehler", "Es konnte kein Service Worker registriert werden.");

            setPushStatus('Wird angefragt...');
            try {
              const permission = await Notification.requestPermission();
              if (permission !== 'granted') {
                  setPushStatus('Abgelehnt ❌');
                  return;
              }

              const token = await messaging.getToken({
                  vapidKey: vapidKey.trim(),
                  serviceWorkerRegistration: swReg
              });

              if (!token) {
                  setPushStatus('Fehler');
                  return showAlert("Fehler", "Es konnte kein Push-Token erzeugt werden.");
              }

              await getFamilyDocRef(currentFamily.id).update({
                  members: safeMembers.map(m => m.name === currentUser?.name ? { ...m, fcmToken: token } : m)
              });
              setPushStatus('Aktiviert ✅'); 
              showAlert("Erfolg", "Push-Mitteilungen wurden erfolgreich aktiviert!");

            } catch (error) { setPushStatus('Fehler'); showAlert("Fehler", "Fehler beim Token-Abruf: " + error.message); }
          };

          const handleSendNotification = async (customReasonObj = null, customTargets = null, isResend = false) => {
            const reasonObj = customReasonObj || REASONS.find(r => r.id === selectedReason);
            const targetsList = customTargets || selectedMembers;
            if (!reasonObj || targetsList.length === 0) return;
            
            const todayCalls = safeHistory.filter(h => h?.sender === currentUser.name && h?.timestamp && new Date(h.timestamp).toDateString() === new Date().toDateString());
            if (todayCalls.length >= 20) return showAlert("Limit erreicht", "Du hast heute bereits 20 Rufe gesendet.");

            setIsSending(true); if(navigator.vibrate) navigator.vibrate(10);
            const now = new Date(); const isNightMode = now.getHours() >= 22 || now.getHours() < 7;
            const actualTargets = [];

            safeMembers.forEach(member => {
                if (member && targetsList.includes(member.name) && member.status !== 'pending') {
                    const isDND = member.dndUntil && new Date(member.dndUntil) > now;
                    if (!isDND) {
                        actualTargets.push(member.name);
                        if (!isNightMode && reasonObj.category !== 'push_only') {
                            const url = reasonObj.category === 'meal' ? member.voiceMonkeyMeal : member.voiceMonkeyOther;
                            if (url && url.trim() !== '') fetch(url).catch(e => {});
                        }
                    }
                }
            });

            if (actualTargets.length === 0) {
                setIsSending(false);
                return showAlert("Hinweis", "Alle ausgewählten Personen haben aktuell 'Nicht stören' aktiviert.");
            }

            const newHistoryItem = { id: Date.now().toString(), timestamp: now.toISOString(), sender: currentUser.name, reason: reasonObj.sentence, targets: actualTargets, acknowledgedBy: [], isExpense: false, isResend: isResend };

            try {
              await getFamilyDocRef(currentFamily.id).update({ history: [newHistoryItem, ...safeHistory].slice(0, 50) });
              if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
              if (!customReasonObj && reasonObj.category !== 'push_only' && !isResend) setTrackingEventId(newHistoryItem.id);
              setSelectedReason(null); setSelectedMembers([]); 
              if (activeTab === 'home' && reasonObj.category === 'push_only') setActiveTab('history');
            } catch (err) {}
            setTimeout(() => setIsSending(false), 800);
          };

          // Echtzeit-Bestätigung mit Fresh Fetch
          const handleAcknowledge = async (historyItemId, responseType = 'Bestätigt') => {
            if(navigator.vibrate) navigator.vibrate([20, 30]);
            const responseString = `${currentUser.name}:${responseType}`;

            try {
                const docRef = getFamilyDocRef(currentFamily.id);
                const docSnap = await docRef.get();
                if (!docSnap.exists) return;
                
                const freshData = docSnap.data();
                const freshHistory = freshData.history || [];
                
                let changed = false;
                const updatedHistory = freshHistory.map(item => {
                    if (item.id === historyItemId) {
                        const alreadyAcked = (item.acknowledgedBy || []).some(ack => ack === currentUser.name || ack.startsWith(currentUser.name + ':'));
                        if (!alreadyAcked) {
                            changed = true;
                            return { ...item, acknowledgedBy: [...(item.acknowledgedBy || []), responseString] };
                        }
                    }
                    return item;
                });

                if (changed) {
                    await docRef.update({ history: updatedHistory });
                }
            } catch (e) {}
          };

          // --- Expense Handlers ---
          const resetExpenseForm = (overrides = {}) => {
              setExpenseForm({
                  amount: '',
                  reason: '',
                  date: getLocalTodayString(),
                  splitCount: 1,
                  splitTargets: [],
                  ...overrides
              });
          };

          const openSingleExpense = (target) => {
              resetExpenseForm();
              setExpenseModal({ mode: 'single', target });
          };

          const openSplitExpense = () => {
              resetExpenseForm({ splitCount: 2 });
              setExpenseModal({ mode: 'split' });
          };

          const openEditExpense = (expense) => {
              resetExpenseForm({
                  amount: String(expense?.amount ?? ''),
                  reason: expense?.reason ?? '',
                  date: expense?.date || getLocalTodayString(),
                  splitCount: 1,
                  splitTargets: []
              });
              setExpenseModal({ mode: 'edit', expense });
          };

          const toggleSplitTarget = (name) => {
              setExpenseForm(prev => {
                  const exists = prev.splitTargets.includes(name);
                  const nextTargets = exists
                      ? prev.splitTargets.filter(n => n !== name)
                      : [...prev.splitTargets, name];

                  return {
                      ...prev,
                      splitTargets: nextTargets
                  };
              });
          };

          const handleSaveExpense = async () => {
              if (!expenseForm.amount || !expenseForm.reason) return showAlert("Fehler", "Bitte Betrag und Grund angeben.");
              const cleanAmount = String(expenseForm.amount).replace(',', '.').replace(/[^0-9.]/g, '');
              const amountNum = parseFloat(cleanAmount);
              if (isNaN(amountNum) || amountNum <= 0) return showAlert("Fehler", "Ungültiger Betrag.");

              let newExpenses = [...safeExpenses];
              let historyPushes = [];

              if (expenseModal.mode === 'edit') {
                  newExpenses = newExpenses.map(e => e?.id === expenseModal.expense.id ? { ...e, amount: amountNum.toFixed(2), reason: expenseForm.reason, date: expenseForm.date } : e);
              } else if (expenseModal.mode === 'single') {
                  newExpenses.unshift({ id: generateId(), creditor: currentUser.name, debtor: expenseModal.target, amount: amountNum.toFixed(2), reason: expenseForm.reason, date: expenseForm.date, timestamp: new Date().toISOString(), isPaid: false });
                  historyPushes.push({ id: generateId(), timestamp: new Date().toISOString(), sender: currentUser.name, reason: `Neue Auslage: ${expenseForm.reason} (${amountNum.toFixed(2)}€)`, targets: [expenseModal.target], acknowledgedBy: [], isExpense: true });
              } else if (expenseModal.mode === 'split') {
                  const splitCount = parseInt(expenseForm.splitCount, 10);
                  
                  if (isNaN(splitCount) || splitCount < 1) {
                      return showAlert("Fehler", "Bitte gib an, durch wie viele Personen der Betrag geteilt wird.");
                  }
                  if (expenseForm.splitTargets.length === 0) {
                      return showAlert("Fehler", "Bitte wähle mindestens eine Person aus.");
                  }

                  const perPerson = (amountNum / splitCount).toFixed(2);
                  expenseForm.splitTargets.forEach(target => {
                      newExpenses.unshift({ id: generateId(), creditor: currentUser.name, debtor: target, amount: perPerson, reason: `${expenseForm.reason} (Anteilig)`, date: expenseForm.date, timestamp: new Date().toISOString(), isPaid: false });
                      historyPushes.push({ id: generateId(), timestamp: new Date().toISOString(), sender: currentUser.name, reason: `Neue geteilte Auslage: ${expenseForm.reason} (${perPerson}€)`, targets: [target], acknowledgedBy: [], isExpense: true });
                  });
              }

              try {
                  await getFamilyDocRef(currentFamily.id).update({ expenses: newExpenses });
                  if (historyPushes.length > 0) await getFamilyDocRef(currentFamily.id).update({ history: [...historyPushes, ...safeHistory].slice(0, 50) });
                  setExpenseModal(null);
              } catch (e) { showAlert("Fehler", "Konnte nicht gespeichert werden."); }
          };

          const handleMarkExpensePaid = async (expId) => {
              const updatedExpenses = safeExpenses.map(e => e?.id === expId ? { ...e, isPaid: true } : e);
              await getFamilyDocRef(currentFamily.id).update({ expenses: updatedExpenses });
          };

          const handleDeleteExpense = async (expId) => {
              const updatedExpenses = safeExpenses.filter(e => e?.id !== expId);
              await getFamilyDocRef(currentFamily.id).update({ expenses: updatedExpenses });
          };

          const setDND = async (hours) => {
              let dndTime = null;
              if (hours > 0) { 
                  const dndDate = new Date(); 
                  const exactMinutes = Math.round(hours * 60);
                  dndDate.setMinutes(dndDate.getMinutes() + exactMinutes); 
                  dndTime = dndDate.toISOString(); 
              }
              await getFamilyDocRef(currentFamily.id).update({ members: safeMembers.map(m => m?.name === currentUser.name ? { ...m, dndUntil: dndTime } : m) });
          };

          const handleClearHistory = () => {
            showConfirm("Verlauf leeren", "Möchtest du den gesamten Verlauf für alle dauerhaft löschen?", async () => {
                await getFamilyDocRef(currentFamily.id).update({ history: [] });
            }, true);
          };

          const handleDeleteMember = (memberName) => {
            if (memberName === currentUser.name) return; 
            showConfirm("Mitglied entfernen", `Möchtest du ${memberName} dauerhaft aus der Familie entfernen?`, async () => {
                const updatedMembers = safeMembers.filter(m => m?.name !== memberName);
                await getFamilyDocRef(currentFamily.id).update({ members: updatedMembers });
            }, true);
          };

          const handleDeleteFamily = () => {
            showConfirm("Familie auflösen", "Möchtest du die gesamte Familie und alle Daten endgültig löschen?", async () => {
                await getFamilyDocRef(currentFamily.id).delete();
            }, true);
          };

          const saveSettings = async (key, value) => {
            const val = value ? String(value).trim() : '';
            await getFamilyDocRef(currentFamily.id).update({ members: safeMembers.map(m => m?.name === currentUser.name ? { ...m, [key]: val } : m) });
          };

          // --- RENDER LOGIK ---
          
          if (!appLoaded) {
              return (
                  <div className="fixed inset-0 bg-[var(--app-bg)] flex flex-col items-center justify-center z-50">
                     <Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                  </div>
              );
          }

          if (isAdminMode) {
              return (
                  <div className="flex flex-col w-full h-full absolute inset-0 bg-[var(--app-bg)] z-40">
                      <Modal data={modal} onClose={() => setModal(null)} />
                      <div className="flex-1 flex flex-col w-full max-w-5xl mx-auto relative h-full">
                          <header className="flex-none pt-safe-top pb-4 px-6 bg-white/80 dark:bg-[#1C1C1E]/80 ios-blur border-b border-[#E5E5EA] dark:border-[#38383A] z-40 flex justify-between items-end sticky top-0">
                              <h1 className="text-[28px] font-extrabold text-black dark:text-white tracking-tight leading-none mt-6">Admin-Dashboard</h1>
                              <button onClick={() => setIsAdminMode(false)} className="text-[#FF3B30] font-semibold active:opacity-70">Logout</button>
                          </header>
                          
                          <main className="scrollable-area px-6 py-6 w-full">
                              <div className="max-w-4xl mx-auto space-y-8">
                                  <section className="bg-white dark:bg-[#1C1C1E] rounded-[20px] p-6 shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">
                                      <h2 className="text-[18px] font-bold mb-4 text-black dark:text-white">Neue Familie anlegen</h2>
                                      <div className="flex flex-col sm:flex-row gap-3">
                                          <input type="text" placeholder="Name der Familie" className="w-full sm:flex-1 bg-[var(--app-bg)] dark:bg-[#2C2C2E] px-4 py-3.5 rounded-[12px] outline-none font-medium focus:ring-2 ring-[#007AFF]/20 box-border text-black dark:text-white placeholder-gray-500" value={newFamilyName} onChange={e => setNewFamilyName(e.target.value)} />
                                          <button onClick={adminCreateFamily} className="w-full sm:w-auto bg-[#007AFF] text-white px-6 py-3.5 rounded-[12px] font-semibold active:opacity-80 transition-opacity">Erstellen</button>
                                      </div>
                                  </section>

                                  <div className="space-y-6">
                                      {adminFamilies.map(fam => {
                                          const localSafeMembers = Array.isArray(fam.members) ? fam.members.filter(m => m && m.name) : [];
                                          return (
                                              <div key={fam.id} className="bg-white dark:bg-[#1C1C1E] rounded-[24px] shadow-sm border border-[#E5E5EA] dark:border-[#38383A] overflow-hidden">
                                                  <div className="p-5 bg-[#F9F9F9] dark:bg-[#2C2C2E] border-b border-[#E5E5EA] dark:border-[#38383A] flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 sm:gap-0">
                                                      <div>
                                                          <h3 className="font-bold text-[20px] text-black dark:text-white">{fam.name}</h3>
                                                          <p className="text-[#8E8E93] dark:text-[#EBEBF5]/60 text-[13px] font-mono mt-1">ID: {fam.id}</p>
                                                      </div>
                                                      <div className="flex w-full sm:w-auto gap-2">
                                                          <button onClick={() => generatePDF(fam)} className="flex-1 sm:flex-none justify-center bg-[#007AFF]/10 text-[#007AFF] px-4 py-2.5 rounded-full text-[13px] font-semibold active:opacity-70 flex items-center gap-1.5 transition-opacity">
                                                              <Icon name="FileText" size={14} /> PDF Info-Blatt
                                                          </button>
                                                          <button onClick={() => adminDeleteFamily(fam.id)} className="bg-[#FF3B30]/10 text-[#FF3B30] w-10 h-10 sm:w-9 sm:h-9 rounded-full flex items-center justify-center active:opacity-70 shrink-0 transition-opacity">
                                                              <Icon name="Trash2" size={16} />
                                                          </button>
                                                      </div>
                                                  </div>
                                                  <div className="p-5">
                                                      <h4 className="text-[13px] font-semibold text-[#8E8E93] uppercase tracking-widest mb-3">Mitglieder</h4>
                                                      <div className="space-y-3 mb-5">
                                                          {localSafeMembers.length === 0 && <p className="text-[#8E8E93] text-sm">Keine Mitglieder.</p>}
                                                          {localSafeMembers.map(m => (
                                                              <div key={m.name} className="flex justify-between items-center p-3.5 bg-[var(--app-bg)] dark:bg-[#2C2C2E] rounded-[14px]">
                                                                  <div className="flex items-center gap-3">
                                                                      <span className="font-semibold text-[16px] text-black dark:text-white">{m.name}</span>
                                                                      {m.status === 'pending' ? <span className="bg-[#FF9500]/20 text-[#FF9500] text-[11px] font-bold px-2 py-0.5 rounded-md uppercase">Ausstehend</span> : <span className="bg-[#34C759]/20 text-[#34C759] text-[11px] font-bold px-2 py-0.5 rounded-md uppercase">Aktiv</span>}
                                                                  </div>
                                                                  <button onClick={() => adminDeleteMember(fam.id, m.name)} className="text-[#FF3B30] active:opacity-70 p-1"><Icon name="Trash2" size={18} /></button>
                                                              </div>
                                                          ))}
                                                      </div>
                                                      <div className="flex flex-col sm:flex-row gap-3">
                                                          <input type="text" placeholder="Neuer Vorname" className="w-full sm:flex-1 bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A] px-4 py-3.5 rounded-[12px] outline-none font-medium focus:border-[#007AFF] box-border text-black dark:text-white placeholder-gray-500" value={newMemberNames[fam.id] || ''} onChange={e => setNewMemberNames({...newMemberNames, [fam.id]: e.target.value})} />
                                                          <button onClick={() => adminAddMember(fam)} className="w-full sm:w-auto bg-[#007AFF] text-white px-6 py-3.5 rounded-[12px] font-semibold active:opacity-80 transition-opacity">Registrieren</button>
                                                      </div>
                                                  </div>
                                              </div>
                                          );
                                      })}
                                  </div>
                              </div>
                          </main>
                      </div>
                  </div>
              );
          }

          if (!currentFamily || !currentUser) {
            // NUR HIER ist der Hintergrund starr schwarz
            return (
              <div className="flex flex-col w-full h-full absolute inset-0 overflow-y-auto bg-[#000000] text-white z-40 items-center justify-center p-6 font-sans">
                <div className="absolute top-[0%] left-[-10%] w-[50vw] max-w-[400px] h-[50vw] max-h-[400px] rounded-full bg-[#007AFF] blur-[100px] opacity-20 pointer-events-none"></div>
                <div className="absolute bottom-[0%] right-[-10%] w-[50vw] max-w-[400px] h-[50vw] max-h-[400px] rounded-full bg-[#5856D6] blur-[100px] opacity-20 pointer-events-none"></div>

                <div className="bg-white/10 backdrop-blur-3xl border border-white/20 p-8 rounded-[32px] shadow-2xl w-full max-w-sm relative z-10 my-auto">
                  <div className="flex justify-center mb-6">
                    <div className="w-20 h-20 bg-gradient-to-tr from-[#007AFF] to-[#5856D6] rounded-2xl flex items-center justify-center shadow-lg">
                      <Icon name="ShieldCheck" size={40} className="text-white" />
                    </div>
                  </div>
                  <h1 className="text-[34px] font-bold text-center mb-8 tracking-tight">FamilyConnect</h1>
                  
                  <div className="flex bg-black/40 p-1 rounded-xl mb-8 backdrop-blur-md border border-white/10">
                    {['login', 'join', 'admin'].map((mode) => (
                      <button key={mode} className={`flex-1 py-2 text-[15px] font-semibold rounded-[8px] transition-all duration-300 ${authMode === mode ? 'bg-white/20 text-white shadow-sm' : 'text-[#8E8E93] active:opacity-70'}`} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setAuthMode(mode); setAuthError(''); }}>
                        {mode === 'login' ? 'Anmelden' : mode === 'join' ? 'Beitreten' : 'Admin'}
                      </button>
                    ))}
                  </div>

                  <div className="space-y-3">
                    {authMode === 'admin' ? (
                        <>
                            <input type="password" placeholder="Admin Master-Passwort" className="w-full bg-white/10 border border-white/10 px-4 py-3.5 rounded-xl outline-none focus:bg-white/20 text-white placeholder-gray-400 font-medium text-[17px] transition-colors box-border" value={formInput.password} onChange={e => setFormInput({...formInput, password: e.target.value})} />
                            {authError && <p className="text-[#FF3B30] text-[13px] text-center font-semibold mt-2">{authError}</p>}
                            <button onClick={() => { if(navigator.vibrate) navigator.vibrate(15); handleAdminAuth(); }} className="w-full bg-[#007AFF] text-white font-semibold text-[17px] py-3.5 rounded-xl mt-4 active:opacity-80 transition-opacity">Admin Login</button>
                        </>
                    ) : (
                        <>
                            <input type="text" placeholder="Familien-ID (6 Ziffern)" className="w-full bg-white/10 border border-white/10 px-4 py-3.5 rounded-xl outline-none focus:bg-white/20 text-white placeholder-gray-400 font-medium text-[17px] transition-colors box-border" value={formInput.familyId} onChange={e => setFormInput({...formInput, familyId: e.target.value})} />
                            <input type="text" placeholder="Dein Vorname" className="w-full bg-white/10 border border-white/10 px-4 py-3.5 rounded-xl outline-none focus:bg-white/20 text-white placeholder-gray-400 font-medium text-[17px] transition-colors box-border" value={formInput.name} onChange={e => setFormInput({...formInput, name: e.target.value})} />
                            <input type="password" placeholder="Persönliches Passwort" className="w-full bg-white/10 border border-white/10 px-4 py-3.5 rounded-xl outline-none focus:bg-white/20 text-white placeholder-gray-400 font-medium text-[17px] transition-colors box-border" value={formInput.password} onChange={e => setFormInput({...formInput, password: e.target.value})} />
                            
                            {authError && <p className="text-[#FF3B30] text-[13px] text-center font-semibold mt-2">{authError}</p>}
                            <button onClick={() => { if(navigator.vibrate) navigator.vibrate(15); authMode === 'login' ? handleLogin() : handleJoinFamily(); }} className="w-full bg-[#007AFF] text-white font-semibold text-[17px] py-3.5 rounded-xl mt-4 active:opacity-80 transition-opacity">
                              {authMode === 'login' ? 'Anmelden' : 'Beitreten'}
                            </button>
                        </>
                    )}
                  </div>
                </div>
              </div>
            );
          }

          const trackingEvent = trackingEventId ? safeHistory.find(h => h.id === trackingEventId) : null;

          return (
            <div className="flex flex-col w-full h-full absolute inset-0 overflow-hidden bg-[var(--app-bg)] z-10">
              <Modal data={modal} onClose={() => setModal(null)} />
              
              {trackingEvent && (
                  <TrackingOverlay 
                      event={trackingEvent} currentFamily={currentFamily} currentUser={currentUser} safeMembers={safeMembers}
                      onClose={() => setTrackingEventId(null)} 
                      onResend={(name, reason) => {
                          const rObj = REASONS.find(r => r.sentence === reason);
                          if(rObj) handleSendNotification(rObj, [name], true);
                      }} 
                  />
              )}

              {/* Flex Container für die iOS PWA */}
              <div className="flex-1 flex flex-col w-full max-w-5xl mx-auto relative h-full sm:shadow-2xl sm:border-x border-gray-300/50 dark:border-[#38383A]">
                  
                  {/* HEADER klebt oben */}
                  <header className="flex-none pt-safe-top pb-4 px-6 bg-white/80 dark:bg-[#1C1C1E]/80 ios-blur border-b border-[#C6C6C8] dark:border-[#38383A] z-30 flex items-end justify-center w-full sticky top-0">
                    <div className="text-center w-full min-w-0">
                      <h1 className="text-[34px] font-bold text-black dark:text-white tracking-tight leading-tight truncate mt-6">
                        {activeTab === 'home' && `Familie ${currentFamily?.name || ''}`}
                        {activeTab === 'history' && 'Verlauf'}
                        {activeTab === 'expenses' && 'Auslagen'}
                        {activeTab === 'settings' && 'Einstellungen'}
                      </h1>
                    </div>
                    {activeTab === 'history' && safeHistory.length > 0 && (
                      <button onClick={handleClearHistory} className="absolute right-4 bottom-4 text-[#FF3B30] font-semibold text-[13px] bg-[#FF3B30]/10 px-3 py-1.5 rounded-full active:opacity-70 transition-opacity flex items-center gap-1.5">
                        <Icon name="Trash2" size={14} /> Leeren
                      </button>
                    )}
                  </header>

                  {/* Dieser <main> Bereich scrollt butterweich durch! */}
                  <main className="scrollable-area px-4 pt-6 w-full relative">
                    
                    {/* --- HOME TAB --- */}
                    {activeTab === 'home' && (
                      <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <section>
                          <h2 className="text-[13px] font-semibold text-[#8E8E93] dark:text-[#EBEBF5]/60 uppercase tracking-widest mb-2 ml-2">Grund</h2>
                          <div className="bg-white dark:bg-[#1C1C1E] rounded-[20px] overflow-hidden shadow-[0_1px_3px_rgba(0,0,0,0.02)] border border-[#E5E5EA] dark:border-[#38383A]">
                            <div className="grid grid-cols-4 md:grid-cols-8 gap-y-6 gap-x-2 p-5">
                              {REASONS.map((reason) => {
                                const isSelected = selectedReason === reason.id;
                                return (
                                  <div key={reason.id} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setSelectedReason(reason.id); }} className="flex flex-col items-center cursor-pointer group relative">
                                    <div className={`w-[56px] h-[56px] rounded-[16px] flex items-center justify-center mb-2 transition-all duration-300 ease-out transform ${isSelected ? 'bg-[#007AFF] text-white scale-105 shadow-[0_4px_12px_rgba(0,122,255,0.3)]' : 'bg-[var(--app-bg)] dark:bg-[#2C2C2E] text-black dark:text-white active:scale-[0.97]'}`}>
                                      <Icon name={reason.icon} size={24} strokeWidth={isSelected ? 2.5 : 2} />
                                    </div>
                                    <span className={`text-[12px] text-center font-medium transition-colors ${isSelected ? 'text-black dark:text-white' : 'text-[#8E8E93] dark:text-[#EBEBF5]/60'}`}>{reason.label}</span>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </section>

                        <section>
                          <div className="flex justify-between items-end mb-2 px-2">
                            <h2 className="text-[13px] font-semibold text-[#8E8E93] dark:text-[#EBEBF5]/60 uppercase tracking-widest">Empfänger</h2>
                            <button className="text-[14px] text-[#007AFF] font-semibold active:opacity-70 transition-opacity" onClick={() => {
                                if(navigator.vibrate) navigator.vibrate(10);
                                const others = activeMembersList.filter(m => m?.name !== currentUser?.name && !(m?.dndUntil && new Date(m.dndUntil) > new Date())).map(m => m.name);
                                setSelectedMembers(selectedMembers.length === others.length ? [] : others);
                              }}>
                              {selectedMembers.length >= (activeMembersList.length - 1) ? 'Keine' : 'Alle'}
                            </button>
                          </div>
                          
                          <div className="bg-white dark:bg-[#1C1C1E] rounded-[20px] overflow-hidden shadow-[0_1px_3px_rgba(0,0,0,0.02)] border border-[#E5E5EA] dark:border-[#38383A]">
                            {activeMembersList.filter(m => m?.name !== currentUser?.name).map((member, index, arr) => {
                              const isSelected = selectedMembers.includes(member.name);
                              const isMemberDND = member.dndUntil && new Date(member.dndUntil) > new Date();

                              return (
                                <div key={member.name} onClick={() => {
                                    if(isMemberDND) return; 
                                    if(navigator.vibrate) navigator.vibrate(10);
                                    if (isSelected) setSelectedMembers(prev => prev.filter(m => m !== member.name));
                                    else setSelectedMembers(prev => [...prev, member.name]);
                                  }} className={`flex items-center justify-between p-4 transition-colors ${index !== arr.length - 1 ? 'border-b border-[#E5E5EA] dark:border-[#38383A]' : ''} ${isMemberDND ? 'opacity-40 grayscale cursor-not-allowed' : 'cursor-pointer active:bg-gray-50 dark:active:bg-[#2C2C2E]'}`}>
                                  <div className="flex items-center gap-2 min-w-0">
                                      <span className="font-medium text-[17px] text-black dark:text-white truncate">{member.name}</span>
                                      {isMemberDND && <Icon name="BellOff" size={16} className="text-[#FF9500] flex-shrink-0" />}
                                  </div>
                                  <div className={`w-[51px] h-[31px] rounded-full transition-colors duration-300 ease-in-out relative flex-shrink-0 ${isSelected ? 'bg-[#34C759]' : isMemberDND ? 'bg-gray-200 dark:bg-gray-700' : 'bg-[#E9E9EB] dark:bg-[#38383A]'}`}>
                                    <div className={`absolute top-[2px] left-[2px] w-[27px] h-[27px] bg-white rounded-full shadow-[0_3px_8px_rgba(0,0,0,0.15),0_3px_1px_rgba(0,0,0,0.06)] transform transition-transform duration-300 ease-in-out ${isSelected ? 'translate-x-[20px]' : 'translate-x-0'}`} />
                                  </div>
                                </div>
                              );
                            })}
