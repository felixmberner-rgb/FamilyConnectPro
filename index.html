<style>
:root{--app-bg:#F2F2F7;} @media(prefers-color-scheme:dark){:root{--app-bg:#000000;}}
html{background-color:var(--app-bg);height:100vh;width:100vw;overflow:hidden;}
body{margin:0;padding:0;background-color:var(--app-bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;overflow:hidden;overscroll-behavior-y:none;height:100%;width:100%;}
.scrollable-area{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(120px + env(safe-area-inset-bottom,20px));}
.scrollable-area::-webkit-scrollbar{display:none;}
.ios-blur{background:rgba(255,255,255,0.85);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);}
@media(prefers-color-scheme:dark){.ios-blur{background:rgba(28,28,30,0.85);}}
.pt-safe-top{padding-top:max(env(safe-area-inset-top),24px);}
input[type="file"]{display:none;}
input[type="date"]::-webkit-calendar-picker-indicator,input[type="datetime-local"]::-webkit-calendar-picker-indicator{opacity:0.5;cursor:pointer;}
input[type="datetime-local"]{max-width:100%;box-sizing:border-box;display:block;width:100%;}
@keyframes slideUpFade{from{opacity:0;transform:translateY(20px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.animate-action-sheet{animation:slideUpFade 0.4s cubic-bezier(0.16,1,0.3,1) forwards;}
.custom-checkbox:checked+div{background-color:#34C759;border-color:#34C759;}
.custom-checkbox:checked+div svg{opacity:1;}

try{const p=new URLSearchParams(window.location.search);const c=p.get('cfg');if(c){const d=JSON.parse(decodeURIComponent(escape(atob(c))));localStorage.setItem('familyConnectAppConfig',JSON.stringify(d));localStorage.setItem('firebaseConfig',JSON.stringify(d));}}catch(e){}
const origErr=console.error;console.error=function(...a){origErr.apply(console,a);};window.addEventListener('error',(e)=>{});window.addEventListener('unhandledrejection',(e)=>{});

const getFamilyDocRef=(fId)=>db.doc(`artifacts/${appId}/public/data/families/${fId}`);
const getLocalTodayString=()=>{const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10);};
const formatTime=(ts)=>{if(!ts)return'';const d=new Date(ts);return isNaN(d.getTime())?'':d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});};
const formatDate=(ts)=>{if(!ts)return'';const d=new Date(ts);return isNaN(d.getTime())?'':d.toLocaleDateString('de-DE',{weekday:'short',year:'numeric',month:'2-digit',day:'2-digit'});};
const getStatusColor=(a)=>{if(!a)return 'text-[#8E8E93] dark:text-[#EBEBF5]/60';if(a.includes('sofort')||a.includes('Übernommen')||a.includes('Gelesen'))return 'text-[#34C759]';if(a.includes('5 Minuten'))return 'text-[#FF9500]';if(a.includes('Fangt')||a.includes('Abgelehnt'))return 'text-[#FF3B30]';return 'text-[#34C759]';};

const SHOPPING_CATEGORIES=['Obst & Gemüse','Eier & Backwaren','Kühlregal & Käse','Fleisch & Fisch','Vorrat & Nährmittel','Snacks & Süßes','Haushalt & Drogerie','Getränke','Sonstiges'];
const getAutoCategory=(i)=>{
  const l=i.toLowerCase();
  if(/scheuer|spül|wasch|seife|klo|papier|tuch|shampoo|deo|zahnpasta|müll|putz|creme|dusch|rasier|bürste|schwamm|reiniger|watte|windel|slipeinlage|tampon|binde|rolle|wc|lotion|pflegetücher|waschmittel|klobürste|zahnseide|hygiene/i.test(l))return 'Haushalt & Drogerie';
  if(/apfel|äpfel|banan|tomate|gurke|obst|gemüse|salat|zwiebel|kartoffel|knoblauch|beere|traube|paprika|möhre|karotte|pilz|zitrone|orange|birne|birnen|pflaume|melone|kiwi|kürbis|lauch|sellerie|brokkoli|zucchini|apfelsine|mandarine|pfirsich|nektarine|kirsche|avocado|aubergine|spinat|kohl|linsen|bohne|erbse|mais|ananas|mango|spargel|ingwer|kräuter|petersilie|basilikum/i.test(l))return 'Obst & Gemüse';
  if(/brot|brötchen|eier|kuchen|mehl|zucker|hefe|toast|croissant|brezel|baguette|backpulver|torte|teig|vanillezucker|pfannkuchen|waffel|breze|\bei\b/i.test(l))return 'Eier & Backwaren';
  if(/milch|käse|quark|joghurt|butter|sahne|frischkäse|mozzarella|feta|gouda|pudding|margarine|parmesan|creme fraiche|emmentaler|camembert|mascarpone|ricotta|schmand|eiweiß/i.test(l))return 'Kühlregal & Käse';
  if(/wurst|fleisch|schinken|salami|hack|hähnchen|speck|schnitzel|steak|aufschnitt|pute|rind|schwein|lamm|bratwurst|würstchen|fisch|lachs|thunfisch|garnele|cevapcici|kaviar|sushi|forelle/i.test(l))return 'Fleisch & Fisch';
  if(/nudel|reis|ketchup|senf|soße|sosse|dose|müsli|haferflocken|öl|oel|essig|gewürz|salz|pfeffer|konserve|pesto|tomaten|suppe|brühe|honig|marmelade|nutella|aufstrich|mayo|sirup|chia|samen|kerne|maggi/i.test(l))return 'Vorrat & Nährmittel';
  if(/chips|schoko|keks|eis|süß|gummibär|nuss|riegel|popcorn|flips|nachos|praline|bonbon|kaugummi|mandel|cashew|pistazie|haribo|snickers|twix|mars/i.test(l))return 'Snacks & Süßes';
  if(/wasser|bier|wein|cola|saft|limo|kaffee|tee|sprudel|schorle|getränk|energy|sekt|sprit|fanta|sprite/i.test(l))return 'Getränke';
  return 'Sonstiges';
};

const Icon=({name,size=24,strokeWidth=2,className="",onClick})=>{
  return React.createElement('svg',{xmlns:"http://www.w3.org/2000/svg",width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:strokeWidth,strokeLinecap:"round",strokeLinejoin:"round",className:`flex-shrink-0 ${className}`,onClick:onClick,dangerouslySetInnerHTML:{__html:ICONS[name]||ICONS['Bell']}});
};

function Modal({data,onClose}){
  if(!data)return null;
  const isDanger=data.danger;
  
  if(data.type==='confirm'||data.type==='alert'){
    return(
      <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 pb-8 sm:pb-4 bg-black/50 dark:bg-black/70 backdrop-blur-md transition-opacity animate-in fade-in duration-300">
        <div className="bg-white/95 dark:bg-[#1C1C1E]/95 backdrop-blur-3xl rounded-[32px] p-6 w-full max-w-sm shadow-[0_20px_40px_rgba(0,0,0,0.3)] border border-white/40 dark:border-[#38383A]/50 overflow-hidden animate-action-sheet relative">
          <div className="flex flex-col items-center mb-6 mt-2 text-center">
            <div className={`w-16 h-16 rounded-[24px] flex items-center justify-center mb-5 shadow-lg transform rotate-3 ${isDanger?'bg-gradient-to-tr from-[#FF3B30] to-[#FF6961] text-white':'bg-gradient-to-tr from-[#007AFF] to-[#5856D6] text-white'}`}>
                <Icon name={isDanger?"Trash2":"Bell"} size={32} strokeWidth={2.5}/>
            </div>
            <h3 className="font-extrabold text-[22px] tracking-tight text-black dark:text-white leading-tight px-2 mb-2">{data.title}</h3>
            <p className="text-[15px] text-[#8E8E93] leading-relaxed">{data.message}</p>
          </div>
          <div className="flex flex-col gap-3">
            <button onClick={data.onConfirm} className={`w-full py-4 rounded-[16px] font-bold text-[17px] active:scale-[0.98] transition-transform shadow-sm ${isDanger?'bg-[#FF3B30] hover:bg-[#D70015] text-white':'bg-[#007AFF] hover:bg-[#0066CC] text-white'}`}>
              {data.confirmText||(data.type==='confirm'?'Bestätigen':'OK')}
            </button>
            {data.type==='confirm'&&(
              <button onClick={data.onCancel} className="w-full py-4 rounded-[16px] bg-[#F2F2F7] dark:bg-[#2C2C2E] hover:bg-[#E5E5EA] dark:hover:bg-[#38383A] text-black dark:text-white font-bold text-[17px] active:scale-[0.98] transition-transform border border-transparent shadow-sm">
                Abbrechen
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }
  
  if(data.type==='poll_vote'){
    return(
      <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 pb-8 sm:pb-4 bg-black/50 dark:bg-black/70 backdrop-blur-md transition-opacity animate-in fade-in duration-300">
        <div className="bg-white/95 dark:bg-[#1C1C1E]/95 backdrop-blur-3xl rounded-[32px] p-6 w-full max-w-sm shadow-[0_20px_40px_rgba(0,0,0,0.3)] border border-white/40 dark:border-[#38383A]/50 overflow-hidden animate-action-sheet relative">
          <button onClick={data.onClose} className="absolute top-4 right-4 text-[#8E8E93] active:opacity-70"><Icon name="X" size={24}/></button>
          <div className="flex flex-col items-center mb-6 mt-2 text-center">
            <div className="w-16 h-16 bg-gradient-to-tr from-[#AF52DE] to-[#5856D6] text-white rounded-[24px] flex items-center justify-center mb-5 shadow-lg transform rotate-3"><Icon name="PieChart" size={32} strokeWidth={2.5}/></div>
            <span className="text-[13px] font-bold text-[#AF52DE] uppercase tracking-wider mb-1">Neue Abstimmung</span>
            <h3 className="font-extrabold text-[22px] tracking-tight text-black dark:text-white leading-tight px-2">{data.title}</h3>
            <p className="text-[14px] text-[#8E8E93] mt-2">Gestartet von {data.poll.createdBy}</p>
          </div>
          <div className="space-y-3 max-h-[40vh] overflow-y-auto custom-scrollbar">
            {data.poll.options.map(opt=>(
              <button key={opt.id} onClick={()=>data.onVote(opt.id)} className="w-full py-4 rounded-[16px] bg-[#F2F2F7] dark:bg-[#2C2C2E] hover:bg-[#E5E5EA] dark:hover:bg-[#38383A] text-black dark:text-white font-bold text-[17px] active:scale-[0.98] transition-transform border border-transparent shadow-sm">{opt.text}</button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if(data.type==='shopping_list_create' || data.type==='shopping_list_edit_share'){
    const shareType=data.listData.shareType||'Alle';
    return(
      <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 pb-8 sm:pb-4 bg-black/40 dark:bg-black/60 backdrop-blur-sm transition-opacity animate-in fade-in duration-300">
        <div className="bg-white dark:bg-[#1C1C1E] rounded-[32px] p-6 w-full max-w-sm shadow-[0_20px_40px_rgba(0,0,0,0.25)] border border-[#E5E5EA] dark:border-[#38383A] overflow-hidden animate-action-sheet">
          <div className="flex justify-between items-center mb-6">
            <h3 className="font-bold text-[20px] text-black dark:text-white">{data.type==='shopping_list_create'?'Neue Liste':'Teilen bearbeiten'}</h3>
            <button onClick={data.onClose} className="w-8 h-8 bg-gray-100 dark:bg-[#2C2C2E] rounded-full flex items-center justify-center"><Icon name="X" size={16}/></button>
          </div>

function TrackingOverlay({event,currentFamily,currentUser,safeMembers,onClose,onResend}){
  if(!event)return null;
  const [cooldowns,setCooldowns]=useState({});
  const isSender=event.sender===currentUser?.name||event.sender==='Extern';

  useEffect(()=>{
    const calc=()=>{
      const n={};
      (event.targets||[]).forEach(t=>{
        const lStr=sessionStorage.getItem(`resend_${event.id}_${t}`);
        const lTime=lStr?parseInt(lStr,10):new Date(event.timestamp).getTime();
        const p=Math.floor((Date.now()-lTime)/1000);
        n[t]=p>=60?0:60-p;
      });
      return n;
    };
    setCooldowns(calc());
    const timer=setInterval(()=>setCooldowns(calc()),1000);
    return()=>clearInterval(timer);
  },[event.id,event.timestamp,event.targets]);

  return(
    <div className="fixed inset-0 z-[90] flex items-end justify-center bg-black/40 backdrop-blur-md animate-fade-in md:items-center">
      <div className="bg-[#F2F2F7] dark:bg-black w-full md:max-w-md md:rounded-[24px] rounded-t-[24px] p-6 pb-safe shadow-2xl animate-scale-in max-h-[85vh] overflow-y-auto scroll-smooth">
        <div className="flex justify-between items-center mb-6">
          <h2 className="text-[22px] font-bold tracking-tight text-black dark:text-white">Ruf Status</h2>
          <button onClick={onClose} className="w-8 h-8 bg-gray-200/60 dark:bg-[#2C2C2E] rounded-full flex items-center justify-center text-gray-500 dark:text-gray-300 active:opacity-70"><Icon name="X" size={18}/></button>
        </div>
        <p className="text-[#3C3C4399] dark:text-[#EBEBF5]/60 mb-6 font-medium bg-white dark:bg-[#1C1C1E] p-4 rounded-[16px] text-[15px] shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">"{event?.reason}"</p>
        <div className="space-y-3">
          {(event.targets||[]).map(t=>{
            const sAck=Array.isArray(event.acknowledgedBy)?event.acknowledgedBy:[];
            const aE=sAck.find(a=>a===t||a.startsWith(t+':'));
            const hA=!!aE;
            let aT='Hat bestätigt!';
            if(hA&&aE.includes(':'))aT=aE.split(':')[1];
            const tM=safeMembers.find(m=>m.name===t);
            const iD=tM?.dndUntil&&new Date(tM.dndUntil)>new Date();
            const cC=cooldowns[t]||0;
            const iE=event.timestamp?(Date.now()-new Date(event.timestamp).getTime())>5*60*1000:false;
            const cR=isSender&&!iE;
            return(
              <div key={t} className="flex items-center justify-between bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A] p-4 rounded-[16px] shadow-[0_1px_3px_rgba(0,0,0,0.02)]">
                <div className="flex items-center gap-3">
                  {hA?<Icon name="CheckCircle2" className={getStatusColor(aE)}/>:iD?<Icon name="BellOff" className="text-[#FF9500]"/>:<div className="w-6 h-6 rounded-full border-2 border-gray-200 dark:border-gray-600 animate-pulse"/>}
                  <div>
                    <p className="font-semibold text-[17px] text-black dark:text-white">{t}</p>
                    <p className={`text-[13px] font-normal ${hA?getStatusColor(aE):'text-[#3C3C4399] dark:text-[#EBEBF5]/60'}`}>{hA?aT:iD?'Bitte nicht stören aktiv':iE?'Nicht geantwortet':'Wartet auf Antwort...'}</p>
                  </div>
                </div>
                {!hA&&!iD&&cR&&(
                  <button disabled={cC>0} onClick={()=>{sessionStorage.setItem(`resend_${event.id}_${t}`,Date.now().toString());setCooldowns(p=>({...p,[t]:60}));onResend(t,event.reason);}} className={`text-[13px] font-semibold px-4 py-2 rounded-full transition-all ${cC>0?'bg-[#F2F2F7] dark:bg-[#2C2C2E] text-gray-400':'bg-[#007AFF]/10 text-[#007AFF] active:opacity-70'}`}>{cC>0?`${cC}s`:'Nochmal'}</button>
                )}
              </div>
            );
          })}
        </div>
        <button onClick={onClose} className="w-full mt-8 py-3.5 bg-white dark:bg-[#1C1C1E] font-semibold text-[17px] text-[#007AFF] rounded-[14px] active:opacity-70 shadow-sm border border-[#E5E5EA] dark:border-[#38383A]">Schließen</button>
      </div>
    </div>
  );
}

function ConfigLoader({onConfigLoaded}){
  const [err,setErr]=useState("");
  const h=(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=(ev)=>{
      try{
        const p=JSON.parse(ev.target.result);
        localStorage.setItem('familyConnectAppConfig',JSON.stringify(p));
        localStorage.setItem('firebaseConfig',JSON.stringify(p));
        onConfigLoaded(p);
      }catch(err){setErr("Fehler: Ungültiges Dateiformat.");}
    };
    r.onerror=()=>setErr("Fehler beim Lesen.");
    r.readAsText(f);
  };
  return(
    <div className="fixed inset-0 z-50 flex flex-col items-center justify-center p-8 bg-[#000000] text-white w-full h-full overflow-y-auto">
      <div className="w-full max-w-sm text-center space-y-8 my-auto">
        <Icon name="ShieldCheck" size={96} strokeWidth={1.5} className="text-[#007AFF] mx-auto" />
        <div>
          <h1 className="text-[34px] font-bold tracking-tight mb-2">System Setup</h1>
          <p className="text-gray-400 text-[15px] leading-relaxed px-4">Bitte lade deine <span className="font-mono text-[#007AFF]">config.json</span> hoch. Die Daten werden sicher lokal gespeichert.</p>
        </div>
        {err&&<p className="text-[#FF3B30] text-[13px] font-semibold bg-[#FF3B30]/10 p-3 rounded-[10px] border border-[#FF3B30]/20">{err}</p>}
        <label className="inline-flex items-center justify-center w-full bg-[#007AFF] text-white py-4 rounded-[14px] font-semibold text-[17px] active:opacity-80 transition-opacity cursor-pointer">
          Konfiguration laden <input type="file" accept=".json" onChange={h} onClick={(e)=>{e.target.value=null;}}/>
        </label>
      </div>
    </div>
  );
}

const getNextSaturday=()=>{const d=new Date();const diff=(6-d.getDay()+7)%7;d.setDate(d.getDate()+diff);return d.toISOString().split('T')[0];};
const getWeekNumber=(d)=>{d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-ys)/86400000)+1)/7);};
const safeFormatDateTime=(ts)=>{if(!ts)return'';const d=new Date(ts);if(isNaN(d.getTime()))return'';return `am ${d.toLocaleDateString('de-DE')} um ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} Uhr`;};

function ShortcutTrigger({action,reason,fid,itemsParam,listNameParam,userParam}){
  const [sT,setST]=useState('Verarbeite...');
  useEffect(()=>{
    const eS=async()=>{
      try{
        await firebase.auth().signInAnonymously(); 
        const r=db.doc(`artifacts/${appId}/public/data/families/${fid}`);const s=await r.get();
        if(s.exists){
          const d=s.data();
          if(action==='shortcut'){
              const aM=Array.isArray(d.members)?d.members.filter(m=>m&&typeof m==='object'&&m.status!=='pending'):[];
              const rO=REASONS.find(x=>x.id===reason)||{id:'shortcut',category:'other',sentence:'Ruf über Kurzbefehl!'};
              const n=new Date();const iN=n.getHours()>=22||n.getHours()<7;const aT=[];
              aM.forEach(m=>{if(!(m.dndUntil&&new Date(m.dndUntil)>n)){aT.push(m.name);if(!iN&&rO.category!=='push_only'){const u=rO.category==='meal'?m.voiceMonkeyMeal:m.voiceMonkeyOther;if(u&&u.trim()!=='')fetch(u).catch(e=>{});}}});
              if(aT.length>0){await r.update({history:[{id:Date.now().toString(),timestamp:n.toISOString(),sender:'Extern',reason:rO.sentence,targets:aT,acknowledgedBy:[],isExpense:false,isResend:false,category:rO.category},...(d.history||[])].slice(0,50)});setST('Erfolgreich gesendet! ✅');if(navigator.vibrate)navigator.vibrate([30,50,30]);}else{setST('Alle im Nicht-Stören Modus 🔕');}
              setTimeout(()=>window.close(), 2500);
          }else if(action==='add_shopping'){
              if(!itemsParam){setST('Keine Daten erhalten ❌');return;}
              const rawLines=decodeURIComponent(itemsParam).split('\n');const newItems=[];
              const tUser=userParam?decodeURIComponent(userParam).trim():'KI Scanner';
              
              rawLines.forEach(line=>{
                  const t=line.replace(/^[-*•\d\.]+\s*/,'').trim();
                  if(t){newItems.push({id:generateId(),name:t,amount:'',notes:'',category:getAutoCategory(t),addedBy:tUser,checked:false,timestamp:new Date().toISOString()});}
              });
              if(newItems.length===0){setST('Keine Artikel gefunden ❌');return;}
              
              let lists=d.shoppingLists||[];
              const tName=listNameParam?decodeURIComponent(listNameParam).trim():'Einkauf (KI)';
              let targetList=lists.find(l=>l.name.trim().toLowerCase()===tName.toLowerCase());
              
              if(!targetList){
                  targetList={id:generateId(),name:tName,sharedWith:[tUser],createdBy:tUser,items:[],isShoppingActive:false,timestamp:new Date().toISOString()};
                  lists.push(targetList);
              }
              targetList.items=[...(targetList.items||[]),...newItems];
              await r.update({shoppingLists:lists});
              setST(`${newItems.length} Artikel importiert! 🛒✅`);if(navigator.vibrate)navigator.vibrate([30,50,30]);
              setTimeout(()=>window.close(), 2500); 
          }
        }else{setST('Familie nicht gefunden ❌');}
      }catch(e){setST('Verbindungsfehler ❌');}
    };eS();
  },[action,reason,fid,itemsParam,listNameParam,userParam]);
  return(<div className="h-full w-full bg-[var(--app-bg)] dark:bg-black flex flex-col items-center justify-center p-8 text-center relative z-50"><div className="bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A] p-8 rounded-[32px] shadow-2xl w-full max-w-sm text-center"><div className="w-20 h-20 bg-[#007AFF]/10 text-[#007AFF] rounded-full flex items-center justify-center mx-auto mb-5"><Icon name={action==='add_shopping'?'Sparkles':'Bell'} size={36} /></div><h2 className="text-[22px] font-bold mb-3">{sT}</h2><p className="text-[15px] text-gray-500 dark:text-[#EBEBF5]/60 mb-6">Dieses Fenster schließt sich automatisch.</p></div></div>);
}

function Root(){
  const p=new URLSearchParams(window.location.search);
  const act=p.get('action');const iS=act==='shortcut'||act==='add_shopping';
  const sR=p.get('reason');const sF=p.get('fid');const itm=p.get('items');const lN=p.get('listName');const usr=p.get('user');
  const [cfg,setCfg]=useState(()=>{
    try{
      const uC=p.get('cfg');if(uC){const d=JSON.parse(decodeURIComponent(escape(atob(uC))));localStorage.setItem(CONFIG_STORAGE_KEY,JSON.stringify(d));return d;}
      if(typeof __firebase_config!=='undefined'&&__firebase_config)return typeof __firebase_config==='string'?JSON.parse(__firebase_config):__firebase_config;
      const s=localStorage.getItem(CONFIG_STORAGE_KEY)||localStorage.getItem('firebaseConfig');if(s)return JSON.parse(s);
    }catch(e){}return null;
  });
  const [s,setS]=useState("booting");const [eM,setEM]=useState("");
  useEffect(()=>{
    if(!cfg)return setS("config-needed");setS("booting");
    try{
      const fC=cfg.firebaseConfig?cfg.firebaseConfig:cfg;
      if(!firebase.apps.length)app=firebase.initializeApp(fC);else app=firebase.app();
      db=firebase.firestore();try{db.enablePersistence({synchronizeTabs:true}).catch(e=>{});}catch(e){}
      auth=firebase.auth();setS("ready");
    }catch(e){setEM("Verbindungsfehler: "+e.message);setS("error");}
  },[cfg]);

  if(s==="config-needed")return <ConfigLoader onConfigLoaded={setCfg} />;
  if(s==="error")return(<div className="h-full w-full bg-[var(--app-bg)] dark:bg-black text-black dark:text-white flex flex-col items-center justify-center p-8 text-center relative z-50"><Icon name="ShieldCheck" size={64} className="text-[#FF3B30] mb-4" /><h2 className="text-xl font-bold mb-2">Systemfehler</h2><p className="text-[#FF3B30] text-[15px] mb-8 font-mono bg-[#FF3B30]/10 p-4 rounded-[16px] border border-[#FF3B30]/20">{eM}</p><button onClick={()=>{localStorage.removeItem(CONFIG_STORAGE_KEY);localStorage.removeItem('firebaseConfig');setCfg(null);setS("config-needed");}} className="bg-[#007AFF] text-white px-6 py-3.5 rounded-[14px] font-semibold text-[17px] active:opacity-80 transition-opacity">Neue Config laden</button></div>);
  if(s==="booting")return <div className="h-full w-full bg-[var(--app-bg)] dark:bg-black flex flex-col items-center justify-center relative z-50"><Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" /></div>;
  if(iS&&sF)return <ShortcutTrigger action={act} reason={sR} fid={sF} itemsParam={itm} listNameParam={lN} userParam={usr} />;
  return <App />;
}

const root=createRoot(document.getElementById('root'));
root.render(<Root />);
</script>
</body>
</html>
