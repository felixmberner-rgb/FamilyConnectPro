                            {activeMembersList.length <= 1 && <div className="p-6 text-center text-[#8E8E93] dark:text-[#EBEBF5]/60 text-[15px]">Du bist noch alleine.</div>}
                          </div>
                        </section>

                        <div className="pt-4 md:flex md:justify-center">
                          <button disabled={!selectedReason || selectedMembers.length === 0 || isSending} onClick={() => handleSendNotification()} className={`w-full md:w-80 py-4 rounded-[14px] font-semibold text-[17px] transition-all duration-300 ease-out ${!selectedReason || selectedMembers.length === 0 ? 'bg-[#E5E5EA] dark:bg-[#2C2C2E] text-[#8E8E93] dark:text-gray-500' : 'bg-[#007AFF] text-white shadow-[0_4px_14px_rgba(0,122,255,0.3)] active:opacity-80'}`}>
                            {isSending ? 'Wird gesendet...' : 'Jetzt rufen'}
                          </button>
                        </div>
                      </div>
                    )}

                    {/* --- EXPENSES TAB --- */}
                    {activeTab === 'expenses' && (
                      <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                          
                          {!expenseModal && (

                               <div className="p-4 bg-[#FF3B30]/5 border-t border-[#FF3B30]/10 md:flex md:justify-end">
                                 <button onClick={handleDeleteFamily} className="w-full md:w-auto px-6 py-3.5 text-[#FF3B30] font-semibold text-[15px] bg-white dark:bg-[#1C1C1E] rounded-[12px] shadow-sm border border-[#FF3B30]/20 active:opacity-80 transition-opacity">
                                   Komplette Familie auflösen
                                 </button>
                               </div>
                             </div>
                           </section>
                        )}
                        
                        <div className="md:col-span-2 pt-2">
                            <button onClick={handleLogout} className="w-full md:max-w-xs mx-auto py-3.5 bg-white dark:bg-[#1C1C1E] text-[#FF3B30] font-semibold rounded-[14px] shadow-sm flex items-center justify-center space-x-2 active:opacity-70 transition-opacity border border-[#E5E5EA] dark:border-[#38383A]">
                              <Icon name="LogOut" size={20} />
                              <span className="text-[17px]">App & Gerät abmelden</span>
                            </button>
                        </div>
                      </div>
                    )}

                  </main>
              </div>

              {/* Feste Tab-Bar unten */}
              <LiquidTabBar activeTab={activeTab} setActiveTab={setActiveTab} isKeyboardOpen={isKeyboardOpen} />
            </div>
          );
        }

        function Root() {
            const [config, setConfig] = useState(() => {
                try {
                    const saved = localStorage.getItem(CONFIG_STORAGE_KEY) || localStorage.getItem('firebaseConfig');
                    return saved ? JSON.parse(saved) : null;
                } catch (e) {
                    return null;
                }
            });
            const [status, setStatus] = useState("booting"); 
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                const fallback = document.getElementById('fallback');
                if (fallback) fallback.style.display = 'none';

                if (!config) return setStatus("config-needed");
                
                setStatus("booting");
                try {
                    const finalConfig = config.firebaseConfig ? config.firebaseConfig : config;
                    if (!firebase.apps.length) app = firebase.initializeApp(finalConfig);
                    else app = firebase.app();
                    
                    // ReCAPTCHA nur online aktivieren, um Fehler zu vermeiden
                    if (RECAPTCHA_SITE_KEY && RECAPTCHA_SITE_KEY !== "DEIN_SCHLUESSEL_HIER_EINFUEGEN") {
                        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' && !window.location.protocol.includes('file')) {
                            try { 
                                firebase.appCheck().activate(RECAPTCHA_SITE_KEY, true).catch(()=>{}); 
                            } catch (e) {}
                        }
                    }
                    db = firebase.firestore();
                    auth = firebase.auth();
                    setStatus("ready");
                } catch (e) {
                    setErrorMsg("Verbindungsfehler: " + e.message);
                    setStatus("error");
                }
            }, [config]);

            if (status === "config-needed") return <ConfigLoader onConfigLoaded={setConfig} />;
            
            if (status === "error") {
                return (
                    <div className="fixed inset-0 bg-[var(--app-bg)] dark:bg-black text-black dark:text-white flex flex-col items-center justify-center p-8 text-center z-50">
                        <Icon name="ShieldCheck" size={64} className="text-[#FF3B30] mb-4" />
                        <h2 className="text-xl font-bold mb-2">Systemfehler</h2>
                        <p className="text-[#FF3B30] text-[15px] mb-8 font-mono bg-[#FF3B30]/10 p-4 rounded-[16px] border border-[#FF3B30]/20">{errorMsg}</p>
                        <button onClick={() => { localStorage.removeItem(CONFIG_STORAGE_KEY); setConfig(null); setStatus("config-needed"); }} className="bg-[#007AFF] text-white px-6 py-3.5 rounded-[14px] font-semibold text-[17px] active:opacity-80 transition-opacity">
                            Neue Config laden
                        </button>
                    </div>
                );
            }

            if (status === "booting") {
                return (
                   <div className="fixed inset-0 bg-[var(--app-bg)] dark:bg-black flex flex-col items-center justify-center z-50">
                      <Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                   </div>
                );
            }
            return <App />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
