<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Connect Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ES Module Imports für den modernen React-Code -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
            "firebase/messaging": "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js",
            "firebase/app-check": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js"
        }
    }
    </script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F2F2F7; margin: 0; }
        .ios-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe-top { padding-top: env(safe-area-inset-top, 44px); }
        ::-webkit-scrollbar { display: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="text-black antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Bell, Clock, Settings, Coffee, Utensils, UtensilsCrossed, Moon, 
          MessageCircle, Film, Gamepad2, Check, LogOut, ShieldCheck, 
          Smartphone, Speaker, CheckCircle2, Key, Trash2 
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, getDocs, onSnapshot } from 'firebase/firestore';
        import { getMessaging, getToken } from 'firebase/messaging';
        import { initializeAppCheck, ReCaptchaEnterpriseProvider } from 'firebase/app-check';

        // =====================================================================
        // 🛡️ HIER DEINEN RECAPTCHA SCHLÜSSEL EINTRAGEN 🛡️
        // =====================================================================
        const RECAPTCHA_SITE_KEY = "DEIN_SCHLUESSEL_HIER_EINFUEGEN";
        // =====================================================================

        let app, auth, db, messaging;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-connect-pro';

        const generateFamilyId = () => Math.floor(100000 + Math.random() * 900000).toString();
        const getFamilyDocRef = (familyId) => doc(db, 'artifacts', appId, 'public', 'data', 'families', familyId);

        // --- Custom Modal ---
        function Modal({ data, onClose }) {
            if (!data) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                    <div className="bg-white rounded-[28px] p-6 w-full max-w-sm shadow-2xl animate-scale-in">
                        <div className="text-center mb-6">
                            <h3 className="font-bold text-xl mb-2 text-black">{data.title}</h3>
                            <p className="text-gray-500 text-[15px] leading-relaxed">{data.message}</p>
                        </div>
                        <div className="flex gap-3">
                            {data.type === 'confirm' && (
                                <button onClick={data.onCancel} className="flex-1 py-3.5 rounded-xl bg-[#F2F2F7] text-black font-bold active:scale-95 transition-transform">
                                    Abbrechen
                                </button>
                            )}
                            <button onClick={data.onConfirm} className={`flex-1 py-3.5 rounded-xl font-bold active:scale-95 transition-transform ${data.danger ? 'bg-red-500 text-white' : 'bg-[#007AFF] text-white'}`}>
                                {data.confirmText || 'OK'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Config Loader ---
        function ConfigLoader({ onConfigLoaded }) {
            const [error, setError] = useState("");
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const config = JSON.parse(event.target.result);
                        const firebaseData = config.firebaseConfig ? config.firebaseConfig : config;
                        if (!firebaseData || !firebaseData.apiKey) throw new Error("Ungültiges Dateiformat. apiKey fehlt.");
                        localStorage.setItem('firebaseConfig', JSON.stringify(firebaseData));
                        onConfigLoaded(firebaseData);
                    } catch (err) { setError("Fehler: " + err.message); }
                };
                reader.readAsText(file);
            };

            return (
                <div className="h-screen flex flex-col items-center justify-center p-8 bg-black text-white">
                    <div className="w-full max-w-sm text-center space-y-6">
                        <ShieldCheck size={96} strokeWidth={1.5} className="text-blue-500 mx-auto mb-4" />
                        <h1 className="text-3xl font-bold tracking-tight">System Setup</h1>
                        <p className="text-gray-400 text-sm leading-relaxed px-4">Bitte lade deine <span className="font-mono text-blue-400">config.json</span> hoch.</p>
                        {error && <p className="text-red-400 text-xs font-semibold">{error}</p>}
                        <label className="inline-block w-full bg-blue-600 py-4 rounded-2xl font-bold active:scale-95 transition-all cursor-pointer mt-8">
                            Konfiguration laden<input type="file" accept=".json" onChange={handleFileUpload} />
                        </label>
                    </div>
                </div>
            );
        }

        // --- Mathematisch perfekte Tab Bar ---
        const LiquidTabBar = ({ activeTab, setActiveTab }) => {
          const tabs = [
            { id: 'home', icon: Bell },
            { id: 'history', icon: Clock },
            { id: 'settings', icon: Settings }
          ];

          const activeIndex = tabs.findIndex(t => t.id === activeTab);

          return (
            <div className="fixed bottom-8 left-0 right-0 flex justify-center z-50 pointer-events-none px-4 pb-safe">
              <div className="pointer-events-auto bg-white/95 backdrop-blur-2xl shadow-[0_8px_30px_rgba(0,0,0,0.12)] border border-gray-100 rounded-full p-1.5 flex items-center justify-between w-full max-w-[220px] relative h-[60px]">
                
                {/* Blaue Pille - Perfekt zentriert hinter dem Icon */}
                <div 
                  className="absolute inset-y-1.5 left-1.5 flex justify-center transition-transform duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] pointer-events-none"
                  style={{
                    width: 'calc((100% - 12px) / 3)', 
                    transform: `translateX(${activeIndex * 100}%)`,
                  }}
                >
                  <div className="w-12 h-full bg-[#007AFF]/12 rounded-full"></div>
                </div>
                
                {tabs.map((tab) => {
                  const Icon = tab.icon;
                  const isActive = activeTab === tab.id;
                  return (
                    <button 
                      key={tab.id}
                      onClick={() => {
                        if(navigator.vibrate) navigator.vibrate(10);
                        setActiveTab(tab.id);
                      }}
                      className="flex-1 relative z-10 flex items-center justify-center h-full active:scale-90 transition-transform"
                    >
                      <Icon 
                        size={isActive ? 24 : 22} 
                        strokeWidth={isActive ? 2.5 : 2}
                        className={`transition-colors duration-300 ${isActive ? 'text-[#007AFF]' : 'text-gray-400'}`} 
                      />
                    </button>
                  );
                })}
              </div>
            </div>
          );
        };

        // --- Main App Component ---
        function App() {
          const [appLoaded, setAppLoaded] = useState(false);
          const [firebaseUser, setFirebaseUser] = useState(null);
          const [currentFamily, setCurrentFamily] = useState(null);
          const [currentUser, setCurrentUser] = useState(null);
          const [modal, setModal] = useState(null);
          
          const [authMode, setAuthMode] = useState('login');
          const [familyIdInput, setFamilyIdInput] = useState('');
          const [familyNameInput, setFamilyNameInput] = useState('');
          const [memberNameInput, setMemberNameInput] = useState('');
          const [passwordInput, setPasswordInput] = useState('');
          const [authError, setAuthError] = useState('');

          const [activeTab, setActiveTab] = useState('home');
          const [selectedReason, setSelectedReason] = useState(null);
          const [selectedMembers, setSelectedMembers] = useState([]);
          const [isSending, setIsSending] = useState(false);
          const [pushStatus, setPushStatus] = useState('Nicht konfiguriert');

          const REASONS = [
            { id: 'breakfast', label: 'Frühstück', icon: Coffee, category: 'meal' },
            { id: 'lunch', label: 'Mittagessen', icon: Utensils, category: 'meal' },
            { id: 'coffee', label: 'Kaffee', icon: UtensilsCrossed, category: 'meal' },
            { id: 'dinner', label: 'Abendessen', icon: Moon, category: 'meal' },
            { id: 'table', label: 'Tischdecken', icon: Utensils, category: 'push_only' }, // Neuer Grund
            { id: 'message', label: 'Kommen', icon: MessageCircle, category: 'other' },
            { id: 'movie', label: 'Film', icon: Film, category: 'other' },
            { id: 'game', label: 'Spielen', icon: Gamepad2, category: 'other' },
          ];

          const showConfirm = (title, message, onConfirm, danger = false) => setModal({ 
            type: 'confirm', title, message, danger, 
            onConfirm: () => { onConfirm(); setModal(null); }, 
            onCancel: () => setModal(null) 
          });

          // 1. App laden ohne Flackern
          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else { await signInAnonymously(auth); }
              } catch (error) { console.error("Auth error:", error); }
            };
            initAuth();

            const unsubscribe = onAuthStateChanged(auth, async (u) => {
              setFirebaseUser(u);
              if (u) {
                  const savedFamilyId = localStorage.getItem('familyId');
                  const savedName = localStorage.getItem('userName');
                  if (savedFamilyId && savedName) {
                      await loadFamilyData(savedFamilyId, savedName);
                  }
              }
              // Verzögerung für weicheren Übergang (verhindert Flackern)
              setTimeout(() => setAppLoaded(true), 300);
            });
            return () => unsubscribe();
          }, []);

          // 2. Real-time DB Listener
          useEffect(() => {
            if (!firebaseUser || !currentFamily?.id) return;
            const unsubscribe = onSnapshot(getFamilyDocRef(currentFamily.id), (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                setCurrentFamily(data);
                if (currentUser) {
                  const updatedUser = data.members.find(m => m.name === currentUser.name);
                  if (updatedUser) {
                     setCurrentUser(updatedUser);
                     if (updatedUser.fcmToken) setPushStatus('Aktiviert ✅');
                  }
                }
              }
            });
            return () => unsubscribe();
          }, [firebaseUser, currentFamily?.id, currentUser?.name]);

          const loadFamilyData = async (familyId, userName) => {
              try {
                  const docSnap = await getDoc(getFamilyDocRef(familyId));
                  if (!docSnap.exists()) throw new Error("Familie existiert nicht.");
                  const data = docSnap.data();
                  const member = data.members.find(m => m.name.trim().toLowerCase() === userName.trim().toLowerCase());
                  if (!member) throw new Error("Benutzername nicht gefunden.");
                  setCurrentFamily(data);
                  setCurrentUser(member);
                  if (member.fcmToken) setPushStatus('Aktiviert ✅');
              } catch (e) {
                  console.error("Ladefehler:", e);
                  handleLogout(); 
              }
          };

          const handleCreateFamily = async () => {
            setAuthError('');
            if (!familyNameInput || !memberNameInput || !passwordInput) return setAuthError('Bitte alle Felder ausfüllen.');
            const newId = generateFamilyId();
            const familyData = {
              id: newId, 
              name: familyNameInput,
              vapidKey: '', 
              members: [{ name: memberNameInput, password: passwordInput, fcmToken: '', voiceMonkeyMeal: '', voiceMonkeyOther: '' }],
              history: []
            };
            try {
              await setDoc(getFamilyDocRef(newId), familyData);
              localStorage.setItem('familyId', newId);
              localStorage.setItem('userName', memberNameInput);
              setCurrentFamily(familyData); setCurrentUser(familyData.members[0]);
            } catch (err) { setAuthError('Fehler beim Erstellen.'); }
          };

          const handleJoinFamily = async () => {
            setAuthError('');
            if (!familyIdInput || !memberNameInput || !passwordInput) return setAuthError('Bitte alle Felder ausfüllen.');
            try {
              const docSnap = await getDoc(getFamilyDocRef(familyIdInput));
              if (!docSnap.exists()) return setAuthError('Familie nicht gefunden.');
              const data = docSnap.data();
              if (data.members.find(m => m.name.toLowerCase() === memberNameInput.toLowerCase())) {
                return setAuthError('Name existiert. Bitte einloggen.');
              }
              const newUser = { name: memberNameInput, password: passwordInput, fcmToken: '', voiceMonkeyMeal: '', voiceMonkeyOther: '' };
              const updatedMembers = [...data.members, newUser];
              await updateDoc(getFamilyDocRef(familyIdInput), { members: updatedMembers });
              
              localStorage.setItem('familyId', form.familyId);
              localStorage.setItem('userName', memberNameInput);
              setCurrentFamily({ ...data, members: updatedMembers }); 
              setCurrentUser(newUser);
            } catch (err) { setAuthError('Fehler beim Beitreten.'); }
          };

          const handleLogin = async () => {
            setAuthError('');
            if (!memberNameInput || !passwordInput) return setAuthError('Name und Passwort erforderlich.');
            try {
              const familiesRef = collection(db, 'artifacts', appId, 'public', 'data', 'families');
              const querySnapshot = await getDocs(familiesRef);
              let foundFamily = null; let foundMember = null;
              querySnapshot.forEach((doc) => {
                const data = doc.data();
                const member = data.members.find(m => m.name.toLowerCase() === memberNameInput.toLowerCase() && m.password === passwordInput);
                if (member) { foundFamily = data; foundMember = member; }
              });
              if (!foundFamily) return setAuthError('Falsche Daten oder Nutzer fehlt.');
              
              localStorage.setItem('familyId', foundFamily.id);
              localStorage.setItem('userName', foundMember.name);
              setCurrentFamily(foundFamily); 
              setCurrentUser(foundMember);
              if (foundMember.fcmToken) setPushStatus('Aktiviert ✅');
            } catch (err) { setAuthError('Fehler bei der Anmeldung.'); }
          };

          const handleLogout = () => {
            setCurrentFamily(null); setCurrentUser(null);
            setPasswordInput(''); setAuthMode('login'); setPushStatus('Nicht konfiguriert');
            localStorage.removeItem('familyId');
            localStorage.removeItem('userName');
          };

          const requestPushPermission = async () => {
            if (!messaging) return alert("Push wird auf diesem Gerät nicht unterstützt (Safari auf dem Home-Bildschirm speichern!).");
            if (!currentFamily.vapidKey || currentFamily.vapidKey.trim() === '') return alert("Dem System fehlt der VAPID Key. Der Admin muss diesen im Setup-Tab eintragen.");
            
            setPushStatus('Wird angefragt...');
            try {
              const permission = await Notification.requestPermission();
              if (permission === 'granted') {
                try {
                  const reg = await navigator.serviceWorker.ready;
                  const token = await getToken(messaging, { 
                      vapidKey: currentFamily.vapidKey.trim(),
                      serviceWorkerRegistration: reg 
                  });
                  if (token) {
                    const updatedMembers = currentFamily.members.map(m => 
                      m.name === currentUser.name ? { ...m, fcmToken: token } : m
                    );
                    await updateDoc(getFamilyDocRef(currentFamily.id), { members: updatedMembers });
                    setPushStatus('Aktiviert ✅');
                    if(navigator.vibrate) navigator.vibrate(50);
                    alert("Erfolgreich! Dein Gerät empfängt jetzt Push-Nachrichten.");
                  } else { 
                    setPushStatus('Fehler beim Abruf'); 
                    alert("Es konnte kein Token generiert werden.");
                  }
                } catch (tokenErr) {
                  console.error("Token Error:", tokenErr);
                  setPushStatus('Zertifikat-Fehler');
                  alert("Fehler beim Token: Überprüfe den VAPID Key. Stelle sicher, dass keine Leerzeichen am Anfang oder Ende sind.");
                }
              } else { 
                setPushStatus('Abgelehnt ❌'); 
                alert("Du hast die Erlaubnis in den iPhone-Einstellungen verweigert.");
              }
            } catch (error) { 
              setPushStatus('Fehler');
              alert("Es gab einen kritischen Fehler beim Anfragen der Push-Rechte.");
            }
          };

          const handleSendNotification = async () => {
            if (!selectedReason || selectedMembers.length === 0) return;
            setIsSending(true);
            if(navigator.vibrate) navigator.vibrate(10);

            const reasonObj = REASONS.find(r => r.id === selectedReason);
            const targets = currentFamily.members.filter(m => selectedMembers.includes(m.name));
            
            // 1. Trigger Voice Monkey (außer bei push_only wie "Tischdecken")
            if (reasonObj.category !== 'push_only') {
                targets.forEach(target => {
                  const url = reasonObj.category === 'meal' ? target.voiceMonkeyMeal : target.voiceMonkeyOther;
                  if (url && url.trim() !== '') {
                    fetch(url).catch(e => console.error("VM Error", e));
                  }
                });
            }

            // 2. Save History (Triggert die Cloud Function für Pushes)
            // WICHTIG: Die Cloud-Function erwartet "targets"
            const newHistoryItem = {
              id: Date.now().toString(),
              timestamp: new Date().toISOString(),
              sender: currentUser.name,
              reason: reasonObj.label,
              targets: selectedMembers, // Korrigiert für die Cloud Function!
              acknowledgedBy: [] 
            };

            try {
              await updateDoc(getFamilyDocRef(currentFamily.id), {
                history: [newHistoryItem, ...(currentFamily.history || [])].slice(0, 50)
              });
              if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
              setSelectedReason(null);
              setSelectedMembers([]);
              setActiveTab('history'); 
            } catch (err) { console.error("History err:", err); }

            setTimeout(() => setIsSending(false), 800);
          };

          const handleAcknowledge = async (historyItemId) => {
            if(navigator.vibrate) navigator.vibrate([20, 30]);
            const updatedHistory = currentFamily.history.map(item => {
              if (item.id === historyItemId) {
                if (!item.acknowledgedBy.includes(currentUser.name)) {
                   return { ...item, acknowledgedBy: [...(item.acknowledgedBy || []), currentUser.name] };
                }
              }
              return item;
            });
            try {
              await updateDoc(getFamilyDocRef(currentFamily.id), { history: updatedHistory });
            } catch (err) { console.error("Ack err:", err); }
          };

          const handleClearHistory = () => {
            showConfirm("Verlauf leeren", "Möchtest du den gesamten Verlauf für alle dauerhaft löschen?", async () => {
                await updateDoc(getFamilyDocRef(currentFamily.id), { history: [] });
            }, true);
          };

          const saveSettings = async (key, value) => {
            const updatedMembers = currentFamily.members.map(m => 
              m.name === currentUser.name ? { ...m, [key]: value.trim() } : m
            );
            await updateDoc(getFamilyDocRef(currentFamily.id), { members: updatedMembers });
          };

          const saveAdminSettings = async (key, value) => {
            await updateDoc(getFamilyDocRef(currentFamily.id), { [key]: value.trim() });
          };

          // --- Splash Screen (verhindert Flackern) ---
          if (!appLoaded) {
              return (
                  <div className="h-screen bg-[#F2F2F7] flex flex-col items-center justify-center">
                     <ShieldCheck size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                     <p className="text-gray-400 font-bold text-sm tracking-widest uppercase">Family Connect</p>
                  </div>
              );
          }

          if (!currentFamily || !currentUser) {
            return (
              <div className="min-h-screen bg-[#000000] text-white flex flex-col items-center justify-center p-6 font-sans">
                <div className="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-[#007AFF] blur-[100px] opacity-20 pointer-events-none"></div>
                <div className="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-[#5856D6] blur-[100px] opacity-20 pointer-events-none"></div>

                <div className="bg-white/10 backdrop-blur-3xl border border-white/20 p-8 rounded-[40px] shadow-2xl w-full max-w-sm relative z-10">
                  <div className="flex justify-center mb-6">
                    <div className="w-20 h-20 bg-gradient-to-tr from-[#007AFF] to-[#5856D6] rounded-3xl flex items-center justify-center shadow-lg">
                      <ShieldCheck size={40} className="text-white" />
                    </div>
                  </div>
                  <h1 className="text-3xl font-bold text-center mb-8 tracking-tight">Family Hub</h1>
                  
                  <div className="flex bg-black/30 p-1.5 rounded-2xl mb-8 backdrop-blur-md">
                    {['login', 'join', 'create'].map((mode) => (
                      <button 
                        key={mode}
                        className={`flex-1 py-2 text-sm font-semibold rounded-xl transition-all duration-300 ${authMode === mode ? 'bg-white text-black shadow-md scale-100' : 'text-gray-400 scale-95 hover:text-white'}`}
                        onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setAuthMode(mode); }}
                      >
                        {mode === 'login' ? 'Anmelden' : mode === 'join' ? 'Beitreten' : 'Neu'}
                      </button>
                    ))}
                  </div>

                  <div className="space-y-4">
                    {authMode === 'create' && (
                      <input type="text" placeholder="Familienname" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 focus:border-[#007AFF]/50 transition-all text-white placeholder-gray-400" value={familyNameInput} onChange={e => setFamilyNameInput(e.target.value)} />
                    )}
                    {authMode === 'join' && (
                      <input type="text" placeholder="Familien-ID (6 Ziffern)" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 focus:border-[#007AFF]/50 transition-all text-white placeholder-gray-400" value={familyIdInput} onChange={e => setFamilyIdInput(e.target.value)} />
                    )}
                    <input type="text" placeholder="Dein Vorname" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 focus:border-[#007AFF]/50 transition-all text-white placeholder-gray-400" value={memberNameInput} onChange={e => setMemberNameInput(e.target.value)} />
                    <input type="password" placeholder="Passwort" className="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl outline-none focus:bg-white/10 focus:border-[#007AFF]/50 transition-all text-white placeholder-gray-400" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} />

                    {authError && <p className="text-red-400 text-sm text-center font-medium">{authError}</p>}

                    <button 
                      onClick={() => { if(navigator.vibrate) navigator.vibrate(15); authMode === 'login' ? handleLogin() : authMode === 'join' ? handleJoinFamily() : handleCreateFamily(); }}
                      className="w-full bg-gradient-to-r from-[#007AFF] to-[#5856D6] text-white font-bold py-4 rounded-2xl mt-4 active:scale-95 transition-transform shadow-[0_0_20px_rgba(0,122,255,0.4)]"
                    >
                      {authMode === 'login' ? 'Anmelden' : authMode === 'join' ? 'Beitreten' : 'Familie erstellen'}
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          const isAdmin = currentFamily.members.length > 0 && currentFamily.members[0].name === currentUser.name;

          return (
            <div className="h-screen bg-[#F2F2F7] font-sans select-none overflow-hidden flex flex-col relative">
              <Modal data={modal} onClose={() => setModal(null)} />

              {/* Fester Header außerhalb des Scroll-Containers */}
              <header className="flex-none pt-safe-top pt-14 pb-4 px-6 bg-white/90 ios-blur border-b border-gray-200/50 z-40 flex justify-between items-end">
                <div>
                  <h1 className="text-3xl font-extrabold text-black tracking-tight">
                    {activeTab === 'home' && currentFamily.name}
                    {activeTab === 'history' && 'Verlauf'}
                    {activeTab === 'settings' && 'Einstellungen'}
                  </h1>
                  {activeTab === 'home' && (
                    <p className="text-gray-500 font-medium mt-1 tracking-wide">ID: <span className="font-bold">{currentFamily.id}</span></p>
                  )}
                </div>
                {/* Verlauf leeren Button */}
                {activeTab === 'history' && currentFamily.history?.length > 0 && (
                  <button onClick={handleClearHistory} className="mb-1 text-red-500 font-bold text-sm bg-red-50 px-3 py-1.5 rounded-full active:bg-red-100 transition-colors flex items-center gap-1.5">
                    <Trash2 size={16} /> Leeren
                  </button>
                )}
              </header>

              {/* Flexibler Scroll-Container mit min-height für dauerhaftes Wischen */}
              <main className="flex-1 overflow-y-auto px-4 pt-6 pb-36">
                <div className="min-h-[calc(100%+1px)] pb-10">
                
                {/* --- HOME TAB --- */}
                {activeTab === 'home' && (
                  <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <section>
                      <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Grund</h2>
                      <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">
                        <div className="grid grid-cols-4 gap-y-4 p-4">
                          {REASONS.map((reason) => {
                            const Icon = reason.icon;
                            const isSelected = selectedReason === reason.id;
                            return (
                              <div key={reason.id} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setSelectedReason(reason.id); }} className="flex flex-col items-center cursor-pointer group relative">
                                <div className={`w-[60px] h-[60px] rounded-2xl flex items-center justify-center mb-2 transition-all duration-300 ease-out transform ${isSelected ? 'bg-[#007AFF] text-white scale-105 shadow-md' : 'bg-[#F2F2F7] text-black group-active:scale-95'}`}>
                                  <Icon size={26} strokeWidth={isSelected ? 2.5 : 2} />
                                </div>
                                <span className={`text-[11px] text-center font-bold transition-colors ${isSelected ? 'text-black' : 'text-gray-400'}`}>{reason.label}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </section>

                    <section>
                      <div className="flex justify-between items-end mb-3 px-2">
                        <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest">Empfänger</h2>
                        <button 
                          className="text-sm text-[#007AFF] font-bold bg-[#007AFF]/10 px-3 py-1 rounded-full active:bg-[#007AFF]/20 transition-colors"
                          onClick={() => {
                            if(navigator.vibrate) navigator.vibrate(10);
                            const others = currentFamily.members.filter(m => m.name !== currentUser.name).map(m => m.name);
                            setSelectedMembers(selectedMembers.length === others.length ? [] : others);
                          }}
                        >
                          {selectedMembers.length === (currentFamily.members.length - 1) ? 'Keine' : 'Alle'}
                        </button>
                      </div>
                      
                      <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">
                        {currentFamily.members.filter(m => m.name !== currentUser.name).map((member, index, arr) => {
                          const isSelected = selectedMembers.includes(member.name);
                          return (
                            <div 
                              key={member.name}
                              onClick={() => {
                                if(navigator.vibrate) navigator.vibrate(10);
                                if (isSelected) setSelectedMembers(prev => prev.filter(m => m !== member.name));
                                else setSelectedMembers(prev => [...prev, member.name]);
                              }}
                              className={`flex items-center justify-between p-5 cursor-pointer active:bg-gray-50 transition-colors ${index !== arr.length - 1 ? 'border-b border-gray-100' : ''}`}
                            >
                              <span className="font-semibold text-[17px]">{member.name}</span>
                              <div className={`w-[50px] h-[30px] rounded-full p-1 transition-colors duration-300 ease-in-out ${isSelected ? 'bg-[#34C759]' : 'bg-gray-200'}`}>
                                <div className={`w-6 h-6 bg-white rounded-full shadow-sm transform transition-transform duration-300 ease-in-out ${isSelected ? 'translate-x-[20px]' : 'translate-x-0'}`} />
                              </div>
                            </div>
                          );
                        })}
                        {currentFamily.members.length <= 1 && (
                           <div className="p-6 text-center text-gray-400 text-sm">Du bist noch alleine. Bitte lade Familienmitglieder ein!</div>
                        )}
                      </div>
                    </section>

                    <div className="pt-4">
                      <button 
                        disabled={!selectedReason || selectedMembers.length === 0 || isSending}
                        onClick={handleSendNotification}
                        className={`w-full py-5 rounded-[24px] font-bold text-xl transition-all duration-300 ease-out ${
                          !selectedReason || selectedMembers.length === 0
                            ? 'bg-gray-200 text-gray-400 scale-100'
                            : 'bg-[#007AFF] text-white shadow-[0_10px_30px_rgba(0,122,255,0.3)] active:scale-95 active:shadow-md'
                        }`}
                      >
                        {isSending ? 'Wird gesendet...' : 'Jetzt rufen'}
                      </button>
                    </div>
                  </div>
                )}

                {/* --- HISTORY TAB --- */}
                {activeTab === 'history' && (
                  <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    {(!currentFamily.history || currentFamily.history.length === 0) ? (
                      <div className="text-center text-gray-400 font-medium mt-16">Keine Benachrichtigungen.</div>
                    ) : (
                      currentFamily.history.map((item) => {
                        // Rückwärtskompatibel für alte Einträge (recipients) und neue (targets)
                        const targetList = item.targets || item.recipients || [];
                        const isRecipient = targetList.includes(currentUser.name);
                        const hasAcknowledged = item.acknowledgedBy?.includes(currentUser.name);
                        const isRecent = (new Date() - new Date(item.timestamp)) < (2 * 60 * 60 * 1000);
                        
                        const renderRecipientStatus = (name) => {
                          const ack = item.acknowledgedBy?.includes(name);
                          return (
                            <span key={name} className={`inline-flex items-center space-x-1 ${ack ? 'text-green-600 font-bold' : 'text-gray-500'}`}>
                              <span>{name}</span>
                              {ack && <CheckCircle2 size={12} className="text-green-500 inline" />}
                              {targetList.indexOf(name) !== targetList.length - 1 && <span className="text-gray-400 mr-1">,</span>}
                            </span>
                          );
                        };

                        return (
                          <div key={item.id} className="bg-white p-5 rounded-[28px] shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col space-y-4">
                            <div className="flex items-center space-x-4">
                              <div className="bg-[#F2F2F7] text-[#007AFF] w-14 h-14 rounded-[20px] flex items-center justify-center flex-shrink-0">
                                <Clock size={24} />
                              </div>
                              <div className="flex-1">
                                <p className="font-bold text-[18px] tracking-tight">{item.reason}</p>
                                <p className="text-[13px] text-gray-500 font-medium mt-0.5">
                                  Von <span className="font-bold text-gray-700">{item.sender}</span>
                                </p>
                              </div>
                              <div className="text-[13px] font-bold text-gray-400 self-start mt-1">
                                {new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                              </div>
                            </div>

                            <div className="bg-gray-50 rounded-2xl p-3 flex flex-wrap gap-1 items-center text-[13px]">
                              <span className="text-gray-400 font-medium mr-1">An:</span>
                              {targetList.map(name => renderRecipientStatus(name))}
                            </div>

                            {isRecipient && !hasAcknowledged && isRecent && item.sender !== currentUser.name && (
                              <button 
                                onClick={() => handleAcknowledge(item.id)}
                                className="w-full bg-[#007AFF]/10 text-[#007AFF] font-bold py-3.5 rounded-[18px] active:scale-95 transition-all flex items-center justify-center space-x-2"
                              >
                                <Check size={20} strokeWidth={3} />
                                <span>Bestätigen (Ich komme)</span>
                              </button>
                            )}
                          </div>
                        );
                      })
                    )}
                  </div>
                )}

                {/* --- SETTINGS TAB --- */}
                {activeTab === 'settings' && (
                  <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    
                    {isAdmin && (
                       <section>
                         <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2 flex items-center gap-2"><Key size={14}/> Admin-Bereich</h2>
                         <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100 p-5">
                           <p className="text-sm font-bold mb-1">Server Push Schlüssel (VAPID)</p>
                           <p className="text-xs text-gray-500 mb-3 leading-relaxed">Diesen Schlüssel bekommst du in der Firebase Konsole unter Project Settings &rarr; Cloud Messaging &rarr; Web Push certificates.</p>
                           <input type="text" placeholder="B... Vapid Key eintragen..." 
                                  className="w-full bg-[#F2F2F7] px-4 py-3 rounded-xl text-sm font-mono outline-none focus:ring-2 ring-black/10" 
                                  defaultValue={currentFamily.vapidKey} 
                                  onBlur={(e) => saveAdminSettings('vapidKey', e.target.value)} />
                         </div>
                       </section>
                    )}

                    <section>
                      <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Geräte Setup</h2>
                      <div className="bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100">
                        <div className="p-5 border-b border-gray-100 flex items-center justify-between">
                          <div className="flex items-center space-x-3">
                            <div className="bg-blue-100 p-2 rounded-xl"><Smartphone size={20} className="text-blue-500"/></div>
                            <div>
                              <p className="font-bold text-[16px]">Apple Push</p>
                              <p className="text-[12px] text-gray-500 font-medium">Status: <span className={currentUser.fcmToken ? "text-green-500" : "text-orange-400"}>{pushStatus}</span></p>
                            </div>
                          </div>
                          <button onClick={requestPushPermission} className="bg-[#007AFF]/10 text-[#007AFF] text-sm font-bold px-4 py-2.5 rounded-[14px] active:scale-95 transition-transform">
                            {currentUser.fcmToken ? 'Erneuern' : 'Aktivieren'}
                          </button>
                        </div>
                        
                        <div className="p-5 space-y-4">
                          <div className="flex items-center space-x-3 mb-2">
                            <div className="bg-purple-100 p-2 rounded-xl"><Speaker size={20} className="text-purple-500"/></div>
                            <p className="font-bold text-[16px]">Alexa Voice Monkey Links</p>
                          </div>
                          
                          <div>
                             <p className="text-[12px] font-bold text-gray-500 mb-1 ml-1">Für Mahlzeiten (Frühstück, Mittag, etc.)</p>
                             <input type="text" placeholder="https://api.voicemonkey.io/trigger..." 
                                    className="w-full bg-[#F2F2F7] px-4 py-3 rounded-2xl text-[14px] font-medium outline-none focus:ring-2 ring-purple-500/20 transition-all" 
                                    defaultValue={currentUser.voiceMonkeyMeal} 
                                    onBlur={(e) => saveSettings('voiceMonkeyMeal', e.target.value)} />
                          </div>

                          <div>
                             <p className="text-[12px] font-bold text-gray-500 mb-1 ml-1">Für Aktivitäten (Kommen, Film, Spielen)</p>
                             <input type="text" placeholder="https://api.voicemonkey.io/trigger..." 
                                    className="w-full bg-[#F2F2F7] px-4 py-3 rounded-2xl text-[14px] font-medium outline-none focus:ring-2 ring-purple-500/20 transition-all" 
                                    defaultValue={currentUser.voiceMonkeyOther} 
                                    onBlur={(e) => saveSettings('voiceMonkeyOther', e.target.value)} />
                          </div>
                        </div>
                      </div>
                    </section>
                    
                    <button onClick={handleLogout} className="w-full bg-red-50 text-red-500 font-bold py-4 rounded-[24px] shadow-sm flex items-center justify-center space-x-2 active:scale-95 transition-transform border border-red-100">
                      <LogOut size={20} />
                      <span className="text-[17px]">Abmelden</span>
                    </button>
                  </div>
                )}

                </div>
              </main>

              {/* Die neue Menüleiste außerhalb des Scroll-Containers */}
              <LiquidTabBar activeTab={activeTab} setActiveTab={setActiveTab} />
            </div>
          );
        }

        // --- Init & Root Component ---
        function Root() {
            const [config, setConfig] = useState(() => {
                if (typeof __firebase_config !== 'undefined') return JSON.parse(__firebase_config);
                const saved = localStorage.getItem('firebaseConfig');
                return saved ? JSON.parse(saved) : null;
            });
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                if (config) {
                    try {
                        app = initializeApp(config);
                        auth = getAuth(app);
                        db = getFirestore(app);
                        
                        // Firebase App Check (reCAPTCHA) aktivieren
                        if (RECAPTCHA_SITE_KEY && RECAPTCHA_SITE_KEY !== "DEIN_SCHLUESSEL_HIER_EINFUEGEN") {
                            initializeAppCheck(app, {
                                provider: new ReCaptchaEnterpriseProvider(RECAPTCHA_SITE_KEY),
                                isTokenAutoRefreshEnabled: true
                            });
                        }

                        if ('serviceWorker' in navigator) {
                            try {
                                const urlParams = `?apiKey=${config.apiKey}&projectId=${config.projectId}&senderId=${config.messagingSenderId}&appId=${config.appId}`;
                                navigator.serviceWorker.register('./firebase-messaging-sw.js' + urlParams)
                                    .then(() => console.log("Hintergrund-Dienst (SW) gestartet!"))
                                    .catch(err => console.warn("SW Fehler:", err));
                            } catch (swErr) {
                                console.warn("SW Registrierung fehlgeschlagen:", swErr);
                            }
                        }

                        if (typeof window !== 'undefined' && 'Notification' in window) {
                            try { messaging = getMessaging(app); } catch (e) { console.log("Messaging init übersprungen."); }
                        }
                        setIsReady(true);
                    } catch (e) {
                        console.error("Firebase Init Fehler:", e);
                        localStorage.removeItem('firebaseConfig'); 
                        setConfig(null);
                    }
                }
            }, [config]);

            if (!config) return <ConfigLoader onConfigLoaded={setConfig} />;
            if (!isReady) return (
               <div className="h-screen bg-[#F2F2F7] flex flex-col items-center justify-center">
                  <ShieldCheck size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                  <p className="text-gray-400 font-bold text-sm tracking-widest uppercase">System hochfahren</p>
               </div>
            );
            
            return <App />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
