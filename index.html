<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FamilyConnect">
    <title>FamilyConnect</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>

    <!-- PDF und QR-Code Generierung -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #000; margin: 0; }
        .ios-blur { background: rgba(255, 255, 255, 0.80); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe-top { padding-top: env(safe-area-inset-top, 44px); }
        ::-webkit-scrollbar { display: none; }
        input[type="file"] { display: none; }
        /* iOS Date Picker Styling */
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
        /* Weiches iOS Scrolling */
        .scroll-smooth { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="text-black antialiased overflow-hidden flex justify-center">
    <div id="root" class="w-full relative"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // =====================================================================
        // 🛡️ HIER DEINEN RECAPTCHA SCHLÜSSEL EINTRAGEN 🛡️
        // =====================================================================
        const RECAPTCHA_SITE_KEY = "DEIN_SCHLUESSEL_HIER_EINFUEGEN";
        // =====================================================================

        let app, db, auth, messaging;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-connect-pro';

        const generateId = () => Math.floor(100000 + Math.random() * 900000).toString();
        const getFamilyDocRef = (familyId) => db.doc(`artifacts/${appId}/public/data/families/${familyId}`);

        const ICONS = {
          Bell: '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
          BellOff: '<path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><line x1="1" x2="23" y1="1" y2="23"/>',
          Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
          Settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
          Coffee: '<path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/>',
          Utensils: '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>',
          UtensilsCrossed: '<path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/><path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"/><path d="m2.1 21.8 6.4-6.3"/><path d="m19 5-7 7"/>',
          Moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
          MessageCircle: '<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>',
          Film: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h4"/><path d="M3 12h18"/><path d="M3 16.5h4"/><path d="M17 3v18"/><path d="M17 7.5h4"/><path d="M17 16.5h4"/>',
          Gamepad2: '<line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/>',
          Check: '<polyline points="20 6 9 17 4 12"/>',
          LogOut: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>',
          ShieldCheck: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
          Smartphone: '<rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/>',
          Speaker: '<rect width="16" height="20" x="4" y="2" rx="2"/><circle cx="12" cy="14" r="4"/><line x1="12" x2="12.01" y1="6" y2="6"/>',
          CheckCircle2: '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
          Key: '<path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/>',
          Trash2: '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
          Banknote: '<rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/>',
          Plus: '<line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/>',
          X: '<line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/>',
          Pencil: '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
          Users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
          FileText: '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>'
        };

        const Icon = ({ name, size = 24, strokeWidth = 2, className = "", onClick }) => {
            return React.createElement('svg', {
                xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: strokeWidth, strokeLinecap: "round", strokeLinejoin: "round",
                className: className, onClick: onClick, dangerouslySetInnerHTML: { __html: ICONS[name] }
            });
        };

        function Modal({ data, onClose }) {
            if (!data) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-xl transition-opacity">
                    <div className="bg-white/95 backdrop-blur-2xl rounded-[14px] p-6 w-full max-w-sm shadow-2xl animate-scale-in border border-white/50">
                        <div className="text-center mb-6">
                            <h3 className="font-semibold text-[17px] mb-2 text-black leading-snug">{data.title}</h3>
                            <p className="text-[#3C3C4399] text-[13px] leading-relaxed whitespace-pre-wrap">{data.message}</p>
                        </div>
                        <div className="flex flex-col gap-2">
                            <button onClick={data.onConfirm} className={`w-full py-3.5 rounded-[12px] font-semibold text-[17px] active:opacity-70 transition-opacity ${data.danger ? 'bg-[#FF3B30] text-white' : 'bg-[#007AFF] text-white'}`}>
                                {data.confirmText || 'OK'}
                            </button>
                            {data.type === 'confirm' && (
                                <button onClick={data.onCancel} className="w-full py-3.5 rounded-[12px] bg-[#F2F2F7] text-[#007AFF] font-semibold text-[17px] active:opacity-70 transition-opacity">
                                    Abbrechen
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function TrackingOverlay({ event, currentUser, currentFamily, onClose, onResend }) {
            if (!event) return null;
            const [cooldown, setCooldown] = useState(60);

            useEffect(() => {
                const start = Date.now();
                const timer = setInterval(() => {
                    const passed = Math.floor((Date.now() - start) / 1000);
                    if (passed >= 60) setCooldown(0);
                    else setCooldown(60 - passed);
                }, 1000);
                return () => clearInterval(timer);
            }, [event.id]);

            return (
                <div className="fixed inset-0 z-[90] flex items-end justify-center bg-black/40 backdrop-blur-md animate-fade-in md:items-center">
                    <div className="bg-[#F2F2F7] w-full md:max-w-md md:rounded-[24px] rounded-t-[24px] p-6 pb-safe shadow-2xl animate-scale-in max-h-[85vh] overflow-y-auto scroll-smooth">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-[22px] font-bold tracking-tight">Ruf Status</h2>
                            <button onClick={onClose} className="w-8 h-8 bg-gray-200/60 rounded-full flex items-center justify-center text-gray-500 active:opacity-70"><Icon name="X" size={18}/></button>
                        </div>
                        <p className="text-[#3C3C4399] mb-6 font-medium bg-white p-4 rounded-[16px] text-[15px] shadow-sm border border-[#E5E5EA]">"{event.reason}"</p>
                        
                        <div className="space-y-3">
                            {event.targets.map(targetName => {
                                const hasAck = event.acknowledgedBy?.includes(targetName);
                                const targetMember = currentFamily.members.find(m => m.name === targetName);
                                const isDND = targetMember?.dndUntil && new Date(targetMember.dndUntil) > new Date();

                                return (
                                    <div key={targetName} className="flex items-center justify-between bg-white border border-[#E5E5EA] p-4 rounded-[16px] shadow-[0_1px_3px_rgba(0,0,0,0.02)]">
                                        <div className="flex items-center gap-3">
                                            {hasAck ? <Icon name="CheckCircle2" className="text-[#34C759]" /> : isDND ? <Icon name="BellOff" className="text-[#FF9500]" /> : <div className="w-6 h-6 rounded-full border-2 border-gray-200 animate-pulse" />}
                                            <div>
                                                <p className="font-semibold text-[17px]">{targetName}</p>
                                                <p className="text-[13px] font-normal text-[#3C3C4399]">{hasAck ? 'Hat bestätigt!' : isDND ? 'Bitte nicht stören aktiv' : 'Wartet auf Antwort...'}</p>
                                            </div>
                                        </div>
                                        {!hasAck && !isDND && (
                                            <button 
                                                disabled={cooldown > 0}
                                                onClick={() => { setCooldown(60); onResend(targetName, event.reason); }}
                                                className={`text-[13px] font-semibold px-4 py-2 rounded-full transition-all ${cooldown > 0 ? 'bg-[#F2F2F7] text-gray-400' : 'bg-[#007AFF]/10 text-[#007AFF] active:opacity-70'}`}
                                            >
                                                {cooldown > 0 ? `${cooldown}s` : 'Nochmal'}
                                            </button>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        <button onClick={onClose} className="w-full mt-8 py-3.5 bg-white font-semibold text-[17px] text-[#007AFF] rounded-[14px] active:opacity-70 shadow-sm border border-[#E5E5EA]">Schließen</button>
                    </div>
                </div>
            );
        }

        function ConfigLoader({ onConfigLoaded }) {
            const [error, setError] = useState("");
            
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        const firebaseData = parsed.firebaseConfig || parsed;
                        
                        if (!firebaseData || !firebaseData.apiKey) {
                            throw new Error("Ungültige JSON-Datei. Firebase 'apiKey' fehlt.");
                        }
                        
                        localStorage.setItem('firebaseConfig', JSON.stringify(firebaseData));
                        onConfigLoaded(firebaseData);
                    } catch (err) { 
                        setError("Fehler: " + err.message); 
                    }
                };
                reader.onerror = () => setError("Fehler beim Lesen der Datei.");
                reader.readAsText(file);
            };

            return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-8 bg-black text-white w-full absolute inset-0 z-50">
                    <div className="w-full max-w-sm text-center space-y-8">
                        <Icon name="ShieldCheck" size={96} strokeWidth={1.5} className="text-[#007AFF] mx-auto" />
                        <div>
                          <h1 className="text-[34px] font-bold tracking-tight mb-2">System Setup</h1>
                          <p className="text-gray-400 text-[15px] leading-relaxed px-4">Bitte lade deine <span className="font-mono text-[#007AFF]">config.json</span> hoch. Die Daten werden sicher lokal gespeichert.</p>
                        </div>
                        {error && <p className="text-[#FF3B30] text-[13px] font-semibold bg-[#FF3B30]/10 p-3 rounded-[10px] border border-[#FF3B30]/20">{error}</p>}
                        
                        <label className="inline-flex items-center justify-center w-full bg-[#007AFF] text-white py-4 rounded-[14px] font-semibold text-[17px] active:opacity-80 transition-opacity cursor-pointer">
                            Konfiguration laden
                            <input type="file" accept=".json" onChange={handleFileUpload} onClick={(e) => { e.target.value = null; }} />
                        </label>
                    </div>
                </div>
            );
        }

        const LiquidTabBar = ({ activeTab, setActiveTab, isKeyboardOpen }) => {
          const tabs = [
            { id: 'home', icon: 'Bell' },
            { id: 'history', icon: 'Clock' },
            { id: 'expenses', icon: 'Banknote' },
            { id: 'settings', icon: 'Settings' }
          ];

          const activeIndex = tabs.findIndex(t => t.id === activeTab);

          return (
            <div 
              className={`absolute bottom-8 left-0 right-0 flex justify-center z-50 pointer-events-none px-4 transition-all duration-400 ease-out ${isKeyboardOpen ? 'translate-y-32 opacity-0' : 'translate-y-0 opacity-100'}`}
              style={{ paddingBottom: 'env(safe-area-inset-bottom, 0px)' }}
            >
              <div className="pointer-events-auto bg-white/80 ios-blur shadow-[0_8px_30px_rgba(0,0,0,0.12)] border border-gray-200/50 rounded-full p-1.5 flex items-center justify-between w-full max-w-[280px] md:max-w-[360px] relative h-[60px]">
                <div 
                  className="absolute inset-y-1.5 left-1.5 flex justify-center transition-transform duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] pointer-events-none"
                  style={{ width: 'calc((100% - 12px) / 4)', transform: `translateX(${activeIndex * 100}%)` }}
                >
                  <div className="w-12 md:w-14 h-full bg-[#007AFF]/15 rounded-full"></div>
                </div>
                
                {tabs.map((tab) => {
                  const isActive = activeTab === tab.id;
                  return (
                    <button 
                      key={tab.id}
                      onClick={() => {
                        if(navigator.vibrate) navigator.vibrate(10);
                        setActiveTab(tab.id);
                      }}
                      className="flex-1 relative z-10 flex items-center justify-center h-full active:opacity-60 transition-opacity"
                    >
                      <Icon 
                        name={tab.icon}
                        size={isActive ? 24 : 22} 
                        strokeWidth={isActive ? 2.5 : 2}
                        className={`transition-colors duration-300 ${isActive ? 'text-[#007AFF]' : 'text-[#8E8E93]'}`} 
                      />
                    </button>
                  );
                })}
              </div>
            </div>
          );
        };

        function App() {
          const [appLoaded, setAppLoaded] = useState(false);
          const [firebaseUser, setFirebaseUser] = useState(null);
          
          const [localFamilyId, setLocalFamilyId] = useState(() => localStorage.getItem('familyId'));
          const [localUserName, setLocalUserName] = useState(() => localStorage.getItem('userName'));

          const [currentFamily, setCurrentFamily] = useState(null);
          const [currentUser, setCurrentUser] = useState(null);
          const [modal, setModal] = useState(null);
          const [isKeyboardOpen, setIsKeyboardOpen] = useState(false);
          const [trackingEventId, setTrackingEventId] = useState(null);
          
          // --- Admin / Auth States ---
          const [authMode, setAuthMode] = useState('login'); // 'login', 'join', 'admin'
          const [isAdminMode, setIsAdminMode] = useState(false); // Zeigt das Admin Dashboard
          const [adminFamilies, setAdminFamilies] = useState([]);
          const [newFamilyName, setNewFamilyName] = useState('');
          const [newMemberNames, setNewMemberNames] = useState({});

          const [formInput, setFormInput] = useState({ familyId: '', familyName: '', name: '', password: '' });
          const [authError, setAuthError] = useState('');

          const todayString = new Date().toISOString().split('T')[0];
          const [expenseModal, setExpenseModal] = useState(null); 
          const [expenseForm, setExpenseForm] = useState({ amount: '', reason: '', date: todayString, splitCount: 1, splitTargets: [] });

          const [activeTab, setActiveTab] = useState(() => {
              const params = new URLSearchParams(window.location.search);
              const tab = params.get('tab');
              return ['history', 'expenses'].includes(tab) ? tab : 'home';
          });
          const [selectedReason, setSelectedReason] = useState(null);
          const [selectedMembers, setSelectedMembers] = useState([]);
          const [isSending, setIsSending] = useState(false);
          const [pushStatus, setPushStatus] = useState('Nicht konfiguriert');

          const REASONS = [
            { id: 'breakfast', label: 'Frühstück', sentence: 'Das Frühstück ist fertig!', icon: 'Coffee', category: 'meal' },
            { id: 'lunch', label: 'Mittagessen', sentence: 'Das Mittagessen ist fertig!', icon: 'Utensils', category: 'meal' },
            { id: 'coffee', label: 'Kaffee', sentence: 'Es gibt Kaffee und Kuchen!', icon: 'UtensilsCrossed', category: 'meal' },
            { id: 'dinner', label: 'Abendessen', sentence: 'Das Abendessen ist fertig!', icon: 'Moon', category: 'meal' },
            { id: 'table', label: 'Tischdecken', sentence: 'Hilfe beim Tischdecken wird benötigt!', icon: 'Utensils', category: 'push_only' },
            { id: 'message', label: 'Kommen', sentence: 'Bitte komm kurz zu mir!', icon: 'MessageCircle', category: 'other' },
            { id: 'movie', label: 'Film', sentence: 'Der Film fängt gleich an!', icon: 'Film', category: 'other' },
            { id: 'game', label: 'Spielen', sentence: 'Wir wollen spielen, komm dazu!', icon: 'Gamepad2', category: 'other' },
          ];

          const showConfirm = (title, message, onConfirm, danger = false) => setModal({ type: 'confirm', title, message, danger, onConfirm: () => { onConfirm(); setModal(null); }, onCancel: () => setModal(null) });
          const showAlert = (title, message) => setModal({ type: 'alert', title, message, onConfirm: () => setModal(null) });

          useEffect(() => {
            const handleFocusIn = (e) => { if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') setIsKeyboardOpen(true); };
            const handleFocusOut = () => setIsKeyboardOpen(false);
            window.addEventListener('focusin', handleFocusIn); window.addEventListener('focusout', handleFocusOut);
            return () => { window.removeEventListener('focusin', handleFocusIn); window.removeEventListener('focusout', handleFocusOut); };
          }, []);

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else { await auth.signInAnonymously(); }
              } catch (error) { console.error("Auth error:", error); }
            };
            initAuth();

            const unsubscribe = auth.onAuthStateChanged(async (u) => {
              setFirebaseUser(u);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!firebaseUser || !localFamilyId || !localUserName) {
                if (firebaseUser && !isAdminMode) setAppLoaded(true);
                return;
            }

            const unsubscribe = getFamilyDocRef(localFamilyId).onSnapshot((docSnap) => {
              if (docSnap.exists) {
                const data = docSnap.data();
                const updatedUser = data.members.find(m => m.name === localUserName);
                
                if (!updatedUser || updatedUser.status === 'pending') {
                    alert("Dein Account wurde vom Administrator aus der Familie entfernt.");
                    handleLogout(); return;
                }

                if (!data.expenses) data.expenses = [];
                setCurrentFamily(data);
                setCurrentUser(updatedUser);
                if (updatedUser.fcmToken) setPushStatus('Aktiviert ✅');
                setAppLoaded(true);
              } else {
                alert("Diese Familie wurde aufgelöst.");
                handleLogout();
              }
            });
            return () => unsubscribe();
          }, [firebaseUser, localFamilyId, localUserName, isAdminMode]);

          // --- Admin Listener ---
          useEffect(() => {
              if (isAdminMode) {
                 const unsub = db.collection(`artifacts/${appId}/public/data/families`).onSnapshot(snap => {
                     const families = [];
                     snap.forEach(doc => {
                         if (doc.id !== 'admin_setup') families.push(doc.data());
                     });
                     setAdminFamilies(families);
                 });
                 return () => unsub();
              }
          }, [isAdminMode]);

          useEffect(() => {
              if (currentFamily && currentUser && activeTab === 'history') {
                  const latestEvent = currentFamily.history?.[0];
                  if (latestEvent && latestEvent.targets?.includes(currentUser.name) && !latestEvent.acknowledgedBy?.includes(currentUser.name) && latestEvent.sender !== currentUser.name) {
                      const eventAge = Date.now() - new Date(latestEvent.timestamp).getTime();
                      if (eventAge < 3 * 60 * 1000 && !sessionStorage.getItem(`prompted_${latestEvent.id}`)) {
                          sessionStorage.setItem(`prompted_${latestEvent.id}`, 'true');
                          showConfirm(`Ruf von ${latestEvent.sender}`, `${latestEvent.reason}\n\nMöchtest du direkt bestätigen, dass du kommst?`, () => handleAcknowledge(latestEvent.id));
                      }
                  }
              }
          }, [currentFamily, currentUser, activeTab]);

          useEffect(() => {
              if (messaging) {
                  try {
                      const unsub = messaging.onMessage((payload) => {
                          if(navigator.vibrate) navigator.vibrate([50, 100, 50]);
                          showAlert(payload.notification?.title || "Neue Benachrichtigung", payload.notification?.body || "");
                      });
                      return () => unsub();
                  } catch(e) { console.warn("Meldungs-Listener Fehler:", e); }
              }
          }, []);

          // --- Admin Auth ---
          const handleAdminAuth = async () => {
              setAuthError('');
              if (!formInput.password) return setAuthError('Bitte Passwort eingeben.');
              
              try {
                  const adminDocRef = getFamilyDocRef('admin_setup');
                  const docSnap = await adminDocRef.get();
                  
                  if (!docSnap.exists) {
                      await adminDocRef.set({ isAdminDoc: true, password: formInput.password.trim() });
                      setIsAdminMode(true);
                  } else {
                      if (docSnap.data().password === formInput.password.trim()) {
                          setIsAdminMode(true);
                      } else {
                          setAuthError('Falsches Master-Passwort.');
                      }
                  }
              } catch (e) { setAuthError('Fehler beim Admin-Login.'); }
          };

          const handleJoinFamily = async () => {
            setAuthError('');
            if (!formInput.familyId || !formInput.name || !formInput.password) return setAuthError('Bitte alle Felder ausfüllen.');
            try {
              const docSnap = await getFamilyDocRef(formInput.familyId).get();
              if (!docSnap.exists) return setAuthError('Familie nicht gefunden.');
              const data = docSnap.data();
              
              const memberIndex = data.members.findIndex(m => m.name.toLowerCase() === formInput.name.trim().toLowerCase());
              
              if (memberIndex === -1) {
                  return setAuthError('Dieser Name wurde vom Administrator noch nicht registriert.');
              }
              
              if (data.members[memberIndex].status !== 'pending') {
                  return setAuthError('Dieser Account ist bereits aktiv. Bitte nutze "Anmelden".');
              }
              
              const updatedMembers = [...data.members];
              updatedMembers[memberIndex] = {
                  ...updatedMembers[memberIndex],
                  password: formInput.password.trim(),
                  status: 'active',
                  fcmToken: '',
                  voiceMonkeyMeal: '',
                  voiceMonkeyOther: '',
                  dndUntil: null
              };
              
              await getFamilyDocRef(formInput.familyId).update({ members: updatedMembers });
              
              localStorage.setItem('familyId', formInput.familyId); 
              localStorage.setItem('userName', updatedMembers[memberIndex].name);
              setLocalFamilyId(formInput.familyId);
              setLocalUserName(updatedMembers[memberIndex].name);
            } catch (err) { setAuthError('Fehler beim Beitreten.'); }
          };

          const handleLogin = async () => {
            setAuthError('');
            if (!formInput.familyId || !formInput.name || !formInput.password) return setAuthError('Familien-ID, Name und Passwort erforderlich.');
            try {
              const docSnap = await getFamilyDocRef(formInput.familyId).get();
              if (!docSnap.exists) return setAuthError('Familie nicht gefunden. Überprüfe die ID.');
              
              const data = docSnap.data();
              const member = data.members.find(m => m.name.toLowerCase() === formInput.name.trim().toLowerCase() && m.password === formInput.password.trim());
              
              if (!member || member.status === 'pending') return setAuthError('Falsches Passwort oder noch nicht beigetreten.');
              
              localStorage.setItem('familyId', data.id); 
              localStorage.setItem('userName', member.name);
              setLocalFamilyId(data.id);
              setLocalUserName(member.name);
            } catch (err) { setAuthError('Fehler bei der Anmeldung.'); }
          };

          const handleLogout = () => { 
              localStorage.removeItem('familyId');
              localStorage.removeItem('userName');
              localStorage.removeItem('firebaseConfig');
              window.location.reload();
          };

          // --- Admin Actions ---
          const adminCreateFamily = async () => {
              if (!newFamilyName.trim()) return showAlert("Fehler", "Bitte Familiennamen eingeben.");
              const newId = generateId();
              const familyData = {
                  id: newId, name: newFamilyName.trim(), vapidKey: '', expenses: [], history: [], members: []
              };
              await getFamilyDocRef(newId).set(familyData);
              setNewFamilyName('');
          };

          const adminDeleteFamily = async (famId) => {
              showConfirm("Familie löschen", "Möchtest du diese Familie und alle Daten endgültig löschen?", async () => {
                  await getFamilyDocRef(famId).delete();
              }, true);
          };

          const adminAddMember = async (fam) => {
              const name = newMemberNames[fam.id];
              if (!name || !name.trim()) return;
              if (fam.members.find(m => m.name.toLowerCase() === name.trim().toLowerCase())) return showAlert("Fehler", "Name existiert bereits.");
              
              const newMember = { name: name.trim(), status: 'pending' };
              await getFamilyDocRef(fam.id).update({ members: [...fam.members, newMember] });
              setNewMemberNames({ ...newMemberNames, [fam.id]: '' });
          };

          const adminDeleteMember = async (famId, memberName) => {
              showConfirm("Mitglied löschen", `Möchtest du ${memberName} aus der Familie entfernen?`, async () => {
                  const fam = adminFamilies.find(f => f.id === famId);
                  const updatedMembers = fam.members.filter(m => m.name !== memberName);
                  await getFamilyDocRef(famId).update({ members: updatedMembers });
              }, true);
          };

          const generatePDF = async (family) => {
              try {
                  const { jsPDF } = window.jspdf;
                  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
                  
                  const appUrl = window.location.origin + window.location.pathname;
                  const qrDataUrl = await QRCode.toDataURL(appUrl, { width: 300, margin: 2, color: { dark: '#007AFF', light: '#FFFFFF' } });

                  doc.setFillColor(242, 242, 247);
                  doc.rect(0, 0, 210, 297, 'F');
                  doc.setFillColor(255, 255, 255);
                  doc.roundedRect(20, 40, 170, 180, 10, 10, 'F');
                  
                  doc.setFont("helvetica", "bold");
                  doc.setTextColor(0, 122, 255);
                  doc.setFontSize(32);
                  doc.text("FamilyConnect", 105, 65, { align: "center" });
                  
                  doc.setTextColor(28, 28, 30);
                  doc.setFontSize(22);
                  doc.text(`Familie: ${family.name}`, 105, 85, { align: "center" });

                  doc.setFont("helvetica", "normal");
                  doc.setFontSize(14);
                  doc.setTextColor(142, 142, 147);
                  doc.text("Scanne den QR-Code, um der App beizutreten:", 105, 105, { align: "center" });
                  doc.addImage(qrDataUrl, 'PNG', 70, 115, 70, 70);

                  doc.setFontSize(14);
                  doc.setTextColor(28, 28, 30);
                  doc.text("Eure Familien-ID lautet:", 105, 200, { align: "center" });

                  doc.setFont("helvetica", "bold");
                  doc.setFontSize(36);
                  doc.setTextColor(0, 122, 255);
                  doc.text(family.id, 105, 215, { align: "center" });

                  doc.setFont("helvetica", "normal");
                  doc.setFontSize(11);
                  doc.setTextColor(142, 142, 147);
                  doc.text("Wichtig: Dein Vorname muss vom Administrator", 105, 260, { align: "center" });
                  doc.text("freigeschaltet sein, bevor du beitreten kannst.", 105, 266, { align: "center" });

                  doc.save(`FamilyConnect_${family.name}_Setup.pdf`);
              } catch (err) {
                  console.error("PDF Error:", err);
                  alert("Fehler beim Generieren der PDF.");
              }
          };

          const requestPushPermission = async () => {
            if (!messaging) return alert("Push wird auf diesem Gerät nicht unterstützt (Safari auf dem Home-Bildschirm speichern!).");
            
            const storedConfig = JSON.parse(localStorage.getItem('firebaseConfig') || '{}');
            const vapidKey = storedConfig.vapidKey || (currentFamily && currentFamily.vapidKey);

            if (!vapidKey || vapidKey.trim() === '') return alert("Kein VAPID-Key hinterlegt! Admin muss diesen im Setup eintragen.");
            
            setPushStatus('Wird angefragt...');
            try {
              const permission = await Notification.requestPermission();
              if (permission === 'granted') {
                  const reg = await navigator.serviceWorker.ready;
                  const token = await messaging.getToken({ vapidKey: vapidKey.trim(), serviceWorkerRegistration: reg });
                  if (token) {
                    const updatedMembers = currentFamily.members.map(m => m.name === currentUser.name ? { ...m, fcmToken: token } : m);
                    await getFamilyDocRef(currentFamily.id).update({ members: updatedMembers });
                    setPushStatus('Aktiviert ✅');
                    if(navigator.vibrate) navigator.vibrate(50);
                    alert("Erfolgreich!");
                  } else setPushStatus('Fehler');
              } else setPushStatus('Abgelehnt ❌');
            } catch (error) { setPushStatus('Fehler'); alert("Kritischer Fehler beim Token-Abruf."); }
          };

          const handleSendNotification = async (customReasonObj = null, customTargets = null) => {
            const reasonObj = customReasonObj || REASONS.find(r => r.id === selectedReason);
            const targetsList = customTargets || selectedMembers;
            if (!reasonObj || targetsList.length === 0) return;
            
            const todayCalls = currentFamily.history.filter(h => h.sender === currentUser.name && new Date(h.timestamp).toDateString() === new Date().toDateString());
            if (todayCalls.length >= 20) return showAlert("Limit erreicht", "Du hast heute bereits 20 Rufe gesendet. Bitte warte bis morgen.");

            setIsSending(true);
            if(navigator.vibrate) navigator.vibrate(10);

            const now = new Date();
            const currentHour = now.getHours();
            const isNightMode = currentHour >= 22 || currentHour < 7;
            
            const actualTargets = [];

            currentFamily.members.forEach(member => {
                if (targetsList.includes(member.name) && member.status !== 'pending') {
                    const isDND = member.dndUntil && new Date(member.dndUntil) > now;
                    if (!isDND) {
                        actualTargets.push(member.name);
                        if (!isNightMode && reasonObj.category !== 'push_only') {
                            const url = reasonObj.category === 'meal' ? member.voiceMonkeyMeal : member.voiceMonkeyOther;
                            if (url && url.trim() !== '') fetch(url).catch(e => {});
                        }
                    }
                }
            });

            const newHistoryItem = {
              id: Date.now().toString(),
              timestamp: now.toISOString(),
              sender: currentUser.name,
              reason: reasonObj.sentence, 
              targets: actualTargets,
              acknowledgedBy: [],
              isExpense: false
            };

            try {
              await getFamilyDocRef(currentFamily.id).update({ history: [newHistoryItem, ...(currentFamily.history || [])].slice(0, 50) });
              if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
              
              if (!customReasonObj && reasonObj.category !== 'push_only') {
                  setTrackingEventId(newHistoryItem.id);
              }
              
              setSelectedReason(null); setSelectedMembers([]); 
              if (activeTab === 'home' && reasonObj.category === 'push_only') setActiveTab('history');
            } catch (err) { console.error("History err:", err); }

            setTimeout(() => setIsSending(false), 800);
          };

          const handleAcknowledge = async (historyItemId) => {
            if(navigator.vibrate) navigator.vibrate([20, 30]);
            const updatedHistory = currentFamily.history.map(item => {
              if (item.id === historyItemId && !item.acknowledgedBy.includes(currentUser.name)) {
                   return { ...item, acknowledgedBy: [...(item.acknowledgedBy || []), currentUser.name] };
              }
              return item;
            });
            await getFamilyDocRef(currentFamily.id).update({ history: updatedHistory });
          };

          const handleAddExpense = async () => {
              if (!expenseForm.amount || !expenseForm.reason) return showAlert("Fehler", "Bitte Betrag und Grund angeben.");
              const amountNum = parseFloat(expenseForm.amount.replace(',', '.'));
              if (isNaN(amountNum) || amountNum <= 0) return showAlert("Fehler", "Ungültiger Betrag.");

              let newExpenses = [...(currentFamily.expenses || [])];
              let historyPushes = [];

              if (expenseModal.mode === 'edit') {
                  newExpenses = newExpenses.map(e => e.id === expenseModal.expense.id ? {
                      ...e, amount: amountNum.toFixed(2), reason: expenseForm.reason, date: expenseForm.date
                  } : e);
              } else if (expenseModal.mode === 'single') {
                  const newExp = {
                      id: generateId(), creditor: currentUser.name, debtor: expenseModal.target,
                      amount: amountNum.toFixed(2), reason: expenseForm.reason, date: expenseForm.date, timestamp: new Date().toISOString(), isPaid: false
                  };
                  newExpenses.unshift(newExp);
                  historyPushes.push({
                      id: generateId(), timestamp: new Date().toISOString(), sender: currentUser.name,
                      reason: `Neue Auslage: ${expenseForm.reason} (${amountNum.toFixed(2)}€)`, targets: [expenseModal.target], acknowledgedBy: [], isExpense: true
                  });
              } else if (expenseModal.mode === 'split') {
                  const splitCount = parseInt(expenseForm.splitCount);
                  if (splitCount < 1 || expenseForm.splitTargets.length === 0) return showAlert("Fehler", "Bitte gib die Anzahl der Personen ein und wähle mindestens eine Person aus.");
                  const perPerson = (amountNum / splitCount).toFixed(2);

                  expenseForm.splitTargets.forEach(target => {
                      const newExp = {
                          id: generateId(), creditor: currentUser.name, debtor: target,
                          amount: perPerson, reason: `${expenseForm.reason} (Anteilig)`, date: expenseForm.date, timestamp: new Date().toISOString(), isPaid: false
                      };
                      newExpenses.unshift(newExp);
                      historyPushes.push({
                          id: generateId(), timestamp: new Date().toISOString(), sender: currentUser.name,
                          reason: `Neue geteilte Auslage: ${expenseForm.reason} (${perPerson}€)`, targets: [target], acknowledgedBy: [], isExpense: true
                      });
                  });
              }

              try {
                  await getFamilyDocRef(currentFamily.id).update({ expenses: newExpenses });
                  if (historyPushes.length > 0) {
                      await getFamilyDocRef(currentFamily.id).update({ history: [...historyPushes, ...(currentFamily.history || [])].slice(0, 50) });
                  }
                  setExpenseModal(null);
              } catch (e) { showAlert("Fehler", "Konnte nicht gespeichert werden."); }
          };

          const handleMarkExpensePaid = async (expId) => {
              const updatedExpenses = currentFamily.expenses.map(e => e.id === expId ? { ...e, isPaid: true } : e);
              await getFamilyDocRef(currentFamily.id).update({ expenses: updatedExpenses });
          };

          const handleDeleteExpense = async (expId) => {
              const updatedExpenses = currentFamily.expenses.filter(e => e.id !== expId);
              await getFamilyDocRef(currentFamily.id).update({ expenses: updatedExpenses });
          };

          const setDND = async (hours) => {
              let dndTime = null;
              if (hours > 0) {
                  const dndDate = new Date();
                  dndDate.setHours(dndDate.getHours() + hours);
                  dndTime = dndDate.toISOString();
              }
              const updatedMembers = currentFamily.members.map(m => m.name === currentUser.name ? { ...m, dndUntil: dndTime } : m);
              await getFamilyDocRef(currentFamily.id).update({ members: updatedMembers });
          };

          const handleClearHistory = () => {
            showConfirm("Verlauf leeren", "Möchtest du den gesamten Verlauf für alle dauerhaft löschen?", async () => {
                await getFamilyDocRef(currentFamily.id).update({ history: [] });
            }, true);
          };

          const saveSettings = async (key, value) => {
            const updatedMembers = currentFamily.members.map(m => m.name === currentUser.name ? { ...m, [key]: value.trim() } : m);
            await getFamilyDocRef(currentFamily.id).update({ members: updatedMembers });
          };
          
          const saveAdminSettings = async (key, value) => await getFamilyDocRef(currentFamily.id).update({ [key]: value.trim() });

          // --- Views ---
          if (!appLoaded) {
              return (
                  <div className="h-[100dvh] bg-[#000000] flex flex-col items-center justify-center relative w-full absolute inset-0 z-50">
                     <Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                  </div>
              );
          }

          // ADMIN DASHBOARD VIEW
          if (isAdminMode) {
              return (
                  <div className="min-h-[100dvh] bg-[#F2F2F7] font-sans flex flex-col w-full absolute inset-0 z-50 overflow-y-auto scroll-smooth pb-20">
                      <Modal data={modal} onClose={() => setModal(null)} />
                      
                      <header className="bg-white px-6 pt-14 pb-4 border-b border-[#E5E5EA] sticky top-0 z-40 flex justify-between items-end">
                          <h1 className="text-[28px] font-extrabold text-black tracking-tight leading-none">Admin-Dashboard</h1>
                          <button onClick={() => setIsAdminMode(false)} className="text-[#FF3B30] font-semibold active:opacity-70">Logout</button>
                      </header>

                      <div className="p-6 max-w-4xl mx-auto w-full space-y-8">
                          <section className="bg-white rounded-[20px] p-6 shadow-sm border border-[#E5E5EA]">
                              <h2 className="text-[18px] font-bold mb-4">Neue Familie anlegen</h2>
                              <div className="flex gap-3">
                                  <input type="text" placeholder="Name der Familie" className="flex-1 bg-[#F2F2F7] px-4 py-3.5 rounded-[12px] outline-none font-medium focus:ring-2 ring-[#007AFF]/20" value={newFamilyName} onChange={e => setNewFamilyName(e.target.value)} />
                                  <button onClick={adminCreateFamily} className="bg-[#007AFF] text-white px-6 py-3.5 rounded-[12px] font-semibold active:opacity-80">Erstellen</button>
                              </div>
                          </section>

                          <div className="space-y-6">
                              {adminFamilies.map(fam => (
                                  <div key={fam.id} className="bg-white rounded-[24px] shadow-sm border border-[#E5E5EA] overflow-hidden">
                                      <div className="p-5 bg-[#F9F9F9] border-b border-[#E5E5EA] flex justify-between items-center">
                                          <div>
                                              <h3 className="font-bold text-[20px]">{fam.name}</h3>
                                              <p className="text-[#8E8E93] text-[13px] font-mono mt-1">ID: {fam.id}</p>
                                          </div>
                                          <div className="flex gap-2">
                                              <button onClick={() => generatePDF(fam)} className="bg-[#007AFF]/10 text-[#007AFF] px-4 py-2 rounded-full text-[13px] font-semibold active:opacity-70 flex items-center gap-1.5">
                                                  <Icon name="FileText" size={14} /> PDF Info-Blatt
                                              </button>
                                              <button onClick={() => adminDeleteFamily(fam.id)} className="bg-[#FF3B30]/10 text-[#FF3B30] w-8 h-8 rounded-full flex items-center justify-center active:opacity-70">
                                                  <Icon name="Trash2" size={14} />
                                              </button>
                                          </div>
                                      </div>
                                      
                                      <div className="p-5">
                                          <h4 className="text-[13px] font-semibold text-[#8E8E93] uppercase tracking-widest mb-3">Mitglieder</h4>
                                          <div className="space-y-3 mb-5">
                                              {fam.members.length === 0 && <p className="text-[#8E8E93] text-sm">Keine Mitglieder.</p>}
                                              {fam.members.map(m => (
                                                  <div key={m.name} className="flex justify-between items-center p-3.5 bg-[#F2F2F7] rounded-[14px]">
                                                      <div className="flex items-center gap-3">
                                                          <span className="font-semibold text-[16px]">{m.name}</span>
                                                          {m.status === 'pending' ? 
                                                              <span className="bg-[#FF9500]/20 text-[#FF9500] text-[11px] font-bold px-2 py-0.5 rounded-md uppercase">Ausstehend</span> : 
                                                              <span className="bg-[#34C759]/20 text-[#34C759] text-[11px] font-bold px-2 py-0.5 rounded-md uppercase">Aktiv</span>
                                                          }
                                                      </div>
                                                      <button onClick={() => adminDeleteMember(fam.id, m.name)} className="text-[#FF3B30] active:opacity-70"><Icon name="Trash2" size={16} /></button>
                                                  </div>
                                              ))}
                                          </div>
                                          
                                          <div className="flex gap-3">
                                              <input type="text" placeholder="Neuer Vorname" className="flex-1 bg-white border border-[#E5E5EA] px-4 py-3 rounded-[12px] outline-none font-medium focus:border-[#007AFF]" value={newMemberNames[fam.id] || ''} onChange={e => setNewMemberNames({...newMemberNames, [fam.id]: e.target.value})} />
                                              <button onClick={() => adminAddMember(fam)} className="bg-[#007AFF] text-white px-5 py-3 rounded-[12px] font-semibold active:opacity-80">Registrieren</button>
                                          </div>
                                      </div>
                                  </div>
                              ))}
                          </div>
                      </div>
                  </div>
              );
          }

          if (!currentFamily || !currentUser) {
            // Full-screen Login/Setup (Keine weißen Ränder mehr auf Mac)
            return (
              <div className="min-h-[100dvh] bg-[#000000] text-white flex flex-col items-center justify-center p-6 font-sans relative w-full overflow-hidden absolute inset-0 z-40">
                <div className="absolute top-[-10%] left-[-10%] w-[50vw] max-w-[400px] h-[50vw] max-h-[400px] rounded-full bg-[#007AFF] blur-[100px] opacity-20 pointer-events-none"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] max-w-[400px] h-[50vw] max-h-[400px] rounded-full bg-[#5856D6] blur-[100px] opacity-20 pointer-events-none"></div>

                <div className="bg-white/10 backdrop-blur-3xl border border-white/20 p-8 rounded-[32px] shadow-2xl w-full max-w-sm relative z-10">
                  <div className="flex justify-center mb-6">
                    <div className="w-20 h-20 bg-gradient-to-tr from-[#007AFF] to-[#5856D6] rounded-2xl flex items-center justify-center shadow-lg">
                      <Icon name="ShieldCheck" size={40} className="text-white" />
                    </div>
                  </div>
                  <h1 className="text-[34px] font-bold text-center mb-8 tracking-tight">FamilyConnect</h1>
                  
                  <div className="flex bg-black/40 p-1 rounded-xl mb-8 backdrop-blur-md border border-white/10">
                    {['login', 'join', 'admin'].map((mode) => (
                      <button key={mode} className={`flex-1 py-2 text-[15px] font-semibold rounded-[8px] transition-all duration-300 ${authMode === mode ? 'bg-white/20 text-white shadow-sm' : 'text-[#8E8E93] active:opacity-70'}`} onClick={() => { if(navigator.vibrate) navigator.vibrate(10); setAuthMode(mode); setAuthError(''); }}>
                        {mode === 'login' ? 'Anmelden' : mode === 'join' ? 'Beitreten' : 'Admin'}
                      </button>
                    ))}
                  </div>

                  <div className="space-y-3">
                    {authMode === 'admin' ? (
                        <>
                            <input type="password" placeholder="Admin Master-Passwort" className="w-full bg-white/10 border border-white/10 px-4 py-3.5 rounded-xl outline-none focus:bg-white/20 text-white placeholder-gray-400 font-medium text-[17px] transition-colors" value={formInput.password} onChange={e => setFormInput({...formInput, password: e.target.value})} />
                            {authError && <p className="text-[#FF3B30] text-[13px] text-center font-semibold mt-2">{authError}</p>}

                    <div className="text-center w-full">

                        {activeTab === 'history' && 'Verlauf'}

                    </div>
                    {activeTab === 'history' && currentFamily.history?.length > 0 && (

                                    const expensesWithThem = (currentFamily.expenses || []).filter(e => !e.isPaid && ((e.creditor === currentUser.name && e.debtor === member.name) || (e.creditor === member.name && e.debtor === currentUser.name)));

                                    const net = theyOwe - iOwe;

                                          <button onClick={() => setDND(1)} className="bg-[#F2F2F7] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px] active:opacity-70">1 Std</button>
                                          <button onClick={() => setDND(8)} className="bg-[#F2F2F7] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px] active:opacity-70">8 Std</button>
                                          <button onClick={() => setDND(24)} className="bg-[#F2F2F7] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px] active:opacity-70">24 Std</button>
                                      </div>
                                      <p className="text-[12px] text-[#8E8E93] text-center">Hinweis: Die Alexa bleibt von 22 bis 7 Uhr automatisch immer stumm.</p>
                                  </div>
                              )}
                          </div>
                        </section>

                        <section>
                          <h2 className="text-[13px] font-semibold text-[#8E8E93] uppercase tracking-widest mb-2 ml-2">Geräte Setup</h2>
                          <div className="bg-white rounded-[20px] overflow-hidden shadow-[0_1px_3px_rgba(0,0,0,0.02)] border border-[#E5E5EA]">
                            <div className="p-4 border-b border-[#E5E5EA] flex items-center justify-between">
                              <div className="flex items-center space-x-3">
                                <div className="bg-[#007AFF]/10 p-2.5 rounded-[12px]"><Icon name="Smartphone" size={20} className="text-[#007AFF]"/></div>
                                <div>
                                  <p className="font-semibold text-[16px]">Apple Push</p>
                                  <p className="text-[13px] text-[#8E8E93] font-normal">Status: <span className={currentUser.fcmToken ? "text-[#34C759] font-medium" : "text-[#FF9500] font-medium"}>{pushStatus}</span></p>
                                </div>
                              </div>
                              <button onClick={requestPushPermission} className="bg-[#007AFF]/10 text-[#007AFF] text-[14px] font-semibold px-4 py-2 rounded-full active:opacity-70 transition-opacity">
                                {currentUser.fcmToken ? 'Erneuern' : 'Aktivieren'}
                              </button>
                            </div>
                            
                            <div className="p-4 space-y-4">
                              <div className="flex items-center space-x-3 mb-2">
                                <div className="bg-[#AF52DE]/10 p-2.5 rounded-[12px]"><Icon name="Speaker" size={20} className="text-[#AF52DE]"/></div>
                                <p className="font-semibold text-[16px]">Alexa Voice Monkey Links</p>
                              </div>
                              
                              <div>
                                 <p className="text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Für Mahlzeiten</p>
                                 <input type="text" placeholder="https://api.voicemonkey.io/trigger..." 
                                        className="w-full bg-[#F2F2F7] px-4 py-3 rounded-[12px] text-[15px] font-normal outline-none focus:ring-2 ring-[#007AFF]/20 transition-all" 
                                        defaultValue={currentUser.voiceMonkeyMeal} 
                                        onBlur={(e) => saveSettings('voiceMonkeyMeal', e.target.value)} />
                              </div>

                              <div>
                                 <p className="text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Für Aktivitäten</p>
                                 <input type="text" placeholder="https://api.voicemonkey.io/trigger..." 
                                        className="w-full bg-[#F2F2F7] px-4 py-3 rounded-[12px] text-[15px] font-normal outline-none focus:ring-2 ring-[#007AFF]/20 transition-all" 
                                        defaultValue={currentUser.voiceMonkeyOther} 
                                        onBlur={(e) => saveSettings('voiceMonkeyOther', e.target.value)} />
                              </div>
                            </div>
                          </div>
                        </section>
                        
                        <div className="md:col-span-2 pt-2">
                            <button onClick={handleLogout} className="w-full md:max-w-xs mx-auto py-3.5 bg-white text-[#FF3B30] font-semibold rounded-[14px] shadow-sm flex items-center justify-center space-x-2 active:opacity-70 transition-opacity border border-[#E5E5EA]">
                              <Icon name="LogOut" size={20} />
                              <span className="text-[17px]">App & Gerät abmelden</span>
                            </button>
                        </div>
                      </div>
                    )}

                    </div>
                  </main>
              </div>

              <LiquidTabBar activeTab={activeTab} setActiveTab={setActiveTab} isKeyboardOpen={isKeyboardOpen} />
            </div>
          );
        }

        function Root() {
            const [config, setConfig] = useState(() => {
                if (typeof __firebase_config !== 'undefined') return JSON.parse(__firebase_config);
                const saved = localStorage.getItem('firebaseConfig');
                return saved ? JSON.parse(saved) : null;
            });
            const [status, setStatus] = useState("booting"); 
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                if (!config) return setStatus("config-needed");
                setStatus("booting");
                try {
                    if (!firebase.apps.length) app = firebase.initializeApp(config);
                    else app = firebase.app();
                    
                    if (RECAPTCHA_SITE_KEY && RECAPTCHA_SITE_KEY !== "DEIN_SCHLUESSEL_HIER_EINFUEGEN") {
                        try { firebase.appCheck().activate(RECAPTCHA_SITE_KEY, true); } catch (e) {}
                    }
                    db = firebase.firestore();
                    auth = firebase.auth();
                    setStatus("ready");
                } catch (e) {
                    setErrorMsg("Verbindungsfehler: " + e.message);
                    setStatus("error");
                }
            }, [config]);

            if (status === "config-needed") return <ConfigLoader onConfigLoaded={setConfig} />;
            
            if (status === "error") {
                return (
                    <div className="h-[100dvh] w-full bg-black text-white flex flex-col items-center justify-center p-8 text-center relative mx-auto absolute inset-0 z-50">
                        <Icon name="ShieldCheck" size={64} className="text-[#FF3B30] mb-4" />
                        <h2 className="text-xl font-semibold mb-2">Systemfehler</h2>
                        <p className="text-[#FF3B30] text-[15px] mb-8 font-mono bg-[#FF3B30]/10 p-4 rounded-xl border border-[#FF3B30]/20">{errorMsg}</p>
                        <button onClick={() => { localStorage.removeItem('firebaseConfig'); setConfig(null); setStatus("config-needed"); }} className="bg-white/10 px-6 py-3.5 rounded-[14px] font-semibold text-[17px] active:opacity-70 transition-opacity">
                            Neue Config laden
                        </button>
                    </div>
                );
            }

            if (status === "booting") {
                return (
                   <div className="h-[100dvh] w-full bg-[#000000] flex flex-col items-center justify-center relative mx-auto absolute inset-0 z-50">
                      <Icon name="ShieldCheck" size={64} strokeWidth={1.5} className="text-[#007AFF] animate-pulse mb-4" />
                   </div>
                );
            }
            return <App />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
