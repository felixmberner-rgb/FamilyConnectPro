<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Connect Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F2F2F7; }
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .liquid-pill { transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 44px); }
        .toggle-dot { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.96); }
        input[type="file"] { display: none; }
        
        /* Modal Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-scale-in { animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    </style>
</head>
<body class="text-black antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        let db = null;
        let auth = null;
        let messaging = null;

        const { useState, useEffect } = React;

        // Custom Modal UI Component
        function Modal({ data, onClose }) {
            if (!data) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-[28px] p-6 w-full max-w-sm shadow-2xl animate-scale-in">
                        <div className="text-center mb-6">
                            <h3 className="font-bold text-xl mb-2 text-black">{data.title}</h3>
                            <p className="text-gray-500 text-[15px] leading-relaxed">{data.message}</p>
                        </div>
                        <div className="flex gap-3">
                            {data.type === 'confirm' && (
                                <button onClick={data.onCancel} className="flex-1 py-3.5 rounded-xl bg-[#F2F2F7] text-black font-bold active:scale-95 transition-transform">
                                    Abbrechen
                                </button>
                            )}
                            <button onClick={data.onConfirm} className={`flex-1 py-3.5 rounded-xl font-bold active:scale-95 transition-transform ${data.danger ? 'bg-red-500 text-white' : 'bg-[#007AFF] text-white'}`}>
                                {data.confirmText || 'OK'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function ConfigLoader({ onConfigLoaded }) {
            const [error, setError] = useState("");
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const config = JSON.parse(event.target.result);
                        const firebaseData = config.firebaseConfig ? config.firebaseConfig : config;
                        if (!firebaseData || !firebaseData.apiKey) throw new Error("Ungültiges Dateiformat. apiKey fehlt.");
                        localStorage.setItem('firebaseConfig', JSON.stringify(firebaseData));
                        if(config.vapidKey) localStorage.setItem('vapidKey', config.vapidKey);
                        onConfigLoaded(firebaseData);
                    } catch (err) { setError("Fehler: " + err.message); }
                };
                reader.readAsText(file);
            };

            return (
                <div className="h-screen flex flex-col items-center justify-center p-8 bg-black text-white">
                    <div className="w-full max-w-sm text-center space-y-6 animate-in fade-in duration-1000">
                        <svg xmlns="http://www.w3.org/2000/svg" className="w-24 h-24 text-blue-500 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <h1 className="text-3xl font-bold tracking-tight">System Setup</h1>
                        <p className="text-gray-400 text-sm leading-relaxed px-4">Bitte lade deine <span className="font-mono text-blue-400">config.json</span> hoch.</p>
                        {error && <p className="text-red-400 text-xs font-semibold">{error}</p>}
                        <label className="inline-block w-full bg-blue-600 py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-xl shadow-blue-600/20 cursor-pointer mt-8">Konfiguration laden<input type="file" accept=".json" onChange={handleFileUpload} /></label>
                    </div>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('auth'); 
            const [activeTab, setActiveTab] = useState('home');
            const [user, setUser] = useState(null);
            const [family, setFamily] = useState(null);
            const [loading, setLoading] = useState(true);
            const [modal, setModal] = useState(null);

            const [authMode, setAuthMode] = useState('login');
            const [form, setForm] = useState({ familyId: '', familyName: '', name: '', password: '' });

            const [selectedReason, setSelectedReason] = useState(null);
            const [selectedMembers, setSelectedMembers] = useState([]);
            const [isSending, setIsSending] = useState(false);

            const reasons = [
                { id: 'breakfast', label: 'Frühstück', icon: 'coffee', color: 'text-orange-500' },
                { id: 'lunch', label: 'Mittagessen', icon: 'utensils', color: 'text-blue-500' },
                { id: 'coffee', label: 'Kaffee & Kuchen', icon: 'utensils-crossed', color: 'text-amber-700' },
                { id: 'dinner', label: 'Abendessen', icon: 'moon', color: 'text-indigo-600' },
                { id: 'play', label: 'Spielen', icon: 'gamepad-2', color: 'text-green-500' },
                { id: 'movie', label: 'Filmabend', icon: 'film', color: 'text-purple-500' },
                { id: 'help', label: 'Hilfe', icon: 'life-buoy', color: 'text-red-500' }
            ];

            // Modal Helpers
            const showAlert = (title, message) => setModal({ type: 'alert', title, message, onConfirm: () => setModal(null) });
            const showConfirm = (title, message, onConfirm, danger = false) => setModal({ 
                type: 'confirm', title, message, danger, 
                onConfirm: () => { onConfirm(); setModal(null); }, 
                onCancel: () => setModal(null) 
            });

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        const savedFamilyId = localStorage.getItem('familyId');
                        const savedName = localStorage.getItem('userName');
                        if (savedFamilyId && savedName) await loadFamilyData(savedFamilyId, savedName);
                        else setLoading(false);
                    } else { setLoading(false); }
                });
                return unsubscribe;
            }, []);

            useEffect(() => { 
                if (window.lucide) {
                    setTimeout(() => window.lucide.createIcons(), 10);
                }
            });

            const loadFamilyData = async (familyId, userName) => {
                try {
                    const doc = await db.collection('families').doc(familyId).get();
                    if (!doc.exists) throw new Error("Familie existiert nicht.");
                    
                    const data = doc.data();
                    const member = data.members.find(m => m.name.trim().toLowerCase() === userName.trim().toLowerCase());
                    
                    if (!member) throw new Error("Benutzername nicht gefunden.");
                    
                    setFamily(data);
                    setUser(member);
                    setView('app');
                    
                    db.collection('families').doc(familyId).onSnapshot(snap => {
                        if (snap.exists) setFamily(snap.data());
                    });
                } catch (e) {
                    showAlert("Ladefehler", e.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleAuth = async () => {
                try {
                    if (!auth.currentUser) await auth.signInAnonymously();
                    
                    const safeName = form.name.trim();
                    const safePassword = form.password.trim();

                    if (authMode === 'create') {
                        if (!form.familyName || !safeName || !safePassword) throw new Error("Alle Felder ausfüllen.");
                        const newId = Math.floor(100000 + Math.random() * 900000).toString();
                        // Der erste Nutzer ist automatisch der Admin
                        const newFamily = { id: newId, name: form.familyName, members: [{ name: safeName, password: safePassword, voiceMonkey: '', fcmToken: '' }], history: [] };
                        
                        await db.collection('families').doc(newId).set(newFamily);
                        localStorage.setItem('familyId', newId);
                        localStorage.setItem('userName', safeName);
                        await loadFamilyData(newId, safeName);
                        
                    } else if (authMode === 'join') {
                        if (!form.familyId || !safeName || !safePassword) throw new Error("Alle Felder ausfüllen.");
                        const doc = await db.collection('families').doc(form.familyId).get();
                        if (!doc.exists) throw new Error('Familie nicht gefunden.');
                        
                        const data = doc.data();
                        if (data.members.find(m => m.name.toLowerCase() === safeName.toLowerCase())) throw new Error('Name bereits vergeben.');
                        
                        // Direkter Read-Modify-Write ist sicherer als arrayUnion für neue User
                        const updatedMembers = [...data.members, { name: safeName, password: safePassword, voiceMonkey: '', fcmToken: '' }];
                        await db.collection('families').doc(form.familyId).update({ members: updatedMembers });
                        
                        localStorage.setItem('familyId', form.familyId);
                        localStorage.setItem('userName', safeName);
                        await loadFamilyData(form.familyId, safeName);
                        
                    } else {
                        if (!safeName || !safePassword) throw new Error("Name und Passwort erforderlich.");
                        const snap = await db.collection('families').get();
                        let found = false;
                        for (let doc of snap.docs) {
                            const d = doc.data();
                            const m = d.members.find(m => m.name.toLowerCase() === safeName.toLowerCase() && m.password === safePassword);
                            if (m) {
                                localStorage.setItem('familyId', d.id);
                                localStorage.setItem('userName', m.name);
                                await loadFamilyData(d.id, m.name);
                                found = true;
                                break;
                            }
                        }
                        if (!found) throw new Error('Anmeldedaten nicht korrekt.');
                    }
                } catch (e) { 
                    showAlert("Fehler", e.message); 
                }
            };

            const requestPushPermission = async () => {
                const vapidKey = localStorage.getItem('vapidKey');
                if (!messaging || !vapidKey) {
                    return showAlert("Hinweis", "Push-Benachrichtigungen werden von diesem Gerät/Browser nicht unterstützt.");
                }

                try {
                    // Apple fragt den Nutzer
                    const permission = await Notification.requestPermission();
                    
                    if (permission === 'granted') {
                        try {
                            const token = await messaging.getToken({ vapidKey: vapidKey });
                            if (token) {
                                const updatedMembers = family.members.map(m => m.name === user.name ? { ...m, fcmToken: token } : m);
                                await db.collection('families').doc(family.id).update({ members: updatedMembers });
                                showAlert("Erfolg", "Apple Push wurde erfolgreich aktiviert! ✅");
                            }
                        } catch (tokenError) {
                            console.error(tokenError);
                            showAlert("Fast fertig!", "Die Berechtigung wurde erteilt. Bitte lade die App einmal neu, damit das System die Verbindung endgültig herstellen kann.");
                        }
                    } else {
                        showAlert("Abgelehnt", "Du hast die Push-Berechtigung abgelehnt. Du kannst sie in den iPhone-Einstellungen wieder aktivieren.");
                    }
                } catch (error) {
                    console.error(error);
                    showAlert("Fehler", "Fehler bei der Aktivierung. Bitte stelle sicher, dass die App als Icon auf deinem Home-Bildschirm liegt.");
                }
            };

            const sendCall = async () => {
                if (!selectedReason || selectedMembers.length === 0) return;
                setIsSending(true);
                const reasonObj = reasons.find(r => r.id === selectedReason);
                
                // Voice Monkey (Alexa) parallel triggern
                family.members.filter(m => selectedMembers.includes(m.name)).forEach(m => {
                    if (m.voiceMonkey) fetch(m.voiceMonkey).catch(() => {});
                });

                const newEvent = { id: Date.now().toString(), sender: user.name, reason: reasonObj.label, targets: selectedMembers, timestamp: new Date().toISOString(), acks: [] };
                
                // Wir fügen das neue Event ganz Oben ein (damit History absteigend ist)
                const newHistory = [newEvent, ...family.history];
                await db.collection('families').doc(family.id).update({ history: newHistory });

                if (navigator.vibrate) navigator.vibrate(50);
                setSelectedReason(null); setSelectedMembers([]); setIsSending(false); setActiveTab('history');
            };

            const acknowledge = async (id) => {
                const history = [...family.history];
                const item = history.find(h => h.id === id);
                if (item && !item.acks.includes(user.name)) {
                    item.acks.push(user.name);
                    await db.collection('families').doc(family.id).update({ history });
                    if (navigator.vibrate) navigator.vibrate(10);
                }
            };

            const clearHistory = () => {
                showConfirm("Verlauf leeren", "Möchtest du den Ruf-Verlauf für alle Mitglieder dauerhaft löschen?", async () => {
                    await db.collection('families').doc(family.id).update({ history: [] });
                }, true);
            };

            const removeMember = (memberName) => {
                showConfirm("Mitglied entfernen", `Möchtest du ${memberName} wirklich aus der Familie entfernen?`, async () => {
                    const updatedMembers = family.members.filter(m => m.name !== memberName);
                    await db.collection('families').doc(family.id).update({ members: updatedMembers });
                }, true);
            };

            const resetSystem = () => { auth.signOut(); localStorage.clear(); location.reload(); };

            if (loading) return <div className="h-screen flex items-center justify-center text-gray-400 font-medium bg-[#F2F2F7]">Laden...</div>;

            if (view === 'auth') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-8 bg-black text-white relative">
                        <Modal data={modal} onClose={() => setModal(null)} />
                        <div className="w-full max-w-sm space-y-6 animate-in fade-in duration-1000">
                            <div className="text-center relative">
                                <button onClick={resetSystem} className="absolute top-0 right-0 p-2 text-gray-600 hover:text-white"><i data-lucide="refresh-cw" className="w-4 h-4"></i></button>
                                <div className="inline-block p-5 bg-[#007AFF] rounded-[32px] mb-4 shadow-2xl"><i data-lucide="shield-check" className="w-10 h-10 text-white"></i></div>
                                <h1 className="text-3xl font-bold tracking-tight">Family Connect</h1>
                            </div>
                            <div className="flex bg-white/10 p-1 rounded-2xl backdrop-blur-md">
                                {['login', 'join', 'create'].map(m => (
                                    <button key={m} onClick={() => setAuthMode(m)} className={`flex-1 py-2.5 text-xs font-bold rounded-xl transition-all ${authMode === m ? 'bg-white text-black shadow-lg scale-100' : 'text-gray-400 scale-95'}`}>
                                        {m === 'login' ? 'Anmelden' : m === 'join' ? 'Beitreten' : 'Neu'}
                                    </button>
                                ))}
                            </div>
                            <div className="space-y-3">
                                {authMode === 'create' && <input type="text" placeholder="Familienname" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-[#007AFF]" value={form.familyName} onChange={e => setForm({...form, familyName: e.target.value})} />}
                                {authMode === 'join' && <input type="text" placeholder="Familien-ID (6 Ziffern)" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-[#007AFF]" value={form.familyId} onChange={e => setForm({...form, familyId: e.target.value})} />}
                                <input type="text" placeholder="Vorname" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-[#007AFF]" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                <input type="password" placeholder="Passwort" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-[#007AFF]" value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                                <button onClick={handleAuth} className="w-full bg-[#007AFF] py-4 rounded-2xl font-bold active:scale-95 transition-all mt-4">Jetzt Starten</button>
                            </div>
                        </div>
                    </div>
                );
            }

            const availableTargets = family.members.filter(m => m.name !== user.name);
            // Derjenige, der den ersten Platz im Array hat (Ersteller), ist der Admin
            const isAdmin = family.members.length > 0 && family.members[0].name === user.name;

            return (
                <div className="h-screen flex flex-col bg-[#F2F2F7] relative">
                    <Modal data={modal} onClose={() => setModal(null)} />
                    
                    <div className="pt-safe px-6 pb-4 ios-blur border-b border-gray-200/50 flex justify-between items-end sticky top-0 z-40">
                        <h1 className="text-3xl font-extrabold tracking-tight text-black">{activeTab === 'home' ? family.name : activeTab === 'history' ? 'Verlauf' : 'Setup'}</h1>
                        {activeTab === 'history' && family.history.length > 0 && (
                            <button onClick={clearHistory} className="mb-1 text-red-500 font-medium text-sm active:opacity-50 transition-opacity">Verlauf leeren</button>
                        )}
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 pb-40 space-y-6">
                        {activeTab === 'home' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <section>
                                    <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Grund</h2>
                                    <div className="bg-white rounded-[32px] p-5 grid grid-cols-3 gap-4 shadow-sm border border-gray-100">
                                        {reasons.map(r => (
                                            <button key={r.id} onClick={() => { setSelectedReason(r.id); if(navigator.vibrate) navigator.vibrate(10); }} className={`flex flex-col items-center p-3 rounded-2xl transition-all active-scale ${selectedReason === r.id ? 'bg-gray-100 scale-105' : ''}`}>
                                                <div className={`w-14 h-14 rounded-[20px] bg-gray-50 flex items-center justify-center mb-2 shadow-sm ${r.color}`}><i data-lucide={r.icon}></i></div>
                                                <span className={`text-[11px] font-bold ${selectedReason === r.id ? 'text-black' : 'text-gray-500'}`}>{r.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                                <section>
                                    <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Empfänger</h2>
                                    <div className="bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100">
                                        {availableTargets.length === 0 ? (
                                            <div className="p-8 text-center text-gray-400 text-sm">
                                                Du bist noch alleine. Lade Familie über das <span className="font-bold text-black">Setup</span> ein!
                                            </div>
                                        ) : (
                                            availableTargets.map((m, i) => (
                                                <div key={m.name} onClick={() => { setSelectedMembers(prev => prev.includes(m.name) ? prev.filter(x => x !== m.name) : [...prev, m.name]); if(navigator.vibrate) navigator.vibrate(10); }} className={`flex items-center justify-between p-5 cursor-pointer active:bg-gray-50 transition-colors ${i !== availableTargets.length - 1 ? 'border-b border-gray-100' : ''}`}>
                                                    <span className="font-semibold text-lg">{m.name}</span>
                                                    <div className={`w-[51px] h-[31px] rounded-full relative transition-colors duration-300 ${selectedMembers.includes(m.name) ? 'bg-[#34C759]' : 'bg-[#E9E9EB]'}`}>
                                                        <div className={`absolute top-[2px] left-[2px] w-[27px] h-[27px] bg-white rounded-full shadow-md toggle-dot ${selectedMembers.includes(m.name) ? 'translate-x-[20px]' : ''}`}></div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </section>
                                <button onClick={sendCall} disabled={!selectedReason || selectedMembers.length === 0 || isSending} className={`w-full py-5 rounded-[24px] font-bold text-xl transition-all active:scale-[0.98] ${!selectedReason || selectedMembers.length === 0 || isSending ? 'bg-gray-200 text-gray-400' : 'bg-black text-white shadow-xl shadow-black/10'}`}>
                                    {isSending ? 'Sende...' : 'Jetzt rufen'}
                                </button>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                {family.history.length === 0 && (
                                    <div className="text-center text-gray-400 p-8 text-sm mt-10">Bisher keine Rufe im Verlauf.</div>
                                )}
                                {family.history.map(item => {
                                    const isMeTarget = item.targets.includes(user.name);
                                    const IHaveAcked = item.acks.includes(user.name);
                                    return (
                                        <div key={item.id} className="bg-white p-5 rounded-[32px] shadow-sm border border-gray-100 flex flex-col space-y-4">
                                            <div className="flex items-start justify-between">
                                                <div className="flex items-start space-x-4">
                                                    <div className="w-12 h-12 bg-[#F2F2F7] rounded-[18px] flex items-center justify-center shadow-inner mt-1"><i data-lucide="bell" className="w-6 h-6 text-black"></i></div>
                                                    <div><p className="font-bold text-lg tracking-tight leading-tight">{item.reason}</p><p className="text-xs text-gray-500 font-medium mt-1">Von {item.sender}</p></div>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-between">
                                                <div className="flex flex-wrap gap-2">
                                                    {item.targets.map(t => (
                                                        <span key={t} className={`px-3 py-1.5 rounded-full text-[11px] font-bold flex items-center space-x-1.5 border transition-all ${item.acks.includes(t) ? 'bg-green-50 border-green-200 text-green-600' : 'bg-gray-50 border-gray-100 text-gray-400'}`}>
                                                            <span>{t}</span>{item.acks.includes(t) && <i data-lucide="check" className="w-3.5 h-3.5 stroke-[3]"></i>}
                                                        </span>
                                                    ))}
                                                </div>
                                                <span className="text-[11px] font-bold text-gray-400">{new Date(item.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                            </div>
                                            {isMeTarget && !IHaveAcked && item.sender !== user.name && (
                                                <button onClick={() => acknowledge(item.id)} className="w-full bg-[#007AFF]/10 text-[#007AFF] py-4 rounded-2xl font-bold text-[15px] active:scale-[0.97] transition-all flex items-center justify-center gap-2"><i data-lucide="check-circle" className="w-5 h-5"></i>Ich komme!</button>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                
                                {isAdmin && (
                                    <div className="bg-white rounded-[32px] p-6 space-y-4 shadow-sm border border-gray-100">
                                        <h3 className="font-bold text-lg flex items-center gap-3"><i data-lucide="users" className="text-orange-500"></i> Mitglieder verwalten</h3>
                                        <div className="space-y-3">
                                            {family.members.map((m, i) => (
                                                <div key={m.name} className={`flex justify-between items-center pb-2 ${i !== family.members.length - 1 ? 'border-b border-gray-50' : ''}`}>
                                                    <span className="font-medium text-sm text-black">{m.name} {m.name === user.name && <span className="text-gray-400 text-xs ml-1">(Admin / Du)</span>}</span>
                                                    {m.name !== user.name && (
                                                        <button onClick={() => removeMember(m.name)} className="p-2 text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                                                            <i data-lucide="trash-2" className="w-5 h-5"></i>
                                                        </button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="bg-white rounded-[32px] p-6 space-y-5 shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-lg flex items-center gap-3"><i data-lucide="smartphone" className="text-blue-500"></i> Apple Push Setup</h3>
                                    <div className="flex items-center justify-between border-t border-gray-100 pt-4">
                                        <div>
                                            <p className="text-sm font-bold">Push Berechtigung</p>
                                            <p className="text-xs text-gray-500 mt-1">{user.fcmToken ? 'Aktiviert ✅' : 'Nicht aktiviert ❌'}</p>
                                        </div>
                                        <button onClick={requestPushPermission} className="bg-gray-100 text-black px-4 py-2.5 rounded-xl font-bold text-sm active:scale-95 transition-all">
                                            {user.fcmToken ? 'Erneuern' : 'Aktivieren'}
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[32px] p-6 space-y-5 shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-lg flex items-center gap-3"><i data-lucide="speaker" className="text-purple-500"></i> Alexa Setup</h3>
                                    <div className="space-y-2">
                                        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Voice Monkey Link</p>
                                        <input type="text" placeholder="https://api.voicemonkey.io/trigger..." className="w-full bg-[#F2F2F7] p-4 rounded-2xl text-[15px] outline-none focus:ring-2 ring-purple-500/20 transition-all font-medium" defaultValue={user.voiceMonkey} onBlur={async (e) => {
                                            const members = family.members.map(m => m.name === user.name ? {...m, voiceMonkey: e.target.value} : m);
                                            await db.collection('families').doc(family.id).update({ members });
                                        }} />
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 text-center">
                                    <p className="text-sm text-gray-400 mb-2">Familien-ID zum Beitreten:</p>
                                    <p className="text-2xl font-mono font-bold tracking-widest text-black bg-gray-50 inline-block px-6 py-2 rounded-xl">{family.id}</p>
                                </div>
                                <button onClick={resetSystem} className="w-full bg-white text-red-500 py-4 rounded-[28px] font-bold shadow-sm border border-red-50 active:bg-red-50 transition-colors">Vollständig abmelden</button>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-8 left-0 right-0 flex justify-center px-4 pb-safe z-50">
                        <div className="ios-blur w-full max-w-[300px] h-[68px] rounded-full border border-white/50 shadow-2xl relative flex items-center justify-between px-2.5">
                            <div className="absolute h-[52px] bg-black/5 rounded-full liquid-pill" style={{ width: '90px', left: activeTab === 'home' ? '8px' : activeTab === 'history' ? '104px' : '202px' }}></div>
                            <button onClick={() => setActiveTab('home')} className="z-10 w-20 flex flex-col items-center justify-center h-full"><i data-lucide="bell" className={`w-6 h-6 transition-colors duration-300 ${activeTab === 'home' ? 'text-[#007AFF]' : 'text-gray-400'}`}></i><span className={`text-[10px] font-bold mt-1 transition-colors duration-300 ${activeTab === 'home' ? 'text-[#007AFF]' : 'text-gray-400'}`}>Rufen</span></button>
                            <button onClick={() => setActiveTab('history')} className="z-10 w-20 flex flex-col items-center justify-center h-full"><i data-lucide="clock" className={`w-6 h-6 transition-colors duration-300 ${activeTab === 'history' ? 'text-[#007AFF]' : 'text-gray-400'}`}></i><span className={`text-[10px] font-bold mt-1 transition-colors duration-300 ${activeTab === 'history' ? 'text-[#007AFF]' : 'text-gray-400'}`}>Verlauf</span></button>
                            <button onClick={() => setActiveTab('settings')} className="z-10 w-20 flex flex-col items-center justify-center h-full"><i data-lucide="settings" className={`w-6 h-6 transition-colors duration-300 ${activeTab === 'settings' ? 'text-[#007AFF]' : 'text-gray-400'}`}></i><span className={`text-[10px] font-bold mt-1 transition-colors duration-300 ${activeTab === 'settings' ? 'text-[#007AFF]' : 'text-gray-400'}`}>Setup</span></button>
                        </div>
                    </div>
                </div>
            );
        }

        function Root() {
            const [config, setConfig] = useState(() => {
                const saved = localStorage.getItem('firebaseConfig');
                return saved ? JSON.parse(saved) : null;
            });
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                if (config) {
                    try {
                        if (!firebase.apps.length) firebase.initializeApp(config);
                        db = firebase.firestore();
                        auth = firebase.auth();
                        if (firebase.messaging.isSupported()) messaging = firebase.messaging();
                        
                        if ('serviceWorker' in navigator) {
                            const urlParams = `?apiKey=${config.apiKey}&projectId=${config.projectId}&senderId=${config.messagingSenderId}&appId=${config.appId}`;
                            navigator.serviceWorker.register('./firebase-messaging-sw.js' + urlParams);
                        }
                        
                        setIsReady(true);
                    } catch (e) {
                        localStorage.removeItem('firebaseConfig'); setConfig(null);
                    }
                }
            }, [config]);

            if (!config) return <ConfigLoader onConfigLoaded={setConfig} />;
            if (!isReady) return <div className="h-screen bg-black text-gray-400 flex items-center justify-center">Lade...</div>;
            return <App />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
