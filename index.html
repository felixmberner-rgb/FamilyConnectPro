<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Connect Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel (Babel ist notwendig, um JSX im Browser auszuführen) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #F2F2F7;
        }
        .ios-blur { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
        }
        .liquid-pill { 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 44px); }
        
        /* Custom Toggle Appearance */
        .toggle-dot { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
        
        /* Touch Animations */
        .active-scale:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="text-black antialiased overflow-hidden">
    <div id="root"></div>

    <!-- Script muss type="text/babel" haben für JSX Support -->
    <script type="text/babel">
        // --- KONFIGURATION (Bitte mit deinen echten Daten füllen) ---
        const firebaseConfig = {
            apiKey: "DEIN_API_KEY",
            authDomain: "DEIN_PROJEKT.firebaseapp.com",
            projectId: "DEIN_PROJEKT",
            storageBucket: "DEIN_PROJEKT.appspot.com",
            messagingSenderId: "DEINE_SENDER_ID",
            appId: "DEINE_APP_ID"
        };

        const VAPID_KEY = "DEIN_VAPID_PUBLIC_KEY";

        // Firebase Initialisierung
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
        let messaging = null;
        if (firebase.messaging.isSupported()) {
            messaging = firebase.messaging();
        }

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [view, setView] = useState('auth'); 
            const [activeTab, setActiveTab] = useState('home');
            const [user, setUser] = useState(null);
            const [family, setFamily] = useState(null);
            const [loading, setLoading] = useState(true);

            const [authMode, setAuthMode] = useState('login');
            const [form, setForm] = useState({ familyId: '', familyName: '', name: '', password: '' });
            const [error, setError] = useState('');

            const [selectedReason, setSelectedReason] = useState(null);
            const [selectedMembers, setSelectedMembers] = useState([]);
            const [isSending, setIsSending] = useState(false);

            const reasons = [
                { id: 'breakfast', label: 'Frühstück', icon: 'coffee', color: 'text-orange-500' },
                { id: 'lunch', label: 'Mittag', icon: 'utensils', color: 'text-blue-500' },
                { id: 'coffee', label: 'Kaffee', icon: 'utensils-crossed', color: 'text-amber-700' },
                { id: 'dinner', label: 'Abendessen', icon: 'moon', color: 'text-indigo-600' },
                { id: 'play', label: 'Spielen', icon: 'gamepad-2', color: 'text-green-500' },
                { id: 'movie', label: 'Film', icon: 'film', color: 'text-purple-500' }
            ];

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        const savedFamilyId = localStorage.getItem('familyId');
                        const savedName = localStorage.getItem('userName');
                        if (savedFamilyId && savedName) {
                            await loadFamilyData(savedFamilyId, savedName);
                        } else {
                            setLoading(false);
                        }
                    } else {
                        setLoading(false);
                    }
                });
                return unsubscribe;
            }, []);

            // Icons nach jedem Render/Tab-Wechsel aktualisieren
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const loadFamilyData = async (familyId, name) => {
                const doc = await db.collection('families').doc(familyId).get();
                if (doc.exists()) {
                    const data = doc.data();
                    setFamily(data);
                    const member = data.members.find(m => m.name === name);
                    setUser(member);
                    setView('app');
                    
                    db.collection('families').doc(familyId).onSnapshot(snap => {
                        if (snap.exists()) setFamily(snap.data());
                    });
                }
                setLoading(false);
            };

            const handleAuth = async () => {
                setError('');
                try {
                    if (authMode === 'create') {
                        const newId = Math.floor(100000 + Math.random() * 900000).toString();
                        const newFamily = {
                            id: newId,
                            name: form.familyName,
                            members: [{ name: form.name, password: form.password, voiceMonkey: '', fcmToken: '' }],
                            history: []
                        };
                        await db.collection('families').doc(newId).set(newFamily);
                        localStorage.setItem('familyId', newId);
                        localStorage.setItem('userName', form.name);
                        await auth.signInAnonymously();
                        await loadFamilyData(newId, form.name);
                    } else if (authMode === 'join') {
                        const doc = await db.collection('families').doc(form.familyId).get();
                        if (!doc.exists()) throw new Error('Familie nicht gefunden.');
                        const data = doc.data();
                        if (data.members.find(m => m.name === form.name)) throw new Error('Name vergeben.');
                        const newMember = { name: form.name, password: form.password, voiceMonkey: '', fcmToken: '' };
                        await db.collection('families').doc(form.familyId).update({
                            members: firebase.firestore.FieldValue.arrayUnion(newMember)
                        });
                        localStorage.setItem('familyId', form.familyId);
                        localStorage.setItem('userName', form.name);
                        await auth.signInAnonymously();
                        await loadFamilyData(form.familyId, form.name);
                    } else {
                        const snap = await db.collection('families').get();
                        let found = false;
                        snap.forEach(doc => {
                            const d = doc.data();
                            const m = d.members.find(m => m.name === form.name && m.password === form.password);
                            if (m) {
                                localStorage.setItem('familyId', d.id);
                                localStorage.setItem('userName', m.name);
                                auth.signInAnonymously().then(() => loadFamilyData(d.id, m.name));
                                found = true;
                            }
                        });
                        if (!found) throw new Error('Zugangsdaten falsch.');
                    }
                } catch (e) { setError(e.message); }
            };

            const sendCall = async () => {
                if (!selectedReason || selectedMembers.length === 0) return;
                setIsSending(true);
                const reason = reasons.find(r => r.id === selectedReason);
                
                family.members.filter(m => selectedMembers.includes(m.name)).forEach(m => {
                    if (m.voiceMonkey) fetch(m.voiceMonkey).catch(() => {});
                });

                const newEvent = {
                    id: Date.now().toString(),
                    sender: user.name,
                    reason: reason.label,
                    targets: selectedMembers,
                    timestamp: new Date().toISOString(),
                    acks: []
                };

                await db.collection('families').doc(family.id).update({
                    history: firebase.firestore.FieldValue.arrayUnion(newEvent)
                });

                if (navigator.vibrate) navigator.vibrate(50);
                setSelectedReason(null);
                setSelectedMembers([]);
                setIsSending(false);
                setActiveTab('history');
            };

            const acknowledge = async (id) => {
                const history = [...family.history];
                const item = history.find(h => h.id === id);
                if (item && !item.acks.includes(user.name)) {
                    item.acks.push(user.name);
                    await db.collection('families').doc(family.id).update({ history });
                    if (navigator.vibrate) navigator.vibrate(10);
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-gray-400 font-medium">Lädt...</div>;

            if (view === 'auth') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-8 bg-black text-white">
                        <div className="w-full max-w-sm space-y-6">
                            <div className="text-center">
                                <div className="inline-block p-5 bg-blue-600 rounded-[32px] mb-4 shadow-xl">
                                    <i data-lucide="shield-check" className="w-10 h-10 text-white"></i>
                                </div>
                                <h1 className="text-3xl font-bold tracking-tight">Family Connect</h1>
                            </div>

                            <div className="flex bg-white/10 p-1 rounded-2xl">
                                {['login', 'join', 'create'].map(m => (
                                    <button key={m} onClick={() => setAuthMode(m)} className={`flex-1 py-2.5 text-xs font-bold rounded-xl transition-all ${authMode === m ? 'bg-white text-black shadow-lg' : 'text-gray-400'}`}>
                                        {m === 'login' ? 'Anmelden' : m === 'join' ? 'Code' : 'Neu'}
                                    </button>
                                ))}
                            </div>

                            <div className="space-y-3">
                                {authMode === 'create' && <input type="text" placeholder="Familienname" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-500/50" value={form.familyName} onChange={e => setForm({...form, familyName: e.target.value})} />}
                                {authMode === 'join' && <input type="text" placeholder="Familien-ID" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-500/50" value={form.familyId} onChange={e => setForm({...form, familyId: e.target.value})} />}
                                <input type="text" placeholder="Dein Vorname" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-500/50" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                <input type="password" placeholder="Passwort" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-500/50" value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                                {error && <p className="text-red-400 text-xs text-center font-medium">{error}</p>}
                                <button onClick={handleAuth} className="w-full bg-blue-600 py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-blue-600/20">Starten</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-[#F2F2F7]">
                    <div className="pt-safe px-6 pb-4 ios-blur border-b border-gray-200/50 flex justify-between items-end sticky top-0 z-50">
                        <div>
                            <h1 className="text-3xl font-extrabold tracking-tight text-black">
                                {activeTab === 'home' ? family.name : activeTab === 'history' ? 'Verlauf' : 'Setup'}
                            </h1>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 pb-40 space-y-6">
                        {activeTab === 'home' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <section>
                                    <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Grund</h2>
                                    <div className="bg-white rounded-[32px] p-5 grid grid-cols-3 gap-4 shadow-sm border border-gray-100">
                                        {reasons.map(r => (
                                            <button key={r.id} onClick={() => { setSelectedReason(r.id); if(navigator.vibrate) navigator.vibrate(10); }} className={`flex flex-col items-center p-3 rounded-2xl transition-all active-scale ${selectedReason === r.id ? 'bg-gray-100 scale-105' : ''}`}>
                                                <div className={`w-14 h-14 rounded-[20px] bg-gray-50 flex items-center justify-center mb-2 shadow-sm ${r.color}`}>
                                                    <i data-lucide={r.icon}></i>
                                                </div>
                                                <span className={`text-[11px] font-bold ${selectedReason === r.id ? 'text-black' : 'text-gray-500'}`}>{r.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h2 className="text-[13px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Wer?</h2>
                                    <div className="bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100">
                                        {family.members.map((m, i) => (
                                            <div key={m.name} onClick={() => { 
                                                setSelectedMembers(prev => prev.includes(m.name) ? prev.filter(x => x !== m.name) : [...prev, m.name]);
                                                if(navigator.vibrate) navigator.vibrate(10);
                                            }} className={`flex items-center justify-between p-5 cursor-pointer active:bg-gray-50 transition-colors ${i !== family.members.length - 1 ? 'border-b border-gray-100' : ''}`}>
                                                <span className="font-semibold text-lg">{m.name} {m.name === user.name && <span className="text-gray-400 text-sm font-normal ml-1">(Du)</span>}</span>
                                                <div className={`w-[51px] h-[31px] rounded-full relative transition-colors duration-300 ${selectedMembers.includes(m.name) ? 'bg-[#34C759]' : 'bg-[#E9E9EB]'}`}>
                                                    <div className={`absolute top-[2px] left-[2px] w-[27px] h-[27px] bg-white rounded-full shadow-md toggle-dot ${selectedMembers.includes(m.name) ? 'translate-x-[20px]' : ''}`}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <button onClick={sendCall} disabled={!selectedReason || selectedMembers.length === 0} className={`w-full py-5 rounded-[24px] font-bold text-xl transition-all active:scale-[0.98] ${!selectedReason || selectedMembers.length === 0 ? 'bg-gray-200 text-gray-400' : 'bg-black text-white shadow-xl shadow-black/10'}`}>
                                    {isSending ? 'Sende...' : 'Jetzt rufen'}
                                </button>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                {[...family.history].reverse().map(item => {
                                    const isMeTarget = item.targets.includes(user.name);
                                    const IHaveAcked = item.acks.includes(user.name);
                                    
                                    return (
                                        <div key={item.id} className="bg-white p-5 rounded-[32px] shadow-sm border border-gray-100 flex flex-col space-y-4">
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center space-x-4">
                                                    <div className="w-12 h-12 bg-[#F2F2F7] rounded-[18px] flex items-center justify-center shadow-inner">
                                                        <i data-lucide="bell" className="w-6 h-6 text-black"></i>
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-lg tracking-tight">{item.reason}</p>
                                                        <p className="text-xs text-gray-500 font-medium">Von {item.sender}</p>
                                                    </div>
                                                </div>
                                                <span className="text-[11px] font-bold text-gray-300">{new Date(item.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {item.targets.map(t => (
                                                    <span key={t} className={`px-3 py-1.5 rounded-full text-[11px] font-bold flex items-center space-x-1.5 border transition-all ${item.acks.includes(t) ? 'bg-green-50 border-green-200 text-green-600' : 'bg-gray-50 border-gray-100 text-gray-400'}`}>
                                                        <span>{t}</span>
                                                        {item.acks.includes(t) && <i data-lucide="check" className="w-3.5 h-3.5 stroke-[3]"></i>}
                                                    </span>
                                                ))}
                                            </div>
                                            {isMeTarget && !IHaveAcked && item.sender !== user.name && (
                                                <button onClick={() => acknowledge(item.id)} className="w-full bg-[#007AFF]/10 text-[#007AFF] py-4 rounded-2xl font-bold text-[15px] active:scale-[0.97] transition-all flex items-center justify-center gap-2">
                                                    <i data-lucide="check-circle" className="w-5 h-5"></i>
                                                    Bestätigen (Ich komme!)
                                                </button>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-white rounded-[32px] p-6 space-y-5 shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-lg flex items-center gap-3"><i data-lucide="speaker" className="text-purple-500"></i> Alexa Setup</h3>
                                    <div className="space-y-2">
                                        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Voice Monkey Trigger Link</p>
                                        <input type="text" placeholder="https://api.voicemonkey.io/trigger..." className="w-full bg-[#F2F2F7] p-4 rounded-2xl text-[15px] outline-none focus:ring-2 ring-purple-500/20 transition-all font-medium" defaultValue={user.voiceMonkey} onBlur={async (e) => {
                                            const members = family.members.map(m => m.name === user.name ? {...m, voiceMonkey: e.target.value} : m);
                                            await db.collection('families').doc(family.id).update({ members });
                                        }} />
                                        <p className="text-[11px] text-gray-400 px-1 leading-relaxed">Füge hier den Link für die Alexa in deinem Zimmer ein. Wenn jemand dich ruft, wird dieser Link automatisch aufgerufen.</p>
                                    </div>
                                </div>
                                <button onClick={() => { auth.signOut(); localStorage.clear(); location.reload(); }} className="w-full bg-white text-red-500 py-4 rounded-[28px] font-bold shadow-sm border border-red-50 active:bg-red-50 transition-colors">Abmelden</button>
                            </div>
                        )}
                    </div>

                    {/* LIQUID TAB BAR */}
                    <div className="fixed bottom-8 left-0 right-0 flex justify-center px-4 pb-safe z-50">
                        <div className="ios-blur w-full max-w-[300px] h-[68px] rounded-full border border-white/50 shadow-2xl relative flex items-center justify-between px-2.5">
                            {/* Liquid Indicator Pill */}
                            <div className="absolute h-[52px] bg-black/5 rounded-full liquid-pill" style={{
                                width: '90px',
                                left: activeTab === 'home' ? '8px' : activeTab === 'history' ? '104px' : '202px'
                            }}></div>
                            
                            <button onClick={() => setActiveTab('home')} className="z-10 w-20 flex flex-col items-center justify-center h-full">
                                <i data-lucide="bell" className={`w-6 h-6 transition-colors duration-300 ${activeTab === 'home' ? 'text-blue-500' : 'text-gray-400'}`}></i>
                                <span className={`text-[10px] font-bold mt-1 transition-colors duration-300 ${activeTab === 'home' ? 'text-blue-500' : 'text-gray-400'}`}>Rufen</span>
                            </button>
                            <button onClick={() => setActiveTab('history')} className="z-10 w-20 flex flex-col items-center justify-center h-full">
                                <i data-lucide="clock" className={`w-6 h-6 transition-colors duration-300 ${activeTab === 'history' ? 'text-blue-500' : 'text-gray-400'}`}></i>
                                <span className={`text-[10px] font-bold mt-1 transition-colors duration-300 ${activeTab === 'history' ? 'text-blue-500' : 'text-gray-400'}`}>Verlauf</span>
                            </button>
                            <button onClick={() => setActiveTab('settings')} className="z-10 w-20 flex flex-col items-center justify-center h-full">
                                <i data-lucide="settings" className={`w-6 h-6 transition-colors duration-300 ${activeTab === 'settings' ? 'text-blue-500' : 'text-gray-400'}`}></i>
                                <span className={`text-[10px] font-bold mt-1 transition-colors duration-300 ${activeTab === 'settings' ? 'text-blue-500' : 'text-gray-400'}`}>Setup</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Rendern der App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
