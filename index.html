<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FamilyConnect">
    <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>FamilyConnect</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'media' }</script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fastAction = urlParams.get('action');
        if (fastAction === 'shortcut' || fastAction === 'add_shopping') {
            window.isFastMode = true;
            document.addEventListener("DOMContentLoaded", async () => {
                document.body.innerHTML = '<div style="display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;background:#000;color:#fff;font-family:sans-serif;font-size:20px;font-weight:bold;">Verarbeite...</div>';
                try {
                    const cfgStr = urlParams.get('cfg');
                    if (!cfgStr) throw new Error("No config");
                    const config = JSON.parse(decodeURIComponent(escape(atob(cfgStr))));
                    const finalConfig = config.firebaseConfig ? config.firebaseConfig : config;

                    firebase.initializeApp(finalConfig);
                    const db = firebase.firestore();
                    await firebase.auth().signInAnonymously();

                    const fid = urlParams.get('fid');
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-connect-pro';
                    const docRef = db.doc(`artifacts/${appId}/public/data/families/${fid}`);
                    const docSnap = await docRef.get();

                    if (!docSnap.exists) throw new Error("Family not found");
                    const data = docSnap.data();

                    if (fastAction === 'shortcut') {
                        const reasonId = urlParams.get('reason');
                        const REASONS = {
                            'general_meal': { sentence: 'Das Essen ist fertig!', category: 'meal' },
                            'breakfast': { sentence: 'Das Frühstück ist fertig!', category: 'meal' },
                            'lunch': { sentence: 'Das Mittagessen ist fertig!', category: 'meal' },
                            'coffee': { sentence: 'Es gibt Kaffee und Kuchen!', category: 'meal' },
                            'dinner': { sentence: 'Das Abendessen ist fertig!', category: 'meal' },
                            'table': { sentence: 'Hilfe beim Tischdecken wird benötigt!', category: 'push_only' },
                            'message': { sentence: 'Bitte komme ins Wohnzimmer!', category: 'other' },
                            'movie': { sentence: 'Der Film fängt gleich an!', category: 'other' },
                            'game': { sentence: 'Wir wollen spielen, komm dazu!', category: 'other' }
                        };
                        const rObj = REASONS[reasonId] || { sentence: 'Ruf über Kurzbefehl!', category: 'other' };

                        const now = new Date();
                        const isNightMode = now.getHours() >= 22 || now.getHours() < 7;
                        const actualTargets = [];
                        const fetchPromises = [];

                        (data.members || []).forEach(m => {
                            if (m && m.status !== 'pending') {
                                const isDND = m.dndUntil && new Date(m.dndUntil) > now;
                                if (!isDND) {
                                    actualTargets.push(m.name);
                                    if (!isNightMode && rObj.category !== 'push_only') {
                                        const u = rObj.category === 'meal' ? m.voiceMonkeyMeal : m.voiceMonkeyOther;
                                        if (u && u.trim()) fetchPromises.push(fetch(u).catch(() => { }));
                                    }
                                }
                            }
                        });

                        if (actualTargets.length > 0) {
                            const isExpired = (ts) => { if (!ts) return true; const t = new Date(ts).getTime(); return isNaN(t) ? true : (Date.now() - t) > 5 * 60 * 1000; };
                            const cleanHistory = (data.history || []).filter(h => h.isExpense || h.isHousehold || h.isSystemReminder || h.isCustomPush || h.isSwapRequest || h.isSuccessfulSwap || h.isRejectedSwap || h.isPaymentVerification || h.isSettlement || !isExpired(h.timestamp)).slice(0, 50);
                            const newHistoryItem = { id: Date.now().toString(), timestamp: now.toISOString(), sender: 'Extern', reason: rObj.sentence, targets: actualTargets, acknowledgedBy: [], isExpense: false, isResend: false, category: rObj.category, isCustomPush: true };

                            await docRef.update({ history: [newHistoryItem, ...cleanHistory] });
                            await Promise.all(fetchPromises);

                            document.body.innerHTML = '<div style="display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;background:#000;color:#34C759;font-family:sans-serif;font-size:22px;font-weight:bold;">Erfolgreich gesendet! ✅</div>';
                        } else {
                            document.body.innerHTML = '<div style="display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;background:#000;color:#FF9500;font-family:sans-serif;font-size:22px;font-weight:bold;">Alle im Nicht-Stören Modus 🔕</div>';
                        }
                    }
                    else if (fastAction === 'add_shopping') {
                        const itemsParam = urlParams.get('items');
                        if (!itemsParam) throw new Error("No items");
                        const listNameParam = urlParams.get('listName');
                        const userParam = urlParams.get('user');

                        const getCat = (l) => {
                            if (/scheuer|spül|wasch|seife|klo|papier|tuch|shampoo|deo|zahnpasta|müll|putz|creme|dusch|rasier|bürste|schwamm|reiniger|watte|windel|slipeinlage|tampon|binde|rolle|wc|lotion|pflegetücher|waschmittel|klobürste|zahnseide|hygiene/i.test(l)) return 'Haushalt & Drogerie';
                            if (/apfel|äpfel|banan|tomate|gurke|obst|gemüse|salat|zwiebel|kartoffel|knoblauch|beere|traube|paprika|möhre|karotte|pilz|zitrone|orange|birne|birnen|pflaume|melone|kiwi|kürbis|lauch|sellerie|brokkoli|zucchini|apfelsine|mandarine|pfirsich|nektarine|kirsche|avocado|aubergine|spinat|kohl|linsen|bohne|erbse|mais|ananas|mango|spargel|ingwer|kräuter|petersilie|basilikum/i.test(l)) return 'Obst & Gemüse';
                            if (/brot|brötchen|eier|kuchen|mehl|zucker|hefe|toast|croissant|brezel|baguette|backpulver|torte|teig|vanillezucker|pfannkuchen|waffel|breze|\bei\b/i.test(l)) return 'Eier & Backwaren';
                            if (/milch|käse|quark|joghurt|butter|sahne|frischkäse|mozzarella|feta|gouda|pudding|margarine|parmesan|creme fraiche|emmentaler|camembert|mascarpone|ricotta|schmand|eiweiß/i.test(l)) return 'Kühlregal & Käse';
                            if (/wurst|fleisch|schinken|salami|hack|hähnchen|speck|schnitzel|steak|aufschnitt|pute|rind|schwein|lamm|bratwurst|würstchen|fisch|lachs|thunfisch|garnele|cevapcici|kaviar|sushi|forelle/i.test(l)) return 'Fleisch & Fisch';
                            if (/nudel|reis|ketchup|senf|soße|sosse|dose|müsli|haferflocken|öl|oel|essig|gewürz|salz|pfeffer|konserve|pesto|tomaten|suppe|brühe|honig|marmelade|nutella|aufstrich|mayo|sirup|chia|samen|kerne|maggi/i.test(l)) return 'Vorrat & Nährmittel';
                            if (/chips|schoko|keks|eis|süß|gummibär|nuss|riegel|popcorn|flips|nachos|praline|bonbon|kaugummi|mandel|cashew|pistazie|haribo|snickers|twix|mars/i.test(l)) return 'Snacks & Süßes';
                            if (/wasser|bier|wein|cola|saft|limo|kaffee|tee|sprudel|schorle|getränk|energy|sekt|sprit|fanta|sprite/i.test(l)) return 'Getränke';
                            return 'Sonstiges';
                        };

                        const rawLines = decodeURIComponent(itemsParam).split('\n');
                        const newItems = [];
                        const tUser = userParam ? decodeURIComponent(userParam).trim() : 'KI Scanner';
                        const generateId = () => Math.floor(100000 + Math.random() * 900000).toString();

                        rawLines.forEach(line => {
                            let t = line.replace(/^[-*•]\s*/, '').replace(/^\d+[\.)]\s+/, '').trim();
                            if (t) {
                                let itemName = t;
                                let itemAmount = '';
                                
                                const trailMatch = t.match(/\s+(\d+(?:[.,]\d+)?)\s*(x|kg|g|l|ml|pkg|pack|packung|stk|stück|flaschen|flasche|dosen|dose)?$/i);
                                const leadMatch = t.match(/^(\d+(?:[.,]\d+)?)\s*(x|kg|g|l|ml|pkg|pack|packung|stk|stück|flaschen|flasche|dosen|dose)?\s+(.+)$/i);
                                
                                if (trailMatch) {
                                    itemName = t.substring(0, t.length - trailMatch[0].length).trim();
                                    itemAmount = `${trailMatch[1]} ${trailMatch[2] || ''}`.trim();
                                } else if (leadMatch) {
                                    itemName = leadMatch[3].trim();
                                    itemAmount = `${leadMatch[1]} ${leadMatch[2] || ''}`.trim();
                                }
                                
                                newItems.push({ id: generateId(), name: itemName, amount: itemAmount, notes: '', category: getCat(itemName.toLowerCase()), addedBy: tUser, checked: false, timestamp: new Date().toISOString() });
                            }
                        });

                        if (newItems.length > 0) {
                            let lists = data.shoppingLists || [];
                            const tName = listNameParam ? decodeURIComponent(listNameParam).trim() : 'Einkauf (KI)';
                            let targetList = lists.find(l => l.name.trim().toLowerCase() === tName.toLowerCase());

                            if (!targetList) {
                                targetList = { id: generateId(), name: tName, sharedWith: [tUser], createdBy: tUser, items: [], isShoppingActive: false, timestamp: new Date().toISOString() };
                                lists.push(targetList);
                            }
                            targetList.items = [...(targetList.items || []), ...newItems];
                            await docRef.update({ shoppingLists: lists });
                            document.body.innerHTML = `<div style="display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;background:#000;color:#34C759;font-family:sans-serif;font-size:22px;font-weight:bold;">${newItems.length} Artikel importiert! 🛒✅</div>`;
                        } else {
                            document.body.innerHTML = '<div style="display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;background:#000;color:#FF3B30;font-family:sans-serif;font-size:22px;font-weight:bold;">Keine Artikel gefunden ❌</div>';
                        }
                    }
                } catch (e) {
                    document.body.innerHTML = '<div style="display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;background:#000;color:#FF3B30;font-family:sans-serif;font-size:22px;font-weight:bold;">Verbindungsfehler ❌</div>';
                }
                setTimeout(() => {
                    if (window.webkit && window.webkit.messageHandlers) window.webkit.messageHandlers.close.postMessage("");
                    window.close();
                }, 1500);
            });
        }
    </script>

    <style>
        :root { --app-bg: #F2F2F7; }
        @media(prefers-color-scheme:dark) { :root { --app-bg: #000000; } }
        html { background-color: var(--app-bg); height: 100vh; width: 100vw; overflow: hidden; }
        body { margin: 0; padding: 0; background-color: var(--app-bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; overflow: hidden; overscroll-behavior-y: none; height: 100%; width: 100%; }
        .scrollable-area { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(120px + env(safe-area-inset-bottom, 20px)); }
        .scrollable-area::-webkit-scrollbar { display: none; }
        .ios-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
        @media(prefers-color-scheme:dark) { .ios-blur { background: rgba(28, 28, 30, 0.85); } }
        .pt-safe-top { padding-top: max(env(safe-area-inset-top), 24px); }
        input[type="file"] { display: none; }
        input[type="date"]::-webkit-calendar-picker-indicator, input[type="datetime-local"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
        input[type="datetime-local"] { max-width: 100%; box-sizing: border-box; display: block; width: 100%; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-action-sheet { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .custom-checkbox:checked+div { background-color: #34C759; border-color: #34C759; }
        .custom-checkbox:checked+div svg { opacity: 1; }
    </style>
</head>

<body class="text-black dark:text-white antialiased flex justify-center w-full">
    <div id="root" class="w-full h-full relative flex flex-col"></div>

    <script type="text/babel">
        const STYLES = {
            card: "bg-white dark:bg-[#1C1C1E] rounded-[24px] shadow-sm border border-[#E5E5EA] dark:border-[#38383A] overflow-hidden",
            input: "w-full bg-[var(--app-bg)] dark:bg-[#2C2C2E] px-4 py-3.5 rounded-[12px] outline-none font-medium text-[16px] text-black dark:text-white box-border focus:ring-2 ring-[#007AFF]/20",
            btnPrimary: "w-full py-3.5 rounded-[16px] bg-[#007AFF] text-white font-bold text-[17px] active:scale-[0.98] transition-transform shadow-sm disabled:opacity-50",
            btnSecondary: "w-full py-3.5 rounded-[16px] bg-[#F2F2F7] dark:bg-[#2C2C2E] text-black dark:text-white font-bold text-[17px] active:scale-[0.98] transition-transform shadow-sm",
            btnDanger: "w-full py-3.5 rounded-[16px] bg-[#FF3B30]/10 text-[#FF3B30] font-bold text-[17px] active:scale-[0.98] transition-transform shadow-sm",
            modalOverlay: "fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 pb-8 sm:pb-4 bg-black/40 dark:bg-black/60 backdrop-blur-sm transition-opacity animate-in fade-in duration-300",
            modalContent: "bg-white dark:bg-[#1C1C1E] rounded-[32px] p-6 w-full max-w-sm shadow-2xl border border-[#E5E5EA] dark:border-[#38383A] overflow-hidden animate-action-sheet relative flex flex-col max-h-[90vh]",
            subTitle: "text-[13px] font-semibold text-[#8E8E93] uppercase tracking-widest mb-2 ml-2",
            listItem: "flex items-center justify-between bg-[var(--app-bg)] dark:bg-[#2C2C2E] p-3.5 rounded-[14px]"
        };

        const SHOPPING_CATEGORIES = ['Obst & Gemüse', 'Eier & Backwaren', 'Kühlregal & Käse', 'Fleisch & Fisch', 'Vorrat & Nährmittel', 'Snacks & Süßes', 'Haushalt & Drogerie', 'Getränke', 'Sonstiges'];

        function getAutoCategory(i) {
            const l = i.toLowerCase();
            if (/scheuer|spül|wasch|seife|klo|papier|tuch|shampoo|deo|zahnpasta|müll|putz|creme|dusch|rasier|bürste|schwamm|reiniger|watte|windel|slipeinlage|tampon|binde|rolle|wc|lotion|pflegetücher|waschmittel|klobürste|zahnseide|hygiene/i.test(l)) return 'Haushalt & Drogerie';
            if (/apfel|äpfel|banan|tomate|gurke|obst|gemüse|salat|zwiebel|kartoffel|knoblauch|beere|traube|paprika|möhre|karotte|pilz|zitrone|orange|birne|birnen|pflaume|melone|kiwi|kürbis|lauch|sellerie|brokkoli|zucchini|apfelsine|mandarine|pfirsich|nektarine|kirsche|avocado|aubergine|spinat|kohl|linsen|bohne|erbse|mais|ananas|mango|spargel|ingwer|kräuter|petersilie|basilikum/i.test(l)) return 'Obst & Gemüse';
            if (/brot|brötchen|eier|kuchen|mehl|zucker|hefe|toast|croissant|brezel|baguette|backpulver|torte|teig|vanillezucker|pfannkuchen|waffel|breze|\bei\b/i.test(l)) return 'Eier & Backwaren';
            if (/milch|käse|quark|joghurt|butter|sahne|frischkäse|mozzarella|feta|gouda|pudding|margarine|parmesan|creme fraiche|emmentaler|camembert|mascarpone|ricotta|schmand|eiweiß/i.test(l)) return 'Kühlregal & Käse';
            if (/wurst|fleisch|schinken|salami|hack|hähnchen|speck|schnitzel|steak|aufschnitt|pute|rind|schwein|lamm|bratwurst|würstchen|fisch|lachs|thunfisch|garnele|cevapcici|kaviar|sushi|forelle/i.test(l)) return 'Fleisch & Fisch';
            if (/nudel|reis|ketchup|senf|soße|sosse|dose|müsli|haferflocken|öl|oel|essig|gewürz|salz|pfeffer|konserve|pesto|tomaten|suppe|brühe|honig|marmelade|nutella|aufstrich|mayo|sirup|chia|samen|kerne|maggi/i.test(l)) return 'Vorrat & Nährmittel';
            if (/chips|schoko|keks|eis|süß|gummibär|nuss|riegel|popcorn|flips|nachos|praline|bonbon|kaugummi|mandel|cashew|pistazie|haribo|snickers|twix|mars/i.test(l)) return 'Snacks & Süßes';
            if (/wasser|bier|wein|cola|saft|limo|kaffee|tee|sprudel|schorle|getränk|energy|sekt|sprit|fanta|sprite/i.test(l)) return 'Getränke';
            return 'Sonstiges';
        }
        function generateId() { return Math.floor(100000 + Math.random() * 900000).toString(); }
        function getLocalTodayString() { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().slice(0, 10); }
        function getLocalIsoString(addHours) { const d = new Date(); d.setHours(d.getHours() + addHours); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().slice(0, 16); }
        function formatTime(ts) { if (!ts) return ''; const d = new Date(ts); return isNaN(d.getTime()) ? '' : d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
        function formatDate(ts) { if (!ts) return ''; const d = new Date(ts); return isNaN(d.getTime()) ? '' : d.toLocaleDateString('de-DE', { weekday: 'short', year: 'numeric', month: '2-digit', day: '2-digit' }); }
        function getStatusColor(a) {
            if (!a) return 'text-[#8E8E93] dark:text-[#EBEBF5]/60';
            if (a.includes('sofort') || a.includes('Übernommen') || a.includes('Gelesen')) return 'text-[#34C759]';
            if (a.includes('5 Minuten')) return 'text-[#FF9500]';
            if (a.includes('Fangt') || a.includes('Abgelehnt')) return 'text-[#FF3B30]';
            return 'text-[#34C759]';
        }
        function isExpired(ts, mx = 5) { if (!ts) return true; const t = new Date(ts).getTime(); if (isNaN(t)) return true; return (Date.now() - t) > mx * 60 * 1000; }
        function getCleanHistory(hist) { return (hist || []).filter(h => { if (h.isExpense || h.isHousehold || h.isSystemReminder || h.isCustomPush || h.isSwapRequest || h.isSuccessfulSwap || h.isRejectedSwap || h.isPaymentVerification || h.isSettlement) return true; return !isExpired(h.timestamp, 5); }).slice(0, 50); }
        function getSharedWith(obj) { return Array.isArray(obj?.sharedWith) ? obj.sharedWith : (obj?.sharedWith ? [obj.sharedWith] : ['Alle']); }
        function getNextSaturday() { const d = new Date(); const diff = (6 - d.getDay() + 7) % 7; d.setDate(d.getDate() + diff); return d.toISOString().split('T')[0]; }
        function getWeekNumber(d) { d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7)); const ys = new Date(Date.UTC(d.getUTCFullYear(), 0, 1)); return Math.ceil((((d - ys) / 86400000) + 1) / 7); }
        function safeFormatDateTime(ts) { if (!ts) return ''; const d = new Date(ts); if (isNaN(d.getTime())) return ''; return `am ${d.toLocaleDateString('de-DE')} um ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} Uhr`; }

        try {
            const p = new URLSearchParams(window.location.search);
            const c = p.get('cfg');
            if (c) {
                const d = JSON.parse(decodeURIComponent(escape(atob(c))));
                localStorage.setItem('familyConnectAppConfig', JSON.stringify(d));
                localStorage.setItem('firebaseConfig', JSON.stringify(d));
            }
        } catch (e) { }

        const origErr = console.error;
        console.error = function (...a) { origErr.apply(console, a); };
        window.addEventListener('error', () => { });
        window.addEventListener('unhandledrejection', (e) => { if (e.reason && e.reason.toString().includes('Database deleted')) e.preventDefault(); });

        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;

        const CONFIG_STORAGE_KEY = "familyConnectAppConfig";
        let app, db, auth, messaging;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-connect-pro';

        function getFamilyDocRef(fId) { return db.doc(`artifacts/${appId}/public/data/families/${fId}`); }

        const ICONS = {

y)] }); setExpenseModal(null); } catch (e) { } };

                                    <div className="flex justify-between items-center pl-2 pr-1 mb-1"><h2 className={STYLES.subTitle + " !mb-0 !ml-0 whitespace-nowrap"}>Hausarbeiten (Samstag)</h2>{canEditHousehold && <button onClick={() => setHouseholdAdminMode(!householdAdminMode)} className="text-[#007AFF] p-1 flex items-center justify-center">{householdAdminMode ? <span className="text-[14px] font-semibold">Fertig</span> : <Icon name="Pencil" size={18} />}</button>}</div>
                                    {householdAdminMode ? (
                                        <div className={STYLES.card + " p-5"}><h3 className="font-bold text-[18px] mb-4">Aufgaben verwalten</h3><div className="space-y-2 mb-6">{safeHouseholdChores.map(c => (<div key={c.id} className={STYLES.listItem}><span className="font-semibold text-[15px]">{c.name}</span><button onClick={() => handleDeleteChore(c.id)} className="text-[#FF3B30]"><Icon name="Trash2" size={16} /></button></div>))}<div className="flex gap-2 mt-2"><input type="text" placeholder="Neue Aufgabe" className={STYLES.input} value={newChoreName} onChange={e => setNewChoreName(e.target.value)} /><button onClick={handleAddChore} className="bg-[#007AFF] text-white px-4 py-3 rounded-[12px] font-semibold"><Icon name="Plus" size={20} /></button></div></div><h3 className="font-bold text-[18px] mb-4">Wer soll berücksichtigt werden?</h3><div className="space-y-2 mb-6">{activeMembersList.map(m => { const iI = safeHouseholdMembers.includes(m.name); return (<div key={m.name} onClick={() => toggleHouseholdMember(m.name)} className={`${STYLES.listItem} cursor-pointer ${iI ? 'bg-[#007AFF]/10 border border-[#007AFF]/30' : ''}`}><span className={`font-semibold ${iI ? 'text-[#007AFF]' : ''}`}>{m.name}</span>{iI && <Icon name="CheckCircle2" size={20} className="text-[#007AFF]" />}</div>); })}</div><h3 className="font-bold text-[18px] mb-4">Anstehende Aufgaben überschreiben</h3><div className="space-y-4">{householdTasks.filter(t => t.date === upcomingSatDate).map(t => (<div key={t.id} className="p-4 bg-[var(--app-bg)] dark:bg-[#2C2C2E] rounded-[16px]"><p className="font-semibold text-[15px] mb-2">{t.choreName}</p><div className="flex gap-2 overflow-x-auto pb-2"><button onClick={() => handleHouseholdAction(t.id, 'admin_reassign', null)} className={`px-4 py-2 rounded-full text-[14px] font-semibold flex-shrink-0 ${!t.assignedTo ? 'bg-[#FF9500] text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700'}`}>Offen</button>{activeMembersList.map(m => (<button key={m.name} onClick={() => handleHouseholdAction(t.id, 'admin_reassign', m.name)} className={`px-4 py-2 rounded-full text-[14px] font-semibold flex-shrink-0 ${t.assignedTo === m.name ? 'bg-[#007AFF] text-white' : 'bg-white dark:bg-[#1C1C1E] border border-[#E5E5EA] dark:border-[#38383A]'}`}>{m.name}</button>))}</div></div>))}</div></div>
                                    ) : (
                                        <div className="space-y-4">
                                            {householdTasks.filter(t => t.date === upcomingSatDate).length === 0 ? <div className="text-center text-[#8E8E93] font-medium mt-10">Lade Haushaltsplan...</div> : (
                                                householdTasks.filter(t => t.date === upcomingSatDate).map(t => {
                                                    const iMT = t.assignedTo === currentUser.name; const iSR = t.swapRequestedWith === currentUser.name;
                                                    return (
                                                        <div key={t.id} className={STYLES.card}><div onClick={() => setHouseholdHistoryModal(t.choreId)} className="p-5 cursor-pointer"><div className="flex justify-between items-start mb-1"><h3 className="font-bold text-[18px] leading-snug pr-4">{t.choreName}</h3><span className={`text-[11px] font-bold uppercase px-2.5 py-1 rounded-full shrink-0 ${t.status === 'completed' ? 'bg-[#34C759]/20 text-[#34C759]' : t.status === 'open' ? 'bg-[#FF9500]/20 text-[#FF9500]' : 'bg-[#007AFF]/20 text-[#007AFF]'}`}>{t.status === 'completed' ? 'Erledigt' : t.status === 'open' ? 'Offen' : 'Eingeteilt'}</span></div><div className="text-[15px] mt-2"><span className="text-[#8E8E93] mr-2">Zuständig:</span><span className="font-semibold">{t.assignedTo ? t.assignedTo : <span className="text-[#FF9500]">Jeder (Freiwillig)</span>}</span></div>{t.status === 'completed' && t.completedAt && <p className="text-[12px] text-[#34C759] mt-2 font-medium">Erledigt von {t.completedBy}</p>}</div>{t.status !== 'completed' && (<div className="bg-[#F9F9F9] dark:bg-[#2C2C2E] p-4 border-t border-[#E5E5EA] dark:border-[#38383A] flex flex-col gap-2">{isExecutionWindow && iMT && <button onClick={() => handleHouseholdAction(t.id, 'complete')} className={STYLES.btnPrimary + " bg-[#34C759]"}>Als erledigt markieren</button>}{t.status === 'open' && <button onClick={() => handleHouseholdAction(t.id, 'takeover')} className={STYLES.btnPrimary}>Ich übernehme das!</button>}{iMT && t.status !== 'open' && (<div className="flex gap-3 w-full mt-2">{t.swapRequestedWith ? <div className="flex-1 py-3 px-2 text-center bg-[#FF9500]/10 text-[#FF9500] font-semibold text-[13px] rounded-[12px] flex items-center justify-center leading-tight border border-[#FF9500]/20">Anfrage an {t.swapRequestedWith}</div> : <button onClick={() => setHouseholdSwapModal(t.id)} className="flex-1 py-3 px-2 rounded-[12px] bg-[#F2F2F7] dark:bg-[#2C2C2E] text-black dark:text-white font-bold text-[14px] active:scale-[0.98] transition-transform border border-[#E5E5EA] dark:border-[#38383A] shadow-sm">Vertretung</button>}<button onClick={() => handleHouseholdAction(t.id, 'absent')} className="flex-1 py-3 px-2 rounded-[12px] bg-[#FF3B30]/10 text-[#FF3B30] font-bold text-[14px] active:scale-[0.98] transition-transform border border-[#E5E5EA] dark:border-[#38383A] shadow-sm">Nicht da</button></div>)}{iSR && (<div className="flex flex-col gap-2"><p className="text-[13px] text-[#007AFF] font-medium text-center">Du wurdest um Vertretung gebeten!</p><div className="flex gap-3"><button onClick={() => handleHouseholdAction(t.id, 'accept_swap')} className={STYLES.btnPrimary + " !mt-0 !py-3 !text-[14px] flex-1"}>Akzeptieren</button><button onClick={() => handleHouseholdAction(t.id, 'reject_swap')} className={STYLES.btnSecondary + " !mt-0 !py-3 !text-[14px] text-[#FF3B30] flex-1"}>Ablehnen</button></div></div>)}</div>)}</div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5 animate-in fade-in pb-10">
                                    <section>
                                        <h2 className={STYLES.subTitle + " flex items-center gap-2"}><Icon name="BellOff" size={14} /> Nicht stören</h2>
                                        <div className={STYLES.card + " p-5 h-[calc(100%-2rem)]"}>
                                            {activeDND ? (
                                                <div className="flex flex-col justify-center h-full gap-4 bg-[#FF9500]/10 p-5 rounded-[16px] border border-[#FF9500]/20 text-center"><div><p className="font-semibold text-[#FF9500] text-[17px]">Aktiviert bis</p><p className="text-[15px] text-[#FF9500]/80 font-medium">{currentUser?.dndUntil && !isNaN(new Date(currentUser.dndUntil).getTime()) ? new Date(currentUser.dndUntil).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : ''} Uhr</p></div><button onClick={() => setDND(0)} className="bg-[#FF9500] text-white font-semibold px-4 py-3 rounded-[12px] w-full">Beenden</button></div>
                                            ) : (
                                                <div className="flex flex-col h-full justify-between"><p className="text-[14px] font-medium text-[#8E8E93] mb-4">Stumm schalten für:</p><div className="grid grid-cols-2 gap-3 mb-4"><button onClick={() => setDND(0.25)} className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px]">15 Min</button><button onClick={() => setDND(1)} className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px]">1 Std</button><button onClick={() => setDND(8)} className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px]">8 Std</button><button onClick={() => setDND(24)} className="bg-[var(--app-bg)] dark:bg-[#2C2C2E] text-[#007AFF] py-3.5 rounded-[14px] font-semibold text-[15px]">24 Std</button></div><p className="text-[12px] text-[#8E8E93] text-center">Hinweis: Die Alexa bleibt von 22 bis 7 Uhr automatisch immer stumm.</p></div>
                                            )}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className={STYLES.subTitle}>Geräte Setup</h2>
                                        <div className={STYLES.card}>
                                            <div className="p-4 border-b border-[#E5E5EA] dark:border-[#38383A] flex items-center justify-between"><div className="flex items-center space-x-3"><div className="bg-[#007AFF]/10 p-2.5 rounded-[12px]"><Icon name="Smartphone" size={20} className="text-[#007AFF]" /></div><div><p className="font-semibold text-[16px]">Apple Push</p><p className="text-[13px] text-[#8E8E93] font-normal">Status: <span className={currentUser?.fcmToken ? "text-[#34C759] font-medium" : "text-[#FF9500] font-medium"}>{pushStatus}</span></p></div></div><button onClick={() => requestPushPermission(false)} className="bg-[#007AFF]/10 text-[#007AFF] text-[14px] font-semibold px-4 py-2 rounded-full">{currentUser?.fcmToken ? 'Erneuern' : 'Aktivieren'}</button></div>
                                            <div className="p-4 space-y-4"><div className="flex items-center space-x-3 mb-2"><div className="bg-[#AF52DE]/10 p-2.5 rounded-[12px]"><Icon name="Speaker" size={20} className="text-[#AF52DE]" /></div><p className="font-semibold text-[16px]">Alexa Voice Monkey Links</p></div><div><p className={STYLES.subTitle + " !ml-1"}>Für Mahlzeiten</p><input type="url" placeholder="https://api.voicemonkey.io/trigger..." className={STYLES.input} defaultValue={currentUser?.voiceMonkeyMeal} onBlur={e => saveSettings('voiceMonkeyMeal', e.target.value)} /></div><div><p className={STYLES.subTitle + " !ml-1"}>Für Aktivitäten</p><input type="url" placeholder="https://api.voicemonkey.io/trigger..." className={STYLES.input} defaultValue={currentUser?.voiceMonkeyOther} onBlur={e => saveSettings('voiceMonkeyOther', e.target.value)} /></div></div>
                                        </div>
                                    </section>

                                    <section className="md:col-span-2">
                                        <h2 className={STYLES.subTitle + " flex items-center gap-2"}><Icon name="Smartphone" size={14} /> Apple Kurzbefehle & Watch</h2>
                                        <div className={STYLES.card + " p-5"}><p className="text-[14px] text-[#3C3C43] dark:text-[#EBEBF5] mb-5 leading-relaxed">Lade dir hier die fertigen Apple Kurzbefehle herunter, um FamilyConnect auf dem iPhone und der Apple Watch ganz einfach nutzen zu können!</p><div className="flex flex-col sm:flex-row gap-3"><button onClick={() => window.open(currentFamily?.shortcutLinks?.ruf || 'https://www.icloud.com/shortcuts/8cb9c9df77ad4767955b0ffdd167c673', '_blank')} className={STYLES.btnSecondary + " !mt-0 !bg-[#007AFF]/10 !text-[#007AFF] flex justify-center items-center gap-2 active:opacity-70 transition-opacity"}><Icon name="Bell" size={18} /> Ruf-Kurzbefehle</button><button onClick={() => window.open(currentFamily?.shortcutLinks?.scanner || 'https://www.icloud.com/shortcuts/455d20eddef14cb8bfcc9ff10d1c2ae7', '_blank')} className={STYLES.btnSecondary + " !mt-0 !bg-[#AF52DE]/10 !text-[#AF52DE] flex justify-center items-center gap-2 active:opacity-70 transition-opacity"}><Icon name="Sparkles" size={18} /> KI Einkaufs-Scanner</button><button onClick={() => window.open(currentFamily?.shortcutLinks?.film || '#', '_blank')} className={STYLES.btnSecondary + " !mt-0 !bg-[#FF3B30]/10 !text-[#FF3B30] flex justify-center items-center gap-2 active:opacity-70 transition-opacity"}><Icon name="Clapperboard" size={18} /> Film vorschlagen</button></div><p className="text-[12px] text-[#8E8E93] mt-4 text-center">Der KI Scanner benötigt ein iPhone 15 Pro oder neuer.</p></div>
                                    </section>

                                    <div className="md:col-span-2 pt-2 space-y-4">
                                        <button onClick={handleLogout} className="w-full md:max-w-xs mx-auto py-3.5 bg-white dark:bg-[#1C1C1E] text-[#FF3B30] font-semibold rounded-[14px] shadow-sm flex items-center justify-center space-x-2 border border-[#E5E5EA] dark:border-[#38383A]"><Icon name="LogOut" size={20} /><span className="text-[17px]">App & Gerät abmelden</span></button>
                                        
                                        {isAdmin && (
                                            <div className="w-full md:max-w-xs mx-auto">
                                                <button onClick={() => setModal({ type: 'admin_login', onSubmit: handleMasterLoginSettings, onClose: () => setModal(null) })} className="w-full py-3.5 bg-[#1C1C1E] dark:bg-[#2C2C2E] text-white font-semibold rounded-[14px] shadow-sm flex items-center justify-center space-x-2 border border-[#38383A]">
                                                    <Icon name="ShieldCheck" size={18} /><span>Master Dashboard</span>
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                    <LiquidTabBar activeTab={activeTab} setActiveTab={setActiveTab} isKeyboardOpen={isKeyboardOpen} />
                </div>
            );
        }

        function Root() {
            const p = new URLSearchParams(window.location.search);
            const act = p.get('action'); const iS = act === 'shortcut' || act === 'add_shopping';
            const [cfg, setCfg] = useState(() => {
                try {
                    const uC = p.get('cfg'); if (uC) { const d = JSON.parse(decodeURIComponent(escape(atob(uC)))); localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(d)); return d; }
                    if (typeof __firebase_config !== 'undefined' && __firebase_config) return typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
                    const s = localStorage.getItem(CONFIG_STORAGE_KEY) || localStorage.getItem('firebaseConfig'); if (s) return JSON.parse(s);
                } catch (e) { } return null;
            });
            const [s, setS] = useState("booting"); const [eM, setEM] = useState("");

            useEffect(() => {
                if (!cfg) return setS("config-needed"); setS("booting");
                try {
                    const fC = cfg.firebaseConfig ? cfg.firebaseConfig : cfg;
                    if (!firebase.apps.length) app = firebase.initializeApp(fC); else app = firebase.app();
                    db = firebase.firestore(); 
                    try { 
                        db.enablePersistence({ synchronizeTabs: true }).catch(e => { console.warn("Persistence error", e); });
                    } catch (e) { }
                    auth = firebase.auth();
                    messaging = firebase.messaging();
                    setS("ready");
                } catch (e) { setEM("Verbindungsfehler: " + e.message); setS("error"); }
            }, [cfg]);

            if (s === "config-needed") return <ConfigLoader onConfigLoaded={setCfg} />;
            if (s === "error") return (<div className="h-full w-full bg-[var(--app-bg)] dark:bg-black text-black dark:text-white flex flex-col items-center justify-center p-8 text-center relative z-50"><Icon name="ShieldCheck" size={64} className="text-[#FF3B30] mb-4" /><h2 className="text-xl font-bold mb-2">Systemfehler</h2><p className="text-[#FF3B30] text-[15px] mb-8 font-mono bg-[#FF3B30]/10 p-4 rounded-[16px] border border-[#FF3B30]/20">{eM}</p><button onClick={() => { localStorage.removeItem(CONFIG_STORAGE_KEY); localStorage.removeItem('firebaseConfig'); setCfg(null); setS("config-needed"); }} className="w-full bg-[#007AFF] text-white py-3.5 rounded-[16px] font-bold text-[17px] active:scale-[0.98] transition-transform shadow-sm">Neue Config laden</button></div>);
            if (s === "booting") return <div className="h-full w-full bg-[var(--app-bg)] dark:bg-black flex flex-col items-center justify-center relative z-50"><Icon name="ShieldCheck" size={64} className="text-[#007AFF] animate-pulse mb-4" /></div>;
            return <App />;
        }

        if (!window.isFastMode) {
            const root = createRoot(document.getElementById('root'));
            root.render(<Root />);
        }
    </script>
</body>
</html>
